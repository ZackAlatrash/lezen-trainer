het probleem niet kunnen oplossen, kun je contact zoeken met de klachtencommissie. Elke school heeft een klachtencommissie. Schrijf in een brief gedetailleerd wat er gebeurd is en benoem eventueel een oplossing. Stuur kopiën van relevante documenten mee. Het adres van de klachtencommissie kun je krijgen bij het secretariaat van je school.</p><h4>De klachtenprocedure buiten de school</h4><p><strong>De Onderwijsgeschillencommissie</strong><br>Deze commissie gaat zich verdiepen in het probleem tussen jou en de school. Deze commissie is onafhankelijk en hun uitspraak moet worden nageleefd. De meeste scholen zijn aangesloten bij deze commissie, er is dus grote kans dat jij daar terecht kan.</p><p><strong>Onderwijsinspectie</strong><br>Gaan de klachten over structurele tekortkomingen in het onderwijs? Bijvoorbeeld over te weinig lesuren, het uitvallen van vakken en dergelijke? Stuur dan ook een kopie van je klacht of bezwaar naar de onderwijsinspectie. De inspectie zal dan beter controleren op je school. Je kunt online een klachtenformulier invullen. Je klacht kan ook per post naar: Inspectie van het Onderwijs, Postbus 2730, 3500 GS Utrecht.</p><h4>Klachten over intimidatie of discriminatie</h4><p>Heb je een klacht over seksuele intimidatie, geweld, rassendiscriminatie of andere vormen van discriminatie? Meld dit dan op je school en bij het Meldpunt discriminatie.</p><h4>Klachten over beoordelingen</h4><p><strong>De Examencommissie</strong><br>Als je een klacht hebt over een toets die je hebt gemaakt, of je vindt dat je verkeerd beoordeeld bent, dan is er op iedere school een Examencommissie. De Examencommissie bestaat meestal uit mensen van je school. Let op: het kan dus zijn dat daar nét de persoon zit over wie je een klacht indient!</p><p><strong>De Commissie van Beroep</strong><br>Als je het niet eens bent met de Examencommissie dan kun je naar de Commissie van Beroep. In deze commissie kunnen wel mensen van je school zitten, maar ze mogen geen deel uitmaken van het bevoegd gezag en mogen geen lid zijn van de Examencommissie. Een roc kan ook samen met andere roc’s een Commissie van Beroep instellen. De Commissie van Beroep oordeelt over beslissingen van de Examencommissie en de examinatoren. In het OER (onderwijs- en examenreglement) van je opleiding vind je het adres waar je de brief naartoe moet sturen en de reactietermijn die je hebt.</p><h4>Klachten over stagebedrijf</h4><p>Heb je een klacht over je stagebedrijf? Kijk dan op de website van de SBB, de Stichting Samenwerking Beroepsonderwijs Bedrijfsleven (tel. 079-329400). Op www.s-bb.nl vind je bij welk kenniscentrum jouw stagebedrijf is aangesloten. Deze kenniscentra bepalen welke bedrijven stagiairs mogen aannemen. Het is voor hen daarom belangrijk om het te weten als er problemen zijn op een stageplek. Schrijf het kenniscentrum een brief met jouw klacht.</p><h4>Klachten over particuliere opleidingen</h4><p>Als je een particuliere opleiding doet kun je met je klacht bij NRTO terecht, de Nederlandse Raad voor Training en Opleiding. Dit is de belangenorganisatie voor particuliere opleidingen. Tel. 030-7373777.</p><h4>JOB</h4><p>Als je alle informatie op deze webpagina hebt gelezen maar je komt er toch niet uit, bel ons dan of stuur een e-mail. Wij kunnen je helpen met het oplossen van je probleem. Mail je vraag naar info@job.nl of bel naar 020-5244050 (bereikbaar van maandag t/m donderdag van 10:00 tot 13:00 uur en van 14:00 tot 17:00 uur).</p>", "questionRange": [22, 28]}, {"id": 6, "intro": "Deze tekst komt uit een instructieboek voor mensen die bij Lota Thuiszorg werken, een bedrijf in thuiszorg. Een werknemer bij Lota Thuiszorg helpt mensen bij het schoonmaken van hun huis.", "title": "Lota Thuiszorg", "body": "<h2>Lota Thuiszorg</h2><h4>Lota Thuiszorg is gericht op mensen</h4><p>Dienstverlening (en dat is wat we doen) is vóór mensen, dóór mensen. Die mensen staan bij ons dus centraal en daar ben jij, maar ook jouw cliënt, er één van. In alles wat we doen, proberen we die gedachte centraal te stellen. Zijn er dus zaken waarvan jij, of je cliënt denkt dat het beter kan, laat het ons dan weten!</p><h4>Bij Lota Thuiszorg doen we het samen!</h4><p>Iedereen heeft binnen ons bedrijf een eigen taak, iedereen is even belangrijk en iedereen wordt met respect behandeld, ongeacht je functie, geaardheid, afkomst of geloofsovertuiging. Omgekeerd verwachten wij dat natuurlijk ook van jou richting je collega’s en cliënten.</p><h4>Lota Thuiszorg is een sterk groeiende organisatie</h4><p>Er zijn dus volop kansen om je verder te ontwikkelen als je dat zou willen. Vind je het leuk om, eventueel naast het werk bij je bestaande cliënten, leiding te geven aan collega’s? Geef dat bij ons aan. De kans is groot dat we je uitnodigen voor een gesprek!</p><h4>Lota Thuiszorg investeert in langdurige samenwerking</h4><p>Wij investeren continu in die samenwerking. We hebben tijdens ons bestaan nog nooit een contract bij een gemeente verloren. Dit houdt in dat de kans dat je je baan verliest, omdat de gemeente voor een andere aanbieder kiest, maar heel klein is. We doen dus hard ons best om ‘samen oud te worden’; met elkaar, onze cliënten en de verschillende gemeenten.</p><h4>Lota Thuiszorg maakt ook fouten</h4><p>Bijna alles wat we binnen onze organisatie doen, wordt uitgevoerd door mensen. En mensen maken soms fouten. Wij dus soms ook. In dat geval wijzen we elkaar hierop en zoeken we samen naar een oplossing om te voorkomen dat dezelfde fout nog een keer gemaakt wordt.</p><h4>Cliëntveiligheid</h4><p>Bij Lota Thuiszorg willen we dat jij prettig kunt werken in een veilige werkomgeving met zo min mogelijk risico’s. Er is veel aandacht voor jouw veiligheid en samen kunnen we die zo goed mogelijk borgen. Daarnaast is het belangrijk dat we kijken of er door het uitvoeren van jouw werkzaamheden onveilige situaties kunnen ontstaan voor onze cliënten. Hieronder zetten we de meest voorkomende risico’s op een rij.</p><p><strong>Natte vloer: risico op uitglijden</strong><br>Een natte vloer kan glad zijn. Om te voorkomen dat jij of je cliënt uitglijdt dweil/mop je de vloer dus niet nat, maar klamvochtig. Hierdoor droogt de vloer veel sneller en beperken we het risico. Ook meld je altijd even aan de cliënt dat hij de vloer pas weer kan betreden als deze is opgedroogd.</p><p><strong>Schoonmaakmaterialen: risico op struikelen</strong><br>Als je cliënt niet weet dat er een snoer van een stofzuiger of ander elektrisch apparaat op de vloer ligt, kan je cliënt hierover struikelen en vallen. Waarschuw je cliënt hiervoor en rol het snoer, als je het apparaat niet gebruikt, altijd op. Overigens geldt dit voor alle schoonmaakmaterialen die je gebruikt. Als je er niet mee werkt, ruim ze dan op en laat ze niet slingeren in de woning.</p><p><strong>Schoonmaakmiddelen: risico bij menging van producten</strong><br>Het mengen van schoonmaakproducten kan een reactie veroorzaken die voor jou maar ook voor je cliënt schadelijk kan zijn. Meng dus nooit producten met elkaar! Zorg er daarnaast voor dat ze altijd veilig opgeborgen zijn.</p><p><strong>Schoonmaakmiddelen: risico bij jonge kinderen</strong><br>Bij het schoonmaken zul je regelmatig gebruik maken van chemische middelen. Als er jonge kinderen in huis zijn, bestaat er een risico dat ze ongewenst in contact komen met deze chemische producten. Zorg dus altijd dat deze producten tijdens het gebruik buiten het bereik van de kinderen staan. Berg de producten na gebruik veilig op.</p><p><strong>Medische handelingen: risico op verkeerd handelen</strong><br>Als hulp bij het huishouden mag je geen enkele handeling verrichten waarvoor je niet gediplomeerd bent. Onze werkzaamheden hebben uitsluitend betrekking op ondersteuning in de huishouding. Je mag dus geen medicijnen uitdelen, geen steunkousen aandoen en je cliënt niet helpen bij de persoonlijke verzorging zoals wassen, aankleden, etc. Als leidraad kun je voor jezelf aanhouden dat je de cliënt niet mag aanraken om je werk te kunnen doen. We bedoelen dan natuurlijk niet een schouderklopje of een hand geven ter kennismaking. Maar alle handelingen waarbij lichamelijk contact, geneesmiddelen of hulpmiddelen (bijvoorbeeld steunkousen) nodig zijn, mag je in jouw functie niet uitvoeren.</p><h4>Belangrijke aandachtspunten</h4><p><strong>De 5 gouden huisregels</strong></p><ol><li>Gebruik geen water als dat niet nodig is.</li><li>Stof kun je niet vegen. Gebruik dus een stofzuiger en geen bezem.</li><li>Gebruik niet te veel water bij het dweilen en afstoffen.</li><li>Gebruik handwarm water.</li><li>Doseer volgens voorschrift.</li></ol><p><strong>Middelen/materialen</strong></p><ul><li>Gebruik verschillende doekjes voor het sanitair en het interieur. Je kunt het beste gebruik maken van twee verschillende kleuren doekjes, zodat je altijd hetzelfde doekje gebruikt voor het sanitair. Dit doen we zo in verband met de hygiëne. Het is natuurlijk niet fris om met hetzelfde doekje het toilet én het aanrecht schoon te maken.</li><li>Voor de schoonmaak kun je gebruik maken van verschillende producten, afhankelijk van het product dat de cliënt in huis heeft. Let goed op wanneer je welk product gebruikt. Lees altijd het etiket en volg de gebruiksaanwijzing. Maak gebruik van de aangegeven beschermingsmiddelen, zoals handschoenen.</li><li>Gebruik het product alleen waar het voor bedoeld is.</li></ul><p><strong>Veiligheid</strong><br>Let erop dat je werkt met veilige materialen. Is materiaal, zoals een stofzuiger of een huishoudtrap niet veilig of kapot; overleg dan met de cliënt over vervanging. Gebruik nooit onveilig materiaal! Kom je er met de cliënt niet uit, meld het dan aan je zorgcoördinator. Gebruik, voor je eigen veiligheid en die van de cliënt, geen chloor. Chloor is geen schoonmaak- maar een ontsmettingsmiddel! Bij het woord ‘veiligheid’ gaat het niet alleen om jouw veiligheid, maar ook om die van de cliënt. Denk er bijvoorbeeld aan dat een cliënt zou kunnen struikelen over jouw schoonmaakspullen of het snoer van je stofzuiger als je daar geen rekening mee houdt. Eerst denken, dan doen dus!</p><p><strong>Omgaan met cliënten</strong></p><ul><li>Als cliënten je iets willen vragen, of klachten hebben en je kunt ze zelf niet helpen, verwijs ze dan naar je zorgcoördinator of naar het hoofdkantoor.</li><li>Het is belangrijk dat de cliënt de hulp krijgt die nodig is. Merk je dat er veranderingen zijn in de gezondheid of het gedrag van de cliënt, meld dit dan altijd aan je zorgcoördinator of aan het hoofdkantoor.</li><li>Gedraag je professioneel naar de cliënt toe. Bespreek geen persoonlijke zaken.</li><li>Iedere cliënt van Lota Thuiszorg krijgt een zorgmap waarin zijn huishoudhulpen gezamenlijk gegevens bijhouden. Als jouw cliënt geen zorgmap heeft, meld dit dan aan het hoofdkantoor of je zorgcoördinator.</li><li>Om misverstanden te voorkomen is het belangrijk dat je nooit geld of cadeaus van de cliënt aanneemt en geen geld voor de cliënt gaat pinnen.</li><li>Het is niet toegestaan om alleen in de woning te werken. Moet de cliënt weg, dan mag je niet alleen in de woning achterblijven, ook niet voor een korte tijd. Spreek de cliënt erop aan en zoek samen een oplossing.</li><li>Raak kostbare voorwerpen van de cliënt niet aan. Verzoek de cliënt deze zelf schoon te maken. Gaat er per ongeluk iets kapot, meld dit dan altijd direct aan de cliënt, je zorgcoördinator én het hoofdkantoor. Lota Thuiszorg kijkt dan hoe het vergoed kan worden.</li></ul><h4>Contact, ziek melden en werkroosters</h4><p>Heb je algemene vragen, dan is je zorgcoördinator altijd bereid antwoord te geven. Ook op de afdeling planning, personeelszaken en salarisadministratie kun je terecht met al je vragen. Om je zo goed mogelijk te kunnen beantwoorden, verzoeken wij je de vragen schriftelijk of per e-mail aan ons toe te zenden.</p><p><strong>Algemene vragen</strong><br>Wil je iets persoonlijk bespreken, dan is het fijn als je vooraf even een afspraak maakt. Los van dit instructieboekje ontvang je een overzicht met alle contactgegevens waarop duidelijk vermeld staat bij wie je met je vragen terecht kunt.</p><p><strong>Ziekmelding en vrij nemen</strong><br>Kun je niet komen werken, lees dan eerst even goed welke afspraken hierover gemaakt zijn. Onze uitgebreide procedure voor ziek- en betermelding kun je nalezen op onze website en eventueel opvragen via het hoofdkantoor. Om alles in goede banen te leiden, hebben we hiervoor duidelijke regels en zijn er ook voor het aanvragen van vakantie of vrije dagen duidelijke afspraken gemaakt binnen Lota Thuiszorg.</p><p><strong>Samenvatting procedure ziekmelding</strong><br>Als je niet kunt komen werken omdat je ziek bent, geef dit dan zo snel mogelijk, maar in ieder geval vóór 08.30 uur op de dag dat je ziek bent, telefonisch door via het centrale telefoonnummer van het hoofdkantoor. Uitsluitend telefonisch en dus nooit per e-mail of sms. Heb je diezelfde ochtend een cliënt, dan bel je zelf ook de cliënt om door te geven dat je ziek bent. Je andere cliënten bellen wij en natuurlijk proberen we ook vervanging te regelen als de cliënt dat wil.</p><table><tr><td><strong>Contactgegevens</strong></td><td><strong>Antwoordnummer</strong></td></tr><tr><td>Lota Thuiszorg B.V.<br>Prof. Van der Scheerstraat 199<br>2035 AM HAARLEM</td><td>Lota Thuiszorg B.V.<br>Antwoordnummer 1048<br>2000 VB HAARLEM</td></tr><tr><td>Tel. 023 – 55 19 810 (hoofdkantoor)<br>Tel. 076 – 8200244 (kantoor Breda)</td><td>Mail<br>planningpersoneel@lotathuiszorg.nl<br>personeel@lotathuiszorg.nl</td></tr><tr><td>Website<br>www.lotathuiszorg.nl</td><td></td></tr></table><h4>Werkroosters</h4><p>Aan het eind van iedere periode stuur je op vrijdag je getekende werkrooster aan ons op. Zonder dit rooster kunnen wij je loon niet verwerken. Je kunt het mailen aan uren@lotathuiszorg.nl of gratis versturen naar het antwoordnummer. Als je het werkrooster per post verstuurt, stuur dan altijd een kopie op. Mocht het dan per ongeluk kwijtraken in de post, dan heb je nog altijd het origineel.</p><p>Schrijf geen opmerkingen of vragen op je werkrooster! De roosters worden voor een groot deel automatisch verwerkt en je vragen of opmerkingen worden dan dus niet gezien door ons. Ook de tekst die je in het mailtje aan uren@lotathuiszorg.nl typt, wordt niet gelezen. We printen vanuit dit mailadres uitsluitend de werkroosters uit. Als je opmerkingen of vragen hebt, stuur dan dus een apart(e) mailtje of brief aan het hoofdkantoor naar de planning of personeelszaken en dus niet naar het e-mailadres voor de werkroosters.</p>", "questionRange": [29, 35]}], "questions": [{"n": 1, "textId": 1, "prompt": "In welke volgorde moeten cursisten de vakken Marketing, Financiering en Ondernemingsplan volgen?", "options": {"A": "Cursisten mogen zelf bepalen in welke volgorde ze deze vakken willen volgen.", "B": "Cursisten volgen eerst Marketing, daarna Ondernemingsplan en dan Financiering.", "C": "Cursisten volgen eerst Marketing en Financiering, daarna Ondernemingsplan."}, "answer": "C"}, {"n": 2, "textId": 1, "prompt": "Waarover kun je in het studiepakket meer informatie vinden, volgens de tekst?", "options": {"A": "over de betaling", "B": "over de lestijden", "C": "over het certificaat"}, "answer": "C"}, {"n": 3, "textId": 1, "prompt": "Aakash wil zo snel mogelijk aan de cursus beginnen. Waar moet hij dan op letten?", "options": {"A": "dat hij het formulier direct op de post doet", "B": "dat hij meteen betaalt", "C": "dat hij zich inschrijft vóór 13.00 uur"}, "answer": "C"}, {"n": 4, "textId": 1, "prompt": "Waar kun je de cursus doen?", "options": {"A": "bij Stichting Praktijkdiploma Ondernemer MKB", "B": "in een studiecentrum van de Open Universiteit", "C": "thuis"}, "answer": "C"}, {"n": 5, "textId": 2, "prompt": "Wanneer hebben buurtbemiddelaars het belangrijkste doel gerealiseerd?", "options": {"A": "als de ruziënde partijen hun conflict zelf gaan oplossen", "B": "als ze de ruziënde partijen met elkaar in gesprek hebben gebracht", "C": "als ze het conflict tussen de ruziënde partijen hebben opgelost"}, "answer": "A"}, {"n": 6, "textId": 2, "prompt": "Wat staat er in de tekst over de gesprekken van bemiddelaars met de buurtbewoners?", "options": {"A": "De twee bemiddelaars bezoeken alleen de partij waarover de klacht gaat.", "B": "De ene bemiddelaar bezoekt de ene partij en de andere bemiddelaar bezoekt de andere partij.", "C": "De twee bemiddelaars bezoeken samen alle partijen."}, "answer": "C"}, {"n": 7, "textId": 2, "prompt": "Wat is een belangrijke eigenschap voor een buurtbemiddelaar?", "options": {"A": "Een buurtbemiddelaar moet de buurt goed kennen.", "B": "Een buurtbemiddelaar moet hoogopgeleid zijn.", "C": "Een buurtbemiddelaar moet uitstekend kunnen luisteren."}, "answer": "C"}, {"n": 8, "textId": 2, "prompt": "Kunnen ruziënde buurtgenoten worden gedwongen tot buurtbemiddeling?", "options": {"A": "Ja, maar alleen als de politie of een andere instantie ze doorverwijst.", "B": "Ja, maar alleen bij ernstige agressie, verslaving of psychiatrische stoornis.", "C": "Nee, maar als ze eraan beginnen, moeten ze zich aan afspraken houden.", "D": "Nee, maar als ze weigeren wordt de politie of een andere instantie ingeschakeld."}, "answer": "C"}, {"n": 9, "textId": 2, "prompt": "Hoe kun je meer informatie krijgen over buurtbemiddeling?", "options": {"A": "door de folder te lezen die je bij buurtbemiddeling kan krijgen", "B": "door een e-mail te sturen naar de buurtbemiddeling", "C": "door te bellen naar de coördinator buurtbemiddeling"}, "answer": "B"}, {"n": 10, "textId": 2, "prompt": "Wat is het belangrijkste doel van deze tekst?", "options": {"A": "algemene informatie geven over buurtbemiddeling", "B": "duidelijk maken voor wie buurtbemiddeling is bedoeld", "C": "mensen overtuigen om te gaan werken bij buurtbemiddeling"}, "answer": "A"}, {"n": 11, "textId": 3, "prompt": "Hout van eenzelfde soort kan toch anders zijn. Wat kan het gevolg zijn?", "options": {"A": "Het kan moeilijk zijn om een juiste keuze voor hout te maken.", "B": "Het kan moeilijk zijn om hout door ander materiaal te vervangen.", "C": "Het kan moeilijk zijn om hout te verwerken en te gebruiken."}, "answer": "C"}, {"n": 12, "textId": 3, "prompt": "In bepaalde gebieden is het verplicht om bomen opnieuw aan te planten. Waarom is dat verplicht, volgens de tekst?", "options": {"A": "omdat de aarde voor 30% uit bos moet bestaan", "B": "omdat er meer verschillende houtsoorten moeten komen", "C": "omdat er ook in de toekomst voldoende hout moet zijn"}, "answer": "C"}, {"n": 13, "textId": 3, "prompt": "Miriam wil weten welke soorten loofhout er zijn. Waar vindt zij het antwoord?", "options": {"A": "in alinea 7", "B": "in alinea 8", "C": "in alinea 9"}, "answer": "B"}, {"n": 14, "textId": 3, "prompt": "René wil een tafel van naaldhout maken. Waaraan herkent hij vooral het verschil met loofhout?", "options": {"A": "Naaldhout heeft geen groeven.", "B": "Naaldhout heeft meer vaten.", "C": "Naaldhout is minder zacht."}, "answer": "A"}, {"n": 15, "textId": 3, "prompt": "Welk onderdeel van de boom is het meest geschikt als werkhout?", "options": {"A": "de top van de stam", "B": "de middenstam", "C": "de onderstam"}, "answer": "B"}, {"n": 16, "textId": 3, "prompt": "Wat is het doel van deze tekst?", "options": {"A": "studenten informeren over hout als materiaal en de toepassingen ervan", "B": "studenten tips geven hoe zij hout het beste kunnen verwerken tot meubels", "C": "studenten overtuigen dat hout het beste materiaal is om meubels van te maken"}, "answer": "A"}, {"n": 17, "textId": 4, "prompt": "Hoe denkt Marco de Vos over individueel roosteren op zijn werk?", "options": {"A": "Hij denkt dat het onmogelijk is.", "B": "Hij twijfelt of hij het handig vindt.", "C": "Hij vindt het een goed idee."}, "answer": "B"}, {"n": 18, "textId": 4, "prompt": "Waarom is het belangrijk dat iemand die meewerkt op de afdeling de roosters maakt, volgens Ineke Calis?", "options": {"A": "omdat die persoon de roosteraanvragen goed op elkaar af kan stemmen", "B": "omdat die persoon precies weet of iemand te veel zware diensten heeft", "C": "omdat die persoon rekening kan houden met de thuissituatie van collega’s"}, "answer": "B"}, {"n": 19, "textId": 4, "prompt": "Waarover verschillen Marco de Vos en Ineke Calis van mening?", "options": {"A": "over de nachtdiensten", "B": "over de slaaptijden", "C": "over het eetpatroon"}, "answer": "C"}, {"n": 20, "textId": 4, "prompt": "Welke conclusie over individueel roosteren trekt de schrijver van deze tekst?", "options": {"A": "Werknemers kunnen zo hun eigen werktijden kiezen, maar onregelmatig werken blijft zwaar.", "B": "Werknemers kunnen zo hun werktijden veranderen, maar dat is extra zwaar voor het lichaam.", "C": "Werknemers willen zo hun werk afstemmen op de thuissituatie, maar dat lukt vaak niet goed."}, "answer": "A"}, {"n": 21, "textId": 4, "prompt": "Voor wie is deze tekst geschreven?", "options": {"A": "voor werkgevers en werknemers die overwegen een flexibel rooster te gebruiken", "B": "voor werkgevers en werknemers die vooral ’s nachts moeten werken", "C": "voor werkgevers met veel specialistische werknemers in hun bedrijf"}, "answer": "A"}, {"n": 22, "textId": 5, "prompt": "Waarom is het belangrijk om een klacht ook bij de studentenraad te melden?", "options": {"A": "omdat zij de klacht doorgeven aan de directie", "B": "omdat zij meebeslissen bij het oplossen van de klacht", "C": "omdat zij werken aan de verbetering van het onderwijs"}, "answer": "C"}, {"n": 23, "textId": 5, "prompt": "Janne heeft een klacht over haar docent. Bij wie moet ze die klacht als eerste melden, volgens de tekst?", "options": {"A": "bij de directeur", "B": "bij de klachtencommissie", "C": "bij haar mentor"}, "answer": "C"}, {"n": 24, "textId": 5, "prompt": "Macy heeft een klachtenbrief gestuurd naar de directie van haar school. Wat is nu de volgende stap?", "options": {"A": "Er wordt een afspraak gemaakt waarin ze haar klacht kan uitleggen.", "B": "Haar klacht wordt doorgestuurd naar de interne klachtencommissie.", "C": "Ze krijgt een brief terug over wat de directie met haar klacht zal doen."}, "answer": "A"}, {"n": 25, "textId": 5, "prompt": "Lynn heeft tijdens haar examen veel last gehad van lawaai door een verbouwing. Ze wil een klacht indienen. Waar kan ze dat het beste doen?", "options": {"A": "bij de Commissie van Beroep", "B": "bij de Examencommissie", "C": "bij de interne klachtencommissie", "D": "bij de Onderwijsgeschillencommissie"}, "answer": "B"}, {"n": 26, "textId": 5, "prompt": "Kevin loopt stage bij een bakkerij, maar hij is niet tevreden over de begeleiding door zijn baas. Hoe kan hij een klacht indienen?", "options": {"A": "door te bellen met de SBB", "B": "door te schrijven naar het kenniscentrum", "C": "via de website van JOB"}, "answer": "B"}, {"n": 27, "textId": 5, "prompt": "Wanneer kun je terecht bij het JOB?", "options": {"A": "als je een klacht hebt die over iets anders gaat dan je school", "B": "als je een klacht over school hebt, maar niet weet wat je moet doen", "C": "als je het niet eens bent met de oplossing van de geschillencommissie"}, "answer": "B"}, {"n": 28, "textId": 5, "prompt": "Wat is het doel van deze tekst?", "options": {"A": "lezers informeren over wat er gebeurt bij het behandelen van een klacht", "B": "lezers overtuigen om bij problemen de klacht altijd te melden", "C": "lezers uitleggen op welke manieren ze klachten kunnen doorgeven"}, "answer": "C"}, {"n": 29, "textId": 6, "prompt": "Wat is het doel van de eerste pagina van de tekst?", "options": {"A": "werknemers ervan overtuigen dat Lota Thuiszorg de allerbeste zorg biedt", "B": "werknemers inlichten over welke normen Lota Thuiszorg belangrijk vindt", "C": "werknemers waarschuwen voor de risico’s van werken in de thuiszorg"}, "answer": "B"}, {"n": 30, "textId": 6, "prompt": "Sandra werkt bij Lota Thuiszorg en maakt zich zorgen over de gezondheid van haar cliënt. Waar staat wat ze moet doen?", "options": {"A": "op de pagina ‘Lota Thuiszorg’", "B": "op de pagina ‘Cliëntveiligheid’", "C": "op de pagina ‘Belangrijke aandachtspunten’"}, "answer": "C"}, {"n": 31, "textId": 6, "prompt": "Patrick maakt schoon bij een cliënt met een kapotte stofzuiger. Waar staat wat hij moet doen?", "options": {"A": "onder ‘Schoonmaakmaterialen: risico op struikelen’", "B": "onder ‘Middelen/materialen’", "C": "onder ‘Veiligheid’"}, "answer": "C"}, {"n": 32, "textId": 6, "prompt": "Jonna heeft een vraag over haar ingevulde werkrooster. Wat moet ze doen?", "options": {"A": "de vraag op haar werkrooster schrijven", "B": "een brief of e-mail sturen naar het hoofdkantoor", "C": "een e-mail sturen naar uren@lotathuiszorg.nl"}, "answer": "B"}, {"n": 33, "textId": 6, "prompt": "Caroline is bij meneer Balhadj thuis om schoon te maken. Meneer Balhadj wil in zijn eentje boodschappen doen. Wat kan Caroline het beste zeggen?", "options": {"A": "“Als u me het geld voor de boodschappen geeft, ga ik wel even.”", "B": "“Dat is goed. Dan kan ik uw huis verder schoonmaken.”", "C": "“Wilt u even wachten tot ik klaar ben met schoonmaken?”"}, "answer": "C"}, {"n": 34, "textId": 6, "prompt": "Noura moet vanochtend naar een cliënt, maar Noura is ziek. Wie moet ze bellen?", "options": {"A": "alleen het hoofdkantoor", "B": "het hoofdkantoor en de cliënt van deze ochtend", "C": "het hoofdkantoor en al haar cliënten van vandaag"}, "answer": "B"}, {"n": 35, "textId": 6, "prompt": "Jos wil chemische schoonmaakmiddelen gebruiken bij het schoonmaken. Welke waarschuwing geeft de tekst?", "options": {"A": "Doe dit niet, dit kan schadelijk zijn voor je cliënt en voor jou.", "B": "Let erop dat je deze producten niet bij apparaten gebruikt.", "C": "Meld het aan je cliënt wanneer je deze producten gebruikt.", "D": "Zorg dat kinderen niet bij deze producten kunnen komen."}, "answer": "D"}]}, {"id": "2023", "year": 2023, "title": "B1 Lezen 2023 — Openbaar examen", "timeLimitMin": 110, "passMark": 23, "totalQuestions": 35, "texts": [{"id": 1, "intro": "Deze tekst staat op de website van onderwijsinstelling Ameda. Je kan bij Ameda een thuisstudie doen, maar ook lessen volgen op school. Deze tekst gaat over de mbo-opleidingen van Ameda.", "title": "Vijf fabels over mbo-opleidingen van Ameda", "body": "<p><strong>Voor het mbo heb je alleen je handen nodig, geen hersens.</strong></p><p>I &nbsp; Niet waar. Bij Ameda vind je 29 erkende mbo-opleidingen die je perfect voorbereiden op het bedrijfsleven, variërend van boekhouder en kinderleidster tot dierenartsassistent en beveiliger. Je leert allerlei taken uit te voeren. Kies je bijvoorbeeld voor de opleiding Dierenartsassistent? Dan leer je niet alleen alles over operatie-instrumenten en de hygiëne bij operaties; je doet ook communicatieve vaardigheden op en je leert onder meer bepaalde receptiewerkzaamheden uitvoeren. De mbo-opleidingen van Ameda bereiden je dus voor op alle aspecten van een beroep!</p><p><strong>Bij Ameda zit tussen onderwijs en praktijk een wereld van verschil.</strong></p><p>II &nbsp; Onjuist! Ameda bepaalt samen met het bedrijfsleven aan welke eisen bepaalde opleidingen moeten voldoen en over welke inzichten, kennis en vaardigheden je aan het einde van de opleiding moet beschikken. Doordat het onderwijs en de praktijk juist wél goed op elkaar aansluiten, heb je als mbo-student nadat je je diploma hebt behaald een heel grote kans om supersnel een baan te vinden. Dat is ook logisch, want tijdens je opleiding word je uitstekend voorbereid op de praktijk!</p><p><strong>Ameda-studenten zijn een nummer, ze krijgen geen individuele begeleiding.</strong></p><p>III &nbsp; Zeker niet! Een Ameda-opleiding is ingericht als individueel leertraject. Kies je voor een mbo-opleiding van Ameda, dan krijg je tijdens je opleiding professionele begeleiding van deskundige docenten uit het vakgebied. Zij geven je feedback en kijken je huiswerkopdrachten na, doorgaans binnen 48 uur. En heb je vragen? Dan kun je natuurlijk ook altijd bij je docent terecht. En vind je het fijn om met je medestudenten van gedachten te wisselen? Dat kan via Ameda Campus, de digitale leeromgeving van Ameda!</p><p><strong>Een mbo-diploma van Ameda is niet erkend.</strong></p><p>IV &nbsp; Echt niet! Alle mbo-opleidingen van Ameda:</p><ul><li>staan onder toezicht van de Inspectie van het Onderwijs;</li><li>zijn geregistreerd bij het Centraal Register Beroepsopleidingen (CREBO);</li><li>zijn erkend door het ministerie van Onderwijs, Cultuur en Wetenschap (OC&amp;W).</li></ul><p>Mbo-opleidingen van Ameda vallen onder de Wet Educatie en Beroepsonderwijs (WEB). Dit houdt in dat het door de minister erkende opleidingen zijn, die geheel voldoen aan de kwaliteitseisen die de overheid aan officiële mbo-opleidingen stelt. Een mbo-diploma van Ameda heeft dus exact dezelfde waarde als dat van bijvoorbeeld een ROC. Jaarlijks volgen ruim 5000 studenten een mbo-opleiding bij Ameda. Dit maakt Ameda tot één van de grootste mbo-opleiders van Nederland!</p><p><strong>Bij Ameda loop je geen stage.</strong></p><p>V &nbsp; Niet waar! De beroepspraktijkvorming (BPV) vormt een belangrijk onderdeel van je opleiding. Tijdens de stage pas je de opgedane theorie toe in de praktijk van je toekomstige beroep. Hierdoor doe je bepaalde vaardigheden op die je alleen in de praktijk kunt leren en krijg je een uitstekend beeld van de dagelijkse gang van zaken van je (toekomstige) beroep! Tijdens de BPV word je intensief begeleid door een praktijkbegeleider, een ervaren medewerker van het bedrijf waar je werkt. Bovendien krijg je door Ameda ook een BPV-begeleider toegewezen. De BPV-begeleider geeft jou en je praktijkbegeleider tussentijds feedback en advies!</p>", "questionRange": [1, 6]}, {"id": 2, "intro": "Deze tekst komt uit een studieboek. De tekst gaat over een ondernemingsraad in een bedrijf.", "title": "De rol van de ondernemingsraad", "body": "<h4>Taken</h4><p>Een ondernemingsraad (OR) bestaat uit werknemers die namens het personeel overleg voeren met de werkgever. Zij overleggen over het ondernemingsbeleid en de personeelsbelangen. De OR moet de wensen van de werknemers aan de werkgever duidelijk maken. Daar hoort bijvoorbeeld bij:</p><ul><li>werkoverleg bevorderen;</li><li>zorgen voor goede arbeidsomstandigheden;</li><li>zorgen voor de naleving van voorschriften op het gebied van de arbeidsvoorwaarden, arbeidstijden en rusttijden;</li><li>interne milieuzorg;</li><li>gelijke behandeling van vrouwen en mannen;</li><li>inschakeling van werknemers met een beperking.</li></ul><h4>Overlegvergadering</h4><p>Minstens twee keer per jaar bespreken de OR en de werkgever in de overlegvergadering de algemene gang van zaken van de onderneming. De werkgever deelt mee welke belangrijke besluiten hij voorbereidt over financiën of de organisatie en spreekt met de OR af wanneer en hoe de OR in de besluitvorming wordt betrokken.</p><h4>Schriftelijke afspraken</h4><p>De OR en de werkgever hebben ruimte om eigen afspraken te maken. Deze afspraken kunnen bijvoorbeeld gaan over de nadere uitwerking van wettelijke verplichtingen of over het toekennen van extra bevoegdheden en/of voorzieningen. De afspraken moeten schriftelijk worden vastgelegd, bijvoorbeeld in een apart document (de ondernemingsovereenkomst) of in goedgekeurde notulen van de overlegvergadering.</p><h4>Achterban raadplegen</h4><p>De OR kan bij belangrijke kwesties de werknemers van het bedrijf (de achterban van de OR) raadplegen. De werkgever dient de OR in staat te stellen de werknemers van het bedrijf te raadplegen en dient dus ook de werknemers in de gelegenheid te stellen hieraan mee te werken.</p><h4>Bevoegdheden</h4><p>De OR heeft vier bevoegdheden, namelijk:</p><ul><li>adviesrecht</li><li>instemmingsrecht</li><li>initiatiefrecht</li><li>informatierecht</li></ul><h4>Adviesrecht</h4><p>De werkgever moet een adviesaanvraag schriftelijk aan de OR voorleggen. Hij moet dit tijdig doen zodat het advies van de OR echt van invloed kan zijn op het besluit.</p><p>De werkgever moet de OR om advies vragen als hij:</p><ul><li>een belangrijk besluit wil nemen, zoals bij financiële en organisatorische zaken (bijvoorbeeld over een grote investering, een fusie of andere vorm van samenwerking met een andere onderneming of sluiting van -een deel van- de onderneming);</li><li>een ingrijpende technologische voorziening wil invoeren of wijzigen;</li><li>belangrijke milieumaatregelen wil treffen;</li><li>een belangrijk krediet wil geven aan een andere onderneming of zich garant stelt voor een grote schuld van een andere onderneming;</li><li>bestuurders wil benoemen of ontslaan.</li></ul><p>De OR kan het oneens zijn met de plannen van de werkgever. De OR krijgt dan een maand de tijd om de zaak voor te leggen aan de Ondernemingskamer van het gerechtshof te Amsterdam. Die beoordeelt of het besluit redelijk is. De Ondernemingskamer kan de werkgever verplichten het besluit in te trekken of de gevolgen ervan ongedaan te maken.</p><h4>Instemmingsrecht</h4><p>In bepaalde gevallen moet een werkgever instemming verkrijgen van de OR, dat wil zeggen dat de OR toestemming geeft voor het besluit.</p><p>De werkgever moet de OR instemming vragen voor het vaststellen, wijzigen of intrekken van:</p><ul><li>regelingen voor werktijden, vakantie, arbeidsomstandigheden, personeelsopleidingen, personeelsbeoordelingen;</li><li>regels voor het aanstellen, bevorderen of ontslaan van medewerkers;</li><li>een beloningssysteem of functiewaarderingssysteem;</li><li>een personeelsvolgsysteem of registratiesysteem;</li><li>de registratie van, omgang met en bescherming van persoonsgegevens;</li><li>regelingen voor ziekteverzuim.</li></ul><p>Als de OR niet instemt met een besluit van de werkgever, kan de werkgever de bedrijfscommissie om hulp vragen. Heeft dit geen resultaat, dan kan de werkgever de kantonrechter toestemming vragen voor zijn besluit.</p><p>De kantonrechter geeft alleen toestemming als:</p><ul><li>de beslissing van de ondernemingsraad onredelijk is;</li><li>de werkgever zijn besluit neemt vanwege zwaarwegende redenen.</li></ul><p>De werkgever kan de regeling niet invoeren zonder de instemming van de OR of de toestemming van de kantonrechter.</p><h4>Initiatiefrecht</h4><p>De OR mag op eigen initiatief de werkgever voorstellen doen over alle sociale, organisatorische, financiële en economische zaken van de onderneming. Voordat de werkgever over het voorstel beslist, moet hij minstens één keer met de OR overleggen. Na dit overleg moet de werkgever zo snel mogelijk schriftelijk en gemotiveerd aan de OR meedelen of hij het voorstel overneemt.</p><h4>Informatierecht</h4><p>De werkgever heeft de plicht ongevraagd informatie te geven over de jaarrekening, het sociaal jaarverslag en beleidsplannen. Daarnaast moet de werkgever alle informatie geven waar de OR om vraagt. Dat wil zeggen: als de OR die informatie nodig heeft om zijn taak te kunnen uitvoeren. Wil de werkgever de informatie niet geven, dan kan de OR de bedrijfscommissie vragen te bemiddelen.</p>", "questionRange": [7, 11]}, {"id": 3, "intro": "Dit artikel uit een tijdschrift gaat over de vraag of we ons gelukkiger gaan voelen als we rijker worden.", "title": "Maakt geld ons gelukkig?", "body": "<h4>Rijker, dus gelukkiger?</h4><p>Wie rijker wordt, wordt gelukkiger. Maar als een samenleving als geheel meer gaat verdienen, wordt daar niemand gelukkiger van. Bijvoorbeeld Amerikanen, Japanners en Europeanen werden in de afgelopen vijftig jaar gemiddeld veel rijker maar niet gelukkiger. Dat geldt dus ook voor Nederlanders.</p><p>Dit blijkt uit onderzoek naar het verband tussen rijkdom en mate van geluksgevoel. Professor Richard Layard van de London School of Economics dook in psychologie-, sociologie- én economiestudies om deze onderzoeksresultaten nader te verklaren.</p><h4>Gewenning</h4><p>Een verklaring is gewenning: we gaan een betere levensstandaard al gauw als gewoon ervaren. Een verbetering maakt ons voor even gelukkig, maar dat effect verdwijnt snel.</p><p>In een Nederlandse woning eind jaren zestig van de vorige eeuw was centrale verwarming een luxe. Intussen vinden we dit al lang normaal, of zelfs een noodzaak.</p><h4>Vergelijken met buren</h4><p>Een tweede en veel belangrijkere verklaring vond professor Layard in onze neiging om onze eigen situatie te vergelijken met die van anderen.</p><p>Aan studenten werd gevraagd waaraan ze de voorkeur zouden geven: aan € 50.000 per jaar terwijl anderen de helft kregen, of aan € 100.000 per jaar terwijl anderen twee keer zoveel ontvingen. De meerderheid koos voor het eerste. Ze kregen liever het lagere bedrag zolang dat meer was dan wat anderen ontvingen.</p><p>We vinden een vergelijking van onze inkomsten met die van anderen belangrijker dan ons feitelijke inkomen op zich. Onze tevredenheid over een inkomensverbetering verdwijnt zodra we horen dat een collega nog meer salarisverhoging krijgt.</p><p>Maar we worden er ook niet gelukkiger van als we met z&#8217;n allen meer gaan werken om meer te kunnen verdienen en uitgeven. Erger nog: dat kan ons zelfs ongelukkiger maken.</p><h4>Vrije tijd</h4><p>Aan dezelfde studenten werd ook gevraagd om te kiezen tussen twee weken vrij terwijl anderen slechts één week kregen, ofwel vier weken vrij terwijl anderen acht weken kregen. Ditmaal koos een duidelijke meerderheid voor het laatste.</p><p>We wedijveren over ons inkomen, maar niet over onze vrije tijd.</p>", "questionRange": [12, 17]}, {"id": 4, "intro": "Deze tekst gaat over het werk van een dolfijnentrainer in het Dolfinarium. Het Dolfinarium is een dierenpark met zeedieren.", "title": "Emma is dolfijnentrainer", "body": "<p>Sommige mensen hebben van die beroepen waarvan je denkt: wat gaaf! In deze rubriek laten we deze mensen aan het woord over hun carrière. Deze keer Emma. Zij is dolfijnentrainer!</p><p>Emma (28) heeft een niet veelvoorkomende, maar dol-fijne baan. En dit keer vrij letterlijk! Al 4 jaar werkt zij met veel liefde als dolfijnentrainer. &#8220;Ondanks dat ik het altijd in mijn achterhoofd heb gehad, had ik nooit verwacht dat ik in dit wereldje terecht zou komen. Totdat ik een oproep zag om mee te doen aan een wedstrijd bij het Dolfinarium.&#8221; Ze schreef zich in, kwam en won. &#8220;Ik moest acteren, me voorstellen aan de jury, oefenen met een vliegsysteem en nadat ik ook nog een zwem- en fitheidstest had gedaan, had ik gewoon gewonnen! Daarna ging het heel snel. Ik kreeg de kans om daar te werken, en pakte deze kans dan ook met beide handen aan.&#8221;</p><h4>Bijzondere baan</h4><p>Alhoewel ze denkt dat je met een opleiding als Dierenverzorging de meeste kans maakt om dolfijnentrainer te worden, heeft de enthousiaste dierenliefhebber veel verschillende opleidingen gedaan. &#8220;Behalve iets met dieren&#8221;, zegt ze lachend. &#8220;Een gerichte opleiding tot dolfijnentrainer bestaat er niet. Het is geluk hebben en ik ben er plotseling en totaal onverwacht ingerold.&#8221; Wat natuurlijk niet betekent dat ze niet dolblij is met deze baan. De Harderwijkse betitelt haar baan als heel bijzonder. &#8220;Er zijn maar weinig dolfijnentrainers en het is heel speciaal om één op één met het dier te zijn. Zowel in, als buiten de show. De dolfijnen moeten jou vertrouwen, en als ze jou écht vertrouwen, geven ze zich helemaal over. Die vertrouwensband is echt iets moois!&#8221; Ook haar omgeving is te spreken over haar bijzondere baan. &#8220;Iedereen reageert enthousiast. Op een verjaardagsfeestje reageren gasten die er niet vanaf weten meestal verbaasd, omdat je het gewoon niet zo vaak hoort. Voor je het weet zijn we dan een uur over mijn baan als dolfijnentrainer aan het praten.&#8221;</p><h4>Werken als dolfijnentrainer</h4><p>&#8220;Hoe mijn werkdag eruitziet hangt ervan af of het Dolfinarium open of dicht is, en van hoeveel shows we hebben als het park open is. Meestal begin ik de dag met voorbereiden. Dit houdt in dat ik begin met schoonmaken, de vis ga snijden, alle attributen klaarleg voor de show en soms hebben we nog een training van tevoren. Na de show loop ik een rondje langs de mensen die meestal even een praatje willen maken of met je op de foto willen. Vervolgens verzamel ik alles weer en bereid ik me voor op de volgende show. Men denkt vaak dat ik alleen maar in het water lig, maar dit is totaal niet zo. Er gebeurt juist veel eromheen.&#8221; Behalve allerlei trainingen en voorbereidingen, is Emma ook druk met de dolfijnen zelf. &#8220;Elke dag kijken we hoe het gaat met de dieren, ze worden nauwlettend in de gaten gehouden qua gezondheid. Dit doen we door middel van speciale trainingen, door hun temperatuur op te meten en ze te wegen; we zijn altijd druk met ze.&#8221;</p><h4>Een leuke show</h4><p>Om een goede dolfijnentrainer te zijn moet je dan ook veel in huis hebben. Je bent een bezig bijtje en een echte teamspeler. &#8220;Je werkt altijd in een team, dus dat is een vereiste. Behalve dat moet je fysiek in orde, sportief, enthousiast, een dierenliefhebber en een entertainer zijn. Oh, en je moet niet vies zijn van vis, want daar ruik je de hele dag naar.&#8221; Ondanks dat Emma niet echt een nadeel ervaart van haar baan, vindt ze de vis toch wel een minpuntje. Ook geeft ze aan dat het lichamelijk best zwaar is. &#8220;Je moet een goede conditie hebben. Iedereen ziet een leuke show: je geeft een teken en het dier doet het. Maar zo werkt het niet. Er zit een hele theorie en veel werk achter!&#8221;</p><h4>Wel of niet zielig?</h4><p>De discussie over dieren in gevangenschap is ons niet ontgaan, dus vroegen we de mening van Emma. Want hoe denkt zij hierover? &#8220;Ik vind het zeker niet zielig voor de dieren. Ze doen niks wat ze niet willen. Als ze iets niet leuk vinden, zwemmen ze weg of laten ze duidelijk merken het niet te willen. En als dat zo is, dan gaan we de dieren ook niet in een bepaalde positie duwen. Ook merken we dat ze gelukkig zijn. De dolfijnen paren en krijgen baby&#8217;s, en dat is een teken dat ze goed in hun vel zitten. Daarbij worden de dieren in het Dolfinarium veel ouder dan hun soortgenoten in het wild! Zo is de gemiddelde leeftijd waarop een dolfijn overlijdt in het Dolfinarium 25, terwijl dit gemiddelde in het wild rond de 17 ligt&#8221;. Emma legt uit dat de dolfijnen geen natuurlijke vijanden hebben en zich vrij kunnen bewegen. Daarnaast is het ook belangrijk om veel liefde voor de dieren te voelen en alles met veel plezier te doen. En dat doen ze! &#8220;Al mijn collega&#8217;s hebben liefde voor het vak en zodra een dolfijn gaat bevallen, staat het hele team paraat. Al is dit midden in de nacht.&#8221;</p><h4>Van bevalling tot blooper</h4><p>&#8220;Ik maak hier zoveel bijzondere en leuke dingen mee. Tja, van een bevalling tot een blunder! Ik ben vrij onhandig van mezelf en val heel vaak. Dit overkomt me ook vaak tijdens de show. Ach, ik zit er niet mee. Ik probeer gewoon te blijven lachen. Dat is het allerbelangrijkste.&#8221; En lachen doet ze veel. Zo veel, dat ze voorlopig ook nog niet weg wil. &#8220;Zolang ik het hier leuk vind, blijf ik dit voorlopig nog even doen. Het ligt er een beetje aan hoelang ik dit volhoud. De meesten stoppen rond hun 35e omdat je toch dagelijks voorstellingen geeft en het werk veel energie kost. Ik hoop sowieso in de dierenwereld te blijven werken, maar voor nu hoop ik nog een hele tijd hier te mogen werken.&#8221;</p>", "questionRange": [18, 23]}, {"id": 5, "intro": "Deze tekst komt uit een folder over vrijwilligerswerk en gaat over buddy's. Wat doet een buddy, hoe word je buddy, wat mag je als buddy verwachten en wat wordt van jou als buddy verwacht?", "title": "Maak het verschil, word buddy!", "body": "<p>Onze cliënten hebben een ernstige beperking of zijn langdurig ziek. Zij zoeken een buddy die hen steunt op vrijwillige basis. Deze tekst schetst wat een cliënt van een buddy verwacht en andersom: wat een buddy van een cliënt kan verwachten.</p><p>&#8220;Door mijn ziekte is het spontane van mijn leven af. Toch wil ik er het beste van maken. Ik wil léven. Mijn man heeft een drukke baan. Om toch nog zoveel mogelijk te kunnen doen, zijn hulp en gezelschap van mijn buddy erg fijn.&#8221; Aan het woord is Margot. Zij heeft een ernstige chronische ziekte. Zij weet als geen ander dat een buddy een groot verschil maakt voor de kwaliteit van leven.</p><h4>Wat doet een buddy?</h4><p>Een buddy helpt zijn cliënt zoveel mogelijk uit zijn leven te halen. De cliënt stelt een doel waar hij met hulp van de buddy naartoe werkt. Dit kan gaan om het vergroten van het sociale netwerk of het accepteren van de ziekte. Soms wil de cliënt zijn verhaal kwijt, een andere keer wil hij op pad. De buddy is er om hem te steunen, als maatje. Deze sociaal-emotionele ondersteuning aan iemand met een chronische of levensbedreigende ziekte of beperking, verleent de buddy op vrijwillige basis. De steun wordt verleend gedurende een afgesproken periode. In eerste instantie wordt een buddy voor een jaar gekoppeld aan een cliënt.</p><h4>Ontstaan</h4><p>Buddyzorg is ontstaan in de jaren tachtig voor mensen met hiv en aids. De professionele gezondheidszorg was in die tijd niet voorbereid op het aantal mensen met deze – toen nog nieuwe ziekte. Buddy&#8217;s boden daarom hun sociaal-emotionele zorg aan. Tegenwoordig doen ook mensen met hele andere levensbedreigende ziektes of ernstige aandoeningen een beroep op buddyzorg. Mensen met kanker, spierziekten of niet-aangeboren hersenletsel bijvoorbeeld. Ook de aard van de steun veranderde. Buddyzorg ontstond als begeleiding bij het sterven, maar tegenwoordig is de zorg veel meer gericht op hulp bij het verder leven.</p><h4>Organisatie</h4><p>De organisatie van buddyzorg is ondergebracht bij Steunpunt Informele Zorg, onderdeel van de Vrijwilligerscentrale. Iedereen kan een aanvraag doen voor buddyzorg. De coördinator van Steunpunt Informele Zorg ondersteunt de buddy in zijn werkzaamheden en houdt kennismakingsgesprekken met nieuwe cliënten.</p><h4>Profiel</h4><p>Buddy&#8217;s vormen een divers gezelschap. Mannen, vrouwen, jongeren, ouderen, homo&#8217;s en hetero&#8217;s met ieder hun eigen achtergrond. Wat hen bindt, is dat ze zich inzetten voor een ander. Buddyzorg stelt wel als voorwaarde dat buddy&#8217;s minimaal 21 jaar zijn. Veel cliënten hebben immers al behoorlijk wat meegemaakt. Dat vraagt om een buddy met levenservaring.</p><h4>Praktisch</h4><p>Buddy&#8217;s hebben minimaal een dagdeel in de week tijd voor hun cliënt. Ze nemen deel aan de verplichte basistraining en periodieke bijeenkomsten. Ze verlenen buddyzorg op vrijwillige basis. Eventuele kosten worden betaald. Daarnaast krijgt elke buddy € 25,- per maand vanaf het moment dat hij is gekoppeld aan een cliënt.</p><h4>Training</h4><p>Om te zorgen dat buddy&#8217;s goed voorbereid aan het werk gaan, krijgen ze een meerdaagse training. In die training ligt het accent op persoonlijk functioneren en zelfkennis. Daarnaast is er aandacht voor verliesverwerking, voor het aangeven van grenzen en voor diverse vaardigheden, waaronder communiceren. Tijdens de training wordt bovendien getoetst of de buddy binnen het profiel past. De conclusie wordt open en eerlijk met de kandidaat besproken, ook wanneer hij niet geschikt blijkt.</p><h4>Begeleiding</h4><p>Buddyzorg is niet zomaar vrijwilligerswerk. De situatie van de cliënt is door zijn ziekte en omstandigheden niet alledaags. Dat dit indruk maakt en invloed heeft op de buddy, is onvermijdelijk. Buddy&#8217;s kunnen daarom altijd een beroep doen op de coördinator. Ook zijn er bijeenkomsten in groepsverband. Op deze momenten kunnen buddy&#8217;s hun verhaal kwijt en elkaar inspireren en ondersteunen. Dat maakt niet alleen dat buddy&#8217;s hun werk met plezier kunnen blijven doen, maar zorgt ook voor persoonlijke ontwikkeling en groei.</p>", "questionRange": [24, 30]}, {"id": 6, "intro": "In deze tekst staan de examenregels die gelden bij Rosarius Opleidingen.", "title": "Examenreglement", "body": "<p>Het is belangrijk dat iedereen die bij de examens van Rosarius Opleidingen is betrokken goed wordt geïnformeerd. Deze examenwijzer is bedoeld voor docenten, examenleiders en examenkandidaten van Rosarius Opleidingen. De examenwijzer bestaat uit een algemeen gedeelte waarin afspraken en regels over de examens zijn opgenomen. Daarnaast wordt aandacht besteed aan specifieke informatie per opleiding.</p><h4>1 Algemeen</h4><p><strong>1.1 Toelatingseisen</strong><br>Rosarius Opleidingen heeft géén open toelating tot de examens. Deelname is alleen voor de cursisten van Rosarius Opleidingen. Voor het volgen van de opleidingen gelden geen eisen ten aanzien van de vooropleiding van de kandidaat.</p><p><strong>1.2 Identificatie</strong><br>Bij deelname aan een van onze opleidingen moet bij de start van de opleiding een kopie van het identiteitsbewijs van de kandidaat worden ingeleverd. Bij het examen moeten de kandidaten een origineel identiteitsbewijs kunnen tonen.</p><p><strong>1.3 Benodigdheden voor de kandidaten tijdens het examen</strong><br>Voor de schriftelijke examens hebben de kandidaten nodig:</p><ul><li>schrijfgerei, zoals een pen of een potlood;</li><li>extra papier voor het maken van notities;</li><li>een rekenmachine bij rekenen.</li></ul><p>Indien het noodzakelijk is dat hiervan wordt afgeweken, dan zal dit vooraf aan de docent en de kandidaten worden verteld. Voor de examinering van de praktijkvaardigheden op de computer worden er computers van het opleidingsinstituut gebruikt. Documenten die nodig zijn voor het examen worden aangeleverd op losse gegevensdragers (bijvoorbeeld usb-sticks).</p><h4>2 Procedures examens</h4><p><strong>2.1 Examenleider</strong><br>Tijdens het examen is een examenleider aanwezig. De examenleider is iemand van Rosarius Opleidingen. Deze persoon is verantwoordelijk voor de goede gang van zaken op de locatie zelf (tafels uit elkaar, rust, aanwezigheid van de benodigde materialen, etc.). Hij moet objectief beoordelen of het examen naar behoren verloopt. Hij controleert of alle examenopgaven teruggaan naar de onderwijsinstelling (ook de niet-gebruikte). Wanneer gebruik gemaakt is van papier voor het maken van notities, dan moet dat door de examenleider worden ingenomen en samen met de examens worden teruggestuurd naar Rosarius Opleidingen.</p><p><strong>Frauduleus handelen</strong><br>De examenleider mag kandidaten die voor, tijdens en/of na het examen aantoonbaar frauduleus hebben gehandeld, uitsluiten van verdere deelneming aan het examen. Onder frauduleus handelen wordt verstaan: het handelen van een kandidaat dat erop gericht is een juiste beoordeling van zijn inzicht en vaardigheden onmogelijk te maken. De examenleider brengt de kandidaat op de hoogte van zijn bevindingen. Het werk van de betrokken kandidaat wordt niet beoordeeld en er wordt geen resultaat verstrekt.</p><p><strong>2.2 De kandidaat</strong><br>De kandidaat dient ruim voor de start van het examen aanwezig te zijn, zodat het examen op het aangegeven tijdstip kan starten. Bij te laat komen beslist de examenleider of de kandidaat alsnog mag starten met het examen. Het is de kandidaat niet toegestaan het examenlokaal binnen 50 minuten na de start te verlaten.</p><p>Na aanvang van het examen tot en met het verlaten van de examenruimte in verband met beëindiging van het examen is het de kandidaat niet toegestaan:</p><ul><li>andere hulpmiddelen te gebruiken dan de uitdrukkelijk toegestane hulpmiddelen;</li><li>contact te hebben met de medekandidaten;</li><li>mobiele telefoons te gebruiken of ingeschakeld te hebben;</li><li>te roken.</li></ul><p>Na afloop van het examen dient de kandidaat de uitwerking van het examen, alle daartoe verstrekte informatie en gemaakte notities in te leveren bij de examenleider.</p><h4>3 Beoordeling en normering</h4><p>De uitwerkingen van de schriftelijke examens worden door één persoon beoordeeld met inachtneming van de beoordelingsnormen zoals die aangegeven zijn in de uitwerking van de examens. Een tweede beoordelaar wordt willekeurig gekozen. De normering van de praktijkvaardigheidsexamens op de computer wordt bepaald door de instantie die de examens aanlevert. De beoordeling van de examens wordt uitgedrukt in een geheel cijfer zonder decimalen. Bij de afronding dient het decimaal 5 of hoger naar boven en het decimaal 4 of lager naar beneden te worden afgerond. Indien een examen door twee mensen is beoordeeld, is het gemiddelde van de twee cijfers na afronding het eindresultaat.</p><h4>4 Inhoud diploma&#8217;s en eindbeoordeling</h4><p><strong>4.1 Inhoud diploma telefoniste/receptioniste</strong><br>Het schriftelijke examen telefoniste/receptioniste bestaat uit de onderdelen:</p><ul><li>Telefoneren (waaronder Nederlands)</li><li>Kantoorvaardigheden (waaronder Nederlands)</li></ul><p>Het examen praktijkvaardigheden omvat:</p><ul><li>Word</li><li>Algemene computervaardigheid</li></ul><p>Voor het behalen van het diploma dient de kandidaat gemiddeld minimaal het cijfer 6 te hebben. Dat betekent een minimum puntentotaal van 24. Daarbij moet ook aan de volgende voorwaarden worden voldaan:</p><ul><li>Geen van de resultaten mag lager zijn dan 5.</li><li>Er mag maximaal 1 verliespunt zijn behaald.</li><li>Bij typevaardigheid moeten minstens 130 aanslagen per minuut worden behaald.</li></ul><p><strong>4.2 Inhoud diploma administratief medewerker</strong><br>Om te kunnen deelnemen aan de examens voor administratief medewerker, moeten de 4 onderdelen van telefoniste/receptioniste eerst zijn gemaakt.</p><ul><li>Het aanvullende schriftelijke examen voor administratief medewerker bestaat uit rekenvaardigheid.</li><li>Het examen praktijkvaardigheden betreft Excel.</li></ul><p>Voor het behalen van het diploma dient de kandidaat gemiddeld minimaal het cijfer 6 te hebben. Dat betekent een minimum puntentotaal van 36. Daarbij moet ook aan de volgende voorwaarden worden voldaan:</p><ul><li>Geen van de resultaten mag lager zijn dan 4.</li><li>Er mogen maximaal 2 verliespunten zijn behaald.</li></ul><p><strong>4.3 Inhoud diploma financieel administratief medewerker</strong><br>Om te kunnen deelnemen aan de examens voor financieel administratief medewerker, moet eerst het onderdeel administratief medewerker met goed gevolg zijn afgelegd.</p><ul><li>Het aanvullende schriftelijke examen voor financieel administratief medewerker bestaat uit Boekhouden.</li><li>Het examen praktijkvaardigheden betreft Computerboekhouden.</li></ul><p>Voor het behalen van het diploma dient de kandidaat gemiddeld minimaal het cijfer 6 te hebben. Dat betekent een minimum puntentotaal van 12. Geen van de resultaten mag lager zijn dan 5.</p><p><strong>4.4 Inhoud diploma secretaresse</strong><br>Om te kunnen deelnemen aan de examens voor secretaresse, moet eerst het onderdeel administratief medewerker met goed gevolg zijn afgelegd. Het aanvullende schriftelijke examen voor secretaresse bestaat uit:</p><ul><li>Zakelijk Nederlands</li><li>Zakelijk Engels</li><li>Notuleren</li></ul><p>Voor het behalen van het diploma dient de kandidaat gemiddeld minimaal het cijfer 6 te hebben. Dat betekent een minimum puntentotaal van 18. Geen van de resultaten mag lager zijn dan 5.</p><p><strong>4.5 Diploma</strong><br>Indien de kandidaat is geslaagd, dan ontvangt hij/zij een diploma. Wanneer de kandidaat een onvoldoende heeft behaald, ontvangt de kandidaat een herexamenreglement om de kandidaat te informeren over de herkansingsmogelijkheden. Indien een kandidaat zijn examenwerk wenst in te zien, dan dient de kandidaat hiervoor een afspraak te maken met het hoofdkantoor van Rosarius Opleidingen. Het werk kan tot vier weken na de examenuitslag op het hoofdkantoor van Rosarius Opleidingen worden ingezien.</p><h4>5 Herkansingsregeling</h4><p>Indien een kandidaat niet voldoet aan de gestelde voorwaarden voor het behalen van een diploma, dan mag hij voor één van de onderdelen kosteloos een herexamen afleggen, ongeacht het cijfer dat voor dit onderdeel is behaald. Ook wanneer herkansing niet zal leiden tot het behalen van het diploma heeft de cursist recht op een herkansing. Dit kan leiden tot een beter resultaat op de beoordelingslijst. Kosteloze herkansingen dienen binnen 3 maanden na de aanvankelijke examendatum van het onderdeel te zijn benut. Voor herkansingen na deze periode worden kosten in rekening gebracht.</p><h4>6 Bezwaar en beroep</h4><p>Een kandidaat kan tegen de uitslag van een examen bezwaar maken. De kandidaat dient daarvoor binnen twee weken na bekendmaking van de uitslag zijn inhoudelijke argumenten betreffende het examen schriftelijk duidelijk te maken bij het management van Rosarius Opleidingen. Aan het indienen van een bezwaarschrift zijn kosten verbonden. De uitwerkingen en/of prestaties van de kandidaat worden voor zover mogelijk opnieuw beoordeeld. Het management neemt de geuite bezwaren en de herbeoordeling met motivering van de oorspronkelijke corrector(en) in overweging. Het resultaat dat voortvloeit uit de herbeoordeling wordt in plaats gesteld van het oorspronkelijke resultaat. Dit houdt in dat het resultaat niet alleen omhoog maar ook omlaag kan gaan of gelijk blijft. De kandidaat wordt schriftelijk op de hoogte gesteld van het besluit op zijn bezwaar. Het resultaat dat wordt vastgesteld na behandeling van het bezwaarschrift is bindend.</p><h4>7 Bijzondere gevallen</h4><p>In bijzondere gevallen kan het management besluiten dat een kandidaat op een andere wijze één of meer examens aflegt. Onder bijzondere gevallen wordt verstaan:</p><ul><li>Medische indicatie waaruit blijkt dat de kandidaat het examen onmogelijk schriftelijk kan afleggen. Hierbij is een mondeling examen mogelijk. Een schriftelijke verklaring van een deskundige is hiervoor noodzakelijk.</li><li>Dyslexie: Kandidaten met een dyslexieverklaring hebben recht op 30 minuten extra examentijd. Op verzoek kan een A3-versie van het examen met vergrote tekst worden aangeleverd.</li><li>Nederlands is niet de eerste taal. Wanneer de kandidaat korter dan vijf jaar in Nederland verblijft, heeft hij recht op 30 minuten extra examentijd. Hij mag ook een Nederlands handwoordenboek gebruiken.</li><li>Problemen met motoriek: de kandidaat mag gebruik maken van een computer van Rosarius Opleidingen om het examen uit te werken. Een schriftelijke verklaring van een deskundige is hiervoor noodzakelijk.</li></ul><p>Om in aanmerking te komen voor een of meer van bovenstaande aanpassingen, moet een schriftelijk verzoek worden ingediend bij het hoofdkantoor van Rosarius Opleidingen. In dit verzoek moet duidelijk worden aangegeven welke aanpassing gewenst is en wat daarvoor de reden is. Dit moet bij voorkeur gepaard gaan met een schriftelijke verklaring van een deskundige.</p>", "questionRange": [31, 35]}], "questions": [{"n": 1, "textId": 1, "prompt": "In alinea I staat een voorbeeld over de opleiding Dierenartsassistent. Wat wil de schrijver met dit voorbeeld duidelijk maken?", "options": {"A": "dat Ameda veel verschillende soorten mbo-opleidingen aanbiedt", "B": "dat de mbo-opleidingen van Ameda veel verschillende kanten hebben", "C": "dat je bij de opleiding tot dierenartsassistent van Ameda meer leert"}, "answer": "B"}, {"n": 2, "textId": 1, "prompt": "Wat staat er in alinea III over de docenten van Ameda?", "options": {"A": "Je hebt een vaste docent die jou begeleiding geeft.", "B": "Je krijgt in de meeste gevallen een snelle reactie van docenten.", "C": "Je kunt aan je docenten vragen stellen via de digitale leeromgeving."}, "answer": "B"}, {"n": 3, "textId": 1, "prompt": "Pedro loopt stage bij een bouwbedrijf. Waarom is dat een belangrijk onderdeel van zijn opleiding, volgens de tekst?", "options": {"A": "omdat hij daar meer dan alleen theorie leert", "B": "omdat hij daar met toekomstige medewerkers werkt", "C": "omdat hij daar veel feedback en advies krijgt"}, "answer": "A"}, {"n": 4, "textId": 1, "prompt": "John wil een mbo-opleiding bij Ameda gaan volgen. Hij wil weten hoe hij begeleid zal worden. Waar kan hij het antwoord vinden?", "options": {"A": "in alinea II en III", "B": "in alinea II en IV", "C": "in alinea III en IV", "D": "in alinea III en V"}, "answer": "D"}, {"n": 5, "textId": 1, "prompt": "Gina wil een mbo-opleiding tot kinderleidster gaan volgen bij Ameda. Haar ouders willen dat ze naar het ROC gaat. Wat is een argument om haar ouders te overtuigen?", "options": {"A": "Alleen bij Ameda leer je om theoretische kennis toe te passen in de praktijk.", "B": "De opleidingen die Ameda verzorgt zijn ook officiële mbo-opleidingen.", "C": "Je krijgt bij Ameda veel persoonlijke aandacht doordat het een kleine opleider is."}, "answer": "B"}, {"n": 6, "textId": 1, "prompt": "Wat is het belangrijkste doel van deze tekst?", "options": {"A": "lezers ervan overtuigen dat Ameda een goede onderwijsinstelling is voor mbo", "B": "lezers informatie geven over de waarde van een mbo-diploma van Ameda", "C": "lezers vermaken met veelvoorkomende misverstanden over het mbo"}, "answer": "A"}, {"n": 7, "textId": 2, "prompt": "Wat is de belangrijkste taak van de OR, volgens de tekst?", "options": {"A": "besluiten nemen over financiën en organisatie in het bedrijf", "B": "besluiten voorbereiden over financiën en organisatie in het bedrijf", "C": "de werkgever overtuigen van wat de werknemers graag willen", "D": "de werknemers informeren over wat de werkgever graag wil"}, "answer": "C"}, {"n": 8, "textId": 2, "prompt": "Een werkgever wil de ontslagregels voor zijn personeel aanpassen. De OR is het daar niet mee eens. Wie bepaalt of de werkgever de ontslagregels mag aanpassen?", "options": {"A": "de bedrijfscommissie", "B": "de kantonrechter", "C": "de Ondernemingskamer", "D": "de werkgever zelf"}, "answer": "B"}, {"n": 9, "textId": 2, "prompt": "Wat moet een werkgever doen met een voorstel van de OR?", "options": {"A": "eerst beslissen, dan de OR hierover informeren", "B": "eerst met de OR overleggen, dan beslissen en de OR hierover informeren", "C": "zelf beslissen of, hoe en wanneer op het voorstel van de OR te reageren"}, "answer": "B"}, {"n": 10, "textId": 2, "prompt": "Wat wordt in de tekst bedoeld met informatierecht?", "options": {"A": "De OR heeft het recht om van de bedrijfscommissie bepaalde informatie over de werkgever te krijgen.", "B": "De OR heeft het recht om van de werkgever bepaalde bedrijfsinformatie te krijgen.", "C": "De werkgever heeft het recht om de OR bepaalde bedrijfsinformatie te weigeren.", "D": "De werkgever heeft het recht om van de OR bepaalde informatie te krijgen."}, "answer": "B"}, {"n": 11, "textId": 2, "prompt": "Wanneer kan de OR de bedrijfscommissie om hulp vragen?", "options": {"A": "als de werkgever een besluit doorvoert tegen de wil van de OR", "B": "als de werkgever een voorstel van de OR niet aanneemt", "C": "als de werkgever geen informatie wil verstrekken aan de OR"}, "answer": "C"}, {"n": 12, "textId": 3, "prompt": "Wat gebeurde er volgens professor Richard Layard in de afgelopen vijftig jaar met Nederlanders?", "options": {"A": "Ze werden gemiddeld veel rijker en dus gelukkiger.", "B": "Ze werden gemiddeld veel rijker, maar niet gelukkiger.", "C": "Ze werden gemiddeld veel rijker, maar ook veel ongelukkiger."}, "answer": "B"}, {"n": 13, "textId": 3, "prompt": "Wat is de beste samenvatting van de tekst onder het kopje 'Gewenning'?", "options": {"A": "Vroeger was luxe bijzonder, nu is het een noodzaak.", "B": "We vinden het al snel normaal dat we rijker zijn dan anderen.", "C": "We zijn onze rijkdom normaal gaan vinden."}, "answer": "C"}, {"n": 14, "textId": 3, "prompt": "Tom heeft € 80.000 gewonnen. Zijn buurman heeft ook een prijs gewonnen. Wanneer is Tom waarschijnlijk het meest tevreden, volgens professor Richard Layard?", "options": {"A": "Als Tom niet weet dat zijn buurman ook een prijs heeft gewonnen.", "B": "Als Tom niet weet hoeveel zijn buurman heeft gewonnen.", "C": "Als Tom weet dat zijn buurman veel minder heeft gewonnen."}, "answer": "C"}, {"n": 15, "textId": 3, "prompt": "Wanneer zijn we volgens professor Richard Layard ontevreden met een loonsverhoging?", "options": {"A": "Als we minder loonsverhoging krijgen dan de vorige keer.", "B": "Als we minder loonsverhoging krijgen dan een collega.", "C": "Als we minder loonsverhoging krijgen dan we hadden verwacht."}, "answer": "B"}, {"n": 16, "textId": 3, "prompt": "Professor Richard Layard onderzocht de relatie tussen vrije tijd en geluksgevoel. Voor hoeveel vrije weken kozen de meeste studenten in het onderzoek?", "options": {"A": "Ze kozen voor evenveel vrij als anderen.", "B": "Ze kozen voor zoveel mogelijk vrij.", "C": "Ze vonden alles goed zolang ze meer vrij hadden dan anderen."}, "answer": "B"}, {"n": 17, "textId": 3, "prompt": "Wat is de belangrijkste conclusie van deze tekst?", "options": {"A": "Geld maakt niet gelukkig.", "B": "Geld maakt pas gelukkig als we meer hebben dan anderen.", "C": "Vrije tijd maakt niet gelukkig, geld wel."}, "answer": "B"}, {"n": 18, "textId": 4, "prompt": "Wat voor opleiding(en) deed Emma voordat ze ging werken bij het Dolfinarium?", "options": {"A": "de opleiding Dierenverzorging", "B": "de opleiding tot dolfijnentrainer", "C": "diverse opleidingen buiten de dierenverzorging"}, "answer": "C"}, {"n": 19, "textId": 4, "prompt": "Waarom reageren mensen volgens Emma verbaasd als ze vertelt over haar beroep?", "options": {"A": "omdat het werk van een dolfijnentrainer fysiek zwaar is", "B": "omdat maar weinig mensen het beroep uitoefenen", "C": "omdat ze haar geen typische dolfijnentrainer vinden"}, "answer": "B"}, {"n": 20, "textId": 4, "prompt": "Wat zegt Emma over de gezondheidscontroles van de dieren?", "options": {"A": "De gezondheidscontroles behoren niet tot de taken van een dolfijnentrainer.", "B": "De gezondheidscontroles kosten meer tijd dan de trainingen en voorbereidingen.", "C": "De gezondheidscontroles worden gedaan op dagen dat er geen shows zijn.", "D": "De gezondheidscontroles zijn een minder bekend onderdeel van haar beroep."}, "answer": "D"}, {"n": 21, "textId": 4, "prompt": "Wat zegt Emma over het verschil tussen dolfijnen in de natuur en dolfijnen in het Dolfinarium?", "options": {"A": "Dolfijnen in de natuur krijgen eerder baby's dan dolfijnen in het Dolfinarium.", "B": "Dolfijnen in de natuur worden minder oud dan dolfijnen in het Dolfinarium.", "C": "Dolfijnen in de natuur zijn gelukkiger dan dolfijnen in het Dolfinarium."}, "answer": "B"}, {"n": 22, "textId": 4, "prompt": "Wat zijn de toekomstplannen van Emma?", "options": {"A": "Ze gaat stoppen met haar werk als ze 35 jaar is.", "B": "Ze wil over een tijdje minder shows gaan doen.", "C": "Ze wil voorlopig hetzelfde werk blijven doen.", "D": "Ze zoekt binnenkort ander werk in de dierenwereld."}, "answer": "C"}, {"n": 23, "textId": 4, "prompt": "Wat is het doel van deze tekst?", "options": {"A": "de lezer informeren over het beroep van een dolfijnentrainer", "B": "de lezer laten zien dat het werk van een dolfijnentrainer belangrijk is", "C": "de lezer overhalen om te gaan solliciteren naar de functie van dolfijnentrainer", "D": "de lezer uitleggen hoe je een dolfijnentrainer kunt worden"}, "answer": "A"}, {"n": 24, "textId": 5, "prompt": "Wie bepaalt wat de buddy bij zijn cliënt moet bereiken?", "options": {"A": "De buddy bepaalt wat hij bij zijn cliënt wil bereiken.", "B": "De cliënt bepaalt wat hij met zijn buddy wil bereiken.", "C": "De coördinator bepaalt wat de buddy bij zijn cliënt moet bereiken."}, "answer": "B"}, {"n": 25, "textId": 5, "prompt": "Wat is de belangrijkste taak van een buddy?", "options": {"A": "eenzame ouderen in hun laatste levensjaren bezoeken", "B": "ernstig zieken helpen die verder willen met hun leven", "C": "hiv- en aidspatiënten verzorgen die weten dat ze sterven", "D": "praten met mensen die persoonlijke problemen hebben"}, "answer": "B"}, {"n": 26, "textId": 5, "prompt": "Hoeveel tijd moet een buddy aan zijn werk besteden?", "options": {"A": "Dat spreken de buddy, zijn cliënt en de coördinator samen af.", "B": "Dat maakt niet uit, maar het liefst zo veel mogelijk.", "C": "Minstens een dagdeel per week plus nog tijd voor bijeenkomsten."}, "answer": "C"}, {"n": 27, "textId": 5, "prompt": "Hoeveel geld krijgt een buddy voor zijn werk?", "options": {"A": "Hij krijgt niets, een buddy doet zijn werk niet voor geld.", "B": "Hij krijgt alleen zijn kosten terugbetaald, verder niets.", "C": "Hij krijgt € 25,- per maand om al zijn kosten te betalen.", "D": "Hij krijgt € 25,- per maand én hij krijgt zijn kosten terug."}, "answer": "D"}, {"n": 28, "textId": 5, "prompt": "Wat moet je doen om als buddy te kunnen beginnen?", "options": {"A": "een kennismakingsgesprek voeren met de coördinator", "B": "een meerdaagse basistraining volgen", "C": "niets: vanaf je 21ste kun je direct beginnen"}, "answer": "B"}, {"n": 29, "textId": 5, "prompt": "Bij wie kan de buddy terecht als hij het moeilijk heeft in zijn werk?", "options": {"A": "zowel bij andere buddy's als bij de trainer", "B": "zowel bij de coördinator als bij andere buddy's", "C": "zowel bij zijn trainer als bij de coördinator"}, "answer": "B"}, {"n": 30, "textId": 5, "prompt": "Wat is het belangrijkste doel van de tekst?", "options": {"A": "buddy's informatie geven over cliënten", "B": "cliënten informatie geven over buddy's", "C": "nieuwe buddy's vinden voor cliënten", "D": "nieuwe cliënten vinden voor buddy's"}, "answer": "C"}, {"n": 31, "textId": 6, "prompt": "Lara volgt een opleiding secretaresse bij Rosarius Opleidingen. Ze wil het examen maken. Wanneer kan dat?", "options": {"A": "als ze de vakken Nederlands, Engels en notuleren heeft gevolgd", "B": "als ze geslaagd is voor het onderdeel administratief medewerker", "C": "als ze in de cursus gemiddeld het cijfer 6 of hoger heeft behaald"}, "answer": "B"}, {"n": 32, "textId": 6, "prompt": "Mo is drie jaar geleden in Nederland komen wonen. Nederlands is niet zijn eerste taal. Welke regel geldt voor Mo als hij een examen maakt?", "options": {"A": "Hij mag 30 minuten langer over het examen doen.", "B": "Hij mag de computer gebruiken om woorden te vertalen.", "C": "Hij mag het examen mondeling doen."}, "answer": "A"}, {"n": 33, "textId": 6, "prompt": "Jos is gezakt voor zijn examen. Hij is het niet eens met de uitslag. Bij wie kan hij bezwaar maken?", "options": {"A": "bij de examenleider", "B": "bij het hoofdkantoor", "C": "bij het management"}, "answer": "C"}, {"n": 34, "textId": 6, "prompt": "Jan komt te laat op het examen. Wat gebeurt er nu?", "options": {"A": "Jan mag het examen niet meer maken, hij moet een herexamen maken.", "B": "Jan mag het examen nog maken, als hij minder dan 50 minuten te laat is.", "C": "Jan moet aan de examenleider vragen of hij het examen mag maken of niet."}, "answer": "C"}, {"n": 35, "textId": 6, "prompt": "Wat is het doel van de schrijver van deze tekst?", "options": {"A": "de lezer ervan overtuigen zich aan de examenregels te houden", "B": "de lezer op de hoogte brengen van de examenregels", "C": "de lezer overhalen om examen te doen bij Rosarius Opleidingen"}, "answer": "B"}]}, {"id": "2024", "year": 2024, "title": "B1 Lezen 2024 — Openbaar examen", "timeLimitMin": 110, "passMark": 24, "totalQuestions": 35, "texts": [{"id": 1, "intro": "Deze tekst gaat over werken bij de bakkerij van Marké. Marké is een winkel waar onder andere eten, speelgoed en kleding wordt verkocht.", "title": "Bakkerij", "body": "<p>Ruim 250 medewerkers van onze centrale bakkerij in Utrecht en onze zes decentrale bakkerijen in het hele land werken met veel liefde en op traditionele wijze aan onze taarten, snacks en andere bakkerijproducten, zodat die altijd vers in de winkels staan.</p><p>Het gebak dat in de Marké-filialen wordt verkocht, wordt in onze eigen bakkerijen gemaakt. In zes vestigingen in het land wordt op traditionele manier het Marké-gebak geproduceerd en vervolgens aan de filialen geleverd. Onze klanten verwachten elke dag opnieuw vers gebak dat met liefde is gemaakt. Om dat voor elkaar te krijgen, zijn onze bakkers continu aan het kijken hoe we de kwaliteit van succesnummers als de tompouce, de appelkruimeltaart en onze saucijzenbroodjes verder kunnen verbeteren.</p><h4>Kantoor</h4><p>In Utrecht hebben we onze grootste vestiging. Hier bevindt zich het kantoor van de bakkerijdirectie en ondersteunende diensten, de centrale bakkerij en één van de zes decentrale bakkerijen. Vanuit kantoor wordt de organisatie aangestuurd of ondersteund door de volgende afdelingen:</p><ul><li>Bij de proefbakkerij worden nieuwe producten ontwikkeld. Hier zijn onze creatieve mensen bezig met nieuwe smaken en recepten.</li><li>De afdeling inkoop zorgt dat alle ingrediënten en verpakkingsmaterialen aanwezig zijn, zodat de bakkerijen zich hier niet druk om hoeven te maken.</li><li>Het bedrijfsbureau maakt de planningen en zorgt onder andere dat ons interne systeem goed blijft draaien. Ook doen zij projecten om de verschillende processen te verbeteren.</li><li>De afdeling kwaliteit bewaakt de hygiëne en kwaliteit in de bakkerijen.</li><li>De afdeling administratie zorgt dat de administratie op orde is.</li><li>De afdeling personeelszaken zorgt dat de personele zaken goed geregeld worden.</li></ul><h4>Centrale bakkerij</h4><p>De centrale bakkerij in Utrecht is het centrum van de organisatie. Hier worden de producten gemaakt die in de decentrale bakkerijen als basis dienen voor alle soorten gebak. In de centrale bakkerij hebben we drie afdelingen; de afdeling 'korstgebak' waar bijvoorbeeld saucijzenbroodjes worden gemaakt, de deegafdeling waar onder andere appeltaarten worden gemaakt en de beslagafdeling waar de basis voor bijvoorbeeld de fototaarten wordt gemaakt. In deze bakkerij wordt op een industriële manier gewerkt. Door techniek in te zetten kunnen we per uur wel 1500 appeltaarten maken of 6000 minitaartjes!</p><p>Heb je gevoel voor techniek, vind je het leuk om met machines te werken en heb je affiniteit met gebak, dan is dit de plek voor jou. Op de afdelingen word je intern opgeleid. Je leert om het proces van ingrediënt tot taart te volgen en bij te sturen, om zo een goede kwaliteit te garanderen. Je wordt hierbij begeleid door ervaren collega's en evalueert regelmatig met de leidinggevenden. In de centrale bakkerij wordt van 5.00 uur tot 23.00 uur gewerkt. Af en toe wordt ook 's nachts doorgewerkt.</p><h4>Decentrale bakkerij</h4><p>In onze decentrale bakkerijen start je om 7.00 uur om de bestellingen voor die dag te produceren. Dat is meestal rond 17.00 uur klaar. Vooral op vrijdag is dat een klus; de meeste feestjes worden toch in het weekend gevierd. Regelmatig zoeken wij in de bakkerij nieuwe (parttime) medewerkers die het leuk vinden om samen met collega's een mooi product te maken. Als nieuwe medewerker start je met eenvoudige werkzaamheden. Als dit goed gaat, leer je steeds meer, zoals crème draaien, slagroom spuiten of gebak decoreren. Als het gebak is gemaakt, moet het verdeeld worden over de winkels. Dit gebeurt in de uitzetkoeling. Bij dit werk moet je je hoofd erbij houden.</p><p>Ten slotte leveren onze chauffeurs het gebak bij de winkels af. Zij starten tussen 2.00 en 4.00 uur om voor openingstijd alle winkels bevoorraad te hebben. Bij dit werk kan het goed van pas komen als je zelfstandig en stressbestendig bent.</p><h4>Uitdagende werkomgeving</h4><p>Bij de bakkerij-organisatie zijn we regelmatig op zoek naar ambitieuze mensen met een bakkerij-achtergrond of ervaring in het werken met voedingsmiddelen. Wij bieden een uitdagende werkomgeving met mogelijkheden om door te groeien. Hiervoor zijn verschillende mogelijkheden binnen de bakkerij-organisatie, maar ook een overstap naar andere bedrijfsonderdelen van Marké is mogelijk. Ben je geïnteresseerd, stuur dan je cv naar ons op en wij laten je zo spoedig mogelijk weten of wij een passende baan voor je hebben.</p><h4>Stage</h4><p>Volg je een opleiding beroepsbegeleidend leren (BBL-opleiding) voor bakker? Er zijn bij onze bakkerijen mogelijkheden om werk en school te combineren. Door je opleiding te combineren met werken bij Marké kun je het vak in de praktijk leren.</p>", "questionRange": [1, 6]}, {"id": 2, "intro": "Deze tekst komt uit een studieboek. Hij gaat over de 'beursstand': een plek op een beurs. Een beurs is een evenement waar bedrijven zich kunnen presenteren.", "title": "De beursstand", "body": "<p>Op een beurs moeten de aanbieders ruimte huren van de organisator. In die ruimte komt een stand. Een stand kan allerlei vormen aannemen, van een kraampje op een handelsmarkt tot een zaal binnen een publieksbeurs. Een stand moet worden ontworpen en ingericht, net als een winkel. De stand is je visitekaartje. Hij moet er uitnodigend uitzien en in het oog springen.</p><p>Hoe je een stand inricht, hangt ook af van het soort stand. Een tussenstand in een rij geeft minder mogelijkheden dan een hoekstand (aan het eind van de rij) of een kopstand (dwars op de rij). De meeste mogelijkheden biedt een eilandstand: een afgescheiden ruimte met looppaden er omheen. Die heeft meer ruimte en is dus duurder. Het simpelste 'eiland' maak je door een rondje van kraampjes, maar het kan ook met houten vloerdelen, diverse kraampjes en looppaden.</p><p>Hoe groot de stand moet zijn hangt niet alleen af van het budget, maar ook van het verwachte aantal bezoekers. Het productaanbod kan ook eisen aan de afmetingen stellen. Wil je aan catering doen, dan is ook wat meer ruimte nodig. Met de organisator overleg je waar de stand precies komt: op welk deel van de beurs? Je zorgt voor een logische keus op thema. Is de ligging gunstig ten opzichte van faciliteiten zoals toiletten, horeca en de ingang en uitgang? Het inrichten van een stand kun je uitbesteden aan een standbouwer, een gespecialiseerde onderneming. Inrichten is een vak apart. Het is ook belangrijk: een slecht gepresenteerde stand trekt weinig publiek, deelname aan de beurs is dan weggegooid geld.</p><table><tr><td><strong>Entree</strong></td><td>De entree van je stand moet open zijn. Ook al zet je een paar wanden om een stand, mensen moeten naar binnen kunnen kijken en makkelijk naar binnen kunnen lopen.</td></tr><tr><td><strong>Zitruimte</strong></td><td>Er moet ruimte zijn voor mensen om een poosje te kunnen blijven. Bij een kraampje zet je stoelen of barkrukken. Op een 'pleintje' binnen een eilandstand kun je zithoeken maken met lees- en demonstratiemateriaal. Komen er gezinnen, zorg dan voor een speelhoek voor kinderen. Dan geef je de ouders de tijd en ruimte om te doen waar ze voor kwamen. Zorg ook voor ruimte om rustig met klanten te overleggen. Ook al ziet je stand er 'open' uit, hij moet wel duidelijk afgescheiden zijn van andere stands. Wil je binnenkomen? Graag, maar ga niet te snel weer weg.</td></tr><tr><td><strong>Verlichting</strong></td><td>Verlichting is belangrijk. Net als bij winkels is de algemene regel: niet te veel licht bij de entree, daar houden mensen niet van. Mensen kijken onbewust naar verlichte gedeeltes, dus je wilt meer licht achterin of in het centrum. Het soort product bepaalt het soort licht: sieraden vragen om warm licht, kleding vraagt om licht dat de kleuren goed laat zien. Je kunt hulpmaterialen gebruiken, zoals posters. Ook foto's, filmpjes en een digitale presentatie kunnen nuttig zijn.</td></tr><tr><td><strong>Routing</strong></td><td>Ook bij een kleine stand is routing belangrijk: in welke richting lopen de mensen? Wat zien ze het eerst? In een grotere eilandstand zorg je ervoor dat de mensen in een logische looprichting langs alle onderdelen komen.</td></tr></table><p>Deelname aan een beurs is vaak een flinke investering. Dat is het natuurlijk alleen waard als je veel bezoekers trekt. Dus zorg voor een goede voorbereiding: laat je zakelijke kennissen weten dat je er zult zijn! Dat verhoogt straks je opbrengst. Bedrijven kunnen de klanten er vast op wijzen door een nieuwsbrief rond te sturen. Met het weggeven van toegangskaarten voor de beurs maak je een goede indruk. Als jouw bedrijf een tijdschrift voor klanten heeft, schrijf je er vast een artikel over.</p>", "questionRange": [7, 11]}, {"id": 3, "intro": "Deze tekst komt van een website voor mensen met een eigen bedrijf. De tekst gaat over verzuim. Verzuim is het niet aanwezig zijn op het werk.", "title": "Verzuim op het werk", "body": "<p>Verzuim
