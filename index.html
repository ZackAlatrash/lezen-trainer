<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#4f46e5">
<title>Lezen Trainer</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lezen">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
  :root{
    --bg:#f5f6fb; --surface:#ffffff; --surface-2:#f1f2f8; --elevated:#ffffff;
    --ink:#1d2333; --muted:#5b6379; --faint:#8a91a6; --line:#e4e7f0;
    --primary:#4f46e5; --primary-ink:#ffffff; --primary-soft:#ececfb; --primary-strong:#4338ca;
    --good:#15803d; --good-bg:#e7f6ed; --good-line:#bfe6cd;
    --bad:#c0271f; --bad-bg:#fcecea; --bad-line:#f3cac6;
    --warn:#b45309; --warn-bg:#fbf0dd; --warn-line:#ecd3a0;
    --ring:#6366f1;
    --shadow-sm:0 1px 2px rgba(20,24,52,.05);
    --shadow:0 1px 2px rgba(20,24,52,.04),0 8px 24px rgba(20,24,52,.07);
    --r-lg:18px; --r-md:12px; --r-sm:9px;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --serif:"Iowan Old Style","Source Serif Pro",Georgia,"Times New Roman",serif;
    --legible:"Atkinson Hyperlegible","Comic Sans MS",Verdana,Tahoma,sans-serif;
    --t:170ms cubic-bezier(.2,.7,.3,1);
    --hdr:54px;
  }
  html[data-theme="dark"]{
    --bg:#0e1016; --surface:#171a23; --surface-2:#1e222e; --elevated:#1b1f29;
    --ink:#e9ecf4; --muted:#a3aaba; --faint:#7c8499; --line:#2a2f3d;
    --primary:#7c83ff; --primary-ink:#0e1016; --primary-soft:#20243a; --primary-strong:#9aa0ff;
    --good:#4ccf8e; --good-bg:#13271d; --good-line:#274a33;
    --bad:#ff6f64; --bad-bg:#2a1614; --bad-line:#4d2420;
    --warn:#f0a23a; --warn-bg:#2a2110; --warn-line:#4a3a1c;
    --ring:#8b91ff;
    --shadow-sm:0 1px 2px rgba(0,0,0,.35);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 28px rgba(0,0,0,.4);
  }
  @media (prefers-color-scheme: dark){
    html:not([data-theme="light"]):not([data-theme="dark"]){
      --bg:#0e1016; --surface:#171a23; --surface-2:#1e222e; --elevated:#1b1f29;
      --ink:#e9ecf4; --muted:#a3aaba; --faint:#7c8499; --line:#2a2f3d;
      --primary:#7c83ff; --primary-ink:#0e1016; --primary-soft:#20243a; --primary-strong:#9aa0ff;
      --good:#4ccf8e; --good-bg:#13271d; --good-line:#274a33;
      --bad:#ff6f64; --bad-bg:#2a1614; --bad-line:#4d2420;
      --warn:#f0a23a; --warn-bg:#2a2110; --warn-line:#4a3a1c;
      --ring:#8b91ff;
      --shadow-sm:0 1px 2px rgba(0,0,0,.35);
      --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 28px rgba(0,0,0,.4);
    }
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.55 var(--sans);-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4,p{margin:0}
  button{font:inherit;color:inherit;cursor:pointer;border:0;background:none}
  :focus-visible{outline:3px solid var(--ring);outline-offset:2px;border-radius:6px}
  .tnum{font-variant-numeric:tabular-nums}

  header.app{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;
    padding:max(10px,env(safe-area-inset-top)) max(14px,env(safe-area-inset-right)) 10px max(14px,env(safe-area-inset-left));
    background:color-mix(in srgb,var(--surface) 88%,transparent);backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:16px;letter-spacing:-.01em}
  .brand .logo{display:grid;place-items:center;width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--primary-strong));color:#fff}
  .brand .logo svg{width:17px;height:17px}
  .hdr-spacer{flex:1}
  .hdr-right{display:flex;align-items:center;gap:8px}

  main{max-width:1120px;margin:0 auto;padding:22px 18px 72px}
  .view{animation:fade var(--t)}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:var(--r-sm);background:var(--surface);border:1px solid var(--line);font-weight:600;font-size:14px;transition:background var(--t),border-color var(--t),transform var(--t),box-shadow var(--t),color var(--t)}
  .btn svg{width:17px;height:17px}
  .btn:hover{border-color:var(--primary);color:var(--primary)}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:var(--primary);color:var(--primary-ink);border-color:transparent;box-shadow:var(--shadow-sm)}
  .btn.primary:hover{background:var(--primary-strong);color:var(--primary-ink)}
  .btn.ghost{background:transparent;border-color:transparent}
  .btn.ghost:hover{background:var(--surface-2);color:var(--ink)}
  .btn.warn{color:var(--warn);border-color:var(--warn-line);background:var(--warn-bg)}
  .btn.sm{padding:7px 11px;font-size:13px}
  .btn.iconbtn{padding:0;width:38px;height:38px;border-radius:10px}
  .btn.iconbtn svg{width:18px;height:18px}
  .btn.iconbtn.sm{width:32px;height:32px}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:12.5px;font-weight:600;background:var(--surface-2);color:var(--muted)}
  .pill.accent{background:var(--primary-soft);color:var(--primary)}
  .pill.warn{background:var(--warn-bg);color:var(--warn)}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}

  .hero{margin:6px 0 22px}
  .hero h1{font-size:clamp(23px,5vw,32px);letter-spacing:-.02em}
  .hero p{color:var(--muted);margin-top:6px;max-width:60ch}
  .setupcard{padding:18px;margin-bottom:18px}
  .setup-row{display:flex;flex-wrap:wrap;gap:20px;align-items:center}
  .field-label{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
  .seg{display:inline-flex;background:var(--surface-2);border-radius:11px;padding:4px;gap:4px}
  .seg button{padding:8px 16px;border-radius:8px;font-weight:600;font-size:14px;color:var(--muted);transition:background var(--t),color var(--t)}
  .seg button[aria-pressed=true]{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}
  .switch{display:inline-flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
  .switch input{position:absolute;opacity:0;width:0;height:0}
  .track{width:42px;height:25px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line);position:relative;transition:background var(--t),border-color var(--t)}
  .track::after{content:"";position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:var(--shadow-sm);transition:transform var(--t)}
  .switch input:checked + .track{background:var(--primary);border-color:transparent}
  .switch input:checked + .track::after{transform:translateX(17px)}
  .switch input:focus-visible + .track{outline:3px solid var(--ring);outline-offset:2px}
  .hint{color:var(--muted);font-size:13.5px;margin-top:12px;display:flex;gap:8px;align-items:flex-start}
  .hint svg{width:16px;height:16px;flex:none;margin-top:2px;color:var(--primary)}

  .practice-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}
  .practice-row .btn{flex:1;min-width:200px;justify-content:flex-start;padding:14px 16px;text-align:left}
  .practice-row .btn .col{display:flex;flex-direction:column;gap:1px;align-items:flex-start}
  .practice-row .btn .col b{font-size:14px}
  .practice-row .btn .col span{font-size:12px;color:var(--muted);font-weight:500}

  .section-title{display:flex;align-items:baseline;gap:10px;margin:4px 2px 14px}
  .section-title h2{font-size:18px;letter-spacing:-.01em}
  .section-title .count{color:var(--faint);font-size:13px;font-weight:600}

  .examgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:14px}
  .exam{padding:18px;display:flex;flex-direction:column;gap:14px;transition:transform var(--t),box-shadow var(--t),border-color var(--t)}
  .exam:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:color-mix(in srgb,var(--primary) 35%,var(--line))}
  .exam .top{display:flex;justify-content:space-between;align-items:flex-start}
  .exam .yr{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .exam .sub{color:var(--faint);font-size:12.5px;margin-top:3px}
  .exam .meta{display:flex;flex-wrap:wrap;gap:6px}
  .exam .result{font-size:12.5px;color:var(--muted)}
  .exam .barwrap{height:7px;border-radius:99px;background:var(--surface-2);overflow:hidden;margin-top:6px}
  .exam .bar{height:100%;border-radius:99px}
  .exam .actions{display:flex;gap:8px;margin-top:2px}
  .exam .actions .btn{flex:1}

  .quizwrap{display:block}
  .quizbar{position:sticky;top:var(--hdr);z-index:20;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(6px);padding:12px 0 10px;margin-bottom:6px}
  .qb-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .qb-title{font-weight:700;font-size:15px}
  .qb-title small{display:block;color:var(--faint);font-weight:500;font-size:12px}
  .qb-grow{flex:1;min-width:120px}
  .progress{height:8px;border-radius:99px;background:var(--surface-2);overflow:hidden}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-strong));border-radius:99px;transition:width var(--t)}
  .qb-stat{font-size:12.5px;color:var(--muted);margin-top:5px}
  .timer{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:15px;padding:6px 12px;border-radius:9px;background:var(--surface);border:1px solid var(--line)}
  .timer.warn{color:var(--bad);border-color:var(--bad-line);background:var(--bad-bg)}
  .timer svg{width:15px;height:15px}

  .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:10px 0 6px}
  .focusseg{display:none}
  .toolspacer{display:none}
  .pills{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;flex:1;scrollbar-width:thin}
  .tpill{flex:none;display:inline-flex;align-items:center;gap:8px;padding:7px 13px;border-radius:999px;background:var(--surface);border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--muted);transition:all var(--t);white-space:nowrap}
  .tpill:hover{border-color:var(--primary);color:var(--primary)}
  .tpill[aria-current=true]{background:var(--primary);color:var(--primary-ink);border-color:transparent}
  .tpill .frac{font-variant-numeric:tabular-nums;opacity:.85;font-weight:700}
  .tpill .dot{width:7px;height:7px;border-radius:50%;background:var(--good)}

  .navlegend{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-bottom:12px}
  .navlegend i{display:inline-block;width:11px;height:11px;border-radius:4px;margin-right:5px;vertical-align:-1px}
  .navgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:8px}
  .navcell{position:relative;aspect-ratio:1;min-height:42px;border-radius:9px;border:1px solid var(--line);background:var(--surface-2);font-weight:700;font-size:13.5px;color:var(--muted);display:grid;place-items:center;transition:all var(--t)}
  .navcell:hover{border-color:var(--primary);color:var(--primary)}
  .navcell.answered{background:var(--primary-soft);color:var(--primary);border-color:transparent}
  .navcell.correct{background:var(--good-bg);color:var(--good);border-color:var(--good-line)}
  .navcell.wrong{background:var(--bad-bg);color:var(--bad);border-color:var(--bad-line)}
  .navcell.cur{outline:2px solid var(--primary);outline-offset:1px}
  .navcell.flag::after{content:"";position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:var(--warn)}

  .split{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,1fr);gap:20px;align-items:start}
  .pane-text,.pane-q{display:contents}
  .reshandle{display:none}
  .reader{position:sticky;top:calc(var(--hdr) + 96px);max-height:calc(100vh - var(--hdr) - 116px);overflow:auto;padding:20px 24px;border-radius:var(--r-lg);background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-sm)}
  .reader-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
  .reader-head .kicker{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
  .reader-tools{display:flex;align-items:center;gap:5px}
  .reader .intro{color:var(--muted);font-style:italic;font-size:14px;margin:2px 0 10px}
  .reader h2.rt{font-family:var(--serif);font-size:23px;line-height:1.2;letter-spacing:-.01em;margin:2px 0 12px}
  .prose{font-family:var(--serif);font-size:calc(17.5px + var(--readstep,0)*1px);line-height:1.72;color:var(--ink);max-width:68ch}
  .prose.dys{font-family:var(--legible);letter-spacing:.02em;word-spacing:.09em;line-height:1.95}
  .prose p{margin:0 0 .85em}
  .prose h3,.prose h4{font-family:var(--sans);font-size:14.5px;font-weight:700;margin:1.3em 0 .4em;color:var(--ink)}
  .prose ul,.prose ol{margin:.3em 0 .9em;padding-left:1.3em}
  .prose li{margin:.25em 0}
  .prose table{border-collapse:collapse;margin:.6em 0;font-family:var(--sans);font-size:14px;width:100%}
  .prose td,.prose th{border:1px solid var(--line);padding:6px 10px;text-align:left}
  .prose th{background:var(--surface-2)}

  .qlist{display:flex;flex-direction:column;gap:14px}
  .q{padding:18px;border-radius:var(--r-md);background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-sm);scroll-margin-top:14px;transition:outline var(--t)}
  .q.active{outline:2px solid var(--ring);outline-offset:2px}
  .q.flagged{border-color:var(--warn-line)}
  .q .qhead{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}
  .q .qnum{flex:none;display:grid;place-items:center;min-width:26px;height:26px;padding:0 7px;border-radius:8px;background:var(--primary-soft);color:var(--primary);font-weight:800;font-size:13px}
  .q .prompt{flex:1;font-weight:600;font-size:15.5px;line-height:1.45}
  .flagbtn{flex:none;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;border:1px solid var(--line);font-size:12.5px;font-weight:600;color:var(--muted);transition:all var(--t)}
  .flagbtn:hover{border-color:var(--warn);color:var(--warn)}
  .flagbtn.on{background:var(--warn-bg);border-color:var(--warn-line);color:var(--warn)}
  .flagbtn svg{width:14px;height:14px}
  .opt{display:flex;gap:12px;align-items:center;width:100%;text-align:left;padding:13px 14px;border-radius:10px;border:1.5px solid var(--line);background:var(--surface);margin:7px 0;transition:border-color var(--t),background var(--t),transform var(--t)}
  .opt:hover{border-color:var(--primary)}
  .opt:active{transform:scale(.992)}
  .opt .letter{flex:none;display:grid;place-items:center;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--line);font-weight:700;font-size:13px;color:var(--muted);transition:all var(--t)}
  .opt .otext{flex:1}
  .opt .mark{flex:none;width:20px;height:20px;opacity:0;transition:opacity var(--t)}
  .opt .mark svg{width:20px;height:20px}
  .opt.sel{border-color:var(--primary);background:var(--primary-soft)}
  .opt.sel .letter{background:var(--primary);color:var(--primary-ink);border-color:transparent}
  .opt.correct{border-color:var(--good-line);background:var(--good-bg)}
  .opt.correct .letter{background:var(--good);color:#fff;border-color:transparent}
  .opt.correct .mark{opacity:1;color:var(--good)}
  .opt.wrong{border-color:var(--bad-line);background:var(--bad-bg)}
  .opt.wrong .letter{background:var(--bad);color:#fff;border-color:transparent}
  .opt.wrong .mark{opacity:1;color:var(--bad)}
  .opt[disabled]{cursor:default}
  .note{display:flex;gap:7px;align-items:center;font-size:13.5px;font-weight:600;margin-top:9px}
  .note svg{width:16px;height:16px;flex:none}
  .note.good{color:var(--good)} .note.bad{color:var(--bad)}

  .bottomnav{display:flex;align-items:center;gap:10px;margin-top:18px}
  .bottomnav .spacer{flex:1}

  .results-hero{display:flex;gap:26px;align-items:center;flex-wrap:wrap;padding:24px;margin-bottom:20px}
  .ring{position:relative;width:132px;height:132px;flex:none}
  .ring svg{transform:rotate(-90deg)}
  .ring .ring-c{stroke:var(--surface-2)}
  .ring .ring-v{stroke-linecap:round;transition:stroke-dashoffset 700ms cubic-bezier(.2,.7,.3,1)}
  .ring .label{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
  .ring .label b{font-size:27px;font-weight:800;line-height:1}
  .ring .label span{font-size:12px;color:var(--muted)}
  .verdict h2{font-size:26px;letter-spacing:-.02em}
  .verdict h2.pass{color:var(--good)} .verdict h2.fail{color:var(--bad)}
  .verdict p{color:var(--muted);margin-top:4px}
  .verdict .actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}

  .breakdown{padding:18px;margin-bottom:20px}
  .breakdown h3{font-size:14px;margin-bottom:12px}
  .brow{display:grid;grid-template-columns:1fr 120px 52px;gap:12px;align-items:center;padding:7px 0}
  .brow + .brow{border-top:1px solid var(--line)}
  .brow .name{font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .brow .track2{height:8px;border-radius:99px;background:var(--surface-2);overflow:hidden}
  .brow .track2 i{display:block;height:100%;border-radius:99px}
  .brow .frac{text-align:right;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}

  .review-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:6px 2px 12px}
  .review-controls .grow{flex:1}
  .rev-group h4{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin:16px 2px 8px}
  .review .q{cursor:pointer}
  .review .q:hover{border-color:var(--primary)}
  .empty{padding:30px;text-align:center;color:var(--muted)}

  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
  .tile{padding:16px 18px}
  .tile .k{font-size:12px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--faint)}
  .tile .v{font-size:26px;font-weight:800;letter-spacing:-.01em;margin-top:4px}
  .tile .v small{font-size:14px;font-weight:600;color:var(--muted)}
  .chartcard{padding:18px;margin-bottom:18px}
  .chartcard h3{font-size:14px;margin-bottom:6px}
  .chart svg{width:100%;height:auto;display:block}
  .legendline{display:flex;gap:16px;color:var(--muted);font-size:12px;margin-top:8px}
  .recent{padding:6px 18px;margin-bottom:18px}
  .rrow{display:flex;align-items:center;gap:12px;padding:11px 0;font-size:14px}
  .rrow + .rrow{border-top:1px solid var(--line)}
  .rrow .date{color:var(--faint);font-size:12.5px;width:84px;flex:none}
  .rrow .nm{flex:1;font-weight:600}
  .rrow .vd{font-weight:700;font-variant-numeric:tabular-nums}

  .overlay{position:fixed;inset:0;z-index:100;background:rgba(10,12,20,.5);display:grid;place-items:end center;animation:fade var(--t)}
  .sheet{width:min(460px,100%);max-height:86vh;overflow:auto;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--r-lg) var(--r-lg) 0 0;box-shadow:var(--shadow);padding:20px 20px calc(20px + env(safe-area-inset-bottom));margin-bottom:0}
  .sheet .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .sheet h3{font-size:17px}
  .kbd-row{display:flex;align-items:center;gap:12px;padding:8px 0;font-size:14px}
  .kbd-row + .kbd-row{border-top:1px solid var(--line)}
  .kbd-row .keys{flex:none;display:flex;gap:5px}

<script>
const EXAMS = [{"id": "2009", "year": 2009, "title": "B1 Lezen 2009 — Openbaar examen", "timeLimitMin": 110, "passMark": 29, "totalQuestions": 41, "texts": [{"id": 1, "intro": "Deze tekst komt uit het personeelsblad van Inalfa, een bedrijf dat auto-onderdelen maakt. De tekst gaat over wat je als werknemer moet doen als je ziek bent.", "title": "Ziekmelding", "body": "<p>Wij constateren de laatste tijd dat niet iedereen zich houdt aan de huisregels bij ziekte. Ziek- en betermelding bij de portier en het opsturen van de 'eigen verklaring' aan de Arbo-Unie gebeurt regelmatig onjuist, onvolledig of niet. Hierdoor ontstaan problemen bij ziekteverzuimregistratie en salarisuitbetaling.</p><p>Voor de goede orde bijgaand nogmaals de van kracht zijnde regeling:</p><p><strong>Ziekmelding</strong></p><ul><li>Bij ziekte meldt u dit bij de portier en wel voor aanvang van de werkzaamheden.</li><li>De portier verbindt u door met uw leidinggevende.</li><li>Vul zo spoedig mogelijk de 'eigen verklaring' in en stuur deze naar de Arbo-Unie. Formulieren en voorbedrukte enveloppen zijn verkrijgbaar bij de portier.</li></ul><p><strong>Betermelding</strong></p><ul><li>Bent u hersteld, meld dit dan zo spoedig mogelijk telefonisch aan de portier en uw leidinggevende.</li><li>Doe dit bij voorkeur daags voor u weer gaat werken.</li></ul><p>Wij verzoeken u nogmaals dringend bij ziekte bovenstaande procedure op te volgen.</p>", "questionRange": [1, 4]}, {"id": 2, "intro": "Deze tekst gaat over pandaberen. Panda's zijn een speciaal soort beren die vooral in China leven.", "title": "Pandaberen", "body": "<h3>Leefwijze</h3><p><strong>Klimvermogen</strong><br>Van hun bijzonder klimvermogen maken panda's alleen gebruik wanneer er gevaar dreigt van roofdieren, zoals bruine beren, luipaarden of wilde honden. Ze zoeken dan hun toevlucht in de eerste de beste boom tot het gevaar geweken is.</p><p><strong>Leefklimaat</strong><br>De panda leeft in een koud en vochtig klimaat, maar wordt beschermd door een bijzonder dichtbehaarde en waterafstotende vacht.</p><p><strong>Voedsel</strong><br>Hoewel de panda tot de roofdieren behoort, bestaat zijn voedsel bijna uitsluitend uit stengels, bladeren en frisse jonge scheuten van verschillende soorten bamboe. In tegenstelling tot vlees heeft bamboe slechts een zeer lage voedingswaarde, waardoor de panda er gemiddeld zo'n 10 tot 20 kg per dag van nodig heeft. Al naar gelang het jaargetijde wordt dit voedsel met andere planten en eieren aangevuld.</p><p><strong>Gezichtsvermogen</strong><br>Omdat de panda bij het voedsel zoeken zijn ogen niet gebruikt, is zijn gezichtsvermogen zwak ontwikkeld.</p><p><strong>Voortplanting</strong><br>Alleen voor paring komen de solitaire panda's kort bij elkaar. Vijf maanden na paring komt het enige jong in een nest van bamboe ter wereld. Slechts zeer zelden wordt er een tweeling geboren, maar meestal overleeft er dan slechts één. Net zoals bij de grote beren is het pasgeboren jong bijzonder klein. Het is ongeveer 15 cm lang en 100 gram zwaar. Het is nog volledig onbehaard, hulpeloos en blind. Het blijft gedurende ongeveer 18 maanden bij de moeder.</p><h3>De toekomst van de panda</h3><p><strong>De pandabeer bedreigd</strong><br>Vroeger was de jacht door de mens de grootste bedreiging voor de panda. Momenteel zijn andere factoren voor het uitsterven van de soort verantwoordelijk: de toenemende verstoring van zijn natuurlijke omgeving doordat de mens uitgestrekte gebieden voor de akkerbouw in cultuur heeft gebracht, maar ook natuurlijke oorzaken zoals het afsterven van bamboebossen. Hij kan niet meer naar ongestoorde gebieden verhuizen, omdat er dorpjes en bebouwd land tussen liggen.</p><p><strong>Jacht</strong><br>De Chinezen ondersteunen momenteel iedere maatregel ter bescherming van de panda. De jacht op de panda wordt bijvoorbeeld streng bestraft.</p><p><strong>Reservaten</strong><br>Om de aantallen panda's weer te vergroten, zijn speciale reservaten ingesteld die voldoende ruimte bieden voor 500 tot 600 dieren. Wetenschappers bestuderen daar hun leefgewoonten en stellen een totaalplan op voor hun behoud.</p><p><strong>Dierentuinen</strong><br>Dierentuinen zijn betrokken bij de uitwerking van een project voor het fokken van de soort in gevangenschap. Dit plan is erop gericht om in bepaalde ongestoorde gebieden het pandabestand door het uitzetten van jonge dieren aan te vullen.</p><h3>Wist u dit?</h3><ul><li>De panda heeft de sterkste kiezen van alle roofdieren.</li><li>Per dag besteedt hij 16 uur aan eten, omdat hij met zijn korte roofdierdarmen alleen de inhoud van de plantencellen en niet de celwanden kan verteren.</li><li>Tot de Franse natuuronderzoeker Père David hem in 1869 ontdekte, was de reuzenpanda in de westelijke wereld onbekend.</li><li>De panda is het symbool van het World Wildlife Fund.</li><li>Het staartstompje van de panda dient als een soort &quot;borstel&quot;, waarmee de geur uit de eronder gelegen geurklieren wordt verspreid voor het markeren van zijn territorium.</li><li>Het gehoor van de panda is zeer scherp; hij kan daarmee het naderbij sluipen van vijanden opmerken.</li><li>De panda houdt geen winterslaap, maar zoekt bij zeer koud weer beschutting in grotten of holle bomen.</li></ul><p><strong>Bijzondere aanpassing</strong><br>Panda's zijn volledig aan hun eetgewoonten aangepast. Roofdieren gebruiken hun tanden om hun prooi te grijpen en hun kiezen om het vlees als met een schaar in kleinere stukken te knippen; panda's gebruiken ze echter om bamboestengels te vermalen. De voorpoten van de panda hebben een extra &quot;duim&quot;, waarmee hij in staat is om, samen met de overige vingers, kleine bamboespruiten nauwkeurig vast te pakken. De lange nagels kunnen in de poten teruggetrokken worden. Onder de voetzolen zit net als bij de ijsbeer huid voor grip tijdens het klimmen.</p>", "questionRange": [5, 9]}, {"id": 3, "intro": "Deze tekst komt uit een folder van de afdeling Handel & Logistiek van het Koning Willem I College in 's-Hertogenbosch.", "title": "Handel & Logistiek", "body": "<p>Bezoek de afdeling Handel & Logistiek in gebouw H, locatie Vlijmenseweg 2.</p><p>In onze opleidingen besteden we veel aandacht aan communicatie, moderne vreemde talen, logistieke processen, economische vakken en management. De meeste opleidingen zijn overdag maar er zijn er ook die je alleen in deeltijd kunt volgen of in de avonduren. Voor als je werken combineert met leren.</p><p><strong>DE AFDELING HANDEL &amp; LOGISTIEK HEEFT DE VOLGENDE OPLEIDINGEN:</strong></p><ul><li><strong>Ondernemer Groothandel:</strong> er wordt veel aandacht besteed aan communicatie, moderne vreemde talen, economische vakken en management.</li><li><strong>Commercieel Medewerker Binnendienst:</strong> onder meer logistiek, personeel, commerciële administratie, verkooptechniek en marketing komen bij de lessen aan bod.</li><li><strong>Verkoopmedewerker:</strong> welke branche je ook kiest, mode, doe-het-zelf, levensmiddelen, elektro of sport, straks weet je meer over marketing, presentatie en promotie en verkopen.</li><li><strong>Eerste Verkoper / Verkoopchef / Afdelingschef kassa:</strong> naast de detailhandelsvakken wordt aandacht besteed aan leidinggeven, kostenmanagement, verkoopstrategie en dergelijke.</li><li><strong>Ondernemer / Manager Detailhandel:</strong> belangrijke onderdelen hierbij zijn marketing, verkoopstrategie, presentatie en promotie, management en bedrijfseconomie.</li><li><strong>Manager Opslag en Vervoer:</strong> voor een efficiënte planning van opslag en/of vervoer van goederen ben je op de hoogte van communicatie, opslag- en vervoerstechnieken, moderne vreemde talen en wetgeving.</li><li><strong>Chauffeur Goederenvervoer:</strong> je haalt de noodzakelijke rijbewijzen en krijgt training in belading, gevaarlijke stoffen en communicatie. Ook leer je alles rondom ritten en het verkeer.</li><li><strong>Toerwagenchauffeur / Reisleider:</strong> naast het rijbewijs D komen onder andere professioneel verkeersgedrag, personenvervoer, communicatie en landenkennis aan bod. Evenals een basistraining in Engels en Duits.</li><li><strong>Magazijnmedewerker:</strong> je leert alles over goederenontvangst en -beheer, orderverzamelen en uitleveren, logistieke processen en je leert een hef- en reach-truck besturen.</li><li><strong>Groepsleider Magazijn en Hoofd Magazijn:</strong> plannen, organiseren, coördineren en het aansturen van mensen zijn de aandachtsgebieden.</li></ul><p><strong>Enkele specialiteiten van de afdeling Handel &amp; Logistiek</strong></p><p><strong>DE MINI-ONDERNEMINGEN</strong><br>Echt praktijkonderwijs! Samen met anderen een jaar lang je eigen bedrijf runnen. Je richt een mini-onderneming op, verkoopt aandelen, kiest en verkoopt de producten en liquideert het bedrijf na een jaar. Docenten en externe adviseurs ondersteunen je daarbij. Onze mini-ondernemingen zijn vaak erg succesvol; zij winnen regelmatig landelijke prijzen!</p><p><strong>MULTIMEDIATOEPASSING ADR (GEVAARLIJKE STOFFEN)</strong><br>Je krijgt dit onderdeel bij de opleidingen Chauffeur Goederenvervoer en Manager Opslag en Vervoer. De lesstof leer je vrij zelfstandig met behulp van een cd-rom die is gemaakt door vier scholen met een opleiding Transport &amp; Logistiek.</p><p><strong>INTERNATIONALE MARKTONDERZOEKEN</strong><br>Oriëntatie op buitenlandse markten is onmisbaar en leuk. De leerlingen benaderen vanuit school bedrijven. Deze formuleren een onderzoeksopdracht die in groepjes in het buitenland uitgewerkt wordt. Ten slotte volgt een presentatie voor de opdrachtgever, de Kamer van Koophandel en de desbetreffende docenten.</p><p><strong>PROJECTEN DETAILHANDEL EN INTERNATIONALE HANDEL/GROOTHANDEL</strong><br>Ook hier ben je bezig met de praktijk. Bij de opleiding Ondernemer/Manager Detailhandel en Ondernemer Groothandel kom je een dag per week bij elkaar om te werken aan een ondernemersplan en/of een project. Dit project kan variëren van het organiseren van een modeshow tot het maken van exportplannen. Ook worden er voorlichtingsbijeenkomsten gehouden door gastsprekers van banken, belastingdienst, MKB enzovoort. Je kunt gebruik maken van het informatie- en communicatiecentrum met onder andere databanken, telefoon, fax, cd-rom, internet en videoconferencingfaciliteiten.</p>", "questionRange": [10, 14]}, {"id": 4, "intro": "Deze tekst is een arbeidsovereenkomst. De overeenkomst wordt gesloten tussen een bedrijf (Scan Logistics) en mevrouw Krevac, een toekomstig medewerkster van dat bedrijf.", "title": "Arbeidsovereenkomst", "body": "<p><strong>ARBEIDSOVEREENKOMST VOOR ONBEPAALDE TIJD</strong> op te maken in tweevoud</p><p>De ondergetekenden:</p><p>1. De heer Westland, te Drunen, hierna te noemen werkgever en</p><p>2. Mevr. A.J.J. Krevac, te Kromacker 16, 5387 BK Heeswijk, geboren 21-05-1971, hierna te noemen werknemer,</p><p>komen als volgt overeen:</p><p><strong>Artikel 1. Indiensttreding</strong><br>De werknemer treedt met ingang van 1 juli 2009 bij werkgever in dienst in de functie van Scan Operator.</p><p><strong>Artikel 2. Duur arbeidsovereenkomst</strong><br>De arbeidsovereenkomst wordt aangegaan voor onbepaalde tijd met dien verstande dat de dienstbetrekking in ieder geval eindigt zonder dat opzegging is vereist bij het bereiken door de werknemer van de AOW-gerechtigde leeftijd. Partijen kunnen deze arbeidsovereenkomst met inachtneming van een opzegtermijn van 1 maand opzeggen tegen het einde van de kalendermaand.</p><p><strong>Artikel 3. CAO</strong><br>Op deze arbeidsovereenkomst is van toepassing de thans geldende CAO grafische sector.</p><p><strong>Artikel 4. Werktijden</strong><br>De werknemer verplicht zich in voorkomende gevallen alle door of namens werkgever in redelijkheid op te dragen werkzaamheden te verrichten gedurende 08.00 uur 's morgens tot 17.00 uur 's avonds.</p><p><strong>Artikel 5. Salaris</strong><br>De werknemer ontvangt een brutosalaris van € 1.580,- per maand, onverminderd wettelijke of periodieke verhogingen. De vakantietoeslag bedraagt 8% per jaar over het jaarsalaris. Het recht op vakantietoeslag wordt opgebouwd naar evenredigheid van de duur van het dienstverband in de periode van 1 juli tot en met 30 juni.</p><p><strong>Artikel 6. Vakantieregeling</strong><br>De werknemer heeft recht op 25 vakantiedagen per kalenderjaar. Deze vakantierechten worden opgebouwd naar evenredigheid van de duur van het dienstverband gedurende het kalenderjaar.</p><p><strong>Artikel 7. Onkosten</strong><br>Aan de werknemer worden door de werkgever de volgende onkosten vergoed: reiskosten woon-werkverkeer, extern, aanschaf P.C.</p><p><strong>Artikel 8. Overwerk</strong><br>Bij bijzondere omstandigheden verplicht de werknemer zich tot overwerk met dien verstande dat indien de werkgever zulks verzoekt, hij langer zal werken dan werd overeengekomen en ontvangt hij hiervoor bruto € 11,- per uur.</p><p>De overeenkomst is opgemaakt te Drunen. Datum 14-6-2009.</p>", "questionRange": [15, 18]}, {"id": 5, "intro": "Hieronder ziet u een folder van de politie. De folder gaat over \"gevonden voorwerpen\".", "title": "Stel... u heeft iets gevonden", "body": "<p>Als u iets op straat vindt, bent u dan automatisch eigenaar? En moet u die vondst aangeven bij de politie of bij het gemeentehuis? Krijgt u vindersloon, of kunt u een vergoeding vragen voor gemaakte kosten? In deze folder een kort overzicht van uw rechten en plichten.</p><p><strong>Aangifte</strong><br>Als u iets vindt, bijvoorbeeld een portemonnee met daarin € 1000,-, dan bent u verplicht van deze vondst aangifte te doen. U kunt daarvoor terecht bij de politie. Dit kan het politiebureau zijn in de plaats van de vondst, maar bijvoorbeeld ook bij de politie in uw woonplaats. Is de eigenaar van de portemonnee bij u bekend, dan hoeft er geen aangifte gedaan te worden. U moet de eigenaar dan natuurlijk wel vertellen dat zijn portemonnee gevonden is en deze aan hem of haar teruggeven.</p><p><strong>Extra aangifte</strong><br>In sommige gevallen moet er een extra aangifte gedaan worden. Als de portemonnee namelijk in een woning gevonden wordt, dan moet de bewoner hiervan in kennis gesteld worden. Ook wanneer de portemonnee in een winkel of een fabriek, in de bus, trein of tram gevonden wordt, moet daarvan melding gedaan worden. In het geval van de trein bijvoorbeeld, moet men dit doen bij het vervoersbedrijf de Nederlandse Spoorwegen.</p><p><strong>Onderhoud</strong><br>Er bestaat nog een verplichting voor de vinder. Hij of zij mag de portemonnee waarvan niet bekend is wie de eigenaar is, zelf bewaren maar moet dan ook voor het onderhoud zorgen. In dit voorbeeld mag de portemonnee dus niet in een vochtige, onafgesloten schuur bewaard worden. Maar de portemonnee kan natuurlijk ook bij de politie afgegeven worden op het moment dat u aangifte komt doen.</p><p><strong>Eigenaar worden</strong><br>De vinder kan ook eigenaar van een gevonden voorwerp worden. In het voorbeeld van de portemonnee wordt de vinder, mits hij of zij aan de verplichtingen heeft voldaan, 1 jaar na de vondst eigenaar. Voor gevonden voorwerpen die minder dan € 500,- waard zijn ten tijde van de vondst en door de vinder bij de politie in bewaring zijn gegeven, geldt een uitzondering. Deze voorwerpen worden namelijk na drie maanden door de politie vernietigd of verkocht. De vinder die gevonden voorwerpen van minder dan € 500,- niet zelf bewaart, kan dus nooit eigenaar worden. Zou er geen aangifte van de vondst van de portemonnee gedaan zijn, dan wordt de vinder ook nooit eigenaar. De oorspronkelijke eigenaar van de portemonnee heeft dan 20 jaar het recht zijn portemonnee op te eisen.</p><p><strong>Bewaarkosten</strong><br>Wanneer een vinder kosten heeft gemaakt om het gevonden voorwerp te bewaren en/of te onderhouden, dan heeft hij of zij recht op een redelijke vergoeding. Wil de oorspronkelijke eigenaar deze kosten niet vergoeden, dan hoeft de vinder het gevonden voorwerp niet af te geven (het zogenaamde recht van retentie).</p><p><strong>Vindersloon</strong><br>Een wettelijke regeling over de hoogte van een vindersloon is er niet. Een percentage van 10% wordt als reëel ervaren. In tegenstelling tot de bewaar- of onderhoudskosten, heeft de vinder bij het vindersloon geen retentierecht. Dus als de oorspronkelijke eigenaar geen vindersloon wil betalen, dan zal de vinder het gevonden voorwerp toch terug moeten geven.</p>", "questionRange": [19, 23]}, {"id": 6, "intro": "Deze tekst komt uit een leerboek voor het vak Scheikunde. De tekst gaat over wat scheikunde eigenlijk is en over stoffen en hun eigenschappen.", "title": "Scheikunde", "body": "<h3>1. Inleiding</h3><p>Scheikunde of chemie is een natuurwetenschap. Chemische kennis wordt op allerlei terreinen toegepast. Wie kiest voor een beroep in de technische, natuurwetenschappelijke of medische wereld komt beslist in aanraking met scheikunde. Maar ook thuis zijn we met scheikunde bezig als we de stoffen uit het keukenkastje gebruiken of als we eten koken. De processen die zich in ons lichaam afspelen zijn ook voor een groot deel chemische reacties. Dankzij chemie krijgt men beter inzicht in het functioneren van het menselijk lichaam, waardoor ziekten beter kunnen worden bestreden. Met behulp van chemische kennis kan men bovendien beter en veiliger gebruik maken van materialen waardoor bijvoorbeeld milieuvervuiling wordt tegengegaan.</p><p><strong>Waaruit bestaat het werk in de scheikunde?</strong><br>Dit richt zich in eerste instantie op stoffen. Men onderzoekt stoffen uit de natuur, probeert stoffen na te maken, zoekt naar nieuwe stoffen met betere eigenschappen, enzovoort. Wat verstaan we precies onder stoffen?</p><p>In het woordenboek staat bij het woord stof:<br>1 weefsel (van wol, katoen of linnen);<br>2 grondstof/materie (datgene waarvan iets vervaardigd kan worden);<br>3 figuurlijk: onderwerp (voor een roman);<br>4 stuifsel: in de lucht voorkomende kleine deeltjes van verschillende aard.</p><p><strong>Stoffen</strong><br>In het vervolg zullen we het begrip 'stof' vooral gebruiken in de betekenis van grondstof/materie. Alles om ons heen bestaat uit stoffen. Stoffen komen voor in zowel de vaste, de vloeibare als de gasvorm. Lucht bestaat dus ook uit stoffen, maar je kunt ze niet zien omdat ze onzichtbaar zijn. Denk bij gasvormige grondstoffen ook aan brandstoffen: aardgas, campinggas. Alle voorwerpen zijn van een of andere stof gemaakt, bijvoorbeeld:</p><table><tr><th>voorwerp</th><th>soort stof</th></tr><tr><td>ring of armband</td><td>goud of zilver</td></tr><tr><td>tafel of stoel</td><td>hout of kunststof</td></tr><tr><td>emmer of teil</td><td>ijzer of plastic</td></tr></table><p><strong>Eigenschappen</strong><br>Elke stof heeft bepaalde eigenschappen die kenmerkend zijn voor die stof. Koper is altijd roodachtig van kleur; de rode kleur is dus een eigenschap van koper. Bij kamertemperatuur heeft koper een dichtheid van 8,9 kg/dm³ (dat wil zeggen dat 1 dm³ koper 8,9 kg weegt). Koper kun je dus herkennen aan de kleur en de dichtheid. Voor andere stoffen gelden weer andere waarden voor de dichtheid. Zo is aluminium zilvergrijs. Met een dichtheid van 2,7 kg/dm³ is aluminium één van de lichtste metalen. Een andere belangrijke eigenschap, die voor alle metalen geldt, is dat metalen bij kamertemperatuur altijd koud aanvoelen als je ze vastpakt. Dat komt doordat metalen de warmte goed geleiden.</p><p><strong>Stofeigenschappen</strong><br>Kleur, dichtheid en warmtegeleiding zijn dus eigenschappen waaraan je een stof kunt herkennen. We noemen dit wel stofeigenschappen. Andere zijn: smaak, geur, hardheid, brandbaarheid, kookpunt en smeltpunt. Elke stof heeft dus allerlei stofeigenschappen, die er samen voor zorgen dat een stof zich onderscheidt van andere stoffen.</p><p>Er zijn ook kenmerken die je niet helpen om de stof te herkennen, bijvoorbeeld temperatuur, volume en massa: of je nu veel of weinig van een stof neemt, het blijft hetzelfde materiaal. Warm water, koud water en ijs bestaan uit dezelfde grondstof. Ook de vorm zegt niets over de soort stof: poedersuiker en suikerklontjes zijn allebei suiker.</p>", "questionRange": [24, 27]}, {"id": 7, "intro": "Deze tekst komt uit 'De Brug', een plaatselijke krant. Hij gaat over enquêtes.", "title": "Uw mening telt", "body": "<p>Iemand die meedoet aan een enquête krijgt een heleboel vragen voorgelegd waarover hij zijn mening moet geven. Circa 3 miljoen keer per jaar gaat in Nederlandse huishoudens de deurbel of de telefoon en klinkt de vraag of men mee wil doen aan een enquête. Toch zijn er veel misverstanden en vragen over wat zo'n enquête nu eigenlijk inhoudt, waar het voor nodig is, en wat er met de gegevens gebeurt. En waarom zou je er eigenlijk aan meedoen?</p><p>Vroeger hadden de meeste fabrikanten en dienstverlenende bedrijven zoals bijvoorbeeld de Nederlandse Spoorwegen, direct contact met hun klanten en merkten al heel snel of iets nieuws dat zij op de markt brachten in de smaak viel of niet. Door de massaproductie van deze tijd is dat contact veel moeilijker geworden, terwijl het tegenwoordig juist veel meer nodig is. Massaproductie van goederen en diensten vergt grote investeringen en een misser kan de producent of dienstverlener meteen in grote problemen brengen.</p><p>Het marktonderzoek is de verzamelnaam van enquêtes die in opdracht van het bedrijfsleven of de overheid worden gehouden, meestal onder consumenten. Een statisticus ontdekte ooit dat je een heel goed beeld kon krijgen van wat het gehele publiek ergens van vindt, als je een goede steekproef uit dat publiek ondervraagt. Een enquête bij een paar honderd inwoners van Nederland is al genoeg om vrij precies te weten wat alle inwoners van Nederland ergens van vinden. Maar dan moet die steekproef wel een goede afspiegeling zijn van dat publiek, dus moeten jong en oud, man en vrouw, stad en platteland, hoog en laag opgeleid er in de goede verhouding in zitten. Deze ontdekking maakte het voor bedrijven mogelijk om via enquêtes op een eenvoudige en betaalbare manier de informatie te kunnen krijgen, die zij nodig hebben om zo veel mogelijk in te kunnen spelen op de wensen en behoeften van de consument.</p><p><strong>Bescherming van de consument</strong><br>Veel onderzoek wordt telefonisch of via een schriftelijke enquête gedaan. In een kwart van de gevallen vindt het vraaggesprek thuis plaats. Soms gebeurt dat ook op straat, in winkels, in openbare gelegenheden of ook wel bij de marktonderzoeksbureaus 'in huis'. Voor de marktonderzoeksbureaus is het heel belangrijk dat het publiek wil meewerken aan de onderzoeken en bereid is om zowel thuis als aan de telefoon een enquêteur te woord te staan. De vakorganisaties voor het marktonderzoek hebben dan ook al sinds 1948 strenge regels waaraan de marktonderzoeksbureaus zich moeten houden.</p><p>De enquêteurs moeten zich kunnen legitimeren (let er op dat op het legitimatiebewijs het lopende jaar staat) en moeten goed kunnen uitleggen waar het onderzoek over gaat. Het is absoluut verboden dat een enquêteur producten verkoopt of aanprijst; dat heeft niets met marktonderzoek te maken. Marktonderzoeksbureaus zorgen ervoor dat de enquêteur een folder achterlaat met de naam en het adres van het onderzoeksbureau. Voor eventuele vragen of opmerkingen kan de ondervraagde dan contact opnemen.</p><p><strong>Anonimiteit</strong><br>Bij de enquête wordt de naam en het adres van de ondervraagde genoteerd. Dat is nodig om de enquêteur te kunnen controleren. De marktonderzoeksbureaus gaan steekproefsgewijs na of de enquêteur het vraaggesprek naar behoren heeft gevoerd. Na de controle wordt het adres vernietigd.</p><p>Voor markt- en opinieonderzoekers is het een heilige beroepswet dat namen en adressen na controle worden verwijderd. En gelukkig heeft de opdrachtgever daar ook geen behoefte aan want bij enquêtes wordt altijd gewerkt met steekproeven van een paar honderd tot een paar duizend ondervraagden. Dat is als adressenmateriaal voor bedrijven niet interessant. De bescherming van de privacy van de ondervraagden is bovendien ook nog per wet geregeld (Wet op de Privacy).</p>", "questionRange": [28, 34]}, {"id": 8, "intro": "Deze tekst geeft informatie aan cursisten van een regionaal opleidingscentrum (ROC).", "title": "Schoolzaken", "body": "<p><strong>SCHOOLZAKEN</strong><br>Stedelijk Dag/Avond College</p><p><strong>Ziekte en afwezigheid van een cursist</strong><br>Als een cursist door omstandigheden één of meer lessen afwezig zal zijn, dient hij dit te melden bij de administratie. Die zorgt er dan voor dat de betrokken docenten hiervan op de hoogte worden gesteld.</p><p><strong>Ziekte en afwezigheid van een docent</strong><br>Bij afwezigheid van een docent wordt getracht de cursisten die alleen voor het desbetreffende vak naar school komen, tijdig op de hoogte te stellen. Derhalve is het van groot belang dat alle adreswijzigingen en/of nieuwe telefoonnummers door de cursisten ook aan de schooladministratie worden doorgegeven. Per vak worden er vervangingslessen samengesteld die de cursist zelf kan doorwerken als er een les uitvalt.</p><p><strong>Mededelingen en roosterwijzigingen</strong><br>Mededelingen en roosterwijzigingen worden voor alle opleidingen bekend gemaakt via de publicatieborden. Bovendien wordt voor de avondopleidingen in elke groep een telefoonketen opgezet, zodat wij u in een voorkomend geval snel kunnen bereiken voor een mededeling.</p><p><strong>Rekenapparatuur</strong><br>Cursisten mogen tijdens toetsen, schoolonderzoeken en examens gebruik maken van rekenapparatuur. Hieronder dient men te verstaan de normale rekenmachines, d.w.z. niet-alfanumerieke rekenapparatuur. Het is raadzaam een eventuele nieuwe aanschaf te doen in overleg met de vakdocent. Voor het gebruik tijdens het examen vindt er vooraf controle plaats.</p><p><strong>Spreekuren</strong><br>Cursisten kunnen te allen tijde om een gesprek vragen met de directeur, de afdelingscoördinator, de mentor of de docenten. U kunt dan op afspraak naar één van de spreekuren.</p><p><strong>Rapporten en proefwerken</strong><br>Net als het reguliere dagonderwijs kent ook het Dag/Avond College een systeem van proefwerken en rapporten. Als u één of meer proefwerken hebt gemist, moet u zelf hierover contact opnemen met de docent(e) en eventueel een inhaalproefwerk afspreken. Indien door het niet maken van proefwerken geen rapportcijfer gegeven kan worden, zal een cursist voor dat vak niet bevorderd worden! Voor het maken van proefwerken kunt u voor € 1,- bij de administratie een proefwerkbloc van het Dag/Avond College kopen. De rapporten verschijnen 3 x per jaar: met Kerstmis, met Pasen en bij de overgang in juni. Alle rapporten worden door de school verstrekt.</p><p><strong>Bewaren van certificaten en diploma's</strong><br>Certificaten en diploma's worden bewaard tot drie maanden na de datum die op het diploma vermeld staat. Indien de certificaten en diploma's niet tijdig afgehaald worden, worden ze op uw risico aangetekend verstuurd, naar uw adres zoals dat in onze administratie voorkomt. Bewaart u deze stukken zorgvuldig! Van diploma's wordt door de school nooit een kopie verstrekt.</p><p>Tenzij u een volledig examen aflegt, ontvangt u van elk met succes afgelegd examen een certificaat. Alleen als u een volledig examen met succes aflegt, ontvangt u meteen uw diploma. U kunt uw certificaten op elk moment inwisselen tegen een diploma. U dient dan wel uw certificaten in te leveren.</p><p><strong>Studiebegeleiding</strong><br>Bij volledige inschrijving voor de eenjarige VMBO, HAVO of VWO kunt u, op grond van een studiecontract, verplicht worden deel te nemen aan het begeleidingsprogramma. Het begeleidingsprogramma maakt deel uit van het integrale opleidingsprogramma. Dit brengt voor u geen extra kosten met zich mee. De studie- en vakbegeleiding maakt deel uit van het toegevoegde dienstenpakket waarmee onze school beoogt uw slagingskansen te vergroten! Het bijkomend voordeel is duidelijk: door op school een belangrijk deel van uw huiswerk te maken, houdt u meer vrije tijd over.</p><p>Samen met u wordt bij inschrijving voor een deeltijdopleiding overlegd of deelname aan de verplichte studie- en vakbegeleidingslessen haalbaar en zinvol is.</p><p>Ook bij de eenjarige dag-MEAO-opleiding kunt u tot deelname aan het begeleidingsprogramma verplicht worden.</p><p><strong>Open Leercentrum</strong><br>In ons Open Leercentrum treft u tal van mogelijkheden aan om uw studieactiviteiten te ondersteunen. Zo kunt u beschikken over computers en onderwijsondersteunende softwarepakketten, maar ook over een bibliotheek en documentatie-afdeling. Verder dient het Open Leercentrum als studieruimte waar u voor het 'stille huiswerk' terecht kunt, maar waar u ook gebruik kunt maken van audio-visuele hulpmiddelen ten behoeve van luistertoetsen en het trainen van spreekvaardigheid. U kunt gratis van deze mogelijkheden gebruik maken.</p><p><strong>Kantine</strong><br>De kantine is de gehele dag open.</p><p><strong>Evenementen en excursies</strong><br>Als buitenschoolse activiteiten worden voor de cursisten o.a. excursies georganiseerd. In principe wordt slechts een deel van de kosten door de school gedragen. Het resterende deel is naar evenredigheid voor rekening van de deelnemers.</p><p><strong>Stalling</strong><br>Fietsen en brommers kunnen gestald worden in de stalling aan de achterzijde van het gebouw (zij-ingang Laaghuissingel). Het is cursisten op last van de brandweer verboden hun fietsen en brommers aan de voorzijde van het schoolgebouw te stallen. Het is aanbevolen brommers en fietsen van een deugdelijk slot te voorzien.</p><p><strong>Parkeren</strong><br>Auto's kunnen geparkeerd worden aan de Laaghuissingel of aan de Rijnbeekstraat.</p><p><strong>RECHTEN EN PLICHTEN</strong></p><p><strong>Cursistenstatuut</strong><br>De rechten en de plichten van de cursisten worden vastgelegd in een cursistenstatuut dat na instemming van de medezeggenschapsraad officieel vastgesteld wordt door het bestuur.</p><p><strong>Huishoudelijk reglement</strong><br>Voor de goede orde zijn er regels die gelden tijdens en na de lessen en in de pauzes. Deze regels hebben betrekking op het verblijf in en rond het gebouw. Aan het begin van het nieuwe studiejaar wordt dit reglement aan de cursisten uitgereikt.</p><p><strong>Roken</strong><br>Tijdens de lessen geldt binnen het gebouw van het Dag/Avond College een rookverbod. Slechts tijdens pauzes mag in de daartoe aangewezen kamers gerookt worden.</p>", "questionRange": [35, 41]}], "questions": [{"n": 1, "textId": 1, "prompt": "Op een dinsdag is Myra ziek. Wie moet ze bellen?", "options": {"A": "de portier", "B": "haar leidinggevende", "C": "Dat staat niet in de tekst."}, "answer": "A"}, {"n": 2, "textId": 1, "prompt": "Wie moet de 'eigen verklaring' van Myra naar de Arbo-Unie opsturen?", "options": {"A": "de portier", "B": "haar leidinggevende", "C": "Myra zelf", "D": "Dat staat niet in de tekst."}, "answer": "C"}, {"n": 3, "textId": 1, "prompt": "Op donderdagmiddag voelt Myra zich weer goed en ze wil op vrijdag weer gaan werken. Wanneer moet ze dit doorgeven?", "options": {"A": "het liefst op donderdag", "B": "het liefst op vrijdag", "C": "Ze hoeft dit niet door te geven."}, "answer": "A"}, {"n": 4, "textId": 1, "prompt": "Wie moet aan de Arbo-Unie doorgeven dat Myra weer beter is?", "options": {"A": "de portier", "B": "haar leidinggevende", "C": "Myra zelf", "D": "Dat staat niet in de tekst."}, "answer": "D"}, {"n": 5, "textId": 2, "prompt": "Wat eet de pandabeer het meest?", "options": {"A": "bamboe", "B": "eieren", "C": "vlees"}, "answer": "A"}, {"n": 6, "textId": 2, "prompt": "Welke bijzondere aanpassing hebben de voorpoten van panda's?", "options": {"A": "Ze hebben een extra duim.", "B": "Ze hebben extra lange nagels.", "C": "Ze worden als een schaar gebruikt."}, "answer": "A"}, {"n": 7, "textId": 2, "prompt": "Wat is momenteel de grootste bedreiging voor de pandabeer?", "options": {"A": "de jacht op deze dieren", "B": "dierentuinen en reservaten", "C": "verandering van hun natuurlijke omgeving"}, "answer": "C"}, {"n": 8, "textId": 2, "prompt": "Houdt de pandabeer ook een winterslaap?", "options": {"A": "Ja, de pandabeer houdt een winterslaap.", "B": "Nee, de pandabeer houdt geen winterslaap."}, "answer": "B"}, {"n": 9, "textId": 2, "prompt": "Hoelang blijft een babypanda bij zijn moeder?", "options": {"A": "enkele weken", "B": "ongeveer vijf maanden", "C": "ongeveer achttien maanden"}, "answer": "C"}, {"n": 10, "textId": 3, "prompt": "Voor wie is deze tekst bedoeld?", "options": {"A": "voor bedrijven die personeel willen werven onder studenten van de afdeling Handel & Logistiek", "B": "voor mensen die interesse hebben in een opleiding bij Handel & Logistiek", "C": "voor studenten die bij de afdeling Handel & Logistiek een opleiding volgen"}, "answer": "B"}, {"n": 11, "textId": 3, "prompt": "Gianni wil graag een baan als leidinggevende in de detailhandel. Welke opleiding kan hij dan het beste volgen?", "options": {"A": "Commercieel Medewerker Binnendienst", "B": "Eerste verkoper / Verkoopchef / Afdelingschef Kassa", "C": "Verkoopmedewerker"}, "answer": "B"}, {"n": 12, "textId": 3, "prompt": "Staat onder het kopje 'De mini-ondernemingen' in welke opleiding je leert hoe je een bedrijf kunt opzetten en leiden?", "options": {"A": "Ja, dat staat er wel.", "B": "Nee, dat staat er niet."}, "answer": "B"}, {"n": 13, "textId": 3, "prompt": "Hoe vaak kom je bij elkaar om te werken aan je ondernemersplan als je een project detailhandel doet?", "options": {"A": "1 x per week", "B": "2 x per week", "C": "3 x per week", "D": "4 x per week"}, "answer": "A"}, {"n": 14, "textId": 3, "prompt": "Bij de projecten voor de opleidingen detailhandel en groothandel worden voorlichtingsbijeenkomsten gehouden. Wie spreken er op deze bijeenkomsten?", "options": {"A": "cursisten van de opleidingen", "B": "docenten van de opleidingen", "C": "mensen van bedrijven"}, "answer": "C"}, {"n": 15, "textId": 4, "prompt": "In welk artikel staat iets over het beëindigen van het dienstverband bij Scan Logistics?", "options": {"A": "in artikel 2", "B": "in artikel 4", "C": "in artikel 6"}, "answer": "A"}, {"n": 16, "textId": 4, "prompt": "De directeur van Scan Logistics vraagt aan mevrouw Krevac of ze, in verband met grote drukte, deze week ook 's avonds wil werken. Kan mevrouw Krevac dit weigeren?", "options": {"A": "Ja, mevrouw Krevac is nooit verplicht om over te werken.", "B": "Ja, want de directeur moet het eerder aankondigen.", "C": "Nee, haar baas mag haar altijd laten overwerken.", "D": "Nee, ze is verplicht over te werken omdat het om bijzondere omstandigheden gaat."}, "answer": "D"}, {"n": 17, "textId": 4, "prompt": "Mevrouw Krevac moet elke dag ongeveer 35 kilometer reizen naar Scan Logistics. Wie moet de reiskosten betalen?", "options": {"A": "alleen mevrouw Krevac", "B": "alleen Scan Logistics", "C": "mevrouw Krevac en Scan Logistics"}, "answer": "B"}, {"n": 18, "textId": 4, "prompt": "Mevrouw Krevac besluit na 3 jaar ergens anders te gaan werken. Hoe lang is de opzegtermijn bij Scan Logistics?", "options": {"A": "De duur van de opzegtermijn hangt af van de duur van het dienstverband.", "B": "De opzegtermijn is één maand.", "C": "Er wordt geen opzegtermijn gehanteerd."}, "answer": "B"}, {"n": 19, "textId": 5, "prompt": "Iemand vindt op straat de portemonnee van een kennis. Wat moet hij doen?", "options": {"A": "Hij hoeft alleen maar aangifte te doen, de politie geeft de portemonnee terug aan de eigenaar.", "B": "Hij hoeft geen aangifte te doen, maar hij moet de portemonnee wel aan de eigenaar teruggeven.", "C": "Hij moet aangifte doen en vervolgens de portemonnee aan de eigenaar teruggeven."}, "answer": "B"}, {"n": 20, "textId": 5, "prompt": "Iemand vindt in de trein een tas. Bij wie moet hij dit aangeven?", "options": {"A": "alleen bij de Nederlandse Spoorwegen", "B": "alleen bij de politie", "C": "bij de politie en bij de Nederlandse Spoorwegen"}, "answer": "C"}, {"n": 21, "textId": 5, "prompt": "Als de eigenaar niet bekend is, mag je een gevonden voorwerp dan na de aangifte mee naar huis nemen?", "options": {"A": "Ja, dan is het van jou.", "B": "Ja, maar dan moet je er goed voor zorgen.", "C": "Nee, dan moet je het op het politiebureau laten."}, "answer": "B"}, {"n": 22, "textId": 5, "prompt": "Iemand heeft een leren tas gevonden ter waarde van € 250,- en geeft hem aan de politie in bewaring. Na drie maanden is de eigenaar nog onbekend. Wat gebeurt er op dat moment met de tas?", "options": {"A": "De tas wordt door de politie verkocht of vernietigd.", "B": "De tas wordt eigendom van de vinder.", "C": "Niets, pas na een jaar wordt de tas eigendom van de vinder."}, "answer": "A"}, {"n": 23, "textId": 5, "prompt": "Wanneer heeft de vinder recht van retentie?", "options": {"A": "als de eigenaar geen vindersloon wil betalen", "B": "als de eigenaar gemaakte bewaarkosten niet wil vergoeden", "C": "als de waarde van het gevonden voorwerp minder dan € 500,- is"}, "answer": "B"}, {"n": 24, "textId": 6, "prompt": "Wat wil de schrijver met het eerste deel van de tekst (regel 1-9) laten zien?", "options": {"A": "dat het bij scheikunde vooral gaat om chemische processen", "B": "dat je overal te maken hebt met scheikunde", "C": "dat scheikunde een natuurwetenschap is", "D": "dat scheikunde vooral belangrijk is in de gezondheidszorg"}, "answer": "B"}, {"n": 25, "textId": 6, "prompt": "In onderstaand plaatje ziet u dat A en B even zwaar zijn. Welke stof heeft de grootste dichtheid, stof A of stof B?", "options": {"A": "stof A heeft de grootste dichtheid", "B": "stof B heeft de grootste dichtheid"}, "answer": "A"}, {"n": 26, "textId": 6, "prompt": "Hoeveel stofeigenschappen worden er genoemd vanaf regel 38?", "options": {"A": "3", "B": "6", "C": "9", "D": "12"}, "answer": "C"}, {"n": 27, "textId": 6, "prompt": "Bestaan warm water, koud water en ijs uit dezelfde materie?", "options": {"A": "Ja, ze bestaan uit dezelfde materie.", "B": "Nee, ze bestaan uit verschillende materie."}, "answer": "A"}, {"n": 28, "textId": 7, "prompt": "Wat is belangrijk als men een enquête houdt?", "options": {"A": "dat men aan een paar honderd mensen vragen stelt", "B": "dat men aan verschillende groepen uit de bevolking vragen stelt", "C": "dat men aan zoveel mogelijk mensen vragen stelt"}, "answer": "B"}, {"n": 29, "textId": 7, "prompt": "Wat is voor een fabrikant het belangrijkste doel bij het houden van een enquête?", "options": {"A": "persoonlijk contact hebben met de klanten", "B": "te weten komen of de consument massaproductie wil", "C": "te weten komen wat de consument nodig heeft en graag wil"}, "answer": "C"}, {"n": 30, "textId": 7, "prompt": "Enquêtes kunnen op verschillende manieren en op verschillende plaatsen worden uitgevoerd. Welke manier is volgens deze tekst niet erg gebruikelijk?", "options": {"A": "een enquête bij de marktonderzoeker", "B": "een schriftelijke enquête", "C": "een telefonische enquête"}, "answer": "A"}, {"n": 31, "textId": 7, "prompt": "Waarom zijn er strenge regels voor marktonderzoek?", "options": {"A": "Anders krijg je niet de juiste gegevens.", "B": "Anders willen mensen niet meer meedoen.", "C": "Anders worden de producten niet verkocht."}, "answer": "B"}, {"n": 32, "textId": 7, "prompt": "Waarnaar moet je volgens de tekst goed kijken op het legitimatiebewijs van een enquêteur?", "options": {"A": "naar de datum", "B": "naar het doel van het onderzoek", "C": "naar zijn naam"}, "answer": "A"}, {"n": 33, "textId": 7, "prompt": "'Na de controle wordt het adres vernietigd' (regel 73-74). Wie worden gecontroleerd?", "options": {"A": "de enquêteurs", "B": "de marktonderzoeksbureaus", "C": "de ondervraagden"}, "answer": "A"}, {"n": 34, "textId": 7, "prompt": "U hebt meegewerkt aan een enquête over keukenapparaten. U hebt gezegd dat u een diepvrieskast wel belangrijk vindt. Een maand later stuurt het bedrijf dat de enquête heeft laten houden u een aanbieding voor een nieuwe diepvrieskast. Zij hebben uw adres van de marktonderzoeker gekregen. Mag dat?", "options": {"A": "Ja, het adres mag doorgegeven worden.", "B": "Nee, dat is verboden.", "C": "Dat staat niet in de tekst."}, "answer": "B"}, {"n": 35, "textId": 8, "prompt": "Een cursist heeft een proefwerk gemist. Wat moet hij doen?", "options": {"A": "contact opnemen met de docent(e)", "B": "de schooladministratie waarschuwen", "C": "wachten tot er een inhaalproefwerk is", "D": "€ 1,- betalen bij de schooladministratie"}, "answer": "A"}, {"n": 36, "textId": 8, "prompt": "Is het mogelijk om bij de school kopieën van diploma's te krijgen?", "options": {"A": "Ja, dat is altijd mogelijk.", "B": "Ja, maar alleen binnen drie maanden na de datum die op het diploma staat.", "C": "Nee, dat is niet mogelijk."}, "answer": "C"}, {"n": 37, "textId": 8, "prompt": "Door wie wordt het cursistenstatuut officieel vastgesteld?", "options": {"A": "door de cursisten", "B": "door de medezeggenschapsraad", "C": "door het bestuur"}, "answer": "C"}, {"n": 38, "textId": 8, "prompt": "Waar in het gebouw mogen cursisten tijdens de pauzes roken?", "options": {"A": "in de gangen", "B": "in speciale ruimtes", "C": "Er mag nergens gerookt worden."}, "answer": "B"}, {"n": 39, "textId": 8, "prompt": "Wat is voor het Stedelijk Dag/Avond College het belangrijkste doel van het studiebegeleidingsprogramma?", "options": {"A": "beter kunnen controleren of de cursisten het huiswerk maken", "B": "de cursisten een grotere kans op slagen geven", "C": "de kosten voor de cursisten laag houden"}, "answer": "B"}, {"n": 40, "textId": 8, "prompt": "Door wie worden de excursies normaal gesproken betaald?", "options": {"A": "alleen door de deelnemers", "B": "alleen door de school", "C": "door de deelnemers én de school"}, "answer": "C"}, {"n": 41, "textId": 8, "prompt": "Mogen cursisten tijdens examens gebruik maken van rekenmachines?", "options": {"A": "Ja, alle rekenmachines mogen gebruikt worden.", "B": "Ja, maar niet alle soorten rekenmachines.", "C": "Nee, het gebruik van rekenapparatuur tijdens examens is verboden."}, "answer": "B"}]}, {"id": "2011", "year": 2011, "title": "B1 Lezen 2011 — Openbaar examen", "timeLimitMin": 110, "passMark": 26, "totalQuestions": 42, "texts": [{"id": 1, "intro": "Deze tekst is een artikel uit een tijdschrift. In het artikel vertelt Debbie Zwaan over haar stage. In haar stage werkt Debbie bij mensen met psychische problemen.", "title": "'Ik wil niet als snotneus overkomen'", "body": "<p><strong>Naam:</strong> Debbie Zwaan<br><strong>Leeftijd:</strong> 19 jaar<br><strong>Woonplaats:</strong> Bodegraven<br><strong>Opleiding:</strong> Activiteiten Begeleidster (AB) op het Crabethcollege in Gouda<br><strong>Stage:</strong> Reakt, een activiteitencentrum voor mensen met een psychiatrische achtergrond</p><h4>Doelgroep:</h4><p>\"Ik zag het als een uitdaging om met mensen met een psychiatrische achtergrond te werken omdat ik er nog maar zo weinig van wist. Ik vroeg mij wel af of ik het aankon, omdat het werken met deze doelgroep best zwaar kan zijn. Tijdens mijn eerste stage heb ik met verstandelijk gehandicapten gewerkt. Zij waren van hoog niveau en goed gebekt. Door deze stage had ik meer zelfvertrouwen om met psychiatrische patiënten aan de slag te gaan. Het uitdagende van het werken met deze doelgroep is, dat er jongeren van mijn leeftijd bij zijn, hoewel dat soms best confronterend is. 'Jeetje, ik had ook zo kunnen zijn.' Daarbij wil ik niet als een snotneus overkomen. Het is moeilijk om dan de juiste begeleidingsvorm te kiezen. Ook vind ik het lastig dat ik soms mensen tegenkom die ik ken. Ze zijn bang dat ik aan andere mensen vertel dat ze daar zitten.\"</p><h4>Stage:</h4><p>\"De AB'ers hier werken niet alleen voor Reakt. Ze worden ook 'ingekocht' door een psychiatrisch ziekenhuis in de buurt. Dat betekent dat ik op meer dan één plek stage loop. Mijn werkzaamheden zijn dus ook divers. De ene dag sport ik, de andere dag begeleid ik de hobbygroep. De bezoekers kunnen dan kiezen wat ze doen. Ze zijn vrij om te doen en te laten wat ze willen. Houtbewerkken, schilderen of gewoon even lekker kletsen. Op maandag en vrijdag ga ik naar de tuin. Mijn belangrijkste taak daar is er te zijn. Ik geef de bezoekers een beschermd gevoel: als ze ergens mee zitten, zal ik naar ze luisteren. Dat maakt het werken met deze doelgroep ook lastig. Als je zelf niet lekker in je vel zit, is het soms moeilijk dat mensen hun pijnlijke verhalen bij jou uitstorten. Het liefst zou je hard wegrennen! Ik was eerst ook bang dat ik hun problemen mee naar huis zou nemen, maar dat valt mee. Soms pieker ik even in de bus, maar als ik eenmaal thuis ben, is het vervelende gevoel weg.\"</p><h4>Begeleiding:</h4><p>\"Met mijn stagebegeleidster heb ik het getroffen. We hebben namelijk ongeveer dezelfde visie. Soms loop ik met haar mee tijdens het begeleiden van activiteiten. Ik kijk hoe zij dat doet. Meestal had ik het ook zo gedaan. Ik heb ook veel eigen inbreng en word heel vrij gelaten. Als ik ideeën heb voor een activiteit, mag ik die zelf uitvoeren. Wel staat er dan iemand bij om mij eventueel te helpen.\"</p><h4>Toekomst:</h4><p>\"Eerst wilde ik direct na mijn opleiding gaan werken, maar nu wil ik verder studeren aan de SPH, de Sociaal-Pedagogische Hogeschool. Dat is een goede manier om nog even rond te kijken op andere plekken. Bovendien kan ik mij daar meer in zaken verdiepen. Dat mis ik in deze AB-opleiding. Je krijgt van alles een beetje, maar je bent nergens echt in gespecialiseerd. Bij SPH wordt je bijvoorbeeld meer juridische en medische kennis bijgebracht.\"</p>", "questionRange": [1, 6]}, {"id": 2, "intro": "Deze tekst geeft informatie over suiker. De tekst beschrijft ook welke gevolgen het gebruik van suiker wel en niet heeft.", "title": "Suiker, een zoete sloper?", "body": "<p>Binnen de voedingsleer heeft suiker een slechte naam. Het bevat veel lege calorieën en verder biedt het ons lichaam weinig bruikbaars. Sterker nog, het zou allerlei ziekten en gebreken veroorzaken. Wij onderzochten de aanklacht tegen suiker.</p><p>De mens is al eeuwen dol op suiker. Zozeer zelfs, dat wij al decennia lang bereid zijn om het goedje te maken. Suiker winnen is immers een ingewikkeld proces, waarvoor suikerriet of suikerbieten langdurig moeten worden bewerkt. Desondanks is het hier sinds de Middeleeuwen populair. Het kwam in onze contreien terecht, nadat de kruisvaarders vele kilo's van de lekkernij uit het Oosten hadden meegekaapt. Eigenlijk waren we een van de laatste volken die kennis maakten met suiker. In Azië, Afrika en India kende men het al veel langer. Tegenwoordig wordt echter nergens zoveel suiker gebruikt als in West-Europa en Noord-Amerika. Ieder jaar eten we zo'n 50 kilo suiker per persoon. Deze hoeveelheid krijgen we niet alleen binnen via frisdrank en snoep. Ook natuurlijke en overigens gezonde producten als appelsap en melk bevatten veel suiker. Het is zonder twijfel een van de populairste ingrediënten uit onze keuken. Maar hoge bomen vangen veel wind en suiker wordt steeds vaker in verband gebracht met allerlei kwalen.</p><h4>Overgewicht</h4><p>Suiker behoort tot de koolhydraten, de chemische naam is sacharose. Één gram suiker is goed voor 16 kJ/4 kcal, verder bevat het weinig stoffen die bruikbaar zijn voor ons lichaam. Men zegt daarom dat sacharose uitsluitend lege calorieën levert. Door deze eigenschap wordt suiker vaak gezien als een dikmaker. Toch is er nog nooit een duidelijk verband aangetoond tussen suiker en overgewicht. Dat wil zeggen: veel dikke mensen eten niet meer suiker dan anderen.</p><h4>Hart- en vaatziekten</h4><p>Aandoeningen aan het hart en de vaten zijn nog altijd doodsoorzaak nummer één. In de zoektocht naar oorzaken van deze ziekten wordt regelmatig een beschuldigende vinger uitgestoken naar suiker. Toch heeft men ook hier nooit een directe relatie kunnen leggen. Vooralsnog lijkt vet de belangrijkste schuldige bij het ontstaan van deze kwalen.</p><h4>Gedragsstoornissen</h4><p>De laatste jaren is er in onderzoek veel aandacht besteed aan hyperactiviteit en andere gedragsstoornissen, die veroorzaakt zouden worden door suiker. Ondanks deze aandachtsgolf is het verband niet bewezen. Het lijkt eerder in tegenspraak met eerder opgedane wetenschappelijke kennis. Een koolhydraatrijke maaltijd maakt immers slaperig.</p><h4>Suikerziekte</h4><p>Diabetes is alleen vanwege de bijnaam suikerziekte onlosmakelijk met sacharose verbonden. Toch is er, in tegenstelling tot populair geloof, nog nooit een verband aangetoond tussen het eten van suiker en het ontstaan van diabetes. Grootverbruikers hebben waarschijnlijk geen grotere kans om de ziekte te krijgen dan anderen. Heeft iemand eenmaal suikerziekte, dan is er wel degelijk een verband tussen de consumptie van suikerhoudend voedsel en het verloop van de klachten. Vaak moet dan een speciaal dieet worden gevolgd, waarbij het eten van koolhydraten nauwlettend in het oog wordt gehouden. Hierbij probeert men in eerste instantie om de inname van suiker zoveel mogelijk gelijkmatig over de dag te verspreiden. Een volledig verbod op sacharose is voor de meeste diabetespatiënten verleden tijd.</p><h4>Gaatjes</h4><p>Het naarste trekje van suiker is dat het tandcariës, oftewel gaatjes, veroorzaakt. Dit geldt overigens voor alle verteerbare koolhydraten. Het verband tussen gaatjes en sacharose is in meerdere onderzoeken aangetoond. Daarbij bleek dat de kans op tandcariës sterk verschilt per persoon en in belangrijke mate afhangt van de mondhygiëne en de bacteriën in het speeksel. De meest bepalende factor bij het ontstaan van gaatjes is niet zozeer de hoeveelheid sacharose die geconsumeerd wordt, maar de regelmaat waarmee men suikerhoudende producten eet. Na het eten van sacharose verandert namelijk de zuurgraad in de mond waardoor de tanden eerder aangetast kunnen raken. Het gebit moet voldoende tijd krijgen om van deze aanval te herstellen.</p>", "questionRange": [7, 11]}, {"id": 3, "intro": "Deze tekst is van een vakbond. De schrijver geeft tips die werknemers kunnen helpen bij functioneringsgesprekken met hun werkgever. Alex werkt bij een groot bedrijf. Twee keer per jaar heeft hij een functioneringsgesprek met zijn chef. Om zich goed voor te bereiden op zijn functioneringsgesprek volgende week leest hij deze tekst.", "title": "Functioneringsgesprekken voeren kun je leren", "body": "<p>Heb je dat wel eens meegemaakt? Alles loopt lekker op het werk. De resultaten zijn in orde. Maar in het functioneringsgesprek loopt het ineens scheef. Je manager zaagt je door op een klein minpuntje dat het hele gesprek overheerst. Je wordt boos en de emotie gaat in het gesprek overheersen. Na afloop heb je een katerig gevoel en heb je geen resultaten geboekt. Vaak gaat dat minpuntje ook nog over jouw persoon, in plaats van jouw resultaten. Dat is vervelend voor jou en ook niet nodig. Want functioneringsgesprekken voeren kun je leren.</p><p>Een functioneringsgesprek gaat in de eerste plaats over hoe jij je werk hebt gedaan. Het gebeurt nogal eens dat managers er maar wat op los praten. Dan verliezen ze al gauw uit het oog wat het doel is van een functioneringsgesprek: de resultaten van jouw functioneren. Dus niet jouw persoon, maar de resultaten die je hebt geboekt staan ter discussie.</p><p>Alle reden dus om goed bij de les te blijven. Met een goede voorbereiding kun jij het verloop van het gesprek grotendeels bepalen. Je gaat daarvoor van tevoren op zoek naar relevante gegevens en presenteert die tijdens het gesprek. Zo houd je de manager bij de les en maak je duidelijk zichtbaar welke positieve bijdragen je de afgelopen tijd hebt geleverd aan de organisatie. Met de juiste tips gaat het je lukken om een perfect functioneringsgesprek te voeren.</p><p>Bedenk dat niemand perfect is. Jouw functioneren hangt natuurlijk wel samen met wie je bent. Van fouten kun je leren en je moet kritiek op jouw persoon natuurlijk wel kunnen hebben. Maar je hoeft geen kloon te worden van je leidinggevende of collega. Als iedereen hetzelfde is binnen een organisatie, ontstaat er geen dynamiek. Juist door de wisselwerking van personen en achtergronden ontstaat samenwerking en vernieuwing.</p><p>Een goede tip: bespreek tijdens het onderwerp 'Opleidingen' de mogelijkheid van een cursus 'Loopbaanplanning'. Met deze cursus hebben veel werknemers goede ervaringen, je leert jezelf goed kennen. Ook weet je na zo'n cursus wat jou gelukkig maakt. Dit houdt verband met je karakter, belangstelling enz. Werken is immers meer dan alleen maar geld verdienen. In de onderhandelingen van de bond is een persoonlijk ontwikkelingsbudget aan de orde. Dit geeft werknemers de mogelijkheid om zich persoonlijk te ontwikkelen. Voor een cursus 'Loopbaanplanning' moet je tegen een stootje kunnen, het gaat immers over jezelf.</p><p>Functioneringsgesprekken, beoordelingsgesprekken, ziekteverzuimgesprekken. Zelfs voor mensen die gewend zijn om onderhandelingen te voeren zijn deze moeilijk. Een goede voorbereiding geeft je een houvast. Hierdoor ervaar je dat je ontspannen dit soort moeilijke gesprekken voert en betere resultaten boekt. Op je werk zijn deze gesprekken zeer belangrijk. Het gaat immers over jou en je toekomst.</p><h4>Tips voor functioneringsgesprekken</h4><table><tr><td><strong>Tip 1</strong><br>Materiaal verzamelen</td><td>Verzamel zoveel mogelijk resultaten van je werk. Pluis je agenda na op activiteiten waar je bij betrokken was. Schrijf ze op en geef een ruwe schatting van de bestede uren. Je kunt zo duidelijk maken wat je in de afgelopen periode hebt gedaan, zo vergeet je niets.</td></tr><tr><td><strong>Tip 2</strong><br>Jouw bijdrage aangeven</td><td>Maak bij elk item duidelijk welke bijdrage je daaraan hebt geleverd. Bij projecten duidelijk aangeven welk onderdeel door jou is aangepakt. Je maakt zichtbaar wat je precieze bijdrage was in de verschillende werkzaamheden.</td></tr><tr><td><strong>Tip 3</strong><br>Resultaten vermelden</td><td>Wat was het resultaat van je werk? Niet alleen benoemen in nota's en cijfers, maar ook duidelijk maken dat de klant er blij mee was of dat het project beter is verlopen. Zo verbind je jouw bijdrage aan een positieve ontwikkeling voor de afdeling.</td></tr><tr><td><strong>Tip 4</strong><br>Keuze maken</td><td>Niet alles was misschien even goed. Maak een keuze uit de onderwerpen die het meeste resultaat hebben opgeleverd. Zorg wel voor evenwicht: noem ook enkele dingen die minder succesvol waren. Je presenteert je zo optimaal, je laat zien dat je eerlijk bent.</td></tr><tr><td><strong>Tip 5</strong><br>Leerpunten formuleren</td><td>Bij minder succesvolle zaken bedenk je enkele leerpunten die je in het vervolg beter wilt doen. Hiermee laat je zien dat je bereid bent om fouten te onderkennen en daarvan te leren.</td></tr><tr><td><strong>Tip 6</strong><br>Doelen formuleren</td><td>Benoem de volgende doelen: waar wil je met je werk naartoe; welke persoonlijke leerdoelen heb je; en welke carrièrestappen wil je nog maken. Handig om vooraf te bedenken. In het gesprek lukt je dat niet zomaar.</td></tr><tr><td><strong>Tip 7</strong><br>Wensen formuleren</td><td>Koppel de doelen aan reële wensen. Bedenk vooral waar je met je huidige functie naar toe wilt. Als je voor jezelf een helder doel stelt, heb je een goede onderhandelingspositie in het gesprek. De doelen van tip 6 verbind je in het gesprek aan afspraken over te leveren resultaten, opleidingswensen en loopbaanafspraken.</td></tr><tr><td><strong>Tip 8</strong><br>Agendapunten opstellen</td><td>Jouw punten zijn in ieder geval: werkzaamheden en resultaten, leerpunten, doelen voor het komende jaar, opleidingswensen en afspraken over je loopbaan. Zo komen in ieder geval jouw prestaties en persoonlijke ontwikkeling aan bod.</td></tr><tr><td><strong>Tip 9</strong><br>Overige factoren</td><td>Bedenk welke andere punten je nog wilt bespreken: collega's, relatie met je chef, afdelingsbeleid, etc. Door een overwogen keuze te maken kun je laten merken dat je betrokken bent bij de afdeling en dienst.</td></tr><tr><td><strong>Tip 10</strong><br>Gesprek voeren</td><td>Zorg dat je al je punten afwerkt. Bedenk dat een functioneringsgesprek een open en tweezijdig gesprek is. Probeer wel goede afspraken te maken over je wensenlijst in verband met opleiding en loopbaanstappen. Door de voorbereiding kun je ontspannen het gesprek ingaan. Je weet dat je niets vergeten bent en je stuurt het gesprek.</td></tr></table>", "questionRange": [12, 17]}, {"id": 4, "intro": "Onderstaande tekst is afkomstig uit een folder van Woonstede, een woningcorporatie in Ede. De folder is bedoeld voor mensen die een huis huren bij Woonstede. De tekst gaat over het onderhoud aan de woningen.", "title": "Woonstede", "body": "<p>U huurt een huis van Woonstede. Daarmee bent u verzekerd van een pakket diensten die Woonstede u op deskundige en betrouwbare wijze levert. Onderhoud van uw woning is een van die diensten. In deze folder kunt u lezen welke verplichtingen huisbaas en huurder hebben én hoe u als huurder op eenvoudige en voordelige wijze aan uw verplichtingen kunt voldoen.</p><h4>Onderhoud door Woonstede</h4><h4>Planmatig onderhoud</h4><p>Volgens de wet en de huurovereenkomst moet Woonstede de woning in goede staat van onderhoud houden. Daarvoor houdt Woonstede voor al haar woningen een onderhoudsplanning bij. Op basis van die planning worden onderhoudswerkzaamheden uitgevoerd. Daarmee bereikt Woonstede dat er al onderhoud verricht is voordat er problemen ontstaan. Dit 'planmatig onderhoud' betreft doorgaans de buitenkant van de woning. U moet daarbij denken aan houtwerkreparaties, schilderbeurten, zorg voor de dakbedekking en dergelijke. Maar ook de periodieke vervanging van keukenblokken en bijvoorbeeld verwarmingsketels vallen eronder.</p><h4>Reparaties</h4><p>Met planmatig onderhoud zijn niet alle problemen te voorkomen. Soms hapert er iets of doet zich een storing voor. U meldt het mankement en Woonstede zorgt voor reparatie. Maar ... dit geldt alleen voor reparaties waartoe Woonstede verplicht is. De huurder is zelf ook verantwoordelijk voor een reeks van werkzaamheden. Dit noemt men wel het 'huurdersonderhoud'. Als u een dergelijke zaak meldt bij Woonstede, krijgt u te horen dat u daar zelf voor moet zorgen. In de financiële opzet van woningen is namelijk geen rekening gehouden met dit onderhoud. Met andere woorden: u betaalt er geen huur voor.</p><h4>Onderhoud door huurder</h4><p>In het huurreglement van Woonstede is opgenomen welke werkzaamheden in ieder geval tot het huurdersonderhoud worden gerekend. Daarbij is ook bepaald dat die werkzaamheden vakkundig uitgevoerd moeten worden. Als je handig bent, is dat geen probleem. Maar het is niet iedereen gegeven om zonder problemen een lichtschakelaar te vervangen of de goten schoon te maken. Dan moet een beroep worden gedaan op de hulp van anderen. Soms moet er zelfs een gespecialiseerd bedrijf aan te pas komen. En dat kan aardig wat kosten.</p><h4>Nieuw: onderhoudsabonnement</h4><p>Vanaf nu kunt u de meeste van deze klusjes door ons laten uitvoeren. Als u wilt dat Woonstede dit werk van u overneemt, neemt u een onderhoudsabonnement. Tegen betaling van een bescheiden bedrag neemt Woonstede u deze zaken uit handen. Net als met andere reparaties belt u even en wij zorgen voor de rest.</p><h4>Wat kost u dat?</h4><p>De prijs voor het onderhoudsabonnement is € 3,50 per maand. U betaalt deze bijdrage maandelijks samen met de huur. Een bescheiden bedrag waarvoor u heel wat aanvullende diensten geleverd krijgt. En u heeft minder zorgen. U belt Woonstede en het komt voor elkaar. Als de omstandigheden dat nodig maken, kan Woonstede het tarief aanpassen. Mocht u het daar niet mee eens zijn, dan kunt u het abonnement opzeggen. Als u al een woning van Woonstede huurt, dan bent u bij de aanvang van het abonnement € 23,- entreegeld verschuldigd. Bij het ondertekenen van een nieuwe huurovereenkomst kan de huurder zonder entreegeld een onderhoudsabonnement aangaan.</p><h4>De regels en voorwaarden</h4><p>Voor het onderhoudsabonnement heeft Woonstede een reglement opgesteld. Daarin staat precies vermeld wat de wederzijdse recht
