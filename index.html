en en plichten zijn. Als u deelneemt, geldt dat in eerste instantie voor één jaar. Zegt u niet op, dan wordt deze periode telkens met één jaar verlengd. Als de huur voor uw woning eindigt, dan eindigt natuurlijk ook het abonnement. Het volledige reglement is opgenomen in het boekje 'Wie doet wat?'. Bij het ondertekenen van de huurovereenkomst ontvangt iedere huurder dit boekje. Mocht u het niet (meer) hebben, dan kunt u het bij Woonstede opvragen.</p><h4>Kan iedereen meedoen?</h4><p>Het onderhoudsabonnement staat open voor alle huurders van Woonstede die een zelfstandige woning huren (dus niet voor kamerbewoners). Zij mogen bij het aangaan van de overeenkomst echter geen huurschuld hebben waarvan de vordering uit handen is gegeven.</p><h4>Belangstelling?</h4><p>Als u wilt meedoen aan het onderhoudsabonnement, kunt u de bon die bij deze folder is gevoegd invullen en kosteloos opsturen naar Woonstede. Met ingang van de door u opgegeven datum gaat het onderhoudsabonnement voor u in.</p>", "questionRange": [18, 20]}, {"id": 5, "intro": "De Lindenberg is een cultureel centrum in Nijmegen. In deze tekst wordt uitgelegd hoe men zich kan inschrijven voor een cursus van De Lindenberg.", "title": "Inschrijving cursussen cultureel centrum De Lindenberg", "body": "<p>De Lindenberg heeft een rijk cursusaanbod voor allerlei vormen van kunst. Zo zijn er cursussen op het gebied van theater en dans, muziek, schrijven en beeldende kunst.</p><h4>Schriftelijk inschrijven</h4><p>De inschrijving voor het seizoen 17/18 vindt plaats op de Open Dag zondag 11 juni van 11.00-17.00 uur. Na deze dag is inschrijving aan de Centrale Balie mogelijk op maandag t/m donderdag van 12.00-16.00 uur, donderdag tevens tot 20.00 uur.</p><p>U kunt zich ook schriftelijk aanmelden. U vult de inschrijfkaart in. U betaalt door middel van het verlenen van een machtiging. U kunt op de inschrijfkaart twee cursusvoorkeuren invullen. Is de cursus van uw eerste voorkeur volgeboekt, dan plaatsen wij u bij de cursus van uw tweede keuze. Is die volgeboekt, dan nemen wij contact met u op. Wilt u meerdere cursussen volgen, gebruik dan voor iedere aanmelding één kaart. Als u zich aanmeldt voor les bij de afdeling Muziek, vult u dan alleen het speciale formulier van de afdeling Muziek in. Met ingang van maandag 12 juni wordt uw schriftelijke aanmelding in behandeling genomen.</p><h4>Cursusgelden</h4><p>De cursusgelden staan vermeld bij de desbetreffende cursussen. Bij plaatsing later in het jaar betaalt u cursusgeld naar evenredigheid.</p><h4>Plaatsing</h4><p>Na de inschrijving ontvangt u een bewijs van inschrijving en daarmee is de plaatsing geregeld. Bij de afdeling Muziek wijkt de plaatsing voor de instrumentale en vocale lessen af van de andere afdelingen. Inschrijven voor de afdeling Muziek houdt niet altijd in dat u direct geplaatst kan worden. In augustus wordt dit bekend gemaakt en pas dan roostert de Muziekafdeling de nieuwe aanmeldingen in. Als u niet geplaatst kunt worden, dan komt u automatisch op de wachtlijst. Bij de eerstvolgende gelegenheid wordt u dan met voorrang geplaatst. Dan pas zal gebruik gemaakt worden van de betalingsmachtiging.</p><h4>Leeftijd</h4><p>Het inschrijfformulier voor jongeren onder de 18 jaar moet worden ondertekend door een ouder of verzorger. De leeftijdsgrenzen zijn in het cursusrooster vermeld. De leeftijden dienen bereikt te zijn op 1 oktober 2017. Indien geen leeftijd is vermeld, is de cursus bedoeld voor personen vanaf 16 jaar.</p><h4>Wijze van betalen</h4><p>Voor betaling vult u een machtiging in.</p><p><strong>A Jaarcursussen: in één termijn</strong><br>Bij betaling in één termijn geldt een korting van 3%. Inning vindt plaats in september 2017. Bij inschrijving ná 1 september vindt de inning plaats op de 1e van de maand volgend op de inschrijving.</p><p><strong>B Jaarcursussen: in termijnen</strong></p><table><tr><td>Beeldend, Audiovisueel, doorgaande leerlingen Muziek: 5 termijnen</td><td>1e termijn: 1 september 2017<br>2e termijn: 1 november 2017<br>3e termijn: 1 januari 2018<br>4e termijn: 1 maart 2018<br>5e termijn: 1 mei 2018</td></tr><tr><td>Nieuwe leerlingen Muziek: 5 termijnen</td><td>1e termijn: 1 november 2017<br>2e termijn: 1 januari 2018<br>3e termijn: 1 maart 2018<br>4e termijn: 1 mei 2018<br>5e termijn: 1 juli 2018</td></tr><tr><td>Theater en Dans: 4 termijnen</td><td>1e termijn: 1 oktober 2017<br>2e termijn: 1 december 2017<br>3e termijn: 1 februari 2018<br>4e termijn: 1 april 2018</td></tr><tr><td>Schrijversschool: 3 termijnen</td><td>1e termijn: 1 oktober 2017<br>2e termijn: 1 december 2017<br>3e termijn: 1 februari 2018</td></tr></table><p>Bij inschrijving voor jaarcursussen ná 1 oktober 2017 geldt cursusgeld naar evenredigheid. Termijnbetaling blijft mogelijk, korting bij betaling in één termijn 3%; inning op de 1e van de maand volgend op de inschrijving.</p><p><strong>C Korte cursussen: één termijn</strong><br>Voor alle afdelingen: inning op de 1e van de maand volgend op de startdatum (geen korting). Indien inning van cursusgeld wegens onvoldoende saldo niet mogelijk is, worden bij aanmaning administratiekosten in rekening gebracht.</p><h4>Kortingen</h4><p><strong>A Gezinskorting</strong><br>Zijn er meer gezinsleden t/m 17 jaar als cursist bij De Lindenberg ingeschreven, dan geldt de volgende kortingsregeling:</p><ul><li>bij 2 leden t/m 17 jaar: per gezinslid 5% op het cursusgeld per persoon;</li><li>bij 3 of meer leden t/m 17 jaar: per gezinslid 10% op het cursusgeld per persoon.</li></ul><p><strong>B Studenten vanaf 18 jaar</strong><br>10% (kopie studentenkaart of bewijs van inschrijving toevoegen).</p><p><strong>C Financieel minder draagkrachtigen</strong><br>Betaalplichtigen met een inkomen dat gelijk is aan bijstandsniveau komen in aanmerking voor een korting van 10% (kopie bank/girobijschrijving toevoegen waarop het inkomen vermeld staat).</p><p>De bovenstaande kortingen moet u vóór 1 februari 2018 via een aanvraagformulier bij de Centrale Balie aanvragen. Kortingen gelden alleen voor de jaarcursussen en worden verrekend met de laatste betalingstermijn. Bij betaling in één termijn worden de kortingen in april 2018 teruggestort. U kunt voor slechts één van bovenstaande kortingen in aanmerking komen. Aanvragen ná 1 februari 2018 kunnen niet meer in behandeling worden genomen.</p><p><strong>D</strong> Als u 65 jaar of ouder bent, dan krijgt u een korting van 5%.</p><h4>Opzegging</h4><p><strong>A. Jaarcursussen</strong></p><ol><li>Voor start cursusjaar: opzeggen tot uiterlijk één week vóór aanvang van de cursus. Geen kosten.</li><li>Vóór 1 november 2017: binnen twee maanden na inschrijfdatum. Bij opzegging is één termijn verschuldigd.</li><li>Vóór 1 maart 2018: in geval van langdurige ziekte (een doktersattest overleggen), verhuizing naar een woonplaats verder dan 15 km van Nijmegen dan de vorige woonplaats (uittreksel bevolkingsregister nieuwe woonplaats overleggen) of in geval van overmacht, ter beoordeling van het hoofd van de afdeling: cursusgeld is verschuldigd tot het einde van de lopende betalingstermijn.</li><li>Ná 1 maart 2018: opzeggen met restitutie van cursusgeld is niet meer mogelijk.</li></ol><p><strong>B. Korte cursussen</strong><br>Opzeggen tot uiterlijk één week vóór aanvang van de cursus. Geen kosten.</p><h4>Uitval van lessen</h4><p>Indien aan het eind van het cursusjaar blijkt dat door ziekte of verhindering van de docent of noodgedwongen sluiting van het instituut, buiten de vakanties of vrije dagen, meer dan vier lessen zijn vervallen, kan hiervoor schriftelijk restitutie worden gevraagd. In geval van verhindering van een docent zal de afdeling trachten voor vervanging te zorgen. Verzuim van een leerling/cursist leidt nimmer tot restitutie van verschuldigde lesgelden.</p>", "questionRange": [21, 26]}, {"id": 6, "intro": "Deze tekst komt uit een boekje over een elektrisch apparaat waarmee je brood kunt roosteren. Dit boekje krijg je in de winkel als je zo'n broodrooster koopt.", "title": "15 Veiligheidsregels bij gebruik van een broodrooster", "body": "<ol><li>Zet het broodrooster op een stevig werkvlak waar het niet in contact kan komen met water.</li><li>Sluit het broodrooster altijd aan op een geaard stopcontact.</li><li>Om te voorkomen dat de buitenkant beschadigt: zet het broodrooster niet op of vlakbij een warmtebron (bijvoorbeeld fornuis).</li><li>Laat het broodrooster nooit zonder toezicht aanstaan en houd het buiten bereik van kinderen.</li><li>Haal de stekker niet uit het stopcontact door aan het snoer te trekken.</li><li>Verplaats het broodrooster niet tijdens het gebruik.</li><li>Haal de stekker uit het stopcontact voordat u het broodrooster gaat schoonmaken.</li><li>Om elektrische schokken te voorkomen: dompel het snoer, de stekker of het broodrooster zelf nooit in water.</li><li>Plaats het broodrooster niet in de buurt van brandbare materialen zoals lamellen, gordijnen, vitrages.</li><li>Als het broodrooster vlam vat, blus dan nooit met water maar dek het vuur af met een natte doek.</li><li>Bedek het broodrooster niet tijdens het gebruik.</li><li>Gebruik het broodrooster niet als warmtebron.</li><li>Gebruik geen metalen sponsjes om het broodrooster schoon te maken: als metalen deeltjes bij het elektrisch gedeelte van het apparaat terechtkomen, kunnen ze elektrische schokken veroorzaken.</li><li>Gebruik geen schuurmiddelen, bijtende schoonmaakmiddelen, ovenreinigingsprodukten of bleekwater bij het schoonmaken van het broodrooster.</li><li>Wikkel het snoer niet rond het broodrooster tijdens gebruik.</li></ol>", "questionRange": [27, 30]}, {"id": 7, "intro": "Deze tekst komt uit de onderwijsbijlage van een krant. In deze onderwijsbijlage vertellen vier cursisten over hun opleiding in de gezondheidszorg.", "title": "Cursisten in de zorg", "body": "<h4>Niveau 1, de zorghulp: Aisha Boulaich (17)</h4><p><strong>School:</strong> Albeda College Rotterdam<br><strong>Opleiding:</strong> Gezondheidszorg<br><strong>Salaris:</strong> als 21-jarige ongeveer 1135 euro bruto per maand, 1570 aan eind carrière<br><strong>Duur opleiding:</strong> 1 jaar</p><p>Een zorghulp mag niet veel. Het is niet de bedoeling dat zij — het is vrijwel altijd een zij — zich direct bemoeit met bejaarden, want dat mag een zorghulp niet. Alleen huishoudelijk werk in de thuiszorg of bejaarden- en verpleeghuizen, zoals bedden opmaken, is toegestaan als je van deze eenjarige opleiding komt. Eigenlijk is het meer een cursus sociale vaardigheden. Aisha: \"We leren hoe je vriendelijk met bejaarden moet doen. We hebben ook lessen over politiek en al die dingen.\" Aisha is niet van plan om na niveau 1 aan het werk te gaan. Ze wil door naar niveau 2. \"Ik wil mensen echt helpen en als zorghulp komt daar niet veel van.\"</p><h4>Niveau 2, de helpende: Deborah Klerks (17)</h4><p><strong>School:</strong> Albeda College Rotterdam<br><strong>Opleiding:</strong> Gezondheidszorg<br><strong>Salaris:</strong> als 21-jarige ongeveer 1180 euro bruto per maand, 1730 aan eind carrière<br><strong>Duur opleiding:</strong> 2 jaar</p><p>Ook Deborah wil hogerop. Niveau 2, dan mag je wel in de thuiszorg of in verpleeghuizen bejaarden helpen met kleren uitzoeken en helpen wassen en aankleden. Maar medicijnen geven of een plas beoordelen op een eventuele kwaal, dat is werk met meer verantwoordelijkheid waar je niveau 3 voor moet hebben. Deborah's eindlijst van het vmbo was daar alleen niet goed genoeg voor, dus ze zal niveau 2 eerst moeten afmaken. \"Eigenlijk wil ik het liefst verpleegkundige worden (niveau 4) maar dat is nog heel ver weg.\" Deborah koos voor gezondheidszorg omdat zij iets voor zieke mensen wil betekenen. \"Ik zal graag iets voor ze doen, en het lijkt me leuk als zij daar dankbaar voor zijn.\"</p><h4>Niveau 3, de verzorgende: Sanne van Dam (18)</h4><p><strong>School:</strong> Albeda College Rotterdam<br><strong>Opleiding:</strong> Gezondheidszorg<br><strong>Salaris:</strong> als 21-jarige ongeveer 1300 euro bruto per maand, 1900 aan eind carrière<br><strong>Duur opleiding:</strong> 3 jaar</p><p>Sanne wil graag werken in een ziekenhuis, een plek waar je steeds weer andere mensen ontmoet. Daar hoef je natuurlijk niet per se voor in een ziekenhuis te zijn, maar Sanne 'gaat' ook echt voor de verzorging van mensen. \"Het is heel interessant wat er allemaal komt kijken bij het genezen van een wond.\" Na niveau 3 wil Sanne naar niveau 4, verpleegkundige worden. Daar mocht ze niet direct beginnen, omdat ze een vmbo-diploma heeft. Wat ze over een paar jaar gaat verdienen interesseert Sanne niet. \"Ik vind het gewoon hartstikke leuk werk om te doen.\"</p><h4>Niveau 4, de verpleegkundige: Toya Mizan (18)</h4><p><strong>School:</strong> Albeda College Rotterdam<br><strong>Opleiding:</strong> Gezondheidszorg<br><strong>Salaris:</strong> als 21-jarige ongeveer 1400 euro bruto per maand, 2275 aan eind carrière<br><strong>Duur opleiding:</strong> 4 jaar</p><p>Als verpleegkundige heeft Toya straks de verantwoordelijkheid over patiënten op een afdeling. Vorig jaar nog volgde Toya de opleiding voor sociaal pedagogisch werk (spw), de grootste mbo-opleiding met iets meer dan 7 procent van alle deelnemers in het mbo. Toya wilde na het vmbo de psychiatrie in, en dat kon met spw was haar gezegd. Dat klopt ook wel, maar spw was meer een opleiding tot activiteitenbegeleidster. \"Hier, op de opleiding voor verpleegkundige, leer je hoe je demente bejaarden wast en aankleedt, dat spreekt mij veel meer aan dan een spelletje met ze spelen.\" Ze zou na haar diploma verder kunnen op het hbo, maar of ze dat doet weet ze nog niet.</p>", "questionRange": [31, 35]}, {"id": 8, "intro": "Onderstaande tekst komt uit een studieboek van een bouwopleiding. De tekst gaat over hoe een CAO in de bouw tot stand komt.", "title": "Wat is een CAO?", "body": "<p>CAO is de afkorting van collectieve arbeidsovereenkomst. Toen je ging werken heb je een persoonlijke arbeidsovereenkomst afgesloten. Hierin stonden afspraken tussen jou (de werknemer) en je baas (de werkgever). Een CAO is ook zo'n verzameling afspraken. Maar die afspraken gelden niet alleen voor jou en je baas. Ze gelden voor alle werkgevers en werknemers binnen een bedrijfstak. Vandaar collectieve arbeidsovereenkomst. Zo is er een CAO voor het schildersbedrijf, voor het garagebedrijf, voor het bouwbedrijf, enzovoorts. Een CAO is dus een verzameling afspraken tussen werkgevers en werknemers in een bepaalde bedrijfstak. Werknemers en werkgevers moeten zich aan die afspraken houden. Voor werknemers in de bouw geldt de CAO voor het bouwbedrijf. Het uitvoerend, technisch en administratief personeel in de bouwbedrijven kent een eigen CAO, de zgn. UTA-CAO. Als je als timmerman bij de gemeente werkt, val je niet onder de CAO voor het bouwbedrijf, maar ben je ambtenaar. We zullen het hier verder voornamelijk hebben over de CAO voor het bouwbedrijf.</p><h4>De CAO en de wet</h4><p>De bepalingen in de CAO staan natuurlijk niet op zichzelf. Voor iedereen geldt de wet. Wettelijke bepalingen vind je dus niet in de CAO. Het kan zijn, dat in de CAO nog een aantal zaken worden geregeld die aanvullend zijn op die wettelijke bepalingen. Zo mag volgens de wet geen lager loon betaald worden dan het wettelijk minimumloon. De CAO voor het bouwbedrijf garandeert echter een loon dat hoger is dan het wettelijk minimum. Niemand in de bouw werkt dus voor dat minimumloon.</p><h4>Hoe komt een CAO tot stand?</h4><p>Twee partijen sluiten een CAO af. Dat zijn de werknemers en de werkgevers. Soms probeert de regering ook een rol te spelen.</p><h4>De rol van de werknemersorganisaties (vakbonden)</h4><p>De vakbonden weten wat ze in een CAO willen regelen. Daarover hebben de vakbondsbestuurders voor en ook tijdens de CAO-onderhandelingen contact met de vakbondsleden. Die kunnen op vakbondsvergaderingen spreken. Ze kunnen stemmen over de voorstellen waar de vakbondsbestuurders de CAO-onderhandelingen mee ingaan.</p><p>Eisen die vakbonden bij de werkgevers op tafel leggen, zijn bijvoorbeeld:</p><ul><li>meer loon, omdat de prijzen zijn gestegen en daardoor het levensonderhoud duurder is geworden (prijscompensatie), of omdat bedrijven meer winst hebben gemaakt;</li><li>arbeidstijdverkorting, zodat meer mensen aan het werk kunnen komen of gewoon omdat werknemers meer vrije tijd willen (bijvoorbeeld meer vakantie, eerder met pensioen);</li><li>secundaire arbeidsvoorwaarden. Dat zijn zaken die met arbeidsomstandigheden, zoals veiligheid en hygiëne, te maken hebben. Ook bijscholing, inspraak en medezeggenschap zijn secundaire arbeidsvoorwaarden.</li></ul><p>Als de vakbondsleden weten wat ze willen, gaan de vakbondsbestuurders met de werkgevers onderhandelen. In bedrijfstakken waar veel werknemers lid zijn van een vakbond kan een vakbond veel bereiken. Ruim 80% van alle bouwvakkers is lid van de vakbond.</p><h4>De rol van de werkgeversorganisaties</h4><p>De werkgevers zijn evenals de werknemers lid van een organisatie die opkomt voor hun belangen. Zo'n organisatie is bijvoorbeeld de NVOB. De werkgevers overleggen hierin met elkaar over de voorstellen die zij zullen inbrengen in het CAO-overleg:</p><ul><li>Hoeveel loonsverhoging willen we geven?</li><li>Willen we arbeidstijdverkorting, of alleen onder bepaalde voorwaarden?</li><li>Hoe vaak mag een werknemer deelnemen aan bijscholingen?</li></ul><p>Over de voorstellen van werkgevers en werknemers wordt daarna in het CAO-overleg onderhandeld.</p><h4>De rol van de regering</h4><p>De regering doet niet mee met de CAO-onderhandelingen voor de bouw. Toch heeft ze er belang bij om invloed op die onderhandelingen uit te oefenen. Als de lonen in de CAO's met 10% stijgen, stijgen ook de ambtenarenlonen en de uitkeringen met 10%. Dat kost de regering geld. Daarom probeert de regering afspraken te maken met de werkgevers en werknemers van alle bedrijfstakken. Dat kunnen afspraken zijn over een maximale loonstijging, maar ook over korter werken of over pensioenregelingen. Als het lukt om een aantal afspraken te maken voor alle bedrijfstakken, heten die afspraken Centraal Akkoord. De CAO-onderhandelaars moeten zich aan die afspraken houden. De regering probeert ieder jaar weer zo'n Centraal Akkoord te sluiten, maar meestal lukt dat niet. Werkgevers en werknemers zijn het op te veel punten (nog) niet met elkaar eens.</p>", "questionRange": [36, 42]}], "questions": [{"n": 1, "textId": 1, "prompt": "Waardoor dacht Debbie dat zij wel kon werken met psychiatrische patiënten?", "options": {"A": "doordat ze eerst een cursus volgde om haar zelfvertrouwen te verbeteren", "B": "doordat ze eerst stage liep bij verstandelijk gehandicapten", "C": "doordat ze veel psychiatrische patiënten kende voordat ze er mee ging werken"}, "answer": "B"}, {"n": 2, "textId": 1, "prompt": "Voor wie werken de AB'ers (activiteitenbegeleiders) van Reakt?", "options": {"A": "alleen voor Reakt", "B": "alleen voor Reakt en een ziekenhuis", "C": "voor Reakt en voor nog enkele werkgevers"}, "answer": "B"}, {"n": 3, "textId": 1, "prompt": "Wat vindt Debbie moeilijk aan het werken met psychiatrische patiënten?", "options": {"A": "Als ze het zelf moeilijk heeft moet ze toch luisteren naar de problemen van patiënten.", "B": "Na haar werk denkt ze in de bus en thuis nog lang na over haar werk.", "C": "Psychiatrische patiënten rennen soms hard weg als ze een probleem hebben verteld."}, "answer": "A"}, {"n": 4, "textId": 1, "prompt": "Hoe denkt Debbie over haar stage en begeleiding?", "options": {"A": "Zij heeft veel ideeën over activiteiten maar mag niet veel zelf bepalen en uitvoeren.", "B": "Zij kijkt vooral naar hoe haar begeleidster dingen doet om zo te zien hoe het moet.", "C": "Zij mag veel van haar activiteiten zelf bepalen maar krijgt wel altijd hulp als dat nodig is."}, "answer": "C"}, {"n": 5, "textId": 1, "prompt": "Wat wil Debbie gaan doen als ze klaar is met haar opleiding?", "options": {"A": "Ze weet het nog niet precies.", "B": "Ze wil direct gaan werken.", "C": "Ze wil verder studeren."}, "answer": "C"}, {"n": 6, "textId": 1, "prompt": "Welk nadeel heeft de AB-opleiding voor Debbie?", "options": {"A": "Zij kan niet rondkijken op andere plekken.", "B": "Zij krijgt geen juridische en medische kennis.", "C": "Zij vindt de opleiding te algemeen."}, "answer": "C"}, {"n": 7, "textId": 2, "prompt": "In regel 45 tot en met 59 staat een tegenstelling. Welke?", "options": {"A": "Koolhydraten bevatten 'lege' calorieën, maar dit geldt niet voor sacharose.", "B": "Men denkt dat je dik wordt van suiker, maar dat is niet bewezen.", "C": "Suiker maakt dik, maar het bevat ook goede stoffen voor het lichaam."}, "answer": "B"}, {"n": 8, "textId": 2, "prompt": "Wat wordt er gezegd over de invloed van suiker op hart- en vaatziekten?", "options": {"A": "Als je een hart- of vaatziekte hebt, mag je geen suiker gebruiken.", "B": "Het is een feit dat het eten van suiker hart- en vaatziekten veroorzaakt.", "C": "Mensen denken vaak dat je van suiker hart- en vaatziekten krijgt."}, "answer": "C"}, {"n": 9, "textId": 2, "prompt": "Wat is, volgens de tekst, het verband tussen het eten van suiker en diabetes?", "options": {"A": "Er is helemaal geen verband tussen suiker en diabetes.", "B": "Er is pas een verband als je al diabetes hebt.", "C": "Van veel en regelmatig suiker eten krijg je diabetes."}, "answer": "B"}, {"n": 10, "textId": 2, "prompt": "Welk advies wordt er tegenwoordig meestal gegeven aan patiënten die diabetes krijgen?", "options": {"A": "U mag geen producten eten waar suiker in voorkomt.", "B": "U mag niet te veel suiker in één keer tegelijk eten.", "C": "U mag zoveel suiker eten als u wilt, tot u klachten krijgt."}, "answer": "B"}, {"n": 11, "textId": 2, "prompt": "De titel van de tekst is 'Suiker, een zoete sloper?'. Welk antwoord geeft de tekst op deze vraag?", "options": {"A": "Suiker is eigenlijk een zeer gezonde stof voor het lichaam, ook al denkt men van niet.", "B": "Suiker is niet gezond; het is de oorzaak van veel lichamelijke kwalen.", "C": "Suiker wordt gezien als de veroorzaker van allerlei kwalen, maar dat is niet terecht."}, "answer": "C"}, {"n": 12, "textId": 3, "prompt": "Hoe kan Alex het gesprek zo goed mogelijk laten verlopen?", "options": {"A": "door aan te tonen wat hij allemaal doet voor het bedrijf", "B": "door eerlijk te zeggen wat er niet goed gaat in het bedrijf", "C": "door zijn leidinggevende veel over zichzelf te vertellen"}, "answer": "A"}, {"n": 13, "textId": 3, "prompt": "Waar moet het functioneringsgesprek vooral over gaan volgens de tekst?", "options": {"A": "over de vraag of Alex goed in het team past", "B": "over de vraag of Alex tevreden is met zijn werk", "C": "over de werkresultaten van Alex"}, "answer": "A"}, {"n": 14, "textId": 3, "prompt": "Alex wil de cursus 'Loopbaanplanning' gaan volgen. Welk voordeel kan deze cursus voor hem hebben?", "options": {"A": "Hij krijgt inzicht in zichzelf en in zijn interesses.", "B": "Hij leert hoe hij moet omgaan met kritiek.", "C": "Hij leert om beter samen te werken."}, "answer": "A"}, {"n": 15, "textId": 3, "prompt": "Alex werkt samen met een aantal collega's aan verschillende projecten. Hij moet tijdens zijn gesprek duidelijk maken wat hij precies gedaan heeft bij die projecten. In welke tip staat hier iets over?", "options": {"A": "in tip 1", "B": "in tip 2", "C": "in tip 3"}, "answer": "B"}, {"n": 16, "textId": 3, "prompt": "Eén van de projecten waar Alex aan meewerkt is niet zo succesvol. Hij weet niet of hij dit tijdens zijn functioneringsgesprek moet noemen. In welke tips kan hij hier iets over lezen?", "options": {"A": "in tip 2 en 3", "B": "in tip 4 en 5", "C": "in tip 6 en 7"}, "answer": "B"}, {"n": 17, "textId": 3, "prompt": "Hoe kan Alex er het beste voor zorgen dat alle punten die hij belangrijk vindt besproken worden in zijn functioneringsgesprek?", "options": {"A": "door een keuze te maken uit de gespreksonderwerpen", "B": "door leerpunten, doelen en wensen te formuleren", "C": "door zelf agendapunten op te stellen", "D": "door zoveel mogelijk materiaal te verzamelen"}, "answer": "C"}, {"n": 18, "textId": 4, "prompt": "Welk onderhoud wordt door Woonstede uitgevoerd als je een onderhoudsabonnement neemt?", "options": {"A": "het huurdersonderhoud zoals in het huurreglement opgenomen", "B": "het periodiek onderhoud van bijvoorbeeld keukenblokken of verwarmingsketels", "C": "het planmatig onderhoud aan de buitenkant van de woning"}, "answer": "A"}, {"n": 19, "textId": 4, "prompt": "Janine woont al jaren in een huurhuis van Woonstede. Ze heeft dit jaar voor het eerst een onderhoudsabonnement afgesloten. Ze wil het onderhoudsabonnement verlengen. Wat moet ze hiervoor doen?", "options": {"A": "Aan het einde van het jaar moet ze het abonnement schriftelijk verlengen.", "B": "Dat ligt aan de afspraken die ze eerder heeft gemaakt.", "C": "Ze hoeft niets te doen, want verlenging gaat automatisch."}, "answer": "C"}, {"n": 20, "textId": 4, "prompt": "Marieke en Frans hebben allebei een kamer gehuurd in een huis van Woonstede. Komen zij ook in aanmerking voor een onderhoudsabonnement?", "options": {"A": "Ja, als ze geen huurschuld hebben.", "B": "Ja, iedereen komt in aanmerking.", "C": "Nee, kamerhuurders kunnen geen gebruik maken van deze regeling."}, "answer": "C"}, {"n": 21, "textId": 5, "prompt": "Hoe moet u zich inschrijven voor een cursus bij de afdeling Muziek?", "options": {"A": "U vult een algemene inschrijfkaart in.", "B": "U vult een apart formulier van de afdeling Muziek in.", "C": "U vult een algemene inschrijfkaart in en een apart formulier van de afdeling Muziek."}, "answer": "B"}, {"n": 22, "textId": 5, "prompt": "Het gezin Kleyweg heeft twee kinderen. Annemarie van 12 jaar en Wouter van 17 jaar. De kinderen volgen een cursus bij De Lindenberg. Hoeveel korting krijgt het gezin Kleyweg op de cursusprijs?", "options": {"A": "2,5% voor Annemarie en 2,5% voor Wouter", "B": "5% voor Annemarie en 5% voor Wouter", "C": "5% voor Annemarie en 10% voor Wouter", "D": "10% voor Annemarie en 10% voor Wouter"}, "answer": "B"}, {"n": 23, "textId": 5, "prompt": "Marcel Grevel heeft een jaarcursus gevolgd. Er zijn drie lessen uitgevallen, omdat de docent ziek was. Kan Marcel restitutie van het lesgeld krijgen?", "options": {"A": "Ja, bij een jaarcursus wordt in dit geval geld teruggegeven.", "B": "Nee, geldteruggave is alleen mogelijk als er meer dan 4 lessen zijn vervallen.", "C": "Nee, geldteruggave is alleen mogelijk bij het missen van lessen door officiële feestdagen."}, "answer": "B"}, {"n": 24, "textId": 5, "prompt": "Lisa Hersboom is op 6 september 2017 begonnen met een jaarcursus bij de afdeling Muziek. Op 31 maart 2018 zegt zij deze cursus op. Krijgt Lisa nog cursusgeld terug?", "options": {"A": "Ja, zij krijgt het geld van de 4e en de 5e termijn terug.", "B": "Nee, teruggave van cursusgeld is niet meer mogelijk.", "C": "Dat is afhankelijk van de reden waarom zij opzegt."}, "answer": "B"}, {"n": 25, "textId": 5, "prompt": "Peter Franzen heeft zich ingeschreven voor een jaarcursus bij de afdeling Theater en Dans. Hij wil het cursusgeld in 5 termijnen betalen. Kan dat?", "options": {"A": "Ja, als Peter van tevoren een machtiging geeft.", "B": "Nee, deze cursus kan alleen per jaar betaald worden, in één keer.", "C": "Nee, deze cursus kan in maximaal 4 termijnen worden betaald."}, "answer": "C"}, {"n": 26, "textId": 5, "prompt": "Elsbeth de Haan schrijft zich in voor een korte cursus die start op 13 november. Wanneer wordt het cursusgeld geïnd?", "options": {"A": "op 1 november", "B": "op 1 december", "C": "direct bij inschrijving"}, "answer": "B"}, {"n": 27, "textId": 6, "prompt": "Enkele veiligheidsregels maken duidelijk op welke plaats een broodrooster veilig staat. In welke van de volgende veiligheidsregels lees je hier iets over?", "options": {"A": "in veiligheidsregel 1", "B": "in veiligheidsregel 6", "C": "in veiligheidsregel 12"}, "answer": "A"}, {"n": 28, "textId": 6, "prompt": "Wat kan volgens de tekst bij een broodrooster elektrische schokken veroorzaken?", "options": {"A": "Dat kan alleen water.", "B": "Dat kunnen alleen metalen deeltjes.", "C": "Dat kunnen metalen deeltjes en water."}, "answer": "C"}, {"n": 29, "textId": 6, "prompt": "Kun je in de tekst lezen hoe je een broodrooster moet schoonmaken?", "options": {"A": "Ja, in de tekst staat hoe je dat moet doen.", "B": "Nee, in de tekst staat hoe je dat niet moet doen."}, "answer": "B"}, {"n": 30, "textId": 6, "prompt": "Wat wil deze tekst vooral duidelijk maken?", "options": {"A": "hoe gevaarlijk het is om een broodrooster te gebruiken", "B": "hoe je brood moet roosteren in een broodrooster", "C": "hoe je ongelukken met een broodrooster kunt voorkomen"}, "answer": "C"}, {"n": 31, "textId": 7, "prompt": "Mag een helpende (niveau 2) medicijnen geven aan patiënten?", "options": {"A": "Ja, een helpende mag medicijnen geven.", "B": "Nee, dat mag alleen een verpleegkundige.", "C": "Nee, dat mag pas als je verzorgende bent."}, "answer": "C"}, {"n": 32, "textId": 7, "prompt": "Wat leer je vooral op de opleiding voor zorghulp?", "options": {"A": "huishoudelijk werk", "B": "sociale vaardigheden", "C": "verzorging"}, "answer": "B"}, {"n": 33, "textId": 7, "prompt": "Iemand heeft het vmbo afgemaakt. Hij heeft goede cijfers. Hij wil een opleiding in de zorg gaan doen, op een zo hoog mogelijk niveau. Op welk niveau kan hij beginnen?", "options": {"A": "op niveau 1", "B": "op niveau 2", "C": "op niveau 3", "D": "op niveau 4"}, "answer": "C"}, {"n": 34, "textId": 7, "prompt": "Hoe lang duurt de opleiding voor verzorgende?", "options": {"A": "1 jaar", "B": "2 jaar", "C": "3 jaar", "D": "4 jaar"}, "answer": "C"}, {"n": 35, "textId": 7, "prompt": "Sanne doet de opleiding voor verzorgende. Waarom wil ze liever verpleegkundige worden?", "options": {"A": "Dan kan ze in een ziekenhuis gaan werken.", "B": "Dan kan ze wonden genezen.", "C": "Dat staat niet in de tekst."}, "answer": "C"}, {"n": 36, "textId": 8, "prompt": "In welke zin staat het best beschreven wat een CAO is?", "options": {"A": "Een CAO is ook zo'n verzameling afspraken ... (r. 3-4)", "B": "Zo is er een CAO voor het schildersbedrijf, voor het garagebedrijf, voor het bouwbedrijf, enzovoorts (r. 5-6)", "C": "Een CAO is dus een verzameling afspraken tussen werkgevers en werknemers in een bepaalde bedrijfstak (r. 7-8)"}, "answer": "C"}, {"n": 37, "textId": 8, "prompt": "Wat zegt de tekst over de hoogte van het salaris in de bouw?", "options": {"A": "Iemand in de bouw verdient altijd meer dan het minimumloon.", "B": "Iemand in de bouw verdient meestal het minimumloon.", "C": "Iemand in de bouw verdient soms minder dan het minimumloon."}, "answer": "A"}, {"n": 38, "textId": 8, "prompt": "Wie overleggen altijd met elkaar tijdens een CAO-onderhandeling?", "options": {"A": "regering en werkgevers", "B": "regering, vakbondbestuurders en werkgevers", "C": "vakbondbestuurders en werkgevers", "D": "vakbondbestuurders en werknemers"}, "answer": "C"}, {"n": 39, "textId": 8, "prompt": "Verschillende partijen hebben er belang bij dat er een Centraal Akkoord bereikt wordt. Voor wie is dit belang het grootst, volgens de tekst?", "options": {"A": "voor de ambtenaren", "B": "voor de regering", "C": "voor de vakbonden", "D": "voor de werkgevers"}, "answer": "B"}, {"n": 40, "textId": 8, "prompt": "In het Centraal Akkoord staat dat de lonen dit jaar maximaal met 4% mogen stijgen. Ken Bolten is vakbondbestuurder en wil voor zijn bedrijfstak 6% loonsverhoging eisen. Kan dat?", "options": {"A": "Ja, een bedrijfstak mag afwijken van het Centraal Akkoord.", "B": "Nee, alle bedrijfstakken moeten zich houden aan het Centraal Akkoord.", "C": "Dat staat niet in de tekst."}, "answer": "B"}, {"n": 41, "textId": 8, "prompt": "In een CAO-overleg is gevraagd om hogere vergoeding voor bijscholing. Waar is dit een voorbeeld van?", "options": {"A": "van een eis voor arbeidstijdverkorting", "B": "van een eis voor meer loon", "C": "van een eis voor secundaire arbeidsvoorwaarden"}, "answer": "C"}, {"n": 42, "textId": 8, "prompt": "In het stukje 'De rol van de werkgeversorganisaties' wordt gesproken over 'we'. Wie worden daarmee bedoeld?", "options": {"A": "de regering", "B": "de vakbondsleden", "C": "de werkgevers", "D": "de werknemers"}, "answer": "C"}]}, {"id": "2015", "year": 2015, "title": "B1 Lezen 2015 — Openbaar examen", "timeLimitMin": 110, "passMark": 27, "totalQuestions": 39, "texts": [{"id": 1, "intro": "In deze tekst staan enkele sollicitatietips. De tekst komt uit een advertentieblad over werk en beroepsopleidingen.", "title": "Zoek je weg op de arbeidsmarkt", "body": "<p>Je hebt je diploma op zak en je wilt aan de slag. Of je wilt veranderen van baan. Dan ga je op zoek naar een geschikte werkgever. Dat betekent dat je kunt reageren op een personeelsadvertentie of een open sollicitatie kunt sturen naar een organisatie waar je graag wilt werken. Ook op het internet kun je zoeken naar geschikte vacatures.</p><p>Hier volgen een paar tips die je kunnen helpen bij het solliciteren.</p><h4>1 De sollicitatiebrief</h4><h4>1.1 Zet alles voor jezelf op een rijtje</h4><p>Stel jezelf een paar duidelijke vragen voordat je aan een sollicitatiebrief begint. Wat vraagt de organisatie en wat kan ik? Wat doet de organisatie en wat wil ik? Wat zijn de randvoorwaarden en wat wil ik voor extraatjes?</p><h4>1.2 Schrijf kort en krachtig</h4><p>Houd de sollicitatiebrief kort en krachtig (maximaal een A4), vertel kort wie je bent en wat je kan. Maak ze nieuwsgierig zodat je uitgenodigd wordt voor een gesprek.</p><h4>1.3 Een goed cv</h4><p>Schrijf een overzichtelijk cv met je persoonlijke gegevens, gevolgde opleiding(-en) en werkervaring. Zorg dat er geen 'gaten' zitten in je cv. Wanneer je een periode niet gewerkt hebt, vul die dan met activiteiten die je in die tijd hebt gedaan, bijvoorbeeld vrijwilligerswerk, zorg voor huishouden en kinderen en verdere relevante levenservaringen.</p><h4>2 Het sollicitatiegesprek</h4><h4>2.1 Blijf kalm</h4><p>Maak je niet zo druk voor een sollicitatiegesprek, tenslotte is het een soort kennismaking tussen twee partijen die elkaar nodig hebben.</p><h4>2.2 Goede voorbereiding</h4><p>Om rustig het gesprek te kunnen voeren, ga je jezelf goed voorbereiden. Zet alle zaken goed op een rijtje zodat je weet wat je wilt en zodat je dit kort en krachtig kunt overbrengen. Veel gestelde vragen tijdens een sollicitatiegesprek zijn: &ldquo;Vertel wat over jezelf&rdquo;, &ldquo;Wat verwacht je van dit werk?&rdquo; en &ldquo;Noem een paar goede en slechte eigenschappen van jezelf&rdquo;.</p><h4>2.3 Verzorgd uiterlijk</h4><p>Zorg dat je er netjes uitziet maar niet overdreven, blijf zoveel mogelijk jezelf. Trek iets aan waar je jezelf prettig in voelt.</p><h4>2.4 Stel vragen</h4><p>Er zijn vast dingen die je wilt weten, dus stel zelf ook een paar vragen tijdens het gesprek. Hiermee laat je zien dat je het initiatief kan nemen en je laat een positieve indruk achter.</p><h4>2.5 Houd oogcontact</h4><p>Zijn er meerdere mensen aanwezig bij het gesprek? Probeer je dan tot iedereen te richten en niet tot diegene die een vraag stelt. Wanneer je tegen mensen praat, kijk ze dan aan, maak oogcontact en kijk niet ergens in het luchtledige of naar de grond. Blijf ontspannen zitten en laat zien dat je alles onder controle hebt.</p><p>Wil je meer en uitgebreidere informatie over het hoe en wat van een cv, een sollicitatiebrief en een sollicitatiegesprek, kijk dan op onze website en ga naar het artikel 'Solliciteren, een vak apart'.</p>", "questionRange": [1, 5]}, {"id": 2, "intro": "Deze teksten gaan over de vraag naar welke tv-programma's kinderen mogen kijken en wie hierover moet beslissen. Drie mensen geven hun mening.", "title": "Kind als tv-kijker: wie beslist over wat?", "body": "<p><strong>Dhr. Groothedde</strong></p><p>Ouders moeten hun kinderen het verschil tussen fictie en werkelijkheid uitleggen. Ouders moeten opletten naar welke tv-programma's hun kinderen kijken. Ouders moeten ook bepalen naar welke programma's hun kinderen mogen kijken. Het is niet de schuld van de overheid dat veel ouders het te druk hebben om hun kinderen op te voeden. De overheid moet zich hier niet mee bemoeien.</p><p>De enige taak die de overheid heeft, is om er voor te zorgen dat programma's, series, films en reclames met veel geweld en seks niet vóór een bepaald tijdstip te zien zijn. De rest is een taak van de ouders. Die moeten hun prioriteiten weer eens leren kennen.</p><p><strong>Mevr. Ladi</strong></p><p>Het is de taak van de overheid om de bevolking een veilige leefomgeving te bieden. Kinderen vormen een deel van de bevolking en hebben daar dus ook recht op. Dat de overheid de kinderen niet produceert, betekent niet dat ze er geen verantwoordelijkheden voor heeft.</p><p>Iedereen kan met 'een druk op de knop' de tv uitzetten. Maar waarom kunnen er geen eisen gesteld worden aan tv-programma's en reclames die op tijdstippen uitgezonden worden waarop kinderen tv kijken? Waarom moeten de ouders 24 uur per dag naast het kind zitten en daar controle op uitoefenen? Waarom heeft de overheid daar geen taak in? Tenslotte heeft de overheid het ook zover gekregen dat de reclame voor sigaretten verboden is op tv.</p><p>Bovendien is deze hele discussie niet meer actueel. Ouders weten wel wat goed is voor hun kinderen. Kinderen maken al vroeg kennis met multimedia en internet. De kinderen wordt al vroeg geleerd hoe om te gaan met internet. De kinderen zijn nu al minder geïnteresseerd in tv en meer in internet. De overheid zou zich op dit feit moeten richten in plaats van zich te concentreren op het achterhaalde concept van de televisie.</p><p><strong>Mevr. Jansen</strong></p><p>Ouders zullen het in 95% van de gevallen ongetwijfeld goed voor hebben met hun kinderen. Toch denk ik dat veel ouders de grootste moeite hebben met opvoeden. Dat kun je ze zeker niet altijd kwalijk nemen. Zij zijn ook niet allemaal kinderpsychologen. Maar ik zie het toch als medeverantwoordelijkheid van de overheid om de opvoeding in goede banen te leiden.</p><p>Om een voorbeeldje te noemen van een situatie waar het fout kan aflopen. In tv-programma 'Rondom Tien' gaf een vrouw aan dat haar drie kinderen tussen 6 en 12 jaar een tv op hun kamer hebben. Zij gaf toe totaal geen zicht te hebben op waar de kinderen naar kijken, laat staan wat voor invloed het op ze heeft. En de kinderen zitten per dag een behoorlijk aantal uurtjes voor de tv.</p><p>In dit voorbeeldje is het eerste dat bij mij opkomt: waarom hebben die kinderen allemaal een tv op hun kamer?</p><p>Er zijn legio ouders die totaal geen belangstelling tonen voor het kijkgedrag van hun kinderen. Kinderen die hun schooltas bij wijze van spreken in de hoek smijten en direct voor de tv gaan zitten totdat ze naar bed gaan. En denk maar niet dat ze naar een zender zoeken waar ze veel van kunnen leren. Ze kijken naar programma's die slecht voor ze zijn. Ik vermoed dat dit zo zijn invloeden heeft op de ontwikkeling van zo'n kind.</p><p>Ik wil absoluut niet betuttelend zijn. Maar soms moet de maatschappij beschermd worden tegen een overvloed aan schadelijke informatie. En juist die ouders die wel willen maar niet kunnen, worden zo geholpen bij hun zware taak van opvoeden. Daarom zeg ik: programma's voor 16 jaar en ouder niet vóór 23.00 uur, programma's voor 12 jaar en ouder niet vóór 21.00 uur en programma's waarbij ouders moeten meekijken met hun kinderen niet vóór 19.00 uur.</p>", "questionRange": [6, 9]}, {"id": 3, "intro": "Deze tekst gaat over het geven van een presentatie voor het vak scheikunde. Er staan adviezen in over hoe u een goede presentatie over een scheikundeproef kunt geven.", "title": "De 8 aandachtspunten bij presenteren", "body": "<p><strong>1. Begrijpelijkheid/overzichtelijkheid van de hele presentatie</strong></p><p>De hele presentatie moet logisch van opbouw en duidelijk te volgen zijn voor iedereen uit het publiek (ongeacht niveau en voorkennis). De taal die je gebruikt moet voor iedereen te begrijpen zijn.</p><p><strong>2. Duidelijkheid/leesbaarheid van sheets</strong></p><p>De sheets moeten voor heel het publiek goed leesbaar zijn. Dat hangt onder meer af van het aantal woorden, de lettergrootte en de kleur. Gebruik niet teveel tekst, alleen kernwoorden en korte zinnen. Als je je eigen sheet van een afstand van drie meter goed kunt lezen terwijl iemand hem voor je vasthoudt, is de leesbaarheid goed.</p><p><strong>3. Houding (lichamelijk/mentaal) van de spreker</strong></p><p>Je houding kan bijdragen aan je succes of falen bij een presentatie. Zelfverzekerdheid en enthousiasme als mentale houding worden als positief ervaren. Lichaamshouding kan een enthousiaste mentale houding ondersteunen. Onder lichaamshouding wordt verstaan: de manier van staan, lopen, het gebruik van gebaren, de manier van ademhalen, en dergelijke.</p><p><strong>4. De manier van spreken</strong></p><p>De presentatie moet voor het publiek duidelijk te verstaan zijn. Dit betekent dat je voldoende luid spreekt (niet met de rug naar het publiek) en een goed te volgen spreektempo aanhoudt. Heel belangrijk is dat er voldoende stiltemomenten zijn en dat de lengte van deze stiltemomenten goed is.</p><p><strong>5. Oogcontact van de spreker met het publiek</strong></p><p>Om de aandacht van het publiek erbij te houden, moet de spreker oogcontact hebben met het hele publiek. De spreker moet de indruk wekken dat hij/zij iedereen in de zaal aankijkt, maar eigenlijk kijkt de spreker alleen naar de hoofden of de wenkbrauwen van de personen om niet afgeleid te worden van zijn verhaal.</p><p><strong>6. Juistheid en compleetheid van de behandelde stof</strong></p><p>Alle stof die besproken wordt moet juist en volledig zijn. Indien het publiek merkt dat een deel van de verstrekte informatie niet juist of incompleet is, is de hele presentatie niet meer geloofwaardig. Voor een presentatie over uitgevoerde scheikundeproeven geldt dat er gelet moet worden op de juistheid en compleetheid van alle onderdelen: doel, uitvoer, waarnemingen, conclusies en verklaringen met behulp van de achterliggende theorie.</p><p><strong>7. Duidelijkheid van de uitleg van de stof</strong></p><p>Het doel van je presentatie is dat de proef en de achterliggende theorie duidelijk zijn zodat de docent geen extra uitleg hoeft te geven. Je medecursisten hoeven de proef niet uit te voeren. Dit moet jij doen. Hiervoor is het noodzakelijk dat je de proef zelf goed begrijpt en weet welke kennis je wilt overdragen en welke niet.</p><p><strong>8. Tijdsindeling</strong></p><p>Je krijgt voor je presentatie tien minuten. Binnen die tien minuten moet je de hele presentatie hebben afgerond. Zorg er daarbij voor dat moeilijke onderdelen voldoende uitleg hebben gehad en makkelijke niet te veel. Tevens moet er genoeg tijd overblijven om vragen te beantwoorden.</p>", "questionRange": [10, 14]}, {"id": 4, "intro": "Deze tekst komt uit een vakblad voor personeelswerk.", "title": "Acht redenen voor een 32-urige werkweek", "body": "<p>Moeten we allemaal weer 40 uur of meer gaan werken? Laat u niets wijsmaken. Niet langere, maar juist kortere werkweken hebben de toekomst.</p><h4>1. Het past in de trend</h4><p>In 1870 werkte de gemiddelde arbeider 3000 uur per jaar. Dat is bijna 58 uur per week, zonder vakantie, ofwel 6 dagen van 9,5 uur. En dat in alle 52 weken van een jaar. Van 1870 tot 1990 nam de hoeveelheid vrije tijd echter gestaag toe. 'Logisch', aldus econome Diane Coyle. 'Mensen willen werken om een inkomen te hebben, maar verkiezen vrije tijd boven werk.' Ofwel: hoe meer we verdienen, hoe minder we kunnen en willen werken.</p><p>En oké, in Nederland gaat de stijging van de arbeidsproductiviteit minder hard dan bijvoorbeeld in de Verenigde Staten. Maar ook bij ons loopt ze nog steeds op. Sinds begin jaren tachtig zelfs met zo'n 50 procent. We zijn in dezelfde tijd bijna anderhalf keer zoveel gaan produceren. Of, omgekeerd: we hebben nog maar tweederde van de tijd nodig die we in 1981 behoefden om hetzelfde te produceren. Waarom doen we dat dan niet?</p><h4>2. We voelen ons er beter bij</h4><p>Mensen die parttime werken, zijn gelukkiger dan fulltimers. Dat blijkt uit onderzoek van de Britse econoom Richard Layard. En dat geluk geldt zowel thuis als op het werk. Sterker nog: meer werken om meer te kunnen kopen kan mensen zelfs ongelukkiger maken, ontdekte hij. Ze verdienen dan weliswaar meer, maar ze hebben nauwelijks tijd om dat geld ook weer uit te geven. Dat is inderdaad niet iets om vrolijk van te worden.</p><h4>3. Met z'n allen aan het werk</h4><p>Volgens het ministerie van Economische Zaken komt het alleen nog maar goed met Europa als we én met meer mensen gaan werken én minder vakantie nemen én later met pensioen gaan. En langere werkweken, daar willen ze op het ministerie ook nog eens goed naar kijken. Maar wat willen ze dat we in die tijd met z'n allen gaan fabriceren?</p><p>Het ministerie wil én, én, én. Maar uit onderzoek blijkt dat sinds de jaren zeventig de totale hoeveelheid beschikbare arbeid in Nederland nauwelijks is toegenomen. Willen we dus echt werk maken van de werkloosheid, dan ontkomen we er niet aan dat werk beter te verdelen. Dus niet de één niets en de ander alles, maar iedereen een beetje minder. Als er zes bakkers zijn en er is vraag naar dertig koekjes, dan kun je toch beter alle zes bakkers vijf koekjes laten bakken dan vijf bakkers zes?</p><h4>4. Minder druk, druk, druk</h4><p>Minder stress, minder kans op rsi, minder burnout, wie durft daar op tegen te zijn? Ons arbeidsethos begint bij steeds meer mensen z'n tol te eisen. Want de WAO-instroom mag dan langzaam afnemen, nog steeds ligt in veel beroepen de oorzaak van de uitval voor meer dan de helft in de psychische sfeer. Waar is de roep om 'onthaasten' ineens gebleven?</p><p>Wie in deeltijd wil werken, kan dat nu natuurlijk ook. Maar gooit daarmee wel meteen z'n eigen glazen in als hij of zij ooit nog carrière wil maken. Ga je met z'n allen naar 32 uur, dan is dat probleem grotendeels opgelost. Ofwel: arbeidstijdverkorting maakt ons bestaan menselijker en minder een wedloop.</p><h4>5. We houden tijd over</h4><p>De sportclub zal er blij mee zijn, de buurtvereniging, de wijkraad, het vrijwilligerswerk. Wie kent niet de klachten over het afnemende animo voor allerlei goede doelen? Laten we daar dan wat aan proberen te doen. En wie in z'n vrije tijd iets 'terugdoet' voor de samenleving, plukt daar ook op het werk de vruchten van. Want zo'n tennisclubje voorzitten, dat is best een handige en nuttige nevenactiviteit als je op kantoor ook wordt geacht een toko draaiende te houden.</p><h4>6. We worden er slimmer van</h4><p>Het grote probleem in wat wij onze kenniseconomie noemen, is een tekort aan opleidingen. Nu is het ook niet zo makkelijk om daar tijd voor vrij te maken als je vijf dagen per week werkt. Wie vier dagen werkt, houdt meer tijd over om zich – in z'n vrije tijd – te ontwikkelen. Dat hoeft natuurlijk niet allemaal werkgerelateerd te zijn, maar het maakt het in ieder geval wel makkelijker. En, dat is genoegzaam bekend, extra investeren in onderwijs resulteert in een substantieel hogere productiviteit.</p><h4>7. We delen de zorg beter</h4><p>Natuurlijk, in deeltijd werken is zelfs wettelijk afdwingbaar geworden. En daarom gebeurt het ook massaal. Meer dan één op de drie banen is al niet meer voltijds. Maar let wel: de naam is nog steeds 'deeltijd'. En dus is de norm 40 uur. Zolang dat zo is, blijft deeltijd toch iets niet helemaal volwaardigs. En zolang dat zo is, blijven ook de zorgtaken ongelijk verdeeld.</p><p>Niet dat die zorgtaken automatisch beter verdeeld zullen zijn als we allemaal ineens vier dagen gaan werken. Maar het zal waarschijnlijk wel helpen. Als de scholen al met een vierdaagse week beginnen, kan het arbeidzame leven dan nog wel achterblijven?</p><h4>8. We worden productiever</h4><p>Deeltijders leggen per uur een hogere productiviteit aan de dag dan voltijders, blijkt telkens weer uit onderzoek. Ze hebben minder carrièrekansen en minder kans op salarisverhoging, maar is dat niet juist een kwestie van onterecht voortrekken van voltijders? En daar ben je dus ook zo vanaf als je iedereen in deeltijd laat werken.</p>", "questionRange": [15, 18]}, {"id": 5, "intro": "Deze tekst komt uit een informatiebrochure van een Regionaal Opleidingen Centrum (ROC) uit het noorden van Nederland.", "title": "Commerciële opleidingen", "body": "<h4>De opleidingen</h4><p>Voor een commerciële baan kun je kiezen uit opleidingen op drie niveaus:</p><ul><li>de basisberoepsopleiding Commercieel Administratief Medewerker (niveau 2);</li><li>de vakopleiding Commercieel Medewerker Binnendienst (niveau 3);</li><li>de middenkaderopleiding Commercieel Medewerker Banken en Verzekeringen (niveau 4);</li><li>de middenkaderopleiding Assistent Marketing en Communicatie (niveau 4).</li></ul><p>In Groningen kun je al deze opleidingen volgen in de beroepsopleidende leerweg (leren en stage). In Hoogeveen en Hardenberg kun je de opleidingen op niveau 2 en 4 volgen; in beide plaatsen eveneens in de leerweg waarin je leren en stage combineert. In Leek kun je alleen de opleiding op niveau 2 volgen.</p><h4>Het werk</h4><p>De werkzaamheden die je verricht in een commerciële functie hangen af van je opleidingsniveau en van je werkomgeving.</p><p>Als Commercieel Administratief Medewerker werk je vaak op een kantoor van een winkel, bij een bank of een verzekeringsbedrijf, waar je veelal achter de computer zult werken om financiële gegevens in te voeren.</p><p>Ben je Commercieel Medewerker Binnendienst, dan ben je in alle commerciële organisaties breed inzetbaar. Dat komt omdat je in je opleiding een combinatie krijgt van handel en administratie. Je hebt inzicht in in- en verkoop. Je kunt met klanten omgaan en hebt veel kennis van economie en logistiek.</p><p>Als Commercieel Medewerker in het Bank- of Verzekeringswezen ben jij de persoon die op de bank of in het verzekeringskantoor rechtstreeks in contact staat met de klanten. Je adviseert, informeert, regelt financiële zaken en behandelt schades en overige vragen.</p><p>Als Assistent Marketing en Communicatie ben jij de persoon die veel externe contacten onderhoudt met diverse doelgroepen buiten het bedrijf. Je verzorgt de public relations en bent betrokken bij de reclame-uitingen van het bedrijf. In dit werkveld zijn je kernkwaliteiten klantvriendelijkheid en creativiteit en heb je oog voor de externe omgeving. Ook heb je verstand van financiën en beheers je de Nederlandse taal bovengemiddeld. Verder weet je goed hoe je met audiovisuele middelen en MS Office-programma's om moet gaan.</p><p>Klantvriendelijk handelen en op commerciële wijze presenteren van producten en diensten zijn van groot belang in deze branches. Verder wordt er van je verwacht dat je: gevoel hebt voor commercie; accuraat bent; er verzorgd uitziet; op een spontane en vriendelijke manier met mensen om kunt gaan; initiatief durft te nemen; goed met geautomatiseerde systemen kunt omgaan; goed met geld kunt omgaan.</p><h4>Inhoud opleidingen</h4><p>Hieronder geven we aan welke deelkwalificaties je per opleiding moet behalen. Bij het doorlezen daarvan moet je weten dat: je in eerste instantie een keuze maakt tussen een opleiding op niveau 2, 3 of 4; het programma van het eerste halfjaar van alle administratieve opleidingen (dus ook van de opleidingen Bedrijfsadministratie, Secretariaat en Juridische Dienstverlening) hetzelfde is en dat je daarna pas een definitieve opleidingskeuze maakt.</p><p>Iedere opleiding bestaat uit een aantal deelkwalificaties, een soort certificaten. Deze certificaten behaal je door deel te nemen aan de lessen en toetsen voor uiteenlopende vakken.</p><p>Binnen de commerciële opleidingen kennen we vakken als Marketing, Bankleer, Assurantie, Bedrijfseconomie, maar ook de meer algemene vakken als Nederlands, Engels, Duits, Maatschappijleer, Recht en Lichamelijke Opvoeding. In het eerste leerjaar is de hoeveelheid algemene vakken het grootst. In de hogere leerjaren zal het accent komen te liggen op de meer beroepsgerichte vakken zoals Bankleer en Assurantie.</p><p>De deelkwalificaties van deze opleidingen op niveau 4 vormen een goede opstap naar de examens van het NIBE en de SW (Assurantie-B). De opleiding Assistent Marketing en Communicatie kent dezelfde basisdeelkwalificaties als Bank en Verzekeringen, maar in plaats van Bankleer en Assurantie bestaan de beroepsgerichte deelkwalificaties uit onderdelen als: Sales, Pers en Public Relations, Reclame en Promotie, Marktonderzoek. Deze deelkwalificaties bieden een goede basis voor de examens in het kader van NIMA-A. Met een extra inspanning kun je een deel van deze examens nog tijdens je opleiding doen.</p><h4>Opleidingsduur</h4><p>De basisberoepsopleiding Commercieel Administratief Medewerker (niveau 2) duurt 2 jaar en de vakopleiding Commercieel Medewerker Binnendienst (niveau 3) 3 jaar. De middenkaderopleidingen Commercieel Medewerker Bank en Verzekeringen en Assistent Marketing en Communicatie (beide niveau 4) duren 3 jaar. Indien nodig kun je in aanmerking komen voor studieverlenging.</p><h4>Beroepspraktijkvorming</h4><p>Op school hebben we de beschikking over moderne lokalen en computers die het mogelijk maken een aantal praktijkonderdelen in gesimuleerde vorm te oefenen en af te sluiten. Daarnaast loop je stage:</p><ul><li>basisberoepsopleiding (niveau 2): 10 weken in de tweede helft van het eerste leerjaar en 10 weken in leerjaar 2;</li><li>vakopleiding (niveau 3): 40 weken in leerjaar 3;</li><li>middenkaderopleiding (niveau 4): 40 weken in leerjaar 3.</li></ul><h4>Mogelijkheden na de opleiding</h4><p>Na de basisberoepsopleiding (niveau 2) kun je aan het werk. Ook kun je doorstromen naar een verwante opleiding op een hoger niveau. Met het diploma van de vakopleiding (niveau 3) heb je heel goede mogelijkheden op de arbeidsmarkt. Na de middenkaderopleidingen (niveau 4) kun je doorstromen naar commerciële hbo-opleidingen. Als je kiest voor het doorstroomcertificaat (met Wiskunde en Algemene Economie), heb je nog veel meer mogelijkheden in het hbo. Ook is het mogelijk om nog meer diploma's op het gebied van het bankwezen en verzekeringen te halen.</p><h4>Toelatingseisen</h4><p>Voor toelating tot de basisberoepsopleiding Commercieel Administratief Medewerker (niveau 2) worden geen vooropleidingseisen gesteld.</p><p>Tot de vakopleiding (niveau 3) en de middenkaderopleidingen (niveau 4) ben je toelaatbaar als je voldoet aan één van de volgende voorwaarden:</p><ul><li>een vmbo-diploma in de kaderberoepsgerichte leerweg, de gemengde leerweg of de theoretische leerweg in de sector Economie;</li><li>een vmbo-diploma in de kaderberoepsgerichte leerweg, de gemengde leerweg of de theoretische leerweg in een andere sector met in je vakkenpakket ten minste één van de vakken Wiskunde, Economie of een tweede moderne vreemde taal;</li><li>een vbo-diploma op C-niveau met in je vakkenpakket ten minste één van de vakken Wiskunde, Economie of een tweede moderne vreemde taal;</li><li>een diploma mavo met in je vakkenpakket ten minste één van de vakken Wiskunde, Economie of een tweede moderne vreemde taal;</li><li>een overgangsbewijs van klas 3 naar klas 4 havo of vwo, of:</li><li>een diploma van een verwante opleiding op niveau 2.</li></ul>", "questionRange": [19, 24]}, {"id": 6, "intro": "In deze tekst staat wat de mogelijkheden zijn om een opleiding te volgen en om te werken in de bouw.", "title": "In de bouw kun je veel bereiken", "body": "<p>Overal om je heen wordt gebouwd. Nieuwbouw van huizen, kantoren en fabrieken. Bestaande gebouwen moeten worden onderhouden, gerenoveerd of gerestaureerd. Voor al die bouwwerken wordt er getekend en gerekend en dan moeten ze natuurlijk nog worden gebouwd. De bouw is een grote bedrijfstak waar zo'n 350.000 mensen hun dagelijks brood verdienen. Jij kunt daar ook bij gaan horen als je een beroep in de bouw leert. Want de bouw heeft behoefte aan vakmensen op alle niveaus.</p><p>De bouw is een bijzondere bedrijfstak. Bouwen gebeurt veel buiten, in de open lucht, onder sterk wisselende omstandigheden. De bouw is ook mobiel. Dan werk je hier en dan weer daar. Soms wordt er zelfs letterlijk aan de weg getimmerd. Er zijn grote en kleine bouwwerken, de voorbereiding en uitvoering zijn steeds anders. Je werkt samen met veel anderen. In de bouw ben je dus mobiel en flexibel en kun je goed met collega's omgaan.</p><p>Veilig en gezond werken is van groot belang. In de bouw wordt ook steeds meer rekening gehouden met het milieu. Bij 'duurzaam bouwen' houden de ontwerper en de bouwer vooraf al rekening met wat er na de sloop gebeurt. Welke materialen kunnen worden hergebruikt, wat kan worden gestort en wat moet verbrand?</p><h4>Er is veel mogelijk</h4><p>In de bouw is van alles te doen. Ga werken als uitvoerend medewerker, bijvoorbeeld als timmerman, metselaar, schilder of stratenmaker. Allemaal beroepen waar je tegenwoordig goed mee aan de slag kunt. Want vergis je niet, er is veel behoefte aan vakmensen op dit niveau.</p><p>Wie zeker wil zijn van een baan, gaat na een vmbo-opleiding direct aan de slag. Werken en leren in een bouwberoep. Je leert vier dagen in de week de praktijk in je werk. Je werkt, dus je verdient ook een goed loon en tijdens je opleiding heb je gegarandeerd werk. Een dag in de week ga je naar school. Je leert daar de theorie die hoort bij het vak dat jij hebt gekozen. Zo kun je in ongeveer twee jaar je eerste diploma halen.</p><p>Wie wil, kan verder leren binnen de vakopleidingen. Zo kun je diploma's voor uitvoerder en aannemer halen, of voor leraar bouwtechniek op een school. Je kunt er ook voor kiezen om nog langer alleen naar school te gaan. Je volgt dan een mbo-opleiding bouwkunde. Die opleiding duurt vier jaar met stages in het derde jaar. Je krijgt er vakken als wis- en natuurkunde, betontechnologie, staalconstructies, materialenkennis, bouwhistorie, Engels en Nederlands. Je krijgt ook technisch tekenen, ontwerpen en schetsen. Wie het diploma mbo-bouwkunde op zak heeft, kan in de uitvoerende bouw aan de gang als tekenaar/constructeur, calculator/werkvoorbereider of uitvoerder. Je kunt ook bij een gemeente of een woningstichting gaan werken. En na het mbo zijn er natuurlijk mogelijkheden op een hbo-instelling of een Technische Universiteit. Dat zijn opleidingen op een veel hoger theoretisch niveau. Als je de Technische Universiteit met succes hebt gevolgd, kun je je vestigen als zelfstandig architect. Dat is alleen voor doorzetters of studiebollen weggelegd, maar je hebt dan een enorme theoretische kennis en praktische ervaring via je stages.</p><h4>Houden van techniek</h4><p>Wie werkt in de bouw, houdt van techniek. Wiskunde en natuurkunde zijn belangrijke vakken in iedere opleiding. Je werkt graag met je handen of met computers. Want ook in de bouw vind je computers op het bedrijfsbureau, in de tekenkamer en in de bouwkeet. De computer is een onmisbaar hulpmiddel geworden bij het ontwerpen en tekenen. Volg je een studie bouwkunde, dan krijg je ook te maken met architectuur.</p><p>Je bent niet snel uitgeleerd. Want wie in de bouw werkt, moet bijblijven in z'n vak. Je kunt cursussen volgen op allerlei gebied. Bijvoorbeeld cursussen over nieuwe technieken in de bouw of over vakgebieden waarover je nog niet hebt geleerd. Een studie in de bouw is een opstap naar later. Nieuwe ontwikkelingen dwingen je bij te blijven in je vak.</p><h4>Kansen genoeg</h4><p>Wie gaat werken in de bouw, maakt een goed begin aan een mooie toekomst. Wat het wordt, ligt vooral aan jezelf. Van timmerman tot uitvoerder, van projectleider tot architect. De bouw is een uitdagende sector met tal van opleidingen en werk waarmee je in de toekomst verzekerd bent van een interessante baan.</p><p>Pak die kans met beide handen!</p>", "questionRange": [25, 29]}, {"id": 7, "intro": "Deze tekst geeft informatie over giftige stoffen. Hij is gemaakt door de Arbeidsinspectie.", "title": "Toxische Stoffen op het Werk", "body": "<h4>UW GEZONDHEID</h4><p>Er zijn veel stoffen in de handel die gevaarlijk kunnen zijn voor uw gezondheid. Toxische stoffen noemen we ze. Dit zijn bijvoorbeeld zoutzuur, chloor en ammoniak. Alleen al in Nederland zijn er meer dan twintigduizend.</p><h4>Waar?</h4><p>Tien tegen één dat u dagelijks met toxische stoffen in aanraking komt. Bijna geen bedrijf kan meer zonder. Toxische stoffen zitten in allerlei producten. In vloeistoffen en gassen met namen die bijna niet zijn uit te spreken. Maar ook in hout, verf en schoonmaakmiddelen.</p><h4>Gevolgen</h4><p>U kunt ziek worden als u toxische stoffen inademt, inslikt of op uw huid krijgt. Misschien niet meteen, maar dat zegt weinig. Soms voelt u de gevolgen pas na jaren. Het resultaat: een bedorven toekomst.</p><h4>Op uw werk?</h4><p>Gelukkig hoeft het zover niet te komen. Als u maar precies weet waar u mee werkt en waar u op moet letten. En als u maar precies in de gaten houdt of er voldoende maatregelen zijn genomen om u te beschermen. Goochel niet met uw gezondheid. Zoek uit hoe dat op uw werk zit met toxische stoffen. Tot op de bodem!</p><h4>VRAGEN STAAT VRIJ</h4><p>Hoe weet u of u met toxische stoffen werkt? Hoe komt u er achter wat ze uw gezondheid kunnen aandoen?</p><h4>Lijstje</h4><p>Schrijf eens een week lang op waar u op uw werk mee in aanraking komt. Welke:</p><ul><li>vloeistoffen</li><li>stofdeeltjes in de lucht</li><li>dampen, gassen en nevels</li><li>materialen</li></ul><p>Met dit lijstje in de hand kunt u uitzoeken hoe schadelijk alles is.</p><h4>Etiketten lezen</h4><p>Om te beginnen kunnen etiketten op verpakkingen u het een en ander vertellen. Vaak vindt u daar symbolen, waarschuwingen en aanbevelingen. Als u ze aandachtig leest, weet u beslist meer.</p><h4>Vraag!</h4><p>Lang niet alles van uw lijstje kunt u op deze manier thuisbrengen. De rest zult u moeten vragen. Aan:</p><ul><li>uw chef</li><li>de bedrijfsleider</li><li>de bedrijfsarts</li><li>de veiligheidsdeskundige</li></ul><p>Vraag… net zo lang tot u precies weet waar u mee werkt. U heeft er recht op, ook volgens de wet. Het gaat immers om uw eigen gezondheid.</p><h4>WAT KUNT U ZELF DOEN?</h4><p>Indien u hebt vastgesteld dat er toxische stoffen aanwezig zijn, gelden de volgende adviezen:</p><ul><li>Toxische stoffen mogen geen kans krijgen uw lichaam binnen te dringen. Daar kunt u zelf veel aan doen. Door uzelf en uw werkplek goed schoon te houden.</li><li>Eet, drink en rook niet tijdens het werk. Zo voorkomt u dat u toxische stoffen per ongeluk inslikt.</li><li>Was uw handen vóór u pauzeert. En houd werkkleding niet onnodig aan.</li></ul><h4>Schoonmaken</h4><p>Een vuile werkplek bedreigt regelrecht uw gezondheid. Stof dwarrelt weer op. Vloeistof kan weer opspatten en zo alsnog in uw lichaam terechtkomen. Zorg voor een schone werkplek. Een paar mogelijkheden:</p><ul><li>Ruim gemorste stoffen direct op.</li><li>Maak afspraken met collega's over het schoonhouden.</li><li>Let op hoe u schoonmaakt. Veeg bijvoorbeeld stof nooit op met een veger, maar zorg voor een zuiger met een filtersysteem.</li><li>Neem voor schoonmaken voldoende tijd.</li><li>Dring bij uw chef aan op duidelijke schoonmaakinstructies.</li></ul><h4>WAT MOET DE WERKGEVER DOEN?</h4><p>Uw werkgever is verplicht u te beschermen tegen toxische stoffen. Op welke manier? Alleen de beste is goed genoeg als het om uw gezondheid gaat.</p><p>Er zijn vier manieren om u te beschermen. De beste methode voorop:</p><ol><li>Zorgen dat er geen toxische stoffen meer vrijkomen.</li><li>Toxische stoffen bij u wegzuigen met een ventilatiesysteem.</li><li>Zorgen dat er geen mensen in de buurt van de toxische stoffen kunnen komen.</li><li>Persoonlijke beschermingsmiddelen verstrekken.</li></ol><h4>De wet</h4><p>Uw werkgever moet z'n uiterste best doen uw bescherming helemaal op de eerste manier te regelen. Dat staat in het Veiligheidsbesluit voor Fabrieken of Werkplaatsen, een onderdeel van de Arbowet. Blijft er ondanks alle moeite toch nog gevaar voor uw gezondheid? Dan moet uw werkgever dat opheffen op manier twee. Manier drie komt pas in aanmerking als één en twee beslist niet lukken.</p><h4>Noodoplossing</h4><p>Pas in allerlaatste instantie mag uw werkgever u persoonlijke beschermingsmiddelen geven. Masker, mondkap, bril, handschoenen en dergelijke zijn volgens de wet noodoplossingen. Uw werkgever moet proberen zo snel mogelijk betere manieren te vinden.</p><h4>Ook bij u?</h4><p>Slaagt uw werkgever erin u op de beste manier te beschermen? Zo niet: vraag dan na waarom. Hij moet daarvoor zeer overtuigende argumenten kunnen geven. Niet alleen aan u. Ook aan de Arbeidsinspectie die controleert of uw werkgever zich aan de wet houdt.</p>", "questionRange": [30, 34]}, {"id": 8, "intro": "In Centrum Vakopleiding Haaglanden wordt de cursus 'Vakgericht communiceren voor anderstaligen' gegeven. De volgende tekst gaat over deze cursus.", "title": "Vakgericht communiceren voor anderstaligen", "body": "<h4>De opleiding</h4><p>Voor anderstaligen die op zoek zijn naar een baan of die een opleiding willen volgen, blijkt soms dat de algemene kennis van de Nederlandse taal of die van de vaktaal niet toereikend is. Vakgericht communiceren voor anderstaligen is een cursus waarbij het accent niet in de eerste plaats op de algemene Nederlandse taalvaardigheden ligt, maar waarbij anderstaligen op een individuele praktijkgerichte manier aan vaktaal werken, waarna zij betere kansen hebben op de arbeidsmarkt.</p><p>Het doel van deze cursus is:</p><ul><li>De laatste belemmeringen in de Nederlandse (vak-)taalvaardigheid en communicatie wegwerken zodat de kandidaat gemakkelijker een baan vindt (of behoudt) of kan deelnemen aan een werkgelegenheidsproject.</li><li>De slagingskans in een beroepsopleiding vergroten.</li></ul><p>Iedere cursist volgt een individueel programma op het eigen vakgebied. Dit kan op het terrein van de zakelijke of de maatschappelijke dienstverlening zijn, maar ook in de techniek. Binnen dit lesprogramma behoren de veel gebruikte termen en uitdrukkingen uit de toekomstige werksituatie en/of opleiding tot de lesstof. Daarnaast zijn er gezamenlijke activiteiten die betrekking hebben op de communicatieve vaardigheden, met name de spreek- en schrijfvaardigheid. Huiswerkopdrachten behoren ook tot de mogelijkheden.</p><p>Cursisten volgen de opleiding in opdracht van bijvoorbeeld het UWV WERKbedrijf of hun werkgever. Het Centrum Vakopleiding Haaglanden informeert deze opdrachtgevers regelmatig over de resultaten van de kandidaat en geeft zonodig ook advies over de gewenste vakrichting. Dit gebeurt zowel aan het begin als aan het eind van de cursus.</p><p>Kandidaten stromen vaak door naar andere beroepsopleidingen. Dit kunnen opleidingen zijn binnen het Centrum Vakopleiding, maar ook daarbuiten.</p><h4>Cursusduur</h4><p>Het vca-traject kan op elk gewenst moment beginnen. Er zijn geen wachttijden. De cursus duurt gemiddeld 4 tot 6 maanden. De vca-cursist volgt een rooster van 1 tot 4 dagdelen les per week; het aantal dagdelen hangt af van de hoeveelheid door te nemen leerstof. De lessen zijn overdag en 's avonds. De lesgroepen bestaan uit gemiddeld tien cursisten.</p><h4>Aanmelding</h4><p>Vca is allereerst bestemd voor anderstalige werkzoekenden die ingeschreven staan bij Bureau Werkraat of bij een UWV WERKbedrijf. Daarnaast is deelname mogelijk voor kandidaten die door hun werkgever worden aangemeld.</p><p>Wanneer blijkt dat deelname aan vca gewenst is, meldt de opdrachtgever de kandidaat aan bij het Centrum Vakopleiding Haaglanden. Hierna volgt een intakegesprek en een toelatingstest. Hieruit wordt duidelijk of de vca-cursus een zinvolle bijdrage kan leveren aan het vergroten van de (vak-)taalkennis. Op basis van de gegevens uit het intakegesprek wordt het individuele programma samengesteld.</p><p>Voor het volgen van de vaaktaaltraining is geen specifieke vooropleiding vereist, hoewel doorstroom (na het vca-traject) naar een vervolgopleiding dat soms wel noodzakelijk maakt. Het niveau van de algemene kennis van de Nederlandse taal bepaalt in welke vca-groep de kandidaat geplaatst wordt. De tijd tussen aanmelding en start van de cursus is ongeveer drie weken.</p><h4>De afsluiting</h4><p>Als de cursus met goed gevolg is afgelegd, dan ontvangt de cursist ter afsluiting een verklaring met daarop vermeld de behandelde onderwerpen en de behaalde resultaten.</p>", "questionRange": [35, 39]}], "questions": [{"n": 1, "textId": 1, "prompt": "Soms had Mai Lin een aantal maanden geen werk. Hoe kan zij daar volgens de tekst het beste mee omgaan bij het solliciteren?", "options": {"A": "de periodes opvullen met de banen die ze daarvoor en daarna had", "B": "uitleggen waarom zij in die periodes geen werk had", "C": "uitleggen welke andere dingen ze in die periodes heeft gedaan"}, "answer": "C"}, {"n": 2, "textId": 1, "prompt": "Mai Lin wordt uitgenodigd voor een sollicitatiegesprek. Ze maakt zich er erg druk over. Waarom hoeft dat niet volgens de tekst?", "options": {"A": "omdat het bedrijf en een werknemer elkaar nodig hebben", "B": "omdat zij immers is uitgenodigd", "C": "omdat zij zich goed kan voorbereiden"}, "answer": "A"}, {"n": 3, "textId": 1, "prompt": "Mai Lin wil graag weten wat voor soort vragen zij moet beantwoorden tijdens een sollicitatiegesprek zodat zij zich beter kan voorbereiden. Waar vindt zij zulke vragen in de tekst?", "options": {"A": "in deel 1.1", "B": "in deel 2.1", "C": "in deel 2.2", "D": "in deel 2.5"}, "answer": "C"}, {"n": 4, "textId": 1, "prompt": "Mai Lin leest in tekstdeel 2.5 dat zij oogcontact moet houden. Hoe moet zij dit doen volgens de tekst?", "options": {"A": "alle aanwezigen blijven aankijken", "B": "de aanwezigen soms aankijken en soms niet", "C": "degene die een vraag stelt aankijken"}, "answer": "A"}, {"n": 5, "textId": 1, "prompt": "Voor wie is deze tekst bedoeld?", "options": {"A": "uitsluitend voor mensen die al heel lang werkloos zijn", "B": "uitsluitend voor mensen die net klaar zijn met hun opleiding", "C": "uitsluitend voor mensen die van baan willen veranderen", "D": "voor iedereen die werk zoekt"}, "answer": "D"}, {"n": 6, "textId": 2, "prompt": "Waar moet de overheid zich mee bemoeien volgens de heer Groothedde, mevrouw Ladi en mevrouw Jansen?", "options": {"A": "met de inhoud van televisieprogramma's", "B": "met het aantal uren dat kinderen per dag televisie kijken", "C": "met het tijdstip waarop programma's worden uitgezonden"}, "answer": "C"}, {"n": 7, "textId": 2, "prompt": "In regel 20 zegt mevrouw Ladi dat de hele discussie niet meer actueel is. Waarom is dat zo volgens haar?", "options": {"A": "omdat de overheid bepaalde reclames op de televisie al verboden heeft", "B": "omdat kinderen vaker gebruik maken van nieuwe media dan van de televisie", "C": "omdat ouders zelf controleren naar welke programma's hun kinderen kijken"}, "answer": "B"}, {"n": 8, "textId": 2, "prompt": "Op de televisie wordt een programma uitgezonden. Het programma is niet geschikt voor kinderen die jonger zijn dan 12 jaar. Wanneer mag volgens mevrouw Jansen het programma uitgezonden worden?", "options": {"A": "vanaf 19.00 uur", "B": "vanaf 21.00 uur", "C": "vanaf 23.00 uur"}, "answer": "B"}, {"n": 9, "textId": 2, "prompt": "Deze drie teksten komen uit een forum van een website. Waarom plaatst het forum deze teksten?", "options": {"A": "om de lezer advies te geven over opvoeden en televisie kijken", "B": "om de lezer instructies te geven over hoe ze kinderen moeten opvoeden", "C": "om de lezer verschillende meningen te geven over opvoeden en televisie kijken"}, "answer": "C"}, {"n": 10, "textId": 3, "prompt": "Fatima wil weten waar zij precies op moet letten bij de inhoud. Waar kan zij die informatie vinden?", "options": {"A": "bij aandachtspunten 1, 3 en 5", "B": "bij aandachtspunten 1, 6 en 7", "C": "bij aandachtspunten 2, 4 en 8"}, "answer": "B"}, {"n": 11, "textId": 3, "prompt": "Fatima wil weten of het verstandig is als zij gebaren maakt tijdens haar presentatie. Waar kan zij die informatie vinden?", "options": {"A": "bij aandachtspunt 1", "B": "bij aandachtspunt 2", "C": "bij aandachtspunt 3"}, "answer": "C"}, {"n": 12, "textId": 3, "prompt": "Frank leest dat hij op zijn houding moet letten. Op welke twee soorten houding moet hij letten?", "options": {"A": "enthousiasme en zelfverzekerdheid", "B": "gebruik van gebaren en manier van staan, lopen, ademen", "C": "mentale en lichamelijke houding"}, "answer": "C"}, {"n": 13, "textId": 3, "prompt": "Na de vorige presentatie van Fatima moest haar docent alles nog eens uitleggen. Welk aandachtspunt kan haar helpen om deze keer direct alles zelf goed uit te leggen?", "options": {"A": "aandachtspunt 2", "B": "aandachtspunt 7", "C": "aandachtspunt 8"}, "answer": "B"}, {"n": 14, "textId": 3, "prompt": "In de presentatie van Frank zit een scheikundeproef. Wie voert die proef uit?", "options": {"A": "alle cursisten", "B": "de docent", "C": "Frank"}, "answer": "C"}, {"n": 15, "textId": 4, "prompt": "Wat is de beste samenvatting van tekstdeel 2?", "options": {"A": "Mensen hebben te weinig tijd om hun geld uit te geven.", "B": "Mensen willen geld verdienen om het uit te kunnen geven.", "C": "Mensen zijn gelukkiger als ze minder dan fulltime werken."}, "answer": "C"}, {"n": 16, "textId": 4, "prompt": "Als je minder gaat werken, houd je tijd over (tekstdeel 5). Hoe kun je volgens dit tekstdeel in die vrije tijd iets 'terugdoen' voor de samenleving?", "options": {"A": "door een tweede baan te nemen", "B": "door lid te worden van een club", "C": "door te gaan studeren", "D": "door vrijwilligerswerk te doen"}, "answer": "D"}, {"n": 17, "textId": 4, "prompt": "Wat is de beste samenvatting van tekstdeel 6?", "options": {"A": "Als je in deeltijd werkt, ga je meer produceren.", "B": "Als je in deeltijd werkt, heb je meer vrije tijd.", "C": "Als je in deeltijd werkt, kun je meer studeren."}, "answer": "C"}, {"n": 18, "textId": 4, "prompt": "Wat is volgens tekstdeel 8 het voordeel van deeltijders tegenover voltijders?", "options": {"A": "Deeltijders doen per uur meer werk dan voltijders.", "B": "Deeltijders hebben een hoger uurloon dan voltijders.", "C": "Deeltijders hebben meer kans op beter werk dan voltijders."}, "answer": "A"}, {"n": 19, "textId": 5, "prompt": "Danisha wil de vakopleiding Commercieel Medewerker Binnendienst gaan volgen. Waar wordt deze opleiding aangeboden?", "options": {"A": "in Groningen", "B": "in Hardenberg en Hoogeveen", "C": "in Leek"}, "answer": "A"}, {"n": 20, "textId": 5, "prompt": "Aïsha wil in haar werk graag veel contact hebben met klanten. Welke opleiding kan ze beter niet kiezen?", "options": {"A": "de opleiding Assistent Marketing en Communicatie", "B": "de opleiding Commercieel Administratief Medewerker", "C": "de opleiding Commercieel Medewerker Bank en Verzekeringen", "D": "de opleiding Commercieel Medewerker Binnendienst"}, "answer": "B"}, {"n": 21, "textId": 5, "prompt": "Philip is heel creatief en wil dat graag ook in zijn werk toepassen. Welke opleiding past daar het beste bij?", "options": {"A": "Assistent Marketing en Communicatie", "B": "Commercieel Administratief Medewerker", "C": "Commercieel Medewerker Bank en Verzekeringen", "D": "Commercieel Medewerker Binnendienst"}, "answer": "A"}, {"n": 22, "textId": 5, "prompt": "Francis zoekt een opleiding met veel stage. Kan zij dan beter een middenkaderopleiding kiezen of een vakopleiding?", "options": {"A": "een middenkaderopleiding", "B": "een vakopleiding", "C": "Een middenkaderopleiding en een vakopleiding hebben evenveel stageweken."}, "answer": "C"}, {"n": 23, "textId": 5, "prompt": "Ditta volgt een commerciële opleiding op niveau 3. Ze wil na haar opleiding graag doorstromen naar het hbo. Kan dat?", "options": {"A": "Dat kan alleen als ze de vakken Wiskunde en Algemene Economie volgt.", "B": "Ja, met een diploma van een opleiding op niveau 3 kan ze doorstromen naar het hbo.", "C": "Nee, om door te stromen naar het hbo moet ze een niveau 4-opleiding hebben afgerond."}, "answer": "C"}, {"n": 24, "textId": 5, "prompt": "Jos wil de opleiding Commercieel Administratief Medewerker gaan volgen. Welk diploma moet hij hiervoor hebben?", "options": {"A": "een mavo-diploma", "B": "een vbo-diploma", "C": "een vmbo-diploma", "D": "Een diploma is niet nodig."}, "answer": "D"}, {"n": 25, "textId": 6, "prompt": "Wat voor vakmensen heeft de bouw vooral nodig volgens de tekst?", "options": {"A": "vakmensen met vmbo- en mbo-diploma's", "B": "vakmensen met hbo- en universitaire diploma's", "C": "De bouw kan alle vakmensen goed gebruiken."}, "answer": "C"}, {"n": 26, "textId": 6, "prompt": "Volgens de tekst moet je mobiel zijn als je in de bouw werkt. Wat wordt daarmee bedoeld?", "options": {"A": "Je moet meewerken aan kleine en grote bouwwerken.", "B": "Je moet op verschillende plaatsen werken.", "C": "Je moet veel met collega's samenwerken."}, "answer": "B"}, {"n": 27, "textId": 6, "prompt": "Volgens de tekst zijn er twee vakken belangrijk in alle bouwopleidingen. Welke twee vakken zijn dat?", "options": {"A": "architectuur en omgaan met computers", "B": "materialenkennis en Nederlands", "C": "wiskunde en natuurkunde"}, "answer": "C"}, {"n": 28, "textId": 6, "prompt": "In de bouw ben je niet snel uitgeleerd. Hoe komt dat, volgens de tekst?", "options": {"A": "omdat het lang duurt voordat je een diploma kunt halen", "B": "omdat je nieuwe ontwikkelingen moet blijven volgen", "C": "omdat je veel theoretische kennis en praktische ervaring moet hebben"}, "answer": "B"}, {"n": 29, "textId": 6, "prompt": "Wat is het belangrijkste doel van deze tekst?", "options": {"A": "dat meer mensen kiezen voor een opleiding of beroep in de bouw", "B": "dat mensen begrijpen wat een opleiding of beroep in de bouw betekent", "C": "dat mensen nadenken voordat ze kiezen voor een opleiding of beroep in de bouw"}, "answer": "A"}, {"n": 30, "textId": 7, "prompt": "Komen toxische stoffen veel voor op werkplekken, volgens de tekst?", "options": {"A": "Ja, maar werknemers komen er meestal niet mee in contact.", "B": "Ja, toxische stoffen komen op vrijwel elke werkplek voor.", "C": "Nee, alleen schoonmaakbedrijven werken met toxische stoffen.", "D": "Nee, omdat toxische stoffen gevaarlijk zijn worden ze zelden gebruikt."}, "answer": "B"}, {"n": 31, "textId": 7, "prompt": "De tekst adviseert u een lijstje te maken. Waarvoor dient deze lijst?", "options": {"A": "om na te kunnen gaan of de stoffen waarmee u werkt schadelijk zijn", "B": "om na te kunnen gaan welke maatregelen u kunt treffen", "C": "om na te kunnen gaan welke veiligheidsmaatregelen uw werkgever heeft getroffen"}, "answer": "A"}, {"n": 32, "textId": 7, "prompt": "Hoe kunt u zichzelf het beste tegen toxische stoffen beschermen?", "options": {"A": "Houd regelmatig pauze zodat u even bij de stoffen uit de buurt bent.", "B": "Houd uzelf en uw werkomgeving goed schoon.", "C": "Vraag uw werkgever om persoonlijke beschermingsmiddelen."}, "answer": "B"}, {"n": 33, "textId": 7, "prompt": "Voor wie is deze tekst bedoeld?", "options": {"A": "voor veiligheidsdeskundigen", "B": "voor werkgevers", "C": "voor werknemers"}, "answer": "C"}, {"n": 34, "textId": 7, "prompt": "De directeur van een drukkerij zegt: 'Bij ons is alles goed geregeld. Alle werknemers hebben de persoonlijke beschermingsmiddelen die ze nodig hebben.' Voldoet de directeur daarmee aan de wettelijke regels?", "options": {"A": "Ja, de werknemers zijn voldoende beschermd.", "B": "Nee, persoonlijke beschermingsmiddelen mogen niet gegeven worden.", "C": "Misschien, als de andere voorgeschreven maatregelen niet mogelijk waren."}, "answer": "C"}, {"n": 35, "textId": 8, "prompt": "Wat wil het Centrum Vakopleiding Haaglanden uiteindelijk met de opleiding bij de anderstalige cursisten bereiken?", "options": {"A": "Het wil hen een individueel programma laten volgen.", "B": "Het wil hun betere kansen geven in onderwijs en beroep.", "C": "Het wil hun beter Nederlands leren."}, "answer": "B"}, {"n": 36, "textId": 8, "prompt": "Voor wie is de opleiding bedoeld?", "options": {"A": "voor mensen die al voor een beroepsopleiding in Nederland zijn geslaagd", "B": "voor mensen die hun taalvaardigheid binnen het eigen vakgebied willen vergroten", "C":
