 "voor mensen die nog niet precies weten in welk vakgebied ze willen gaan werken"}, "answer": "B"}, {"n": 37, "textId": 8, "prompt": "Bij welk onderdeel krijgen de cursisten tijdens deze opleiding samen les?", "options": {"A": "bij maatschappelijke dienstverlening", "B": "bij spreek- en schrijfvaardigheid", "C": "bij uitbreiding van de vaktaalwoorden"}, "answer": "B"}, {"n": 38, "textId": 8, "prompt": "Voor welke cursisten kan een specifieke vooropleiding noodzakelijk zijn?", "options": {"A": "voor cursisten die een vca-traject willen volgen", "B": "voor cursisten die in een vca-groep geplaatst willen worden", "C": "voor cursisten die naar een vervolgopleiding willen"}, "answer": "C"}, {"n": 39, "textId": 8, "prompt": "Wat moet het Centrum Vakopleiding van een cursist weten om hem in een vca-groep te plaatsen?", "options": {"A": "of hij de opleiding echt graag wil gaan volgen", "B": "wat zijn niveau van de algemene kennis van het Nederlands is", "C": "wat zijn specifieke vooropleiding is"}, "answer": "B"}]}, {"id": "2017", "year": 2017, "title": "B1 Lezen 2017 — Openbaar examen", "timeLimitMin": 110, "passMark": 29, "totalQuestions": 41, "texts": [{"id": 1, "intro": "Dit is een tekst over de hoeveelheid afval die we in Nederland zomaar ergens weggooien en over de gevolgen daarvan.", "title": "Zwerfafval: zijn wij echt zulke viespeuken?", "body": "<p>Huisvuil, puin, chemisch afval: iedereen weet hoe we dat op een verantwoorde manier kwijt kunnen. Toch wordt er veel afval illegaal gestort, onderweg uit de auto gekieperd of op straat gegooid. Zijn wij echt zulke viespeuken?</p><p>Van alle milieuproblemen is het misschien niet het ergste, maar we storen er ons wel dagelijks aan: zwerfafval. In Nederland wordt per jaar minstens honderdduizend ton (dat is honderd miljoen kilo) afval langs snelwegen achtergelaten. Het opruimen daarvan kost acht miljoen euro per jaar. Vooral bij op- en afritten, op parkeerplaatsen en bij verkeerslichten lijkt het vaak op een grote vuilnisbelt. En dat geldt niet alleen voor snelwegen.</p><p>Voor het schoonhouden van straten en pleinen moeten de gemeenten opdraaien. Kosten: driehonderd miljoen euro per jaar! Vooral fietspaden met veel verkeer van scholieren worden ernstig vervuild.</p><p>Je hebt het misschien wel eens gezien: een automobilist die op een parkeerplaats gauw even de asbak leeggooit. Zo iemand weet waarschijnlijk niet dat het één tot vijf jaar duurt voordat een sigarettenpeuk door de natuur is afgebroken. Of interesseert het hem niets?</p><h4>Kauwgom</h4><p>Loop eens door het centrum van een Nederlandse stad en kijk eens naar de grond. Waarschijnlijk zie je witte, grijze en zwarte stippen. Dat is kauwgom, uitgespuugd door duizenden kauwgomkauwers. Op sommige plaatsen — bijvoorbeeld bij de ingang van grote winkels, bij snackbars en bij putten — heeft zich zelfs één grote laag kauwgom op de grond gevormd.</p><p>Het opruimen van kauwgom is onbegonnen werk. In de tijd waarin je één stukje kauwgom verwijdert, hebben anderen al weer tien nieuwe stukjes uitgespuugd. Een stukje kauwgom is pas na 20 tot 25 jaar afgebroken door de natuur. Minder erg, maar wel verrassend is dat een sinaasappel- of bananenschil er één tot drie jaar over doet om te vergaan.</p><p>Het bedrijf 'Gumbusters' heeft een methode ontwikkeld om kauwgom te verwijderen. Met vloeibare stikstof wordt de kauwgom diep ingevroren, vervolgens verkruimeld en dan opgezogen. Het werkt goed, maar het is erg kostbaar.</p><p>In Singapore weten ze wel raad met mensen die kauwgom op straat spugen: 300 euro boete!</p><h4>Afbreektijd van afval</h4><p>Het tempo waarin zwerfafval wordt afgebroken door de natuur is afhankelijk van het weer.</p><table><tr><td>papier</td><td>paar dagen tot een half jaar</td></tr><tr><td>kartonnen drankbeker</td><td>minstens een half jaar</td></tr><tr><td>dun natuurrubber</td><td>1 jaar</td></tr><tr><td>wollen sok</td><td>5 jaar</td></tr><tr><td>metalen blikje</td><td>1,5 tot 50 jaar</td></tr><tr><td>pvc</td><td>5 tot 10 jaar</td></tr><tr><td>pet-fles (frisdrank)</td><td>5 tot 10 jaar</td></tr><tr><td>plastic zak</td><td>10 tot 20 jaar</td></tr><tr><td>plastic filmkokertje</td><td>30 jaar</td></tr><tr><td>nylon</td><td>40 jaar</td></tr><tr><td>leer</td><td>maximaal 50 jaar</td></tr><tr><td>aluminium blikje</td><td>80 tot 1 miljoen jaar</td></tr><tr><td>plastic six-packhouder</td><td>100 jaar</td></tr><tr><td>glazen fles</td><td>1 miljoen jaar</td></tr><tr><td>piepschuim bekertje</td><td>'eeuwig'</td></tr></table>", "questionRange": [1, 4]}, {"id": 2, "intro": "Deze tekst gaat over het beroep van glazenwasser.", "title": "En? Wat doet u?", "body": "<p>Niet bang om op hoogte te werken? Zin in een baan vol afwisseling? Leuk verdienen? En nog veel meer? Wat zou u er dan van denken om glazenwasser te worden? Geen dag is hetzelfde, want als glazenwasser bent u steeds onderweg. Samen met leuke collega's en soms ook alleen. U werkt binnen en buiten, bij mensen thuis, op kantoren, scholen enzovoort. De ene keer wast u de ramen vanaf een ladder, de andere keer vanaf een hangbruginstallatie of hoogwerker. Daar hebt u techniek en durf bij nodig. Dus houdt u van uitdaging én steekt u graag de handen uit de mouwen? Dan bent u de glazenwasser die wij zoeken!</p><p>Waarom altijd binnen zitten? Als de zon schijnt, is het heerlijk om ook buiten te werken! Dat is één van de voordelen van het glazenwassersvak. 's Morgens krijgt u uw opdrachten mee en daar gaat u die dag mee aan het werk. Zo bepaalt u voor een belangrijk deel uw eigen werktempo en dat biedt veel vrijheid.</p><p>Geregeld bieden klanten u een kop koffie aan en maken ze even een praatje. Iedere dag ontmoet u weer nieuwe mensen. Dat is de gezellige kant van het vak. Ook de objecten waar u de ramen wast zijn steeds anders. Het kunnen huizen, kantoren, scholen, ziekenhuizen zijn. Soms met alleen ramen op de begane grond en soms op flinke hoogte. Zeker als u op hoogte werkt, moet u rekening houden met veiligheid. U gebruikt hiervoor moderne technische hulpmiddelen waar u goed mee moet kunnen omgaan. Glazenwassen is een echt vak waarvoor kennis en vaardigheid nodig zijn! Veel meer dus dan een emmertje sop, een spons en een ladder.</p><p>Een huis vraagt een andere manier van wassen dan een flatgebouw. In veel gevallen kunt u het werk uitvoeren op een ladder. Hiermee mag u al beginnen als u zeventien bent. Voor hogere gebouwen gebruikt u een hoogwerker, gevelonderhoudinstallatie of permanente hangladder. Dit mag u pas doen als u achttien bent en bij voorkeur het diploma Vakopleiding Glazenwasser hebt. Er zijn in Nederland ook heel wat gebouwen met ramen waar glazenwassers moeilijk bij kunnen komen. Denk hierbij aan grote en hoge gebouwen. Voor dit specialistische glazenwaswerk heeft u een gericht vakdiploma Glazenwasser in Uitzonderingssituaties nodig. Direct na de cursus Vakopleiding Glazenwasser kunt u al doorstromen naar de Lagere Kaderopleiding Leidinggevende Glazenwassen en Specialistische Reiniging. In het vak van glazenwasser kunt u dus zo 'hoog' komen als u zelf wilt.</p><p>Bent u achttien jaar of ouder, dan kunt u direct als glazenwasser aan de slag. Zeker in het begin werkt u veel samen met collega's die al veel ervaring hebben. Wilt u hogerop? Dan kunt u na de zesdaagse cursus Vakopleiding Glazenwasser al direct gaan werken voor uw diploma professioneel hoogwerker! Hiervoor hoeft u niet de hele dag in de boeken te zitten, want meer dan de helft van de tijd oefent u praktische vaardigheden. Dat doet u in de levensechte praktijkruimte van het opleidingscentrum. U leert er hoe u veilig omgaat met de verschillende klimmaterialen en op welke manier u glas het beste reinigt. Het examen is een praktijkexamen, waarbij u ook enkele mondelinge theorievragen krijgt.</p><h4>Wat moet u doen?</h4><p>Ga eerst op zoek naar een glazenwassersbedrijf waar u aan het werk kunt. Via dit bedrijf meldt u zich aan bij een opleidingscentrum voor het volgen van de opleiding. Wilt u meer weten over de vakopleiding tot glazenwasser? Kijk dan op de website of bel naar het opleidingscentrum.</p><p>Bent u achttien jaar of ouder? En zoekt u een afwisselende baan? Dan bent u de glazenwasser die wij zoeken!</p>", "questionRange": [5, 10]}, {"id": 3, "intro": "Deze tekst is een deel van het Onderwijs- en Examenreglement van de opleiding Horeca van ROC Maasland. Hierin staan allerlei regels waar je je aan moet houden als je op die school zit.", "title": "Onderwijs- en Examenreglement", "body": "<h4>Aanwezigheidslijsten</h4><p>Na elke les moet iedere deelnemer een handtekening zetten op een lijst als bewijs van aanwezigheid tijdens de les. Het is de verantwoordelijkheid van elke deelnemer dat hij of zij tekent voor aanwezigheid. Indien een leerling 20% of meer afwezig is, heeft de deelnemer niet voldaan aan de opleidingseisen. Uiteindelijk kan afwezigheid tot gevolg hebben dat een deelnemer wordt uitgesloten van deelname aan toetsing en examen.</p><h4>Afwezigheid</h4><p>Wanneer je niet in staat bent lessen bij te wonen, dan verwachten we van je dat je 's morgens tussen 8.00 uur en 12.00 uur de helpdesk van de school belt: telefoonnummer 010-2901234. Denk eraan, indien van toepassing, dat je ook de ziekmelding doorgeeft aan het leer- of stagebedrijf.</p><p>Probeer arts- en tandartsbezoeken zoveel mogelijk buiten de lestijden te plannen. Als dit echt niet mogelijk is, moet je contact opnemen met de teamleider.</p><p>Wij gaan ervan uit dat je alle lessen volgt. Wanneer je vaak afwezig bent dan zal de mentor contact met je opnemen. Iedere gemiste les moet worden ingehaald! Lessenverzuim kan gevolgen hebben voor overgang of deelname aan toetsing en examen.</p><p>Geoorloofd en ongeoorloofd verzuim wordt geregistreerd. Bij veelvuldig ongeoorloofd verzuim wordt contact opgenomen met ouders/verzorgers en eventueel met het leerbedrijf.</p><p>Bij verzuim ben je er in eerste instantie zelf verantwoordelijk voor om je achterstand in te halen. Ook kan de docent extra opdrachten geven zoals werkstukken of verslagen maken.</p><h4>Begeleiding bij problemen</h4><p>Iedere deelnemer wordt op school en tijdens de beroepspraktijk in de leerbedrijven begeleid. Zowel op school als op het werk kunnen zich kleine of grotere problemen voordoen. Op de eerste plaats moet je altijd proberen hiervoor zelf een oplossing te vinden.</p><p>Het kan voorkomen dat je er zelf niet meer uitkomt. Dan kun je terecht bij je mentor of je praktijkopleider. Mocht hij/zij je ook niet kunnen helpen dan kan hij/zij je doorverwijzen naar de juiste persoon binnen of buiten de school.</p><p>Op iedere locatie van het ROC Maasland houdt een vertrouwenspersoon spreekuur. Als je het zelf nodig vindt, kun je een afspraak maken: telefoon 010 - 4363580.</p><p>Bij (dreigende) studieachterstand word je doorverwezen naar je teamleider. Samen met jou stippelt de teamleider een weg uit om de achterstand in de studie in te lopen, zodat je aan het einde van het cursusjaar, net als ieder ander, aan het examen kunt deelnemen.</p><h4>Boeken</h4><p>Afhankelijk van je opleiding en het leerjaar, moet je boeken aanschaffen. Deze boeken bestel je via het V.D.O. (zie hiervoor je boekenlijst).</p><p>Enkele leermiddelen worden je uitgereikt op school. De rekening voor deze leermiddelen betaal je via de deelnemersbijdrage.</p><h4>Cursus- en lesgelden</h4><p>Voor de beroepsopleidende leerweg (BOL) is lesgeld verschuldigd. De hoogte van dit bedrag wordt vastgesteld door het ministerie van Onderwijs, Cultuur en Wetenschap. Voor het cursusjaar 2017/2018 is dit € 852,-.</p><p>Voor de beroepsbegeleidende leerweg (BBL) is cursusgeld verschuldigd. Dit ligt zo rond de € 183,- als je 18 jaar of ouder bent voor de niveaus 1 en 2. Als je een opleiding op niveau 3 of niveau 4 volgt, ligt dat bedrag tussen € 427,- en € 445,-.</p><p>Voor de aanvang van het schooljaar dient dit bedrag te worden overgemaakt via de toegezonden acceptgirokaart.</p><h4>Deelnemersbijdrage</h4><p>Om de kosten van kopieën, bestuursbijdrage, boeken, lesbrieven, contributies aan verschillende instanties, verzekeringen en dergelijke te kunnen dekken, wordt een deelnemersbijdrage gevraagd. Hiervoor wordt een acceptgirokaart toegestuurd.</p><h4>Kleding en lesmateriaal</h4><p>Als je geen boeken, papier of pen bij je hebt, kan dat uitsluiting van de lessen tot gevolg hebben. Als je lessen volgt waarbij vakkleding verplicht is en je hebt de kleding niet bij je of de kleding is niet in orde, kun je de les ook niet volgen.</p><h4>Lesbrieven</h4><p>Het onderwijs binnen de afdeling is misschien anders dan je gewend was. We werken met lesbrieven. Deze lesbrieven zijn opgedeeld in tweeën: de A- en de B-lesbrief.</p><p>In een lesbrief wordt een aantal op elkaar afgestemde onderwerpen behandeld. De A-lesbrief is theoretisch van aard en in de B-lesbrief staat het toepassen van de theorie centraal. De A- en B-lesbrief zijn één geheel dat wordt afgesloten met een toets. De onderwerpen uit de lesbrieven worden door middel van praktijkopdrachten uitgewerkt in een praktijk-werkboek.</p><p>Na elke A-lesbrief krijg je een taak uitgereikt die je in de praktijk uitwerkt. De taken zijn nauw verbonden met de theorie. Met andere woorden: wat theoretisch behandeld wordt in een A-lesbrief, voer je uit in de praktijk. Deze taken zijn voor een belangrijk deel hoofdpunt van bespreking op de B-lesdagen. Tevens is dit het controle- en begeleidingsmiddel van de praktijk.</p>", "questionRange": [11, 16]}, {"id": 4, "intro": "Deze tekst beantwoordt vragen over RSI: wat is het, hoe ontstaat het en wie kunnen het krijgen?", "title": "RSI", "body": "<h4>Wat is RSI?</h4><p>RSI is een verzamelnaam voor een groot aantal ziektebeelden van de nek, schouders, armen, polsen, handen en, in uitzonderlijke gevallen, van de benen. Vaak voorkomende RSI-klachten in deze lichaamsdelen zijn pijn, tintelingen, doof gevoel of gevoelloosheid, koude kramp, stijfheid en krachtsverlies. Soms is de pijn moeilijk te lokaliseren. Voor alle RSI-klachten geldt: ze verergeren als ze te lang genegeerd worden en naarmate er minder momenten van rust en herstel zijn.</p><h4>Hoe ontstaat RSI?</h4><p>De volgende factoren dragen bij tot het ontstaan van RSI:</p><ul><li><strong>Aard en duur van het werk:</strong> Langer dan 4 tot 6 uur repeterend werk verrichten zoals typen, knippen en lopende bandwerk.</li><li><strong>Werkdruk:</strong> Weinig of geen tijd voor pauze, psychische druk waardoor een krampachtige houding ontstaat.</li><li><strong>Werkhouding:</strong> Slechte inrichting van de werkplek zoals te lage of juist te hoge stoel, geen armleuningen, beeldscherm op verkeerde hoogte.</li><li><strong>Taken/taakverdeling:</strong> Weinig afwisseling in taken.</li><li><strong>Persoonlijkheid:</strong> Hoog streefniveau, alles op tijd af willen maken, moeilijk taken uit handen kunnen geven.</li><li><strong>Regelmogelijkheden:</strong> Weinig zeggenschap over de taakverdeling, geen mogelijkheid tot indeling van eigen werktijden en pauzes.</li></ul><h4>Drie stadia</h4><p>RSI is een sluipende ziekte die vaak wordt onderverdeeld in drie stadia:</p><ul><li><strong>Stadium 1:</strong> Er zijn alleen wat klachten tijdens of direct na de belastende werkzaamheden. Er zijn bijvoorbeeld wat klachten over geïrriteerde handen tijdens of na het werk. De klachten verdwijnen snel nadat men met het werk stopt. In dit stadium lijken de klachten onschuldig, maar als de belasting blijft bestaan verergeren ze en verdwijnen ze ook niet meer tijdens een rustperiode.</li><li><strong>Stadium 2:</strong> De klachten treden ook buiten het werk op. Men wordt soms 's nachts wakker van de pijn.</li><li><strong>Stadium 3:</strong> Er zijn continu klachten. Handelingen als aan- en uitkleden zijn al pijnlijk en een deur opendoen of sleutel omdraaien gaat bijna niet meer.</li></ul><h4>Wie krijgen RSI?</h4><p>Vaak wordt bij RSI gedacht aan beeldschermwerkers. Bij deze beroepsgroep komen RSI-klachten inderdaad veel voor. Vooral werknemers die langdurig repeterende bewegingen maken, hebben een verhoogde kans op RSI. Dat geldt bijvoorbeeld ook voor kappers, productiemedewerkers en slagers.</p>", "questionRange": [17, 22]}, {"id": 5, "intro": "In dit artikel uit een krant kunt u lezen hoe een kleine supermarkt snel is gegroeid.", "title": "Jan Linders koestert trouwe klant", "body": "<p>Jan Linders is uitgeroepen tot 'Beste Supermarkt van Nederland'. De snelle groei van een supermarkt.</p><p>Door JACQUELINE VAN GINNEKEN</p><p>Een jaar geleden stond Jan Linders nog op een twaalfde plaats van het landelijke halfjaarlijkse klantenonderzoek van vakblad Foodmagazine en marktonderzoeksbureau GfK. En nu ineens is Jan Linders de 'Beste Supermarkt van Nederland'.</p><p>Anderhalf jaar geleden is de snelle groei van de supermarktketen begonnen. In supermarktland woedde een prijzenslag met een goedkope melkactie als klap op de vuurpijl. Leo Linders, de algemeen directeur van het familiebedrijf, zag toen in dat het geen zin heeft om te roepen dat je groter, beter en goedkoper bent.</p><p>&ldquo;Dat deden we wel, en we zijn bovendien al enorm goedkoop. Maar op het moment dat iedereen dat zegt, kun je je niet meer onderscheiden. Er moest meer gebeuren. We hebben toen gezegd: we richten ons niet op de koopjes-jagers maar op de eerste plaats op onze vaste klant die voor 80 procent van onze omzet zorgt. Zij moet elke keer met een tevreden gevoel weggaan&rdquo;, zegt Leo Linders die bewust de zij-vorm gebruikt. Tenslotte is 70 procent van de klanten vrouw, benadrukt hij.</p><p>Maar hoe weet je dat de klant tevreden is? Dat is lastig te meten.</p><p>Leo Linders &mdash; 'ik hou niet van vage verhalen' &mdash; legde daarom zichzelf en zijn ruim 2200 werknemers een nieuwe norm op. Zo is wachten bij de kassa een bron van ergernis. De 43 supermarkten van Jan Linders beloven daarom dat er nooit meer dan drie wachtenden voor u zijn. En komt een klant terug met een product, dan krijgt zij zonder pardon het geld terug. Want, zo luidt het nieuwe adagium, Koning Klant heeft altijd gelijk.</p><p>Elke fles wijn, zegt Leo Linders, kun je bij ons blind kopen. Want als de opengemaakte fles toch niet bevalt, krijgt de klant het geld terug &mdash; mits ze de aankoopbon heeft natuurlijk.</p><p>Jan Linders doet meer om de klant te behagen. Een klacht die niet wordt afgehandeld? Sorry mevrouw, hier heeft u een doosje bonbons. &ldquo;We stellen ons als winkel kwetsbaar op.&rdquo;</p><p>Maar het concern gaat de lat nog hoger leggen. De supermarktketen geeft klanten vanaf begin maart de garantie dat een aanbieding nooit uitverkocht is. Dat zal niet meevallen, realiseert Linders zich. Mocht het onverhoopt wel gebeuren, dan krijgt de klant een tegoedbon met extra korting bovenop de aanbiedingsprijs.</p><p>Het spaarsysteem ging een jaar geleden op de helling, hiermee de mythe doorbrekend dat Nederlanders dol zijn op zegeltjes &mdash; 'dat leverde geen extra waardering op'. De huidige voordeelkaart biedt kans op een prijs, variërend van een auto waarvan er dit jaar vier worden weggegeven tot de wekelijkse verkiezing 'Klant van de week'. De winnaars mogen een jaar lang met korting winkelen. Dat vinden zij veel leuker.</p><p>De 43 winkels, van Lent en Sittard tot Boxmeer en verder in Oost-Brabant, zijn in de afgelopen drie jaar allemaal tegen het licht gehouden, verbouwd en uitgebreid met een groter assortiment maar ook met diensten zoals een kinderspeelparadijsje. In december ging de laatste winkel 'om'.</p><p>Ruime keuze is niet langer een van de sterkste punten van marktleider Albert Heijn. Want juist op het gebied van assortiment scoorde Jan Linders in het klantenonderzoek hoog. Met de lage prijzen scoren ze ook.</p><p>&ldquo;We geven grote kortingen op alledaagse producten. Met carnaval hebben we koude schotel in de aanbieding, met heel veel vlees. Daar ben ik trots op. Maar kortingen gelden ook voor brood en broodjes, kaas en vlees. Op bepaalde aanbiedingen scoren we heel goed. Zo hadden we onlangs een 'drie halen, twee betalen' actie met Warsteiner bier. De brouwerij kon het niet aan, terwijl we het heel lang van tevoren hadden overlegd. Foutje in hun planning. Maar de brouwer was coulant en leverde voor dezelfde prijs de Duitse bierflesjes waar 10 procent meer in zit. Dat zijn wel acties die aanslaan, een krat kost toch gauw 11 euro.&rdquo;</p><p>Linders &mdash; 'wij zijn niet te koop' &mdash; heeft daarnaast uitbreidingsplannen. In maart opent de 44ste winkel in het Brabantse Haaren. De overige 'witte vlekken' heeft hij op zijn netvlies. Nijmegen hoort daar ook bij. Maar het vinden van een geschikte locatie &mdash; goed bereikbaar, voldoende parkeergelegenheid en met de vereiste vierkante meters &mdash; valt niet mee.</p><p>Minimale groei is volgens Linders nodig om de kostenontwikkeling voor te blijven en om een noodzakelijk niveau van professionaliteit te garanderen. &ldquo;Voor automatisering bijvoorbeeld heb ik acht, negen mensen nodig. Dat kan alleen als er genoeg omzetgroei is.&rdquo;</p><p>Elke werknemer bij Jan Linders moet met één ding bezig zijn: een klant die 100 procent tevreden is. &ldquo;Als je niet de grootste bent, moet je zorgen dat je beter bent. Van de tevreden klant moeten wij het hebben.&rdquo;</p><p>Kennelijk met succes. Met hetzelfde aantal winkels haalde Jan Linders vorig jaar een omzetstijging van 13,5 procent. De regionale supermarktketen boekte vorig jaar een omzet van 217 miljoen euro.</p>", "questionRange": [23, 26]}, {"id": 6, "intro": "Deze tekst komt uit een studieboek en gaat over gezond eten.", "title": "Voeding", "body": "<p>Om goed te functioneren heeft je lichaam allerlei stoffen nodig. De zes belangrijkste voedingsstoffen zijn:</p><ul><li>vitaminen</li><li>mineralen</li><li>vezels</li><li>koolhydraten</li><li>vetten</li><li>eiwitten</li></ul><p>Er is geen enkel levensmiddel waarin al deze stoffen tegelijkertijd zitten. Het is daarom belangrijk om gevarieerd te eten, zodat je lichaam de verschillende voedingsstoffen dagelijks binnenkrijgt.</p><h4>De voedingswijzer</h4><p>Met behulp van de voedingswijzer kun je gevarieerd eten. De voedingswijzer is een wijzer die aangeeft welke soorten producten je elke dag moet eten om alle benodigde voedingsstoffen binnen te krijgen en dus gezond te blijven.</p><p>In de voedingswijzer worden vier groepen van levensmiddelen onderscheiden, die samen de voedingswijzer vormen. De vier groepen zijn:</p><ol><li>brood, aardappelen, rijst, macaroni en peulvruchten (koolhydraten)</li><li>groenten en fruit (vitamines)</li><li>melk, kaas, vlees, kip, ei en tahoe (eiwitten)</li><li>margarine, halvarine en olie (vetten)</li></ol><p>Het is belangrijk om elke dag iets te eten uit elk van de vier voedingsgroepen. Als je dit namelijk doet dan eet je gezond en zul je alle benodigde voedingsstoffen binnenkrijgen.</p><p>Uit groep 1 en 2 mag je meer eten dan uit groep 3 en 4. Met de producten uit groep 3 en 4 moet je bewuster omgaan. In deze groepen bevinden zich de producten die vet bevatten. Je hebt vet wel nodig, maar als je te veel vet eet, is dit ongezond. Verder is het gezond om elke dag minstens anderhalve liter vocht te drinken.</p><h4>Vetten</h4><p>Het menselijk lichaam heeft vet nodig, maar te veel vet is slecht voor je gezondheid. Over het algemeen wordt er in Nederland (en in de meeste andere westerse landen) te veel vet gegeten.</p><p>Vetten bevatten vetzuren. Deze vetzuren kun je opdelen in twee groepen: de verzadigde vetzuren en de onverzadigde vetzuren.</p><p>Verzadigde vetzuren zijn vetzuren die het cholesterolgehalte in het bloed verhogen. Als je een hoog cholesterolgehalte hebt dan betekent dit dat je meer kans hebt op hartaandoeningen. Producten die veel verzadigde vetzuren bevatten zijn: boter, spek, rundvlees, varkensvlees, lamsvlees en volle melk.</p><p>Onverzadigde vetzuren zijn vetten die het cholesterolgehalte in het bloed niet verhogen. Onverzadigd vet vind je in vis, kip, margarine en de meeste plantaardige oliën.</p><h4>Suikers</h4><p>In veel levensmiddelen zitten suikers. Deze suikers kunnen aan de levensmiddelen zijn toegevoegd, maar suikers zijn er vaak ook van nature in aanwezig. Zelfs citroenen bevatten suikers.</p><p>Door bacteriën in de mond worden suikers omgezet in een zuur dat het glazuur van tanden en kiezen aantast. Het gaat hierbij niet echt om de hoeveelheid suikers die in de mond en in de rest van het lichaam komt, maar meer om hoe vaak dit gebeurt. Hoe vaker iets wordt gegeten of gedronken, hoe groter de kans is op tandbederf.</p><p>Om tandbederf te voorkomen, wordt daarom aangeraden drie keer per dag te eten en niet vaker dan viermaal een tussendoortje te nemen.</p>", "questionRange": [27, 30]}, {"id": 7, "intro": "Deze tekst komt uit een brochure van Kraamzorg De Waarden.", "title": "Kraamzorg De Waarden", "body": "<p>Locaties in: Schoonhoven, Alphen aan den Rijn, Noordwijk en Oud-Beijerland</p><h4>Kraamverzorgende: een mooi beroep</h4><p>Afwisselend, met mensen werken en bovenal leuk: kraamverzorgende. Kraamverzorgenden zijn professionele hulpverleners die assisteren tijdens een thuisbevalling en die gedurende zeven of acht dagen moeder en baby verzorgen. Tevens treden zij op als gastvrouw, geven ze voorlichting, instructie en begeleiding aan de ouders, zorgen ze voor de overige gezinsleden en houden ze de huishoudelijke werkzaamheden op orde. Als je baby's onweerstaanbaar vindt, er tegen kan om onregelmatig te werken en niet te beroerd bent de handen uit de mouwen te steken, dan is dit de perfecte baan voor jou.</p><h4>Meteen beginnen!?</h4><p>Je kunt direct bij ons aan de slag, indien:</p><ul><li>je in het bezit bent van het diploma Kraamverzorgende of Verzorgende, niveau 2 (mbo)</li><li>je in het bezit bent van een scooter, brommer of auto</li><li>je als kind de noodzakelijke inentingen hebt gehad (polio verplicht)</li><li>je bereid bent om je deskundigheid op peil te houden of op peil te brengen</li></ul><h4>Opleidingen</h4><p>Als je nog niet aan de eerder genoemde voorwaarden voldoet, maar je bent wel ruim 17 jaar en je hebt minimaal vmbo, dan kun je solliciteren naar een opleidingsplaats voor de beroepsbegeleidende leerweg (bbl) van de opleiding Verzorgende niveau 3. Dit is een werken-leren-route. De eerste maanden ga je naar school (leerovereenkomst) en krijg je zakgeld. Na deze periode begint de beroepspraktijkvorming, wat inhoudt dat je onder begeleiding van praktijkbegeleidsters in de praktijk ervaring op gaat doen. Vanaf dat moment krijg je ook een salaris conform de cao.</p><p>Na drie jaar kun je bij voldoende resultaat (theorie en praktijk) het brede diploma voor verzorgende in ontvangst nemen en is in principe elk percentage dienstverband mogelijk.</p><h4>Wat biedt De Waarden?</h4><p>Iedere nieuwe medewerker kan rekenen op een goede inwerkperiode en daarna op bijscholing en inhoudelijke ondersteuning. Bovendien vinden wij een goede werksfeer heel erg belangrijk. Jaarlijks worden diverse thema-avonden gehouden waar onderwerpen aan bod komen die door kraamverzorgenden zijn aangedragen. Ook houden de kraamverzorgenden regelmatig werkoverleg waarin ze ervaringen met elkaar kunnen uitwisselen. Heb je al wat langer praktijkervaring, dan kun je de cursus praktijkbegeleiding volgen, zodat je leert om kennis over te dragen aan stagiaires. Ieder jaar kunnen de kraamverzorgenden op kosten van de werkgever congressen en symposia bijwonen.</p><p>Voor alle medewerkers geldt de cao-thuiszorg. Aanvullend hierop heeft de organisatie een goede reiskostenvergoeding, krijgen de medewerkers bedrijfskleding en worden ze uitgerust met een mobiele telefoon.</p><h4>Wat is Kraamzorg De Waarden?</h4><p>Kraamzorg De Waarden is een vertrouwd kraamzorgadres met locaties in Schoonhoven, Alphen aan den Rijn, Noordwijk en Oud-Beijerland. Per jaar verlenen onze kraamverzorgenden zorg in 10.000 gezinnen.</p><h4>Geïnteresseerd?</h4><p>Bel dan naar Kraamzorg De Waarden, telefoon (0182) 32 55 55, en vraag naar de afdeling Praktijkopleiding. Schrijven of e-mailen mag natuurlijk ook: Postbus 538, 2870 AH Schoonhoven of waarden@kraamzorg.org.</p>", "questionRange": [31, 35]}, {"id": 8, "intro": "Deze tekst komt uit een folder over auto's die in het water terechtkomen.", "title": "Hulp bij auto te water", "body": "<p>Nederland is een waterrijk land. Het gebeurt dan ook zo'n 750 à 800 keer per jaar dat er een auto in het water terechtkomt. Dit heeft in de meeste gevallen alleen materiële schade als gevolg. Toch is er vaak ook persoonlijk letsel, in het ergste geval zelfs met dodelijke afloop. Een angstaanjagende gedachte, zeker ook omdat mensen vaak niet precies weten hoe ze moeten handelen. In deze folder leggen we u uit hoe u uit een auto te water kunt ontsnappen.</p><p>Het belangrijkste is dat u zo snel mogelijk de auto verlaat. Een auto blijft altijd enkele minuten drijven. Daardoor heeft u voldoende tijd om de auto te verlaten volgens een stappenplan. Bij Bovag-autobedrijven kunt u een sticker halen die u op de zijruit van uw auto kunt plakken, zodat u altijd weet welke stappen u moet doorlopen.</p><h4>Stap 1: Verlichting aan</h4><p>Doe alle lichten aan, ook de binnenverlichting. Zo blijft de auto zichtbaar. Bovendien kunt u zich dan oriënteren. Schakel het contact niet uit. Mogelijk schakelt dat de verlichting uit, werken de elektrische ramen niet meer en is de kans groot dat u per ongeluk de deuren op slot doet. Het is mogelijk dat ramen en deuren door kortsluiting niet meer zijn te openen. Het is dus van groot belang de auto zo snel mogelijk te verlaten!</p><h4>Elektronica</h4><p>Veel auto's zijn tegenwoordig uitgerust met elektronica waarmee ramen en portieren worden bediend. Hoewel water en elektronica geen goede combinatie zijn, zal er bij kortsluiting geen brand uitbreken.</p><h4>Stap 2: Gordels los</h4><p>Maak meteen de autogordels los. Als dat niet lukt, snijdt u de gordel door met het autogordelmes. Dit mes is onderdeel van de veiligheidshamer. Zorg er dus voor dat u de veiligheidshamer binnen handbereik heeft!</p><h4>Passagiers</h4><p>Doe de autogordel volledig af en help passagiers uit hun gordels. Heeft u kinderen in kinderzitjes, dan haalt u ze daar uit. Het beste is dat er achterin ook een veiligheidshamer aanwezig is.</p><h4>Stap 3: Open het zijraam</h4><p>Open het zijraam van de auto. Dat kan via de raambediening. Als dat niet lukt, moet u het raam verbrijzelen met de veiligheidshamer of met een ander zwaar object. Het zijraam zit stevig in het portier, dus wees niet bang om hard te slaan.</p><h4>Stap 4: Verlaat de auto</h4><p>Ontsnappen door een raam gebeurt bij voorkeur met uw gezicht naar het dak van de auto. Bied waar nodig hulp aan andere inzittenden. Breng kleine kinderen desnoods in veiligheid door ze op het dak van de auto te zetten. Verlaat de auto altijd zo snel mogelijk!</p>", "questionRange": [36, 41]}], "questions": [{"n": 1, "textId": 1, "prompt": "Welk afval veroorzaakt in Nederland de hoogste opruimkosten, volgens de tekst?", "options": {"A": "het afval in de natuur", "B": "het afval langs snelwegen", "C": "het afval op straten en pleinen"}, "answer": "C"}, {"n": 2, "textId": 1, "prompt": "Welk zwerfafval wordt het snelst door de natuur afgebroken?", "options": {"A": "bananenschil", "B": "kauwgom", "C": "papier", "D": "sigarettenpeuk"}, "answer": "C"}, {"n": 3, "textId": 1, "prompt": "De afbreektijd van een weggegooid metalen blikje kan variëren van 1,5 jaar tot 50 jaar. Waarvan hangt dit verschil in afbreektijd af?", "options": {"A": "van de grootte van het blikje", "B": "van de plaats waar het blikje ligt", "C": "van het weer tijdens de afbreektijd"}, "answer": "C"}, {"n": 4, "textId": 1, "prompt": "Een frisdrankfabrikant wil alleen nog maar frisdrank produceren in een verpakking met de kortste afbreektijd. In welk materiaal moet hij zijn frisdrank verpakken?", "options": {"A": "in aluminium blikjes", "B": "in glazen flessen", "C": "in pet-flessen"}, "answer": "C"}, {"n": 5, "textId": 2, "prompt": "Volgens de tekst is glazen wassen veel meer dan een emmertje sop, een spons en een ladder. Wat wordt hiermee bedoeld?", "options": {"A": "Een glazenwasser loopt grote veiligheidsrisico's.", "B": "Een glazenwasser moet over veel kennis en vaardigheid beschikken.", "C": "Een glazenwasser moet veel technisch inzicht hebben."}, "answer": "B"}, {"n": 6, "textId": 2, "prompt": "Wanneer mag een glazenwasser op een hoogwerker, gevelonderhoudsinstallatie of permanente hoogladder werken?", "options": {"A": "Hij moet één jaar op een ladder hebben gewerkt.", "B": "Hij moet het diploma Glazenwasser in Uitzonderingssituaties hebben.", "C": "Hij moet minstens 18 jaar zijn.", "D": "Hij moet veel ervaring hebben."}, "answer": "C"}, {"n": 7, "textId": 2, "prompt": "Wat wordt in de tekst geschreven over de opleidingen tot glazenwasser?", "options": {"A": "De opleidingen tot glazenwasser zijn meer praktisch dan theoretisch.", "B": "De opleidingen tot glazenwasser zijn meer schriftelijk dan mondeling.", "C": "Voor een diploma glazenwasser hoef je in je opleiding niet veel te leren."}, "answer": "A"}, {"n": 8, "textId": 2, "prompt": "Waar oefent een glazenwasser zijn praktische vaardigheden als hij de opleiding tot professioneel hoogwerker volgt?", "options": {"A": "in een speciaal ingerichte ruimte op school", "B": "op een werkplek in de praktijk", "C": "op verschillende locaties tijdens het werk"}, "answer": "A"}, {"n": 9, "textId": 2, "prompt": "Wat moet iemand van 18 jaar of ouder eerst doen als hij glazenwasser wil worden?", "options": {"A": "een glazenwassersbedrijf zoeken waar hij kan gaan werken", "B": "het diploma behalen van de zesdaagse cursus Vakopleiding Glazenwasser", "C": "zich aanmelden voor een opleiding tot glazenwasser"}, "answer": "A"}, {"n": 10, "textId": 2, "prompt": "Wat is het belangrijkste doel van de tekst?", "options": {"A": "duidelijk maken dat ramen wassen een echt vak is", "B": "informatie geven over het beroep van glazenwasser", "C": "mensen interesseren voor het beroep van glazenwasser", "D": "reclame maken voor glazenwassers"}, "answer": "C"}, {"n": 11, "textId": 3, "prompt": "Wie moet ervoor zorgen dat de aanwezigheidslijst getekend wordt?", "options": {"A": "de administratie", "B": "de deelnemer", "C": "de docent"}, "answer": "B"}, {"n": 12, "textId": 3, "prompt": "Meryam loopt stage en volgt nog een aantal lessen op school. Ze wordt ziek en moet een paar dagen thuis blijven. Bij wie moet ze dit melden?", "options": {"A": "alleen bij de helpdesk van de school", "B": "alleen bij haar stagebedrijf", "C": "bij de helpdesk van de school en bij het stagebedrijf"}, "answer": "C"}, {"n": 13, "textId": 3, "prompt": "Wat kan er gebeuren als je te vaak afwezig bent?", "options": {"A": "Je mag niet meedoen aan een toets of examen.", "B": "Je mag niet meer aan de lessen meedoen.", "C": "Je moet stoppen met de opleiding."}, "answer": "A"}, {"n": 14, "textId": 3, "prompt": "Luiz heeft problemen op school: hij kan niet goed samenwerken met andere cursisten. Wie is volgens de tekst in de eerste plaats verantwoordelijk voor het vinden van een oplossing?", "options": {"A": "de vertrouwenspersoon", "B": "Luiz zelf", "C": "zijn mentor", "D": "zijn teamleider"}, "answer": "B"}, {"n": 15, "textId": 3, "prompt": "Bella heeft een studieachterstand. Naar wie wordt ze doorverwezen volgens de tekst?", "options": {"A": "naar de vertrouwenspersoon", "B": "naar haar mentor", "C": "naar haar praktijkbegeleider", "D": "naar haar teamleider"}, "answer": "D"}, {"n": 16, "textId": 3, "prompt": "Alessandra volgt een les waarbij vakkleding verplicht is, maar ze is haar jasje vergeten. Wat kan er gebeuren, volgens het reglement?", "options": {"A": "Ze mag de les volgen, maar ze moet de volgende les wel haar vakkleding aanhebben.", "B": "Ze mag de les volgen, maar ze moet een extra opdracht maken.", "C": "Ze mag de les niet volgen en er wordt contact opgenomen met haar ouders.", "D": "Ze mag de les niet volgen en moet de les later in haar eigen tijd inhalen."}, "answer": "D"}, {"n": 17, "textId": 4, "prompt": "Wat zegt de tekst over RSI-klachten?", "options": {"A": "RSI-klachten kun je nooit precies aanwijzen.", "B": "RSI-klachten kun je overal in je lichaam krijgen.", "C": "RSI-klachten worden erger als je er niets tegen doet."}, "answer": "C"}, {"n": 18, "textId": 4, "prompt": "Wanneer loop je het grootste risico om RSI te krijgen?", "options": {"A": "als je altijd klaagt maar niets doet om je problemen op te lossen", "B": "als je dagelijks meer dan vier tot zes uur zwaar werk doet", "C": "als je elke dag urenlang naar een tv- of computerscherm kijkt", "D": "als je over een lange periode eenzelfde beweging blijft herhalen"}, "answer": "D"}, {"n": 19, "textId": 4, "prompt": "In welk stadium ben je als je zowel tijdens je werk als uren later soms RSI-klachten hebt?", "options": {"A": "in stadium 1", "B": "in stadium 2", "C": "in stadium 3"}, "answer": "B"}, {"n": 20, "textId": 4, "prompt": "Wat zegt de tekst over het genezen van RSI?", "options": {"A": "De tekst zegt helemaal niets over het genezen van RSI.", "B": "Je geneest vanzelf van RSI, als je maar voldoende rust neemt.", "C": "Je kunt niet genezen van RSI, je wordt er steeds zieker van."}, "answer": "A"}, {"n": 21, "textId": 4, "prompt": "De tekst beschrijft niet echt wat je moet doen om RSI te voorkomen. Toch kun je hierover met behulp van de tekst veel te weten komen. Waar in de tekst kun je hierover de meeste informatie vinden?", "options": {"A": "onder het kopje 'Wat is RSI?'", "B": "onder het kopje 'Hoe ontstaat RSI?'", "C": "onder het kopje 'Drie stadia'", "D": "onder het kopje 'Wie krijgen RSI?'"}, "answer": "B"}, {"n": 22, "textId": 4, "prompt": "Wat is het belangrijkste doel van deze tekst?", "options": {"A": "advies geven aan RSI-patiënten", "B": "informatie geven over de kenmerken van RSI", "C": "waarschuwen voor de gevolgen van RSI"}, "answer": "B"}, {"n": 23, "textId": 5, "prompt": "Waardoor is supermarkt Jan Linders gaan groeien?", "options": {"A": "door alle prijzen te verlagen", "B": "door melk goedkoop te verkopen", "C": "door vaste klanten tevreden te maken", "D": "door vuurwerk te verkopen"}, "answer": "C"}, {"n": 24, "textId": 5, "prompt": "Waarom heeft het volgens Linders geen zin om als supermarkt te roepen dat je groter, beter en goedkoper bent?", "options": {"A": "omdat alle supermarkten dat doen", "B": "omdat dat voor je klanten niet belangrijk is", "C": "omdat je daarmee geen tevreden klanten krijgt"}, "answer": "A"}, {"n": 25, "textId": 5, "prompt": "Pieter koopt een fles Spaanse witte wijn bij Jan Linders. 's Avonds drinkt hij een glas van deze wijn. Hij vindt de wijn niet lekker. De volgende dag gaat hij terug naar de supermarkt. Wat doet de supermarkt?", "options": {"A": "Zij geeft Pieter een andere fles wijn als hij de aankoopbon bij zich heeft.", "B": "Zij geeft Pieter het geld terug als de wijn niet goed meer is.", "C": "Zij geeft Pieter het geld terug als hij de aankoopbon bij zich heeft."}, "answer": "C"}, {"n": 26, "textId": 5, "prompt": "Op 15 maart leest Linda dat Jan Linders deze week 10 procent korting geeft op alle verse groenten en fruit. Linda gaat tomaten kopen, maar er zijn geen tomaten meer. Wat krijgt Linda van de supermarkt?", "options": {"A": "een bon waarmee ze de tomaten later nóg goedkoper kan kopen", "B": "een gratis doosje bonbons", "C": "een voordeelkaart waarmee ze een auto kan winnen", "D": "zegeltjes waarmee ze kan sparen"}, "answer": "A"}, {"n": 27, "textId": 6, "prompt": "Als je volgens de voedingswijzer eet, wat is dan het gevolg?", "options": {"A": "dat je alleen gezonde producten eet", "B": "dat je de juiste voedingsstoffen eet", "C": "dat je niet te veel of te weinig eet", "D": "dat je voeding zonder suikers en verzadigde vetzuren eet"}, "answer": "B"}, {"n": 28, "textId": 6, "prompt": "Twee voedingsstoffen worden niet genoemd in de voedingswijzer. Welke voedingsstoffen zijn dat?", "options": {"A": "eiwitten en vitamines", "B": "koolhydraten en vetten", "C": "mineralen en vezels"}, "answer": "C"}, {"n": 29, "textId": 6, "prompt": "Het eten van citroenen kan het glazuur van tanden en kiezen aantasten. Wat hebben bacteriën hiermee te maken?", "options": {"A": "Bacteriën veranderen de suikers van de citroen in zuur.", "B": "Bacteriën veranderen het zuur van de citroen in suikers.", "C": "Bacteriën voegen suikers toe aan het zuur van de citroen.", "D": "Bacteriën voegen zuur toe aan de suikers van de citroen."}, "answer": "A"}, {"n": 30, "textId": 6, "prompt": "Welk advies maakt de kans op tandbederf kleiner?", "options": {"A": "Eet minder.", "B": "Eet minder vaak.", "C": "Eet minder vet.", "D": "Eet minder zuur."}, "answer": "B"}, {"n": 31, "textId": 7, "prompt": "Cindy wil graag werken als kraamverzorgster bij Kraamzorg De Waarden. Ze wil aan de werken-leren-route beginnen. Welk diploma heeft zij hiervoor nodig?", "options": {"A": "een diploma Kraamverzorgende of Verzorgende niveau 2", "B": "een vmbo-diploma", "C": "Hiervoor is geen diploma vereist."}, "answer": "B"}, {"n": 32, "textId": 7, "prompt": "Cindy wil weten hoe Kraamzorg De Waarden omgaat met nieuwe medewerkers. Wat kan ze hierover in de tekst lezen?", "options": {"A": "Voor nieuwe medewerkers is er inwerktijd, bijscholing en inhoudelijke ondersteuning.", "B": "Voor nieuwe medewerkers is er overleg waarin ze met elkaar hun werk bespreken.", "C": "Voor nieuwe medewerkers zijn er avonden waarvoor ze zelf thema's kunnen kiezen."}, "answer": "A"}, {"n": 33, "textId": 7, "prompt": "Cindy wil weten vanaf wanneer ze de cursus praktijkbegeleiding kan volgen. Vanaf wanneer kan dat?", "options": {"A": "zodra ze aan de werken-leren-route begint", "B": "vanaf het moment dat ze stage gaat lopen", "C": "pas als ze voldoende werkervaring heeft"}, "answer": "C"}, {"n": 34, "textId": 7, "prompt": "Cindy wil in Alphen aan den Rijn werken. Naar welke locatie moet zij schrijven voor meer informatie?", "options": {"A": "naar locatie Alphen aan den Rijn", "B": "naar locatie Schoonhoven", "C": "Dat maakt niet uit, ze kan schrijven naar één van de vier locaties."}, "answer": "B"}, {"n": 35, "textId": 7, "prompt": "Voor wie is deze tekst in de eerste plaats geschreven?", "options": {"A": "voor lezers die misschien bij Kraamzorg De Waarden willen werken", "B": "voor lezers die misschien een opleiding in de zorg willen volgen", "C": "voor lezers die willen weten wat een kraamverzorgende doet"}, "answer": "A"}, {"n": 36, "textId": 8, "prompt": "Misschien vergeet u de info in de folder snel. Wat kunt u daartegen doen, volgens de tekst?", "options": {"A": "deze folder op een zichtbare plek in de auto leggen", "B": "een sticker met instructies op de zijruit plakken", "C": "zelf een stappenplan maken met de informatie in de folder"}, "answer": "B"}, {"n": 37, "textId": 8, "prompt": "Wat is de eerste stap als u met de auto het water inrijdt?", "options": {"A": "de lichten aandoen en het contact aanlaten", "B": "de lichten aandoen en het contact uitschakelen", "C": "de lichten uitdoen en het contact aanlaten", "D": "de lichten uitdoen en het contact uitschakelen"}, "answer": "A"}, {"n": 38, "textId": 8, "prompt": "Hoe moet u kinderen helpen als u met de auto het water inrijdt?", "options": {"A": "eerst het raam opendoen en daarna de kinderen losmaken", "B": "eerst uit de auto komen en daarna de kinderen losmaken", "C": "eerst uw eigen gordel losmaken en daarna die van de kinderen"}, "answer": "C"}, {"n": 39, "textId": 8, "prompt": "Wat moet u doen als u het raam wilt openen en de bediening werkt niet?", "options": {"A": "het contact uitschakelen", "B": "het portier openduwen", "C": "het raam kapot slaan"}, "answer": "C"}, {"n": 40, "textId": 8, "prompt": "Wat is het allerbelangrijkst om te doen als u met uw auto in het water bent gekomen?", "options": {"A": "de auto zo snel mogelijk uitkomen", "B": "de elektrische bediening uitschakelen", "C": "een zijraam kapot slaan", "D": "ervoor zorgen dat anderen de auto kunnen blijven zien"}, "answer": "A"}, {"n": 41, "textId": 8, "prompt": "Waarom is deze folder geschreven?", "options": {"A": "om te informeren wat te doen als een auto te water raakt", "B": "om te wijzen op de gevaren als een auto te water raakt", "C": "om zoveel mogelijk te voorkomen dat een auto te water raakt"}, "answer": "A"}]}, {"id": "2020", "year": 2020, "title": "B1 Lezen 2020 — Openbaar examen", "timeLimitMin": 110, "passMark": 24, "totalQuestions": 36, "texts": [{"id": 1, "intro": "Dit artikel beschrijft enkele resultaten uit een onderzoek naar wat mensen in Nederland eten op hun werk.", "title": "Eten op uw werk", "body": "<p>Wat is de overeenkomst tussen een uitsmijter, een broodje kroket, soep, een saucijzenbroodje en een huzarensalade? Samen vormen ze de top 5 van meest gekochte voedingsmiddelen in Nederlandse bedrijfskantines. Dit blijkt uit onderzoek naar eetgewoonten in Nederland tijdens het werk. Lekker? Zeker. Gezond? Meestal niet.</p><p>In Nederland geeft bijna een kwart van de werknemers (24 procent) aan dat er geen gezonde voeding wordt aangeboden in de bedrijfskantine. Het eten dat we er kopen is vaak te vet en te eenzijdig. Het lunchaanbod bestaat uit allerlei soorten wit brood, zoute soep en veel voedingsproducten met kaas en vlees. Ofwel: eten met te weinig vezels, te veel zout en te veel verzadigd vet. Fruit en groenten zijn een zeldzaamheid in een kantine. En ook yoghurt en muesli zullen we er niet snel vinden.</p><p>Ook de andere eetmomenten op het werk bestaan vaak uit snacks. In de automaten met tussendoortjes vinden we voornamelijk chips, koek en snoep. De frisdrankautomaten bevatten bijna alleen blikjes cola en sinas. En traktaties bestaan standaard uit gebak, cake en koek.</p><h4>Heel lekker, maar….</h4><p>Allemaal lekker. Maar voor mensen die kampen met overgewicht (40 procent van de Nederlanders) is dit aanbod op het werk een serieuze bedreiging. Zeker voor degenen die vijf dagen per week in een kantine eten. Of zelfs meerdere keren op een dag.</p><p>Het gevolg op heel korte termijn is een slechte concentratie op het werk. Vette producten en etenswaren met snelle suikers (witbrood) blijken te zorgen voor een lagere concentratie en het fenomeen dat we ‘inzakken’, slaperig worden of een dip krijgen.</p><p>De gevolgen van overgewicht op de lange termijn zijn uiteraard ook groot. Wie te dik is, heeft een verhoogde kans op hart- en vaatziekten, diabetes, sommige vormen van kanker, artrose en psychische klachten.</p><h4>Werkgever moet in actie komen</h4><p>Werknemers zeggen dat ze gezonder eten op het werk zeker zouden waarderen. Van hen vindt 82 procent het stimuleren van gezonde voeding vooral een taak van de werkgever. Toch worden de ‘ongezonde snacks’ stiekem best gemist als deze uit de bedrijfskantine zouden verdwijnen. Met name de kroket zou worden gemist door 25 procent van de ondervraagden, gevolgd door patat (11 procent) en de frikadel (9 procent).</p>", "questionRange": [1, 5]}, {"id": 2, "intro": "In deze tekst staan regels voor het gebruik van computers bij een ROC.", "title": "Gebruik van schoolcomputers: huis- en gedragsregels", "body": "<p>Je kunt gebruikmaken van de computer- en netwerkfaciliteiten van het ROC. Wel gelden er uiteraard enkele regels.</p><h4>In- en uitloggen</h4><p>Op elke afdeling zijn alle computers met elkaar verbonden via een draadloos netwerk. Met je persoonlijke laptop kun je op bepaalde plaatsen toegang krijgen tot dit netwerk. In alle gevallen moet je je aanmelden met een eigen gebruikersnaam en wachtwoord. Elke leerling krijgt zo’n gebruikersnaam en wachtwoord.</p><ul><li>Je gebruikersnaam en het bijbehorende wachtwoord zijn strikt persoonlijk. Je mag die op geen enkele manier aan anderen bekendmaken.</li><li>Het is verboden om je gebruikersnaam te gebruiken voor:<ul><li>aanmelding als je je gebruikersnaam onrechtmatig hebt verkregen;</li><li>installatie van software en verspreiding van virussen;</li><li>verkrijging van toegang tot computersystemen of delen ervan;</li><li>uitvoering van commerciële activiteiten.</li></ul></li><li>Als je klaar bent met werken aan de computer, meld je dan af van het netwerk. Vergeet dit niet, want anders kunnen anderen bij je persoonlijke gegevens op de server.</li></ul><h4>Persoonlijke map</h4><p>Met de inloggegevens heb je toegang tot een eigen map op de server (de home directory). Deze map is persoonlijk: anderen hebben geen toegang tot jouw map, met uitzondering van ICT-medewerkers. Zij moeten wel de privacyregels respecteren. In jouw map kun je oefeningen en opdrachten opslaan. De opslagruimte is beperkt. Gegevens die je op een andere plaats dan in je persoonlijke map bewaart, kunnen zonder meer worden verwijderd. Dat geldt ook voor documenten die je op het bureaublad van de computer plaatst.</p><h4>Computergebruik</h4><p>De computers zijn in de eerste plaats bedoeld voor onderwijsactiviteiten. Hiertoe behoren:</p><ul><li>oefenen van leerstof en voorbereiden van scripties, stages en opdrachten;</li><li>raadplegen van educatief verantwoorde websites;</li><li>gebruiken van je e-mailadres van school voor het lezen en versturen van e-mails;</li><li>gebruiken van de elektronische leeromgeving TOLEDO;</li><li>gebruiken van de online bibliotheekcatalogus.</li></ul><p>ICT-medewerkers mogen bepaalde websites blokkeren. Educatief gebruik heeft voorrang op persoonlijk gebruik. Computergebruik mag geen beschadiging of verstoring van hardware of software opleveren. Als gebruiker ga je ermee akkoord dat de ICT-medewerkers netwerkverkeer, e-mailverkeer en persoonlijke mappen controleren en dat ze bij vermoedens van misbruik een onderzoek instellen.</p><h4>Gedrag in computerruimtes</h4><ul><li>Je mag niet eten, drinken of roken in de computerruimtes.</li><li>Je mag andere gebruikers niet storen door hard te praten, muziek te luisteren of ander storend gedrag te vertonen.</li><li>Je bent verplicht om de apparatuur met zorg te behandelen.</li><li>Je bent verplicht om de regels van Netiquette te volgen bij het elektronisch communiceren.</li><li>Je bent verplicht om technische storingen (defecte computers en printers) te melden. Je kunt anders verantwoordelijk worden gesteld voor de storing.</li><li>Je mag het label met het inventarisnummer van een apparaat niet verwijderen.</li><li>Je ruimt bij het verlaten van het lokaal persoonlijk materiaal (papier, gegevensdragers, schrijfgerei…) op en je laat de werkplek netjes achter.</li></ul><h4>Maatregelen</h4><p>Houd je je niet aan bovenstaande regels of maak je op een andere manier misbruik van de computerfaciliteiten, dan kan het afdelingshoofd je voor maximaal dertig dagen het gebruik van de computerfaciliteiten weigeren. Bij herhaald misbruik kan het afdelingshoofd je definitief de toegang tot de computerfaciliteiten weigeren.</p>", "questionRange": [6, 11]}, {"id": 3, "intro": "Deze tekst informeert de lezer over enkele beroepsopleidingen bij opleidingscentrum Helicon. De tekst staat op de website van Helicon Opleidingen.", "title": "Wat is Helicon Opleidingen?", "body": "<p>Helicon Opleidingen is een opleidingscentrum voor onder andere Techniek, mechanisatie en loonwerk, Voeding en Bloemschikken en tuincentrum. Deze opleidingen bieden wij aan op verschillende scholen in Gelderland en Noord-Brabant. Bij veel opleidingen is er een bol- (beroepsondersteunende leerweg) en een bbl-variant (beroepsbegeleidende leerweg). Als je liever in de praktijk wilt leren, kun je kiezen voor de bbl-variant, waarbij je werken combineert met leren.</p><p>Hieronder vind je beschrijvingen van opleidingen in de richting Techniek, mechanisatie en loonwerk, Voeding en Bloemschikken en tuincentrum. De beschrijvingen geven je een idee van de opleidingen en het werk dat je na de opleiding kunt doen.</p><h4>Techniek, mechanisatie en loonwerk</h4><p>De Nederlandse land- en tuinbouw staat in de hele wereld bekend als modern en succesvol. Dit komt onder andere door de ontwikkeling en toepassing van moderne technieken en apparatuur. De agrarische ondernemer koopt die techniek en apparatuur steeds vaker in bij gespecialiseerde bedrijven. Daardoor is er bij de ruim tweeduizend loonwerkbedrijven en bij bedrijven op gebied van verkoop en onderhoud van landbouwwerktuigen een groeiende behoefte aan goed geschoolde medewerkers op mbo-niveau die alles weten van landbouwtechniek.</p><p>Wil je een technische opleiding waarin landbouw centraal staat? Kies dan voor de opleiding mechanisatie en landbouwtechniek. Na de opleiding kun je gaan werken bij loonwerkbedrijven en bedrijven die landbouwwerktuigen, motoren en installaties verhuren, repareren en onderhouden.</p><p>Op onze locaties MBO Boxtel en MBO Apeldoorn kun je ook de opleiding volgen tot monteur-chauffeur. Een boeiende opleiding voor mensen die houden van techniek en sleutelen aan grote machines. De opleiding op MBO Boxtel richt zich op het agrarisch loonwerk, terwijl de opleiding op MBO Apeldoorn zich richt op loonwerk in het grote groen (bosbouw) en de grote cultuurtechniek.</p><table><tr><th>Opleiding</th><th>MBO Apeldoorn</th><th>MBO Boxtel</th></tr><tr><td>medewerker gemechaniseerd loonwerk (niveau II)</td><td>—</td><td>bol</td></tr><tr><td>medewerker gemechaniseerd loonwerk (niveau III)</td><td>—</td><td>bol &nbsp; bbl</td></tr><tr><td>monteur-chauffeur loonwerk (niveau III)</td><td>bol</td><td>bol &nbsp; bbl</td></tr><tr><td>middenkaderfunctionaris landbouwtechniek (niveau IV)</td><td>—</td><td>bol</td></tr></table><h4>Voeding</h4><p>We kunnen niet zonder eten en drinken. Geen dag! En dat eten en drinken kunnen we tegenwoordig in een bijna onbeperkte variatie voor een redelijke prijs kopen. Dat is mogelijk dankzij een heleboel mensen die werkzaam zijn in onze belangrijke voedingsmiddelenindustrie. En die op moderne wijze en met veel zorg voor kwaliteit met voeding bezig zijn.</p><p>Wil je een opleiding waarin je bijvoorbeeld drop, chips, frisdrank of bier maakt en waarin techniek, kwaliteit en het milieu voorop staan? Dan kies je voor één van de opleidingen Voeding bij MBO Boxtel of Groenschool ’s-Hertogenbosch.</p><p>Deze opleiding besteedt volop aandacht aan productie, kwaliteitscontrole, productontwikkeling en handel. Na deze uitdagende opleiding kun je werken als productiemedewerker, laborant, keurmeester of medewerker proeffabriek.</p><table><tr><th>Opleiding</th><th>MBO Boxtel</th><th>Groenschool ’s-Hertogenbosch</th></tr><tr><td>assistent medewerker levensmiddelentechnoloog (niveau I)</td><td>—</td><td>bbl</td></tr><tr><td>medewerker levensmiddelentechnoloog (niveau II)</td><td>bol &nbsp; bbl</td><td>—</td></tr><tr><td>vakbekwaam medewerker levensmiddelentechnoloog (niveau III)</td><td>bol &nbsp; bbl</td><td>—</td></tr><tr><td>middenkaderfunctionaris levensmiddelentechnoloog (niveau IV)</td><td>bol &nbsp; bbl</td><td>—</td></tr></table><h4>Bloemschikken en tuincentrum</h4><p>Bloemen en planten koop je meestal om ze met liefde aan een ander te geven. Wie een bos bloemen, een bloemstuk of een plant koopt, wil iets moois hebben: verse bloemen of planten van hoge kwaliteit. En dat fraai verpakt en mooi gepresenteerd. Een echte bloemist biedt klanten prima service, goede voorlichting en duidelijk advies.</p><p>Wil je een creatieve opleiding waarin producten, trends en klanten centraal staan? Kies dan voor de opleiding ‘bloemschikken’ of ‘tuincentrum’ bij MBO Nijmegen of Tuinbouwvakschool (TVS) Vught. Je wordt niet alleen opgeleid tot bloemist, maar je kunt ook keurmeester bij een veiling, inkoper, verkoper of vertegenwoordiger worden.</p><p>Belangrijk is ook dat je het ondernemersdiploma Algemene Ondernemersvaardigheden (AOV) kunt halen waarmee je zelf een winkel of tuincentrum kunt beginnen of overnemen.</p><table><tr><th>Opleiding</th><th>MBO Nijmegen</th><th>TVS Vught</th></tr><tr><td>medewerker bloemen- en tuincentrumbranche (niveau II)</td><td>bol &nbsp; bbl</td><td>bol &nbsp; bbl</td></tr><tr><td>vakbekwaam medewerker bloemen- en tuincentrumbranche (niveau III)</td><td>bol &nbsp; bbl</td><td>bol &nbsp; bbl</td></tr><tr><td>middenkaderfunctionaris bloemen- en tuincentrumbranche (niveau IV)</td><td>bol</td><td>bol &nbsp; bbl</td></tr><tr><td>arrangeur/decorateur bloemen- en tuincentrumbranche* (niveau IV)</td><td>bol</td><td>bol &nbsp; bbl</td></tr></table><p>*Heb je een havo-diploma, dan kun je de opleiding arrangeur-decorateur (atelier-opleiding) in drie jaar doen. Op beide scholen kun je meer informatie krijgen over deze nieuwe opleiding.</p>", "questionRange": [12, 15]}, {"id": 4, "intro": "In deze tekst uit een brochure staan regels voor uitzendkrachten die via een uitzendbureau bij een bedrijf gaan werken.", "title": "Regels voor uitzendkrachten", "body": "<h4>Uiterlijke verzorging</h4><p>Zorg dat je er verzorgd uitziet als je voor ons bij een bedrijf gaat werken. Immers, hoe beter de indruk die je achterlaat bij het bedrijf, hoe groter de kans dat je vaker bij dit bedrijf kunt werken. Voor sommige functies worden speciale eisen gesteld aan je uiterlijke verzorging. Dit kan bijvoorbeeld het dragen van een net (mantel)pak zijn. Als je gaat werken en je voldoet niet aan deze eisen, dan kan de opdrachtgever je wegsturen. Je bent dan dus helaas voor niets gekomen. Eisen die aan kleding worden gesteld hoeven overigens niet altijd te maken te hebben met een verzorgd uiterlijk. In sommige bedrijven zijn bepaalde kledingstukken uit overwegingen van veiligheid niet toegestaan. Bij machines met draaiende onderdelen kan het dragen van sjaals of kettingen bijvoorbeeld levensgevaarlijk zijn. In andere gevallen kan bepaalde kleding juist verplicht zijn.</p><h4>Veiligheid</h4><p>Onze ervaring leert dat je als uitzendkracht op het gebied van veiligheid en gezondheid een groter risico loopt dan de ‘vaste’ medewerkers. Dit komt voornamelijk door typische ‘nieuwelingenproblemen’ waar je tegenaan loopt. Ongelukken zijn vaak het gevolg van een onbekende omgeving, onbekendheid met de risico’s van het werk, onervarenheid, overmoed of onvoldoende voorbereiding. De overheid heeft deze gevaren voor uitzendkrachten onderkend en heeft het geven van uitvoerige instructies verplicht gesteld (Arbowet). Over de specifieke risico’s van het bedrijf waar je gaat werken word je voorgelicht op de vestiging. Voor veel werkzaamheden is het dragen van beschermingsmiddelen verplicht. Volg de instructies op de werkvloer op en maak altijd gebruik van de beschermingsmiddelen die je geboden worden. Stel je daarnaast op de hoogte van het (brand)alarmsysteem, de nooduitgangen en hoe je de brandblussers moet bedienen. Informeer ook waar je EHBO-voorzieningen en alarmnummers kunt vinden.</p><h4>Wat te doen bij ziekte</h4><p>Als je ziek bent en besluit niet te gaan werken, moet je dat op de eerste ziektedag vóór 9.00 uur doorgeven aan:</p><ul><li>ons</li><li>het bedrijf waar je via ons werkt</li></ul><p>Wanneer je voor 8.30 uur moet beginnen, meld je dan eerst ziek bij het bedrijf waar je zou gaan werken en stel vervolgens ons zo snel mogelijk hiervan op de hoogte. Wanneer je in het weekend ziek bent geworden, meld je dan direct ziek bij het bedrijf waar je zou gaan werken en stel maandagochtend ons van de ziekte op de hoogte. Ook als je inmiddels al beter bent. Let op: Een te late ziekmelding leidt tot een (fikse) mindering op je ziekengelduitkering. Wij zorgen ervoor dat jouw ziekmelding wordt doorgegeven aan het UWV. Je moet wel de eerste 2 à 3 dagen thuisblijven tot het eerste bericht van de uitvoeringsinstantie. Dit is meestal een brief, maar je kunt ook een rapporteur op bezoek krijgen. Ben je niet thuis dan kun je hier een boete voor krijgen.</p><h4>Beter melden</h4><p>Vergeet niet, zodra je weer beter bent, dit direct te melden bij ons. Dat geldt ook wanneer er na je ziekte geen werk meer is. Je moet je daarnaast ook direct beter melden bij het UWV. Als je je te laat beter meldt, kun je van het UWV een boete krijgen.</p><h4>Stoppen met werken</h4><p>Soms komt het voor dat je om wat voor reden dan ook eerder wilt stoppen met je werk. Je moet dan meteen contact opnemen met ons en met het bedrijf waar je werkt. Het is raadzaam dit ruim, maar minstens één dag van tevoren te doen. Dat geeft ons de gelegenheid om eventueel vervanging voor jou te regelen en daarmee het bedrijf een passende oplossing te bieden voor jouw vertrek. Als je langere tijd via ons hebt gewerkt en je stopt met werken, kunnen wij je een persoonlijk getuigschrift geven. Daarin staan de verschillende werkzaamheden die je verricht hebt, de periode waarin je via ons werkzaam was en de indruk die je op ons hebt gemaakt als uitzendkracht.</p>", "questionRange": [16, 20]}, {"id": 5, "intro": "Deze tekst gaat over werken bij de brandweer. Vier vrouwen vertellen over hun werk als brandweervrouw.", "title": "De brandweer: vrouwen, kom in actie!", "body": "<p>Veel mensen denken dat de brandweer alleen maar branden blust. Maar dat is slechts een deel van het werk. De brandweer is er om hulp te bieden aan mensen en dieren in nood. De brandweer helpt bij verkeersongevallen, stormschade, overstromingen, ongelukken met gevaarlijke stoffen en uiteraard bij brand. Bij rampenbestrijding coördineert de brandweer de inzet van politie, ambulance en andere hulpverleners. Het voorkomen van ongevallen – preventie – is overigens één van de belangrijkste taken van de brandweer.</p><p>Een groot deel van het brandweerwerk wordt door vrijwilligers verricht: vrouwen en mannen die in hun eigen woonomgeving zinvol en spannend werk doen. De vrijwilligers worden thuis of op het werk opgepiept. De beroeps rukken uit vanuit de kazerne en werken veelal in 24-uursdiensten of van acht tot vijf.</p><p>Als brandweervrouw maak je deel uit van een team. Sociale en sportieve vrouwen en mannen, beroepskrachten en vrijwilligers, allemaal met één belangrijk doel voor ogen: helpen als dat nodig is. Bij de brandweer train je je tijdens de oefenavonden samen met je collega’s in alle aspecten van hulpverlening. Zo groeit er een band die nodig is om samen de klus te kunnen klaren. Brandweerwerk is immers teamwerk.</p><p>Wellicht heb je er nog niet eerder bij stilgestaan, maar de brandweer heeft vrouwen veel te bieden. Er werken inmiddels 835 vrouwen bij de brandweer. En deze vrouwen zijn het erover eens: werken bij de brandweer is een verrijking van je leven.</p><p><strong>‘Je kunt iets betekenen voor de gemeenschap’</strong><br>„Ik werk nu vijf jaar bij de vrijwillige brandweer. Daarnaast werk ik twee dagen per week als administratief medewerkster en ben ik moeder van een dochter van 2 jaar. Ons korps heeft zo’n 60 uitrukken per jaar. Soms worden we een paar keer per week opgepiept, soms gebeurt er weken niets. Wat het meest voorkomt? Containerbrandjes, hulp bij ongevallen, paarden en koeien uit de sloot halen, woningbranden en af en toe een loos alarm. Het is afwisselend, spannend en gezellig. De kameraadschap binnen het korps is heel belangrijk. Ik vind het leuk dat ik bij de groep hoor. En dat ik iets kan betekenen voor de gemeenschap.”<br><em>Diana Rijke Willems, vrijwilliger bij de brandweer</em></p><p><strong>‘De spanning en de voldoening zijn een verrijking van mijn leven’</strong><br>„Het past bij me om iets voor mensen te betekenen. Bij de brandweer ben je bezig met hulpverlening: adequaat en direct reageren is belangrijk. Wat me aanspreekt, is dat de werkzaamheden zo uiteenlopend zijn. De ene keer ruk je uit voor een brand en de andere keer zwem je met z’n allen in een kanaal om een hert te redden. De spanning en de voldoening zijn een verrijking van mijn leven. Ik werk als vrijwilliger, dus dat betekent dat ik word opgepiept als er een alarm is. Ik combineer het werk als brandweervrouw met de zorg voor mijn drie kinderen.”<br><em>Betsie Dekker-Waninge, vrijwilliger bij de brandweer</em></p><p><strong>‘De brandweer biedt uitdaging en afwisselend werk’</strong><br>„Als kind dacht ik niet: ik word later brandweervrouw. Dat ik dat toch ben geworden, is toeval. Eigenlijk ben ik hovenier. Maar toen ik een poster zag waarop vrouwen voor de brandweer werden gevraagd, dacht ik direct: ja leuk! Ik hou van lichamelijk inspannend werk, van werken in teamverband, ik ga graag uitdagingen aan en ik hou van afwisseling en mensen helpen. Dat biedt de brandweer allemaal. En het salaris is ook nog goed.”<br><em>Anne-Pauline Jacobs, beroepsbrandweervrouw</em></p><p><strong>‘Er ging een wereld voor me open’</strong><br>„In het begin moesten de mannen wel een beetje wennen aan vrouwen bij de brandweer. Maar dat is voorbij. Het is nu vanzelfsprekend en ik word volledig geaccepteerd. Ik kwam in contact met de brandweer door mijn werk als sportlerares. En er ging een wereld voor me open. Ik vond het fantastisch!”<br><em>Caroline Reitsma, beroepsbrandweerofficier</em></p>", "questionRange": [21, 25]}, {"id": 6, "intro": "Deze tekst komt uit een studieboek en gaat over gewoonten.", "title": "Mensen en gewoonten", "body": "<p>1 Elke samenleving kent talrijke normen en gewoonten. Vaak bedenken we de normen en gewoonten niet zelf, maar leren we ze van anderen. Veel van wat we hebben geleerd vinden we vanzelfsprekend. Dat we bijvoorbeeld een ouder iemand met ‘u’ aanspreken is voor veel mensen ‘natuurlijk’, maar is in feite geleerd. We hebben veel waarden en normen ‘geïnternaliseerd’, ons helemaal eigen gemaakt. Het lijkt dat veel gewoonten ‘een tweede natuur’ zijn, maar eigenlijk is er sprake van een leerproces: internalisatie. Er zijn verschillende manieren waarop we eigenschappen en gewoonten leren en ons een cultuur eigen maken. Hoe leren mensen in dat socialisatieproces?</p><p>2 In de eerste plaats leren we door iets vaker te zien. Op den duur vinden we het zelfs heel gewoon en gaan we het bovendien positief waarderen. Je ziet bijvoorbeeld dat veel jongeren een spijkerbroek dragen. Daardoor vind je het dragen van een spijkerbroek gewoon, normaal en goed. Pas als we vaak een vrouw in een leidinggevende functie zouden zien, zullen we dat ‘normaal’ gaan vinden en dat idee ook overnemen.</p><p>3 Elk klein kind gaat op ontdekkingsreis: de eerste stappen, het bouwen van een toren of de trap oplopen. Door ervaring leert het veel. De eerste keer dat het lukt om enkele stapjes zonder hulp te zetten, zullen de ouders het kind belonen: ‘goed zo, grote meid’. Het gevolg van de beloning is, dat het kind vaker zal proberen om zelf te lopen. Als de ouders het kind straffen (bijvoorbeeld ‘niet knoeien met het eten’) zal het dit op den duur niet meer doen. Beloningen en straffen zijn dus belangrijke middelen om gedrag van kinderen en volwassenen te sturen. Deze tweede manier heet conditionering. Ook een compliment van leerkracht of chef is een beloning die iedereen graag in ontvangst neemt. Alleen al het uitzicht op zo’n positieve reactie van de leerkracht kan iemand stimuleren om het gewenste gedrag te vertonen. Negatieve reacties, zoals iemands scherpe tong, probeert men juist het liefst te ontwijken; op die manier is er toch sprake van invloed op anderen, ook al belonen of straffen ze niet.</p><p>4 Sociaal leren is een andere vorm van socialisatie. Het is een manier van leren die zonder direct zichtbare beloning plaatsvindt. Voor iemand is een andere persoon een voorbeeld. Die ander staat dan ‘model’ voor hem/haar en zijn gedrag wordt nagedaan. Mensen kijken naar anderen en zien zo hoe zij zich kunnen gedragen in bepaalde situaties.</p><p>5 Door model-leren nemen mensen gewoonten van anderen over. Dat kan op twee manieren. Kinderen doen bijvoorbeeld hun ouders na, dit heet imitatie. Een dochter ziet bijvoorbeeld hoe haar moeder handelt en handelt op dezelfde manier: ‘zo moeder, zo dochter’. Identificeren is meer dan imiteren. Identificatie vindt plaats als iemand kenmerken (houdingen, gedrag, emoties) van anderen overneemt: in een nieuwe situatie (haar moeder is bijvoorbeeld niet aanwezig) handelt de dochter zoals haar moeder zou hebben gedaan. Kinderen, jongeren én volwassenen kunnen allerlei modellen imiteren en zich ermee identificeren: vaders, vriendjes tegen wie ze opkijken, leerkrachten, popsterren, collega’s enzovoort. De personen die belangrijk zijn voor een kind (of volwassene) noemen we een referentiegroep. Het is de groep mensen waaraan iemand zijn ideeën, waarden, normen en opvattingen ontleent.</p><p>6 Laten we overigens niet vergeten dat we ook leren en blijven leren doordat we informatie lezen en horen en doordat we ons door argumenten kunnen laten overtuigen.</p>", "questionRange": [26, 30]}, {"id": 7, "intro": "Deze tekst is van een fabrikant van elektrische tandenborstels. Lees eerst de vraag. Zoek het antwoord in de tekst.", "title": "Handleiding elektrische tandenborstel", "body": "<p>Gefeliciteerd met uw aankoop. Deze elektrische tandenborstel is speciaal ontwikkeld om u en uw familie een unieke poetservaring te bieden, die veilig en efficiënt is.</p><h4>BELANGRIJK</h4><ul><li>Controleer regelmatig het snoer op schade. Indien het snoer beschadigd is, breng dan de oplader naar een Service Center. Beschadigde of niet-functionerende apparatuur kunt u beter niet langer gebruiken. Repareer het apparaat niet zelf of haal het apparaat niet uit elkaar. Dit kan brand, een elektrische schok of letsel veroorzaken.</li><li>Dit apparaat is niet bedoeld voor gebruik door kinderen onder de 3 jaar. Kinderen van 3 tot 14 jaar en personen met verminderde lichamelijke, zintuiglijke of geestelijke vermogens, of die gebrek aan ervaring of kennis hebben, mogen de tandenborstel enkel gebruiken onder toezicht of na instructies over het veilige gebruik van het apparaat en de mogelijke gevaren ervan.</li><li>Reiniging en onderhoud mag niet worden uitgevoerd door kinderen.</li><li>Houd toezicht op kinderen om te voorkomen dat ze met het apparaat gaan spelen.</li><li>Gebruik dit product alleen waarvoor u het dient te gebruiken zoals beschreven in deze handleiding. Gebruik geen toebehoren die niet worden aanbevolen door de fabrikant.</li></ul><h4>WAARSCHUWING</h4><ul><li>Als het product gevallen is, dient u de opzetborstel te vervangen voor uw volgende gebruik, ook als er geen zichtbare schade is.</li><li>Plaats de oplader niet in water of andere vloeistoffen. Plaats of bewaar de oplader niet op een plek vanaf waar het in een bad of wastafel kan vallen. Pak geen oplader die in het water is gevallen. Haal onmiddellijk de stekker uit het stopcontact.</li><li>Haal het apparaat niet uit elkaar, behalve voor het verwijderen van de batterij. Pas op dat u geen kortsluiting maakt tussen de positieve en negatieve pool bij het verwijderen van de batterij.</li><li>Wanneer u de stekker uit het stopcontact haalt, houd dan steeds de stekker vast in plaats van het snoer. Raak de powerknop niet aan met natte handen. Dit kan een elektrische schok veroorzaken.</li><li>Neem eerst contact op met uw tandarts, indien u onder behandeling bent voor een aandoening in de mond.</li></ul><h4>Beschrijving</h4><ul><li>a Opzetborstel</li><li>b Poetsdruksensorlampje</li><li>c Aan-/uitknop (poetsstand keuze)</li><li>d Handvat</li><li>e Indicatielampje opladen</li><li>f Indicatielampje bij lage lading</li><li>g Standaard oplader</li><li>h Opzetborstelhouder (afhankelijk van het model)</li><li>i Opzetborstelcompartiment met beschermende hoes (afhankelijk van het model)</li></ul><h4>Specificaties</h4><p>Zie de onderkant van de oplader voor voltagespecificaties.</p><h4>Aansluiten en opladen</h4><p>Uw tandenborstel heeft een waterproof handvat, is elektrisch veilig en ontwikkeld voor gebruik in de badkamer.</p><ul><li>Steek de basisoplader (g) of de gemonteerde oplader (fig. B/C) in het stopcontact en plaats het handvat van de tandenborstel (d) op de oplader.</li><li>Het groene indicatielampje (e) knippert wanneer de tandenborstel wordt opgeladen. Wanneer het toestel volledig opgeladen is, zal het indicatielampje gedurende 5 seconden aan blijven en dan uitgeschakeld worden. U kunt tot 7 dagen poetsen, bij regelmatig poetsen (2x per dag, 2 minuten).</li><li>Wanneer de oplaadbare batterij bijna leeg is, zal het rode indicatielampje (f) knipperen gedurende aan paar seconden na het aan-/uitzetten van uw tandenborstel.</li><li>Voor dagelijks gebruik kan het handvat van de tandenborstel op de oplader geplaatst worden om volledige lading te behouden. Te veel opladen is onmogelijk. Om milieuredenen raden we echter aan de tandenborstel niet op de oplader te houden tot opladen nodig is.</li><li>Om de maximumcapaciteit van de oplaadbare batterij te behouden, dient u minimaal iedere 6 maanden het handvat en de oplader van elkaar te halen tot het toestel volledig ontladen is.</li></ul><p><em>Opmerking: blijf opladen indien het indicatielampje niet direct flikkert. Het zal binnen 10–15 minuten verschijnen.</em></p><h4>Gebruik van de tandenborstel</h4><h4>Poetstechnieken</h4><p>Maak de opzetborstel nat en breng de tandpasta aan; u kunt elke soort tandpasta gebruiken. Om spetteren te voorkomen, plaats de tandenborstel tegen uw tanden voor u het apparaat aanzet. Wanneer u uw tanden poetst met één van onze roterende borstelkoppen, beweeg de borstelkop langzaam van tand naar tand en blijf een aantal seconden op het tandoppervlak van elke tand. Wanneer u onze QuadroX-opzetborstel gebruikt, plaats de borstelharen tegen de tanden in een kleine hoek naar de tandvleesrand toe. Geef een lichte druk en start de heen-en-weer-poetsbeweging, net zoals u zou doen met een manuele tandenborstel. Met alle borstelkoppen: poets eerst de buitenkant, daarna de binnenkant en dan de kauwvlakken. Poets de 4 kwadranten van uw gebit gelijkwaardig. Ook kunt u uw tandarts of mondhygiënist vragen naar de juiste poetstechniek voor u.</p><h4>Poetsstanden (afhankelijk van het model)</h4><p>Uw tandenborstel biedt drie verschillende poetsstanden:</p><ul><li>«poetsstand 1» – Standaard stand voor dagelijkse reiniging</li><li>«poetsstand 2» – Zachte, maar grondige reiniging voor de gevoelige gebieden</li><li>«poetsstand 3» – Polijsten</li></ul><p>Hoe de poetsstand te veranderen:</p><ul><li>Wanneer u op de aan-/uitknop (c) drukt, zal uw tandenborstel automatisch in «poetsstand 1» staan.</li><li>Druk nog eens op de aan-/uitknop om naar «poetsstand 2» te veranderen en nog eens om naar «poetsstand 3» te veranderen.</li><li>Indien u uw tandenborstel naar «poetsstand 1» wilt veranderen of de tandenborstel wenst uit te schakelen, duw op de aan-/uitknop en houd hem ingedrukt tot de motor wordt uitgeschakeld.</li></ul><h4>Opzetborstels</h4><p>De meeste van onze opzetborstels hebben lichtblauwe borstelharen om aan te geven wanneer de opzetborstel vervangen dient te worden. Bij grondig poetsen, 2x per dag gedurende 2 minuten, zal de blauwe kleur vervagen in ongeveer 3 maanden tijd en zo aanduiden dat uw opzetborstel vervangen moet worden om het hoge niveau van tandplakverwijdering te behouden. Als de borstelharen wijd gaan staan voordat de kleur van de borstelharen vervaagd is, kan het zijn dat u te veel druk uitoefent op tanden en tandvlees.</p><p>We raden niet aan de 3DAllround- of CleanQ-opzetborstels te gebruiken wanneer u een beugel heeft. U kunt de 4MEDwhite-opzetborstels gebruiken. Deze zijn speciaal ontwikkeld voor reiniging rondom beugels en protheses.</p><h4>Poetsdruksensor</h4><p>Uw toestel heeft een poetsdruksensor om uw tanden en tandvlees te helpen beschermen tegen te hard poetsen. Als u te veel druk uitoefent op uw tanden, zal het rode poetsdruksensorlampje (b) branden om u erop te wijzen minder druk te gebruiken. Eveneens zult u een ander geluid horen tijdens het poetsen. Controleer regelmatig tijdens gebruik hoe de poetsdruksensor werkt door druk uit te oefenen op de opzetborstel.</p><h4>De professionele timer</h4><p>Een kort schokkerig geluid na intervallen van 30 seconden herinnert u eraan om de 4 kwadranten gelijkmatig te poetsen.</p><p>Een lang schokkerig geluid geeft het eind aan van de professioneel aanbevolen 2 minuten poetstijd. De overgebleven tijd wordt opgeslagen wanneer de handgreep even wordt uitgeschakeld tijdens het poetsen. Wanneer de pauze langer duurt dan 30 seconden, begint de timer weer opnieuw.</p><p>Bij het gebruik van een elektrische tandenborstel, zou het kunnen dat uw tandvlees lichtjes gaat bloeden de eerste dagen. Over het algemeen stopt het bloeden na een paar dagen. Als dit na 2 weken nog aanhoudt, raadpleeg dan uw tandarts of mondhygiënist. Als u gevoelig tandvlees of gevoelige tanden heeft, raden we «poetsstand 2» aan.</p><h4>Aanbevelingen voor het reinigen</h4><p>Spoel na het poetsen de opzetborstel af onder stromend water wanneer de borstel nog aanstaat. Zet de borstel uit en verwijder de opzetborstel. Reinig de handgreep en de opzetborstel afzonderlijk; droog ze af voordat u de opzetborstel weer terugplaatst op de handgreep. Haal de stekker van de oplader uit het stopcontact voordat u deze gaat reinigen. Zet de oplader nooit in de vaatwasmachine of in water; deze zou enkel gereinigd mogen worden met een vochtige doek. Het opzetborstelcompartiment en de beschermhoes kunnen in de vaatwasmachine.</p><h4>Mededeling ter bescherming van het milieu</h4><p>Dit product bevat oplaadbare batterijen. Gooi het product aan het einde van de gebruiksduur niet weg bij het huishoudelijk afval. U kunt uw product inleveren bij een van onze Service Centers of een goedgekeurd inzamelpunt in overeenstemming met lokale regelgeving.</p><h4>30-Dagen-Niet-Tevreden-Geld-Terug-garantie</h4><p>Doe de 30-dagentest! Probeer de tandenborstel vanaf de dag van aankoop. Als u niet tevreden bent over dit product, stuur dan de tandenborstel, opzetborstels en oplader in de originele doos met uw originele kassabon naar onderstaand adres:</p><p>Aankopen in Nederland<br>HighCo DATA 05066<br>Antwoordnummer 3020<br>3000 WB ROTTERDAM<br>of kijk op www.niettevredengeldterug.nl</p><p>Aankopen in België<br>DJS<br>«Actie 30 dagen op proef»<br>Rue de la Brasserie 2<br>5310 Eghézée<br>Voor meer informatie, neem contact op met onze klantendienst:<br>NL: 0800 4455388 / BE: 08 14592</p><h4>Garantie</h4><p>Op dit product verlenen wij een garantie van 2 jaar geldend vanaf de datum van aankoop. Binnen de garantieperiode zullen de eventuele materiaalfouten en/of fabricagefouten gratis door ons worden verholpen, door reparatie, vervanging van onderdelen of het omruilen van het apparaat. Deze garantie is van toepassing in elk land waar dit product wordt geleverd.</p><p>Beschadigingen ten gevolge van oneigenlijk gebruik of normale slijtage, vooral met betrekking tot de opzetborstels, vallen niet onder de garantie. De garantie vervalt bij reparatie door niet-erkende serviceafdelingen en/of gebruik van niet-originele onderdelen.</p><p>Om service te verkrijgen binnen de garantieperiode, dient u het complete product binnen te brengen of te verzenden met aankoopbewijs naar een officieel Service Center.</p>", "questionRange": [31, 36]}], "questions": [{"n": 1, "textId": 1, "prompt": "Wat zegt de tekst over de soep in Nederlandse bedrijfskantines?", "options": {"A": "Die is gezond, maar niet lekker en wordt weinig verkocht.", "B": "Die is zout, maar wel lekker en wordt veel verkocht.", "C": "Die wordt vooral verkocht met vet vlees of kaas erin."}, "answer": "B"}, {"n": 2, "textId": 1, "prompt": "Wat zeggen de meeste werknemers in Nederland over het eten op hun werk?", "options": {"A": "Ze vinden dat het slechte concentratie, overgewicht en ziektes veroorzaakt.", "B": "Ze vinden dat hun bedrijfskantine geen gezond eten aanbiedt.", "C": "Ze vinden dat vooral hun werkgever gezond eten op het werk moet stimuleren."}, "answer": "C"}, {"n": 3, "textId": 1, "prompt": "Slechte concentratie en overgewicht kunnen allebei een gevolg zijn van ongezond eten. Welke van deze twee gevolgen kan psychische klachten veroorzaken?", "options": {"A": "alleen overgewicht", "B": "alleen slechte concentratie", "C": "zowel overgewicht als slechte concentratie"}, "answer": "A"}, {"n": 4, "textId": 1, "prompt": "Hoe denken werkgevers over het aanbod in hun bedrijfskantines?", "options": {"A": "De meesten geven de voorkeur aan een gezond aanbod.", "B": "De meesten vinden hun werknemers verantwoordelijk voor wat ze eten.", "C": "De meesten willen een aanbod waarmee hun werknemers tevreden zijn.", "D": "Daar wordt in de tekst niets over gezegd."}, "answer": "D"}, {"n": 5, "textId": 1, "prompt": "Hoe denkt
