door je werknemers kan jou als ondernemer veel geld kosten. Lees welke vormen van verzuim er zijn, wat je kunt doen om verzuim te voorkomen en hoe je de financiële risico's zo goed mogelijk afdekt.</p><p>Het meest voorkomende soort verzuim is ziekteverzuim. We spreken van ziekteverzuim als een werknemer zijn arbeidsovereenkomst niet kan nakomen wegens aantoonbare medische redenen. Er zijn verschillende vormen van ziekteverzuim te onderscheiden.</p><h4>1. Kortdurend ziekteverzuim</h4><p>Werknemers zijn soms ziek, daar kan geen werkgever omheen. Gaat het bijvoorbeeld om een simpel griepje of een verkoudheid, dan is de werknemer meestal snel weer beter. Bij zulk kortdurend ziekteverzuim blijft de schade voor je bedrijf beperkt tot een paar dagen loondoorbetaling en de kosten van eventuele vervanging. Vervelend, maar doorgaans een ondernemersrisico waar je vooraf rekening mee houdt.</p><p>Let op: sommige cao's bieden de mogelijkheid om twee wachtdagen in te stellen. Je hoeft een zieke werknemer de eerste twee ziektedagen dan niet door te betalen. Controleer dit in je cao.</p><h4>2. Frequent kortdurend (ziekte)verzuim</h4><p>Kortdurend verzuim kan echter ook andere oorzaken hebben dan een ziekte. Bijvoorbeeld: een zwakke gezondheid, werkstress, een conflict op het werk of privéproblemen. In die gevallen bestaat het risico dat een werknemer zich vaker ziek zal melden. Dit heet frequent kortdurend ziekteverzuim.</p><p>Onderzoek heeft aangetoond dat deze vorm van verzuim vaak leidt tot langdurig verzuim. Het is daarom zaak dit tijdig te signaleren, de oorzaken op te sporen en maatregelen te nemen. Als meerdere werknemers binnen een afdeling zich geregeld ziek melden, kan dit bijvoorbeeld duiden op een slechte werksfeer. Soms volstaat een goed gesprek om de ruzies uit te praten, of is een kleine aanpassing in het werk al voldoende om de oorzaak van werkstress bij een werknemer weg te nemen.</p><p>Als een werknemer zo vaak kortdurend verzuimt dat dit slecht is voor je bedrijfsvoering, kun je hem eventueel ontslaan.</p><h4>3. Langdurend ziekteverzuim</h4><p>Als een werknemer kortdurend verzuimt, hoef je als werkgever maar weinig verplicht te regelen. Het belangrijkste is de loondoorbetaling en de ziektemelding bij de arbo- of bedrijfsarts. Het wordt anders als een werknemer zes weken of langer ziek is. Dit heet langdurend ziekteverzuim. Je krijgt dan te maken met de Wet verbetering poortwachter.</p><p>Deze wet schrijft voor dat je samen met je werknemer met hulp van een verzuimbedrijf een plan moet maken om je werknemer opnieuw te laten beginnen met werken. Dit heet een re-integratietraject. Jouw bedrijf moet de kosten voor het re-integratietraject betalen. Daarbij komen nog de kosten van de loondoorbetaling van minimaal 70 procent van het loon gedurende maximaal twee jaar. In bepaalde cao's staat zelfs dat je het eerste jaar 100 procent van het loon moet betalen. Ook maak je kosten voor vervanging van de medewerker. Deze kosten kunnen erg hoog zijn.</p><p>De werkgeversrisico's bij ziekteverzuim zijn dus groot, zeker als het re-integratietraject lang duurt of niet het gewenste resultaat heeft en je werknemer in de WIA (Wet werk en inkomen naar arbeidsvermogen) terechtkomt. Het is verstandig om je als ondernemer goed te laten adviseren over deze risico's.</p><p>Een goede ziekteverzuimverzekering vergoedt (een gedeelte van) het loon dat je moet doorbetalen bij ziekte van personeel en biedt vaak dienstverlening bij het voorkomen en verminderen van verzuim. Als een arbodienst is opgenomen in het verzekeringspakket, dan kan die in samenwerking met jou een zieke werknemer vanaf de eerste verzuimdag begeleiden.</p><h4>4. Ongeoorloofd verzuim</h4><p>Het kan voorkomen dat een werknemer zonder toestemming niet komt werken, soms zelfs zonder dit te melden. Dit heet ongeoorloofd verzuim of 'zwart' verzuim. Een werknemer komt bijvoorbeeld te laat terug van vakantie, neemt zonder jouw toestemming deel aan een stakingsbijeenkomst of blijkt in de gevangenis te zitten. Anders dan bij ziekte geldt in zo'n geval de regel 'geen arbeid, geen loon'. Je hoeft de werknemer geen salaris te betalen, want hij komt zijn arbeidsovereenkomst niet na.</p><p>Als werkgever zul je in zo'n geval eerst proberen met je werknemer in contact te komen en om uitleg vragen of hem verzoeken alsnog op het werk te verschijnen. Als dit niet lukt, kun je ontslag overwegen. De kans dat de rechter hiermee akkoord gaat is echter klein. Je kunt een werknemer in zo'n geval pas ontslaan als hij al eerder gewaarschuwd is voor ongeoorloofd verzuim of ander verkeerd gedrag. Dit geldt ook voor een werknemer in gevangenschap, tenzij het strafbare feit waarvoor hij in de gevangenis zit een relatie heeft tot het werk.</p><h4>Verzuim in kleuren</h4><p>Er wordt ook wel gesproken over wit, zwart en grijs verzuim. Wat is dat nu precies?</p><table><tr><td><strong>Wit verzuim</strong></td><td>Je werknemer kan niet werken omdat hij echt ziek is.</td></tr><tr><td><strong>Zwart verzuim</strong></td><td>Je werknemer meldt zich onterecht ziek, bijvoorbeeld omdat hij op vakantie is.</td></tr><tr><td><strong>Grijs verzuim</strong></td><td>Je werknemer is bijvoorbeeld licht verkouden en kan eigenlijk wel werken, maar meldt zich toch ziek.</td></tr></table><h4>Verzuim door een sportongeval</h4><p>Sporten is gezond en vermindert over het algemeen het arbeidsverzuim van werknemers. Werknemers kunnen tijdens het sporten echter wel geblesseerd raken, waardoor ze enige tijd niet kunnen werken. Zij mogen zich in zo'n geval gewoon ziek melden. Jij als werkgever moet dit als een normale ziekmelding behandelen: je meldt je werknemer binnen vier dagen ziek bij de bedrijfsarts en betaalt het loon gewoon door.</p><p>Als je werknemer herhaaldelijk geblesseerd raakt bij het sporten en hierdoor meermalen verzuimt, heb je als werkgever het recht hem formeel hierop te wijzen en hem te vragen met de sport te stoppen. Je kunt de werknemer echter niet ontslaan wegens herhaaldelijk verzuim door een sportongeval.</p>", "questionRange": [12, 17]}, {"id": 4, "intro": "Deze tekst komt uit een tijdschrift over mbo-opleidingen.", "title": "Met deze opleiding heb je echt een voorsprong", "body": "<p>De autosportklas van Newton College is een extra traject voor studenten van de opleiding motorvoertuigentechniek. Alleen de beste studenten van de richting technisch specialist niveau 4 komen in aanmerking. Zij mogen een jaar lang – één raceseizoen – het onderhoud van de wagens doen en in de weekenden mee naar racewedstrijden.</p><h4>Defensie</h4><p>De Tilburgse autosportklas bestaat al veel langer, sinds 1988. Inmiddels heeft de school vier eigen racewagens en staan coureurs in de rij om in de Newton-auto's te mogen racen. De auto's worden beschikbaar gesteld door het ministerie van Defensie. Dat hoopt met de autosportklas jongeren warm te maken voor een technische opleiding, en mogelijk een carrière bij Defensie. 'Maar het is niet zo dat wij nou mensen opleiden voor Defensie', verduidelijkt docent Bernardo Marelis. Samen met Kate Bitar leidt hij de raceklas. 'Het is meer een manier om te laten zien dat een technische opleiding leuk en spannend kan zijn.'</p><p>Alleen de beste studenten komen daarvoor in aanmerking. 'Het zijn er nu dertien. We hebben vier auto's, en het heeft geen zin om met meer dan vier studenten aan één auto te sleutelen.' Hoe Marelis en Bitar de studenten selecteren? 'Alleen goede cijfers zijn niet genoeg. Doorzettingsvermogen, discipline en motivatie zijn zeker zo belangrijk. We laten studenten een brief schrijven waarin ze hun motivatie moeten toelichten. We kijken naar resultaten. Maar ook belangrijk zijn onze gesprekken met de mentoren van studenten. Zij kunnen vaak het beste inschatten of iemand geschikt is. Tijdens races draait het om teamwerk. Je moet goed in teams kunnen werken om te kunnen functioneren in de autosportklas.'</p><p>Volgens Bitar is het ontwikkelen van dit traject voor excellente studenten niet de grootste uitdaging. De grootste uitdaging is om het vol te houden, in dit geval ook financieel. 'Tot nu toe zijn we daar steeds weer in geslaagd, maar het is elk jaar spannend.' Het raceteam is afhankelijk van sponsoren. Ook Newton College zelf steekt er geld in, omdat het raceteam ook een visitekaartje voor de school is.</p><h4>Enthousiasme</h4><p>Abel (17) en Hussam (18) volgen de autosport-opleiding. Hussam zat aanvankelijk op niveau 3, 'maar toen ik hoorde van de autosportklas, heb ik mijn best gedaan om toch niveau 4 te halen.' Hij is duidelijk enthousiast. Marelis: 'Studenten zijn hier soms om tien uur 's avonds nog op de werkplaats. Dan komt de beveiliging ons vertellen dat ze weg moeten, omdat het alarm erop gaat. Niks mee te maken, zeggen die studenten dan, morgen hebben we een race en de auto's moeten helemaal klaar zijn.' Abel: 'Het staat mooi op je cv als je de autosportklas hebt gedaan. Ik wil wel verder in de race-branche en als je deze opleiding hebt gedaan, heb je echt een voorsprong.'</p><h4>Uitbreiding</h4><p>Het is onhandig dat het raceseizoen één kalenderjaar loopt, waardoor het extra jaar raceklas noodgedwongen is uitgesmeerd over twee schooljaren: het tweede en het derde jaar. Dat is de enige mogelijkheid, omdat studenten anders later in hun opleiding in de knel komen met stages. Dat betekent dat studenten na hun jaar race-ervaring weer inschuiven bij de opleiding motorvoertuigentechniek. Een andere lastigheid: dit traject is bedoeld als extra traject binnen een bestaande opleiding. Maar als het aan Newton ligt, wordt de autosportklas een op zichzelf staand traject, in plaats van een plusklas binnen de opleiding motorvoertuigentechniek. Lauren Ramos, opleidingsmanager Sector Techniek &amp; Vormgeving, wil onderzoeken wat de mogelijkheden zijn om de autosportklas niet te beperken tot één raceseizoen, maar bijvoorbeeld uit te breiden naar drie seizoenen. 'We krijgen deze vraag van zowel de studenten als de leerbedrijven.' Ook wil Ramos bezien in hoeverre de autosportklas zich ook op andere disciplines kan gaan richten. 'Waarom zouden we bijvoorbeeld geen circuitwedstrijden gaan rijden? Het is de moeite waard hier eens goed naar te kijken.'</p><h4>Internationalisering</h4><p>Het traject van de autosportklas moet bij voorkeur tweetalig zijn. Marelis: 'Want de voertaal in de racewereld is Engels. En onze studenten kunnen dan doorstromen: de enige hbo-opleiding in Europa voor monteurs in de racewereld zit in Engeland.' Studenten in de autosportklas gaan nu al regelmatig naar het buitenland. Elk jaar zijn er verschillende excursies naar de motorbeurs in Keulen of een trip naar Engeland om daar te bekijken hoe bekende racemerken als M-Sport, Prodrive Le Mans-auto's en WRC Rally-auto's het doen. Maar dichter bij huis is natuurlijk ook genoeg te leren. 'Zo zijn wij regelmatig te gast bij Proflex, het bedrijf dat schokdempers levert aan de rally Parijs-Dakar. Op hun beurt sturen bedrijven hun vakspecialisten naar Tilburg, om hier gastlessen te verzorgen. Zo blijven we op de hoogte van de motorsportbranche en weten we wat de arbeidsmarkt van ons verwacht', besluit Marelis. 'Maar het meest leren de studenten in de praktijk, tijdens de races. Elk foutje wordt meteen afgestraft, dat is enorm leerzaam. Alleen wanneer iedereen optimaal presteert, kan het gemeenschappelijke doel worden bereikt: het winnen van de race.'</p>", "questionRange": [18, 24]}, {"id": 5, "intro": "Dit krantenartikel gaat over de verschillen in wensen tussen jongeren en ouderen bij het zoeken naar werk.", "title": "Arbeidsmarkt: jongere op zoek naar zekerheid, oudere naar uitdaging", "body": "<p>Jonge sollicitanten vinden arbeidsvoorwaarden belangrijker dan de inhoud van hun toekomstige werk. Ze zoeken vooral stabiliteit en zekerheid. Lichamelijk actief werk is de enige inhoudelijke wens uit hun top 5. Ouderen zoeken eerder naar uitdagend werk.</p><p>Dit blijkt uit onderzoek van adviesbureau Arda onder 1200 werkzoekenden (m/v) van alle leeftijden. Onderzoeker Samir van Veen vroeg hun wat ze belangrijk vinden in een baan. Hij onderzocht 19 aandachtspunten waaronder het salaris en het maken van carrière. De resultaten zijn soms verrassend.</p><h4>Interesse in werk</h4><p>Onder de werkzoekenden zeggen jongeren eerder dan ouderen interesse in hun werk te verliezen. Van de jongeren tot 24 jaar vindt 26 procent creatief denken belangrijk, terwijl van de 45-plussers 59 procent dat juist het allerbelangrijkst vindt. Maar liefst 70 procent van de jongeren noemt zekerheid en stabiliteit als grootste wens. In de top 5 van de 45-plussers komt die wens niet eens voor.</p><p>Van Veen: &#8220;We denken al gauw dat vooral jongeren willen bijdragen aan vernieuwing en creativiteit. Het zijn echter eerder ouderen die dat belangrijk vinden. Onder werklozen is het voor 50-plussers vaak heel lastig om werk te vinden. Toch willen juist zij zich ontwikkelen. Ook denken we vaak dat jongeren eerder risico's willen nemen dan ouderen. Maar het tegenovergestelde is waar.&#8221;</p><h4>Financiële basis</h4><p>Vera Tames van ouderenuitzendbureau Plustalent gelooft niet dat ouderen ambitieuzer zijn dan jongeren. Veel 45-plussers hebben een financiële basis. Dat maakt het eenvoudiger om te zeggen dat ze creatief bezig willen zijn. Tames: &#8220;Ouderen voelen zich op hun vijftigste te fit om niets te doen. Na een werkloos jaar is thuis hun tuintje wel weer netjes en hun schuur geverfd. Vaak gaan ze dan doen wat ze écht willen. Waar ouderen al een carrière achter zich hebben, staan jongeren aan de start.&#8221;</p><h4>Bang voor toekomst</h4><p>Marcia Bregman van vakbond FNV: &#8220;Jongeren zijn bang voor de toekomst. Ze maken zich zorgen: de wereld verandert misschien niet, maar de arbeidsmarkt wel. Een vast contract heb je niet zomaar. Werkgevers kunnen steeds gemakkelijker van hun werknemers af. Als je een huis of kinderen wilt, wordt zekerheid belangrijker.&#8221;</p><h4>Avontuurlijke karakter</h4><p>Van Veen adviseert werkgevers die zoeken naar jong personeel om rekening te houden met de uitkomsten van zijn onderzoek: &#8220;Je bereikt jonge werkzoekenden niet door alleen maar het avontuurlijke karakter van een baan te benadrukken.&#8221;</p><h4>Top 5 wensen bij het zoeken naar werk</h4><table><tr><th>Jongeren tot 24 jaar</th><th>Ouderen vanaf 45 jaar</th></tr><tr><td>1. zekerheid en stabiliteit</td><td>1. creatief denken</td></tr><tr><td>2. fysiek actief zijn</td><td>2. analyseren</td></tr><tr><td>3. aandacht</td><td>3. concrete resultaten</td></tr><tr><td>4. balans privé en werk</td><td>4. beïnvloeden</td></tr><tr><td>5. financiële beloning</td><td>5. kwaliteit</td></tr></table>", "questionRange": [25, 30]}, {"id": 6, "intro": "Deze tekst staat op de website van Wonderrijk, een groot attractiepark.", "title": "Abonnement Wonderrijk", "body": "<p>Met een abonnement kun je zo vaak als je wilt ons pretpark bezoeken. Dat worden nóg meer ritjes in allerlei attracties voor jong en oud. Vanaf 6 bezoeken per jaar is een abonnement voordeliger dan losse entreekaartjes en voor kinderen t/m 3 jaar is het abonnement helemaal gratis.</p><p>Een abonnement is altijd minimaal 12 maanden geldig vanaf de dag van aankoop. In welke periode van het jaar je een abonnement koopt, maakt dus niet uit. Een pasfoto meenemen is niet nodig als de abonnementhouder er zelf bij is. Er wordt dan bij de kassa een foto genomen.</p><h4>Voorwaarden abonnement</h4><h4>1. Abonnement algemeen en toegang tot het park</h4><p>1.1 Breng het abonnement bij elk parkbezoek mee. Bij de hoofdingang dien je je abonnement persoonlijk te overhandigen aan de controleur. Deze controleert of je pas geldig is. Bovendien wordt aan de hand van de foto op het abonnement gecontroleerd of je daadwerkelijk de abonnementhouder bent. Hoewel jouw gegevens als abonnementhouder geregistreerd staan, wordt de toegang geweigerd als je het abonnement niet kan tonen.</p><p>1.2 Als bij visuele controle blijkt dat je op de foto, welke je op je abonnement wenst te plaatsen, niet duidelijk herkenbaar bent, heeft Wonderrijk de bevoegdheid je te vragen een nieuwe foto te laten maken bij de Gastenservice. De mening van de Wonderrijk is hierbij bepalend.</p><p>1.3 Een abonnement is strikt persoonlijk en niet overdraagbaar. Het is niet mogelijk om abonnementen tijdens de vaste of minimale looptijd om te zetten in een andere abonnementsvorm. Per persoon kan slechts één abonnement aangeschaft worden.</p><p>1.4 Als abonnementhouder kun je gebruikmaken van enkele voordelen. Deze voordelen en de voorwaarden hiervan zijn terug te vinden op www.wonderrijk.com/abonnementen.</p><p>1.5 Bij oneigenlijk gebruik van het abonnement en/of wangedrag in het park, wordt het abonnement door Wonderrijk in beslag genomen of geblokkeerd. Bij inbeslagname of blokkering van het abonnement wordt het abonnementsgeld niet teruggegeven.</p><p>1.6 Eenieder voor wie of door wie een abonnement wordt aangeschaft bij de Gastenservice, dient zich te legitimeren.</p><p>1.7 Kinderen tot en met 3 jaar mogen het park gratis bezoeken en hebben de mogelijkheid een gratis abonnement aan te schaffen (zie 2.1).</p><p>1.8 Bij het betreden van het park is het Parkreglement van toepassing. Het Parkreglement hangt ter inzage bij de hoofdingang en is te lezen op www.wonderrijk.com/voorwaarden.</p><h4>2. Abonnementen tegen lager tarief</h4><p><strong>2.1 Kinderen tot 4 jaar:</strong> Indien een ouder/voogd abonnementhouder is, dan bestaat de mogelijkheid een gratis abonnement aan te schaffen voor kinderen tot en met 3 jaar. Het abonnement start vanaf datum aanschaf en eindigt op dezelfde datum als het abonnement van de ouder/voogd of – indien eerder – wanneer het kind 4 jaar wordt.</p><p><strong>2.2 Kinderen die 4 jaar worden:</strong> Voor kinderen die 4 jaar worden kan soms een speciaal 4-jarigenabonnement worden gekocht. Dat is een abonnement met een lager tarief dan een normaal abonnement. Dit kan alleen worden gekocht indien ouder/voogd een jaarabonnement heeft en dit direct bij aanschaf volledig betaald heeft. Dit abonnement start vanaf de vierde verjaardag en eindigt tegelijk met het abonnement van de ouder/voogd.</p><p><strong>2.3 Aanschaf abonnement minderjarigen:</strong> Indien de abonnementhouder onder de 18 jaar is, dient een ouder of voogd tevens te tekenen en aanwezig te zijn bij het moment van aanschaf bij de Gastenservice.</p><p><strong>2.4 60+'ers:</strong> Als 60+'er kom je in aanmerking voor een abonnement tegen een lager tarief.</p><h4>3. Parkeerabonnement</h4><p>3.1 Als je onbeperkt wilt parkeren gedurende de looptijd van je abonnement, kun je kiezen voor een parkeerabonnement.</p><p>3.2 Het parkeerabonnement geeft de persoon met een geldig rijbewijs de mogelijkheid gebruik te maken van het parkeerterrein voor één auto per dag, uitsluitend in combinatie met een parkbezoek.</p><p>3.3 De eigenaar van het parkeerabonnement dient bij gebruik zelf aanwezig te zijn.</p><p>3.4 Een parkeerabonnement geeft bij grote drukte geen voorrang of garantie op een parkeerplaats. Indien er geen parkeerplaats (meer) beschikbaar is, kun je je abonnementsgeld niet terugvragen.</p><p>3.5 Het is niet toegestaan het parkeerabonnement uit te lenen aan derden of anders te gebruiken dan volgens hierboven genoemde voorwaarden.</p><p>3.6 Je dient de aanwijzingen van de dienstdoende parkeerwachters op te volgen.</p><p>3.7 Parkeren met een parkeerabonnement is enkel toegestaan tijdens de reguliere openingstijden van het attractiepark.</p><p>3.8 Wanneer je een parkeerabonnement hebt aangeschaft, is deze verwerkt in je abonnementspas. Bij het verlaten van het parkeerterrein kun je gebruik maken van alle slagbomen. Wanneer je je abonnementspas voor de scanner houdt, gaat de slagboom omhoog.</p><p>3.9 Het parkeerabonnement is alleen geldig in combinatie met een parkbezoek. Het oprijden van het parkeerterrein is niet meer toegestaan vanaf één uur voor sluitingstijd van het attractiepark. Kijk voor de actuele openingstijden op www.wonderrijk.com.</p><h4>4. Geldigheid en duur abonnement</h4><p>4.1 Je sluit het abonnement af voor één jaar. Heb je het abonnement in één keer betaald? Dan stopt het na een jaar automatisch. Indien je een abonnement met maandelijkse betaling hebt afgesloten, loopt het abonnement na het eerste jaar door voor onbepaalde tijd. Hierna is het abonnement tegen de laatste dag van de lopende kalendermaand op te zeggen. Er geldt een opzegtermijn van één kalendermaand. De dag van aanschaf geldt als eerste dag van het abonnement. Voor kinderen tot 4 jaar geldt een aangepaste minimale looptijd van het abonnement (zie voorwaarden artikel 2.1).</p><p>4.2 Het abonnement is enkel geldig tijdens de reguliere openingstijden van het attractiepark. Deze tijden zijn te vinden op www.wonderrijk.com/openingstijden.</p><p>4.3 Voor ieder kalenderjaar geldt dat Wonderrijk maximaal veertien dagen per jaar, in de maanden januari, februari, maart, november en december, mag gebruiken voor bedrijfsevenementen. Op deze dagen is je abonnement niet geldig. Deze dagen worden minimaal drie maanden voorafgaand aan de betreffende dagen door Wonderrijk gepubliceerd op www.wonderrijk.com/abonnementen. Houd de website hiervoor in de gaten.</p><p>4.4 Bij verlies of diefstal van je abonnement dien je hiervan direct melding te maken via telefoonnummer +31 116 53 7447. Om misbruik uit te sluiten, wordt je abonnement direct geblokkeerd.</p><p>4.5 In het geval van verlies, diefstal of beschadiging kun je een kopie van je abonnement aanvragen bij de Gastenservice van Wonderrijk. De administratiekosten voor een kopie bedragen € 7,- per abonnement.</p><h4>5. Opzegging</h4><p>5.1 Na het verstrijken van de minimale looptijd van een abonnement dat per maand betaald wordt, wordt dit abonnement automatisch omgezet in een abonnement voor onbepaalde tijd, dus zonder einddatum. Vervolgens geldt een opzegtermijn van één kalendermaand.</p><p>5.2 Opzeggen kan door het opzegformulier op www.wonderrijk.com/abonnementen in te vullen, te ondertekenen en te e-mailen naar abonnementen@wonderrijk.com of ingevuld en ondertekend per post te versturen naar Wonderrijk, Postbus 12, 5570 AA Bloemenoord, onder vermelding van &#8220;opzegging abonnement&#8221;, het abonnementsnummer en je adresgegevens. Opzegging is tevens mogelijk bij de Gastenservice.</p><h4>6. Prijs/wijzigingen</h4><p>Wonderrijk kan de prijs van je abonnement aanpassen. Deze wijziging wordt pas doorgevoerd wanneer de minimale looptijd van twaalf maanden is verstreken. Wanneer je abonnement daarna per kalendermaand opzegbaar is, word je minimaal één maand van te voren geïnformeerd. Tevens kunnen de abonnementsvoorwaarden worden gewijzigd.</p><h4>7. Privacystatement</h4><p>De door jou verstrekte gegevens zullen door Wonderrijk volgens de Wet Bescherming Persoonsgegevens worden behandeld. Kijk voor meer informatie op www.wonderrijk.com/privacy.</p><h4>8. Meer weten?</h4><p>Voor meer informatie over abonnementen op Wonderrijk kun je bellen met +31 116 53 7447, e-mailen naar abonnementen@wonderrijk.com of je kan de Gastenservice bij de hoofdentree bezoeken. De Gastenservice is geopend tijdens de openingstijden van Wonderrijk.</p>", "questionRange": [31, 35]}], "questions": [{"n": 1, "textId": 1, "prompt": "Sanne wil voor Marké gaan werken. Ze wil graag op het kantoor werken en de planningen maken. Welke kantoorafdeling van Marké past bij haar?", "options": {"A": "administratie", "B": "bedrijfsbureau", "C": "personeelszaken"}, "answer": "B"}, {"n": 2, "textId": 1, "prompt": "Ezra wil voor Marké gaan werken. Hij vindt het leuk om gebak mooi te maken. Welke werkplek past bij hem?", "options": {"A": "de centrale bakkerij", "B": "de decentrale bakkerij", "C": "de proefbakkerij"}, "answer": "B"}, {"n": 3, "textId": 1, "prompt": "Joshua wil in de decentrale bakkerij gaan werken. Hoe laat moet hij dan beginnen?", "options": {"A": "tussen 2.00 en 4.00 uur", "B": "om 7.00 uur", "C": "om 17.00 uur"}, "answer": "B"}, {"n": 4, "textId": 1, "prompt": "Karl wil in een Marké-bakkerij gaan werken. Hij houdt ook van techniek. Welke werkplek past bij hem?", "options": {"A": "de centrale bakkerij", "B": "de decentrale bakkerij", "C": "de proefbakkerij"}, "answer": "A"}, {"n": 5, "textId": 1, "prompt": "Piet is op zoek naar een baan in de bakkerij-organisatie. Wat heeft Piet nodig om kans te maken op een baan?", "options": {"A": "een afgeronde BBL-opleiding tot bakker", "B": "een zelfstandig en stressbestendig karakter", "C": "ervaring in een bakkerij of met voedingsmiddelen"}, "answer": "C"}, {"n": 6, "textId": 1, "prompt": "Wat is het doel van deze tekst?", "options": {"A": "de lezer informeren over de werkprocessen bij de Marké-bakkerijen", "B": "de lezer overhalen om te solliciteren naar een functie bij Marké", "C": "de lezer uitleggen hoe professioneel de verschillende Marké-afdelingen zijn"}, "answer": "B"}, {"n": 7, "textId": 2, "prompt": "Bij wat voor beursstand kun je het meeste afwisselen in inrichting?", "options": {"A": "een eilandstand", "B": "een hoekstand", "C": "een kopstand", "D": "een tussenstand"}, "answer": "A"}, {"n": 8, "textId": 2, "prompt": "Alette wil op een beurs oorbellen verkopen in een stand. Welke tip over verlichting geldt voor Alette?", "options": {"A": "Gebruik licht dat de kleuren goed laat zien.", "B": "Gebruik veel licht bij de entree van de stand.", "C": "Gebruik vooral warm licht op de producten."}, "answer": "C"}, {"n": 9, "textId": 2, "prompt": "Waar staat informatie over de plaats van producten in de stand?", "options": {"A": "bij 'Entree'", "B": "bij 'Zitruimte'", "C": "bij 'Verlichting'", "D": "bij 'Routing'"}, "answer": "D"}, {"n": 10, "textId": 2, "prompt": "Welke tip staat in de tekst om zo veel mogelijk bezoekers te krijgen in je beursstand?", "options": {"A": "Informeer je relaties over de beursstand.", "B": "Investeer veel geld in de beursstand.", "C": "Zorg voor een logische looprichting."}, "answer": "A"}, {"n": 11, "textId": 2, "prompt": "Wat is het doel van deze tekst?", "options": {"A": "de lezer adviseren over het vo wen voor de belangrijkste gevolgen van langdurig verzuim"}, "answer": "A"}, {"n": 18, "textId": 4, "prompt": "Wat doet het ministerie van Defensie voor de autosportklas van Newton College?", "options": {"A": "Zij bieden technische opleidingen aan studenten van de autosportklas.", "B": "Zij leveren de auto's voor de autosportklas aan het Newton College.", "C": "Zij zorgen ervoor dat de studenten van de autosportklas werk krijgen."}, "answer": "B"}, {"n": 19, "textId": 4, "prompt": "Welke studenten worden vooral geselecteerd voor de autosportklas?", "options": {"A": "studenten die al een technische opleiding of carrière bij Defensie hebben", "B": "studenten die hoge cijfers halen, gemotiveerd zijn en kunnen samenwerken", "C": "studenten die zichzelf weten te bewijzen in een gesprek met hun mentor"}, "answer": "B"}, {"n": 20, "textId": 4, "prompt": "Wat vindt Kate Bitar het lastigst aan het traject van de autosportklas?", "options": {"A": "het financieel mogelijk maken van het traject", "B": "het opzetten en ontwikkelen van het traject", "C": "het vinden van goede studenten voor het traject"}, "answer": "A"}, {"n": 21, "textId": 4, "prompt": "Wat geldt voor de studenten Hussam en Abel?", "options": {"A": "Ze geven allebei aan later verder te willen in de racebranche.", "B": "Ze hebben allebei een overstap gemaakt naar een hoger niveau.", "C": "Ze zijn allebei gemotiveerd om aan het traject deel te nemen."}, "answer": "C"}, {"n": 22, "textId": 4, "prompt": "Wat wil de opleidingsmanager, Lauren Ramos, veranderen aan het traject van de autosportklas?", "options": {"A": "Ze wil het leerzamer maken met de hulp van leerbedrijven.", "B": "Ze wil het meer seizoenen laten doorlopen dan het nu doet.", "C": "Ze wil zorgen dat het beter aansluit op de bestaande opleidingen."}, "answer": "B"}, {"n": 23, "textId": 4, "prompt": "Wat is het meest leerzaam in het traject, volgens Bernardo Marelis?", "options": {"A": "de excursies", "B": "de gastlessen", "C": "de praktijkervaring"}, "answer": "C"}, {"n": 24, "textId": 4, "prompt": "Wat is de belangrijkste boodschap van de tekst?", "options": {"A": "De autosportklas is een uitdagend traject voor de beste studenten.", "B": "Het traject van de autosportklas moet worden uitgebreid.", "C": "Je maakt met de autosportklas kans op een internationale carrière."}, "answer": "A"}, {"n": 25, "textId": 5, "prompt": "Welk verrassend onderzoeksresultaat wordt in de tekst genoemd?", "options": {"A": "Veel jongeren hebben geen interesse in hun werk.", "B": "Veel jongeren vinden de inhoud van hun werk onbelangrijk.", "C": "Veel jongeren willen geen risico's nemen in hun werk."}, "answer": "C"}, {"n": 26, "textId": 5, "prompt": "Welk punt uit de Top 5 van ouderen vindt een deel van de jongeren ook belangrijk , volgens de tekst?", "options": {"A": "concrete resultaten", "B": "creativiteit", "C": "kwaliteit"}, "answer": "B"}, {"n": 27, "textId": 5, "prompt": "In de Top 5 van ouderen komt de wens naar zekerheid en stabiliteit in het werk niet voor. Waarom niet, volgens Vera Tames?", "options": {"A": "omdat veel ouderen al genoeg zekerheid en stabiliteit hebben opgebouwd", "B": "omdat veel ouderen hun gezondheid belangrijker vinden dan hun ambities", "C": "omdat veel ouderen liever thuis klusjes doen en creatief bezig zijn"}, "answer": "A"}, {"n": 28, "textId": 5, "prompt": "Wie willen zich volgens onderzoeker Van Veen vooral ontwikkelen?", "options": {"A": "jongeren", "B": "ouderen", "C": "werklozen", "D": "werkloze ouderen"}, "answer": "D"}, {"n": 29, "textId": 5, "prompt": "Waar zijn jongeren volgens Marcia Bregman bang voor?", "options": {"A": "om ontslagen te worden", "B": "om van werk te veranderen", "C": "voor een toekomst met eigen huis en kinderen", "D": "voor veranderingen"}, "answer": "A"}, {"n": 30, "textId": 5, "prompt": "Wie kunnen vooral voordeel halen uit de onderzoeksresultaten?", "options": {"A": "werkgevers", "B": "werknemers", "C": "werkzoekenden"}, "answer": "A"}, {"n": 31, "textId": 6, "prompt": "Jorik betaalt maandelijks voor zijn abonnement. Wat gebeurt er als het abonnement van Jorik één jaar oud is?", "options": {"A": "Dan krijgt hij een abonnement voor onbepaalde tijd.", "B": "Dan krijgt hij opnieuw een abonnement voor een jaar.", "C": "Dan loopt het abonnement dat hij heeft automatisch af."}, "answer": "A"}, {"n": 32, "textId": 6, "prompt": "Sifra wil het park bezoeken, maar ze heeft haar abonnement thuis laten liggen. Mag Sifra het park in?", "options": {"A": "Ja, want haar gegevens staan bij Wonderrijk geregistreerd.", "B": "Nee, want ze moet haar abonnement kunnen laten zien.", "C": "Misschien, de controleur bij de hoofdingang beslist daarover."}, "answer": "B"}, {"n": 33, "textId": 6, "prompt": "Mitch heeft een parkeerabonnement. Het is erg druk op de parkeerplaats en er zijn geen plaatsen vrij. Wat kan Mitch doen?", "options": {"A": "Hij kan een speciale parkeerplaats gebruiken waarop abonnementhouders voorrang hebben.", "B": "Hij kan het geld van het abonnement terugvragen, want hij heeft recht op een parkeerplaats.", "C": "Hij kan niets doen, want zijn abonnement geeft hem geen garantie op een parkeerplaats."}, "answer": "C"}, {"n": 34, "textId": 6, "prompt": "Het abonnement van Ramon is beschadigd en daardoor niet meer geldig. Hij vraagt een kopie van zijn abonnement aan. Moet hij hiervoor administratiekosten betalen?", "options": {"A": "Ja, dat moet iedereen die een kopie van een abonnement aanvraagt.", "B": "Nee, dat hoeft alleen wanneer iemand zijn abonnement verloren is.", "C": "Misschien, dat hangt ervan af hoe oud het abonnement van Ramon is."}, "answer": "A"}, {"n": 35, "textId": 6, "prompt": "Meryem heeft al twee jaar een abonnement voor onbepaalde tijd. Kan Wonderrijk de prijs van Meryems abonnement aanpassen?", "options": {"A": "Ja, Wonderrijk kan abonnementsprijzen op ieder moment aanpassen.", "B": "Nee, alleen de prijzen van nieuwe abonnementen kunnen worden aangepast.", "C": "Alleen als Wonderrijk Meryem een maand van tevoren informeert."}, "answer": "C"}]}];

function assembleMock(parts,title,kind){
  const texts=[], questions=[]; let n=1;
  parts.forEach((p,i)=>{ const tid=i+1, start=n;
    p.questions.forEach(q=>{ questions.push({n,textId:tid,prompt:q.prompt,options:q.options,answer:q.answer}); n++; });
    texts.push({id:tid,intro:p.text.intro||"",title:p.text.title+(p.year?` · ${p.year}`:""),body:p.text.body,questionRange:[start,n-1]}); });
  const N=questions.length;
  return {id:"mock",mock:true,mockKind:kind,year:null,title,timeLimitMin:Math.max(15,Math.round(N*110/35)),passMark:Math.max(1,Math.round(N*0.65)),totalQuestions:N,texts,questions};
}
function buildMockRandom(){
  const pool=[]; EXAMS.forEach(ex=>ex.texts.forEach(t=>pool.push({text:t,questions:ex.questions.filter(q=>q.textId===t.id),year:ex.year})));
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const chosen=[]; let c=0; for(const p of pool){ if(c>=33) break; chosen.push(p); c+=p.questions.length; }
  return assembleMock(chosen,"Willekeurig oefenexamen","random");
}
function buildMockText(ex,text){ return assembleMock([{text,questions:ex.questions.filter(q=>q.textId===text.id),year:ex.year}],"Losse tekst — "+text.title,"text"); }

  const head=el("div",{class:"qhead"},[el("span",{class:"qnum"},String(q.n)),el("div",{class:"prompt"},q.prompt)]);
  if(!review){ const on=!!s.flags[q.n];
    head.append(el("button",{class:"flagbtn"+(on?" on":""),"aria-pressed":String(on),"aria-label":on?"Markering verwijderen":"Vraag markeren",onclick:()=>toggleFlag(q.n)},[icon(on?I.flagFill:I.flag),on?"Gemarkeerd":"Markeer"])); }
  card.append(head);
  const chosen=s.answers[q.n], reveal=review||(s.mode==="practice"&&chosen!=null), order=orderFor(s,q);
  let correctLabel=null;
  order.forEach((letter,i)=>{
    const label=String.fromCharCode(65+i); if(letter===q.answer) correctLabel=label;
    const cls=["opt"]; if(chosen===letter) cls.push("sel");
    if(reveal){ if(letter===q.answer) cls.push("correct"); else if(chosen===letter) cls.push("wrong"); }
    const mark=(reveal&&letter===q.answer)?I.check:(reveal&&chosen===letter)?I.x:"";
    const opt=el("button",{class:cls.join(" "),disabled:review||undefined,"aria-pressed":String(chosen===letter)},
      [el("span",{class:"letter"},label),el("span",{class:"otext"},q.options[letter]),el("span",{class:"mark","aria-hidden":"true",html:mark})]);
    if(!review) opt.addEventListener("click",()=>{ snapScroll(); s.answers[q.n]=letter; s.activeQ=q.n; persist(); render(); });
    card.append(opt);
  });
  if(!review&&s.mode==="practice"&&chosen!=null){ const ok=chosen===q.answer;
    card.append(el("div",{class:"note "+(ok?"good":"bad")},[icon(ok?I.check:I.x),el("span",{},ok?"Goed!":"Helaas — het juiste antwoord is "+correctLabel)])); }
  return card;
}
function toggleFlag(n){ const s=state.session; snapScroll(); s.flags[n]=!s.flags[n]; if(!s.flags[n]) delete s.flags[n]; s.activeQ=n; persist(); render(); }
function jumpToFlag(){ const s=state.session; const flagged=s.exam.questions.filter(q=>s.flags[q.n]); if(!flagged.length) return;
  state.navOpen=false; const after=flagged.find(q=>q.n>s.activeQ)||flagged[0];
  s.currentTextId=after.textId; s.activeQ=after.n; state.scrollTo=after.n; render(); }

function confirmFinish(){
  const s=state.session, left=s.exam.totalQuestions-Object.keys(s.answers).length, nf=flagCount(s);
  let msg="";
  if(left>0) msg+=`Je hebt nog ${left} ${left===1?"vraag":"vragen"} niet beantwoord. `;
  if(nf>0) msg+=`Je hebt ${nf} gemarkeerde ${nf===1?"vraag":"vragen"}. `;
  if(msg && !confirm(msg+"Toch inleveren?")) return;
  finish();
}
function finish(){
  stopTimer(); const s=state.session, ex=s.exam; state.navOpen=false; state.scrollMemo=null;
  let score=0; ex.questions.forEach(q=>{ if(s.answers[q.n]===q.answer) score++; });
  s.finished=true; s.score=score; s.passed=score>=ex.passMark;
  const byText=ex.texts.map(t=>{ const qs=ex.questions.filter(q=>q.textId===t.id);
    return {title:t.title,right:qs.filter(q=>s.answers[q.n]===q.answer).length,total:qs.length}; });
  const hist=LS.get(HIST,[]);
  hist.push({examId:ex.id,mock:!!ex.mock,year:ex.year,label:ex.mock?ex.title:"Lezen "+ex.year,mode:s.mode,score,total:ex.totalQuestions,passed:s.passed,pct:Math.round(score/ex.totalQuestions*100),date:new Date().toISOString().slice(0,10),byText});
  LS.set(HIST,hist.slice(-200));
  if(!ex.mock) LS.del(ipKey(ex.id));
  state.reviewFilter="all"; go("results");
}

/* =====================================================================
   RESULTS
   ===================================================================== */
function renderResults(){
  const s=state.session, ex=s.exam;
  const root=$("#root"); root.innerHTML=""; const view=el("div",{class:"view"});
  const margin=s.passed?s.score-ex.passMark:ex.passMark-s.score;
  const hero=el("div",{class:"panel results-hero"});
  hero.append(scoreRing(s.score,ex.totalQuestions,s.passed));
  hero.append(el("div",{class:"verdict"},[
    el("h2",{class:s.passed?"pass":"fail"},s.passed?"Geslaagd":"Gezakt"),
    el("p",{}, s.passed?`Je had ${s.score} van de ${ex.totalQuestions} goed — ${margin} meer dan nodig (≥ ${ex.passMark}).`:`Je had ${s.score} van de ${ex.totalQuestions} goed. Je had er nog ${margin} nodig om te slagen (≥ ${ex.passMark}).`),
    el("div",{class:"actions"},[
      el("button",{class:"btn primary",onclick:()=>startSession(ex,s.mode)},[icon(I.redo),"Opnieuw"]),
      el("button",{class:"btn",onclick:()=>startSession(ex,s.mode,true)},[icon(I.shuffle),"Opnieuw, husselen"]),
      el("button",{class:"btn ghost",onclick:()=>go("stats")},[icon(I.stats),"Voortgang"]),
      el("button",{class:"btn ghost",onclick:exitToHome},[icon(I.home),"Start"]),
    ])]));
  view.append(hero);
  const bd=el("div",{class:"panel breakdown"}); bd.append(el("h3",{},"Per tekst"));
  ex.texts.forEach((t,i)=>{ const qs=ex.questions.filter(q=>q.textId===t.id); const right=qs.filter(q=>s.answers[q.n]===q.answer).length, p=Math.round(right/qs.length*100);
    const col=p>=67?'var(--good)':p>=34?'var(--warn)':'var(--bad)';
    bd.append(el("div",{class:"brow"},[el("div",{class:"name",title:t.title},`${i+1}. ${t.title}`),el("div",{class:"track2"},[el("i",{style:`width:${p}%;background:${col}`})]),el("div",{class:"frac"},`${right}/${qs.length}`)])); });
  view.append(bd);
  const wrong=ex.questions.filter(q=>s.answers[q.n]!==q.answer).length;
  const controls=el("div",{class:"review-controls"});
  controls.append(el("h3",{style:"font-size:18px"},"Antwoorden nakijken")); controls.append(el("span",{class:"grow"}));
  controls.append(el("div",{class:"seg",role:"radiogroup","aria-label":"Filter"},[
    el("button",{role:"radio","aria-pressed":String(state.reviewFilter==="all"),onclick:()=>{state.reviewFilter="all";render();}},`Alle (${ex.totalQuestions})`),
    el("button",{role:"radio","aria-pressed":String(state.reviewFilter==="wrong"),onclick:()=>{state.reviewFilter="wrong";render();}},`Alleen fout (${wrong})`)]));
  view.append(controls);
  const review=el("div",{class:"review"}); let shown=0;
  ex.texts.forEach((t,i)=>{ let qs=ex.questions.filter(q=>q.textId===t.id); if(state.reviewFilter==="wrong") qs=qs.filter(q=>s.answers[q.n]!==q.answer); if(!qs.length) return;
    review.append(el("div",{class:"rev-group"},[el("h4",{},`Tekst ${i+1} — ${t.title}`)]));
    qs.forEach(q=>{ const card=questionCard(q,true); card.setAttribute("role","button"); card.setAttribute("tabindex","0"); card.setAttribute("aria-label","Bekijk vraag "+q.n+" in de tekst");
      const open=()=>openReview(t.id,q.n); card.addEventListener("click",open);
      card.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();open();} });
      review.append(card); shown++; }); });
  if(shown===0) review.append(el("div",{class:"panel empty"},"Geen fouten — alles goed!"));
  view.append(review); root.append(view);
  requestAnimationFrame(()=>{ const v=$("#ring-v"); if(v) v.style.strokeDashoffset=v.dataset.to; });
}
function scoreRing(score,total,passed){
  const R=58,C=2*Math.PI*R,pct=score/total,col=passed?'var(--good)':'var(--bad)';
  const wrap=el("div",{class:"ring"});
  wrap.innerHTML=`<svg width="132" height="132" viewBox="0 0 132 132"><circle class="ring-c" cx="66" cy="66" r="${R}" fill="none" stroke-width="11"/><circle id="ring-v" class="ring-v" cx="66" cy="66" r="${R}" fill="none" stroke="${col}" stroke-width="11" stroke-dasharray="${C}" stroke-dashoffset="${reduceMotion?C*(1-pct):C}" data-to="${C*(1-pct)}"/></svg>`;
  wrap.append(el("div",{class:"label"},[el("b",{class:"tnum",style:`color:${col}`},`${score}`),el("span",{class:"tnum"},"/ "+total)]));
  return wrap;
}
function openReview(textId,scrollN){ state.session.currentTextId=textId; state.scrollTo=scrollN||null; go("reviewText"); }
function renderReviewText(){
  const s=state.session, ex=s.exam, cur=textOf(s), idx=ex.texts.indexOf(cur);
  const root=$("#root"); root.innerHTML=""; const wrap=el("div",{class:"quizwrap view"});
  const bar=el("div",{class:"quizbar"},[el("div",{class:"qb-row"},[
    el("button",{class:"btn",onclick:()=>go("results")},[icon(I.arrowL),"Terug naar uitslag"]),
    el("span",{class:"qb-grow"}),el("span",{class:"qb-title"},`Tekst ${idx+1} van ${ex.texts.length}`)])]);
  wrap.append(bar);
  const tb=el("div",{class:"toolbar"});
  tb.append(focusSeg());
  const pills=el("div",{class:"pills",role:"tablist"});
  ex.texts.forEach((t,i)=>pills.append(el("button",{class:"tpill",role:"tab","aria-current":String(t.id===s.currentTextId),onclick:()=>{s.currentTextId=t.id;render();const pt=$(".pane-text"),pq=$(".pane-q");if(pt)pt.scrollTop=0;if(pq)pq.scrollTop=0;}},"Tekst "+(i+1))));
  tb.append(pills); wrap.append(tb);
  const split=el("div",{class:"split m-"+focusMode(),style:`--split-h:${LS.get("lezen_split",46)}%`});
  split.append(el("div",{class:"pane-text"},[buildReader(s,cur,true)]));
  split.append(el("div",{class:"reshandle",onpointerdown:onHandleDown,"aria-hidden":"true"},[el("span",{class:"grip"})]));
  const pq=el("div",{class:"pane-q"}); const qlist=el("div",{class:"qlist"});
  ex.questions.filter(q=>q.textId===cur.id).forEach(q=>qlist.append(questionCard(q,true))); pq.append(qlist); split.append(pq);
  wrap.append(split); root.append(wrap);
  if(state.scrollTo!=null){ const n=document.getElementById("q-"+state.scrollTo); state.scrollTo=null;
    if(n) n.scrollIntoView({behavior:reduceMotion?'auto':'smooth',block:'center'}); }
}

/* =====================================================================
   STATS
   ===================================================================== */
function renderStats(){
  const root=$("#root"); root.innerHTML=""; const view=el("div",{class:"view"});
  const hist=LS.get(HIST,[]);
  view.append(el("div",{class:"qb-row",style:"margin-bottom:16px"},[el("button",{class:"btn",onclick:()=>go("home")},[icon(I.arrowL),"Terug"]),el("h2",{style:"font-size:20px"},"Jouw voortgang")]));
  if(!hist.length){ view.append(el("div",{class:"panel empty"},"Nog geen pogingen. Maak een examen om je voortgang te zien.")); root.append(view); return; }
  const attempts=hist.length, passed=hist.filter(h=>h.passed).length, passRate=Math.round(passed/attempts*100);
  const pcts=hist.map(h=>h.pct??Math.round(h.score/h.total*100)), avg=Math.round(pcts.reduce((a,b)=>a+b,0)/attempts), best=Math.max(...pcts);
  view.append(el("div",{class:"tiles"},[tile("Pogingen",attempts),tile("Geslaagd",passRate,"%"),tile("Gemiddeld",avg,"%"),tile("Beste",best,"%")]));
  view.append(trendChart(pcts));
  const agg={}; hist.forEach(h=>(h.byText||[]).forEach(b=>{ agg[b.title]=agg[b.title]||{right:0,total:0}; agg[b.title].right+=b.right; agg[b.title].total+=b.total; }));
  const weak=Object.entries(agg).map(([title,v])=>({title,pct:Math.round(v.right/v.total*100),total:v.total})).filter(w=>w.total>=2).sort((a,b)=>a.pct-b.pct).slice(0,6);
  if(weak.length){ const wc=el("div",{class:"panel breakdown"}); wc.append(el("h3",{},"Teksten waar je het laagst op scoort"));
    weak.forEach(w=>{ const col=w.pct>=67?'var(--good)':w.pct>=34?'var(--warn)':'var(--bad)';
      wc.append(el("div",{class:"brow"},[el("div",{class:"name",title:w.title},w.title),el("div",{class:"track2"},[el("i",{style:`width:${w.pct}%;background:${col}`})]),el("div",{class:"frac"},w.pct+"%")])); });
    view.append(wc); }
  const rc=el("div",{class:"panel recent"});
  hist.slice(-8).reverse().forEach(h=>{ rc.append(el("div",{class:"rrow"},[el("span",{class:"date"},h.date),el("span",{class:"nm"},h.label||("Lezen "+h.year)),el("span",{class:"vd",style:`color:${h.passed?'var(--good)':'var(--bad)'}`},`${h.score}/${h.total}`)])); });
  view.append(el("div",{class:"section-title",style:"margin-top:6px"},[el("h2",{style:"font-size:16px"},"Laatste pogingen")]));
  view.append(rc);
  view.append(el("button",{class:"btn ghost",style:"margin-top:4px",onclick:()=>{ if(confirm("Alle resultaten en voortgang wissen?")){LS.del(HIST);render();} }},"Geschiedenis wissen"));
  root.append(view);
}
function tile(k,v,suffix){ return el("div",{class:"panel tile"},[el("div",{class:"k"},k),el("div",{class:"v tnum"},[String(v),suffix?el("small",{},suffix):null])]); }
function trendChart(pcts){
  const W=600,H=180,pad=24,n=pcts.length;
  const x=i=>n<=1?pad:pad+(W-2*pad)*i/(n-1), y=v=>H-pad-(H-2*pad)*v/100;
  const card=el("div",{class:"chartcard"}); card.append(el("h3",{},"Score per poging"));
  const passY=y(65);
  const pts=pcts.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const dots=pcts.map((v,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="3.5" fill="var(--primary)"/>`).join("");
  card.append(el("div",{class:"chart",html:`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="Score per poging">
    <line x1="${pad}" y1="${passY}" x2="${W-pad}" y2="${passY}" stroke="var(--warn)" stroke-width="1.3" stroke-dasharray="5 5"/>
    <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="var(--line)" stroke-width="1.3"/>
    ${n>1?`<polyline points="${pts}" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`:""}${dots}</svg>`}));
  card.append(el("div",{class:"legendline"},[el("span",{},"0–100% per poging"),el("span",{style:"color:var(--warn)"},"– – – ≈ slaaggrens")]));
  return card;
}

/* =====================================================================
   OVERLAYS (shortcuts + question navigator)
   ===================================================================== */
function renderOverlays(){
  let o=$("#overlay"); if(o) o.remove();
  if(!state.helpOpen && !state.navOpen) return;
  const close=()=>{ state.helpOpen=false; state.navOpen=false; renderOverlays(); };
  let sheet;
  if(state.helpOpen){
    const rows=[ [["A","B","C","D"],"Antwoord kiezen voor de actieve vraag"],[["↑","↓"],"Vorige / volgende vraag"],
      [["←","→"],"Vorige / volgende tekst"],[["F"],"Vraag markeren"],[["Enter"],"Inleveren"],[["?"],"Deze hulp tonen/sluiten"],[["Esc"],"Sluiten"] ];
    sheet=el("div",{class:"sheet",role:"dialog","aria-modal":"true","aria-label":"Sneltoetsen"},[
      el("div",{class:"sheet-head"},[el("h3",{},"Sneltoetsen"),el("button",{class:"btn ghost iconbtn",onclick:close,"aria-label":"Sluiten"},[icon(I.x)])]),
      ...rows.map(([keys,desc])=>el("div",{class:"kbd-row"},[el("div",{class:"keys"},keys.map(k=>el("kbd",{},k))),el("div",{class:"desc"},desc)])) ]);
  } else {
    const s=state.session; if(!s){ return; }
    const grid=el("div",{class:"navgrid"});
    s.exam.questions.forEach(q=>{ const cls=["navcell"];
      if(s.finished){ if(s.answers[q.n]===q.answer) cls.push("correct"); else cls.push("wrong"); }
      else { if(s.answers[q.n]!=null) cls.push("answered"); if(s.flags[q.n]) cls.push("flag"); }
      if(q.textId===s.currentTextId) cls.push("cur");
      grid.append(el("button",{class:cls.join(" "),"aria-label":`Vraag ${q.n}`,onclick:()=>{ s.currentTextId=q.textId; s.activeQ=q.n; state.scrollTo=q.n; state.navOpen=false; persist(); render(); }},String(q.n))); });
    sheet=el("div",{class:"sheet",role:"dialog","aria-modal":"true","aria-label":"Vragenoverzicht"},[
      el("div",{class:"sheet-head"},[el("h3",{},"Overzicht"),el("button",{class:"btn ghost iconbtn",onclick:close,"aria-label":"Sluiten"},[icon(I.x)])]),
      el("div",{class:"navlegend"},[el("span",{html:'<i style="background:var(--primary-soft);border:1px solid var(--primary)"></i>beantwoord'}),
        el("span",{html:'<i style="background:var(--surface-2);border:1px solid var(--line)"></i>nog open'}),
        el("span",{html:'<i style="background:var(--surface-2);border:1px solid var(--line)"></i>met stip = gemarkeerd'})]),
      grid ]);
  }
  o=el("div",{id:"overlay",class:"overlay",onclick:e=>{ if(e.target===o) close(); }},[sheet]);
  document.body.append(o);
}

/* =====================================================================
   KEYBOARD
   ===================================================================== */
document.addEventListener("keydown",(e)=>{
  if(e.key==="?"){ e.preventDefault(); state.helpOpen=!state.helpOpen; state.navOpen=false; renderOverlays(); return; }
  if(state.helpOpen||state.navOpen){ if(e.key==="Escape"){ state.helpOpen=false; state.navOpen=false; renderOverlays(); } return; }
  if(state.view!=="quiz"||!state.session) return;
  const tag=(e.target.tagName||"").toLowerCase(); if(tag==="input"||tag==="textarea") return;
  const s=state.session, ex=s.exam, k=e.key.toLowerCase();
  if(["a","b","c","d"].includes(k)){ e.preventDefault(); answerActive("abcd".indexOf(k)); }
  else if(e.key==="ArrowDown"||k==="j"){ e.preventDefault(); moveActive(1); }
  else if(e.key==="ArrowUp"||k==="k"){ e.preventDefault(); moveActive(-1); }
  else if(e.key==="ArrowRight"){ e.preventDefault(); const i=ex.texts.findIndex(t=>t.id===s.currentTextId); if(i<ex.texts.length-1) switchText(ex.texts[i+1].id,true); }
  else if(e.key==="ArrowLeft"){ e.preventDefault(); const i=ex.texts.findIndex(t=>t.id===s.currentTextId); if(i>0) switchText(ex.texts[i-1].id,true); }
  else if(k==="f"){ e.preventDefault(); toggleFlag(s.activeQ); }
  else if(e.key==="Enter"){ e.preventDefault(); confirmFinish(); }
});
function activeQuestion(){ const s=state.session; return s.exam.questions.find(q=>q.n===s.activeQ)||s.exam.questions[0]; }
function answerActive(pos){ const s=state.session, q=activeQuestion(), order=orderFor(s,q); if(pos>=order.length) return; snapScroll(); s.answers[q.n]=order[pos]; persist(); render(); }
function moveActive(dir){ const s=state.session, qs=s.exam.questions, idx=qs.findIndex(q=>q.n===s.activeQ);
  const q=qs[Math.min(qs.length-1,Math.max(0,idx+dir))]; const sameText=q.textId===s.currentTextId;
  s.activeQ=q.n; if(!sameText) s.currentTextId=q.textId; if(sameText) snapScroll(); state.scrollTo=q.n; persist(); render(); }

/* ---------- render ---------- */
function render(){
  setHeader();
  const hdr=document.querySelector("header.app"); if(hdr) document.documentElement.style.setProperty("--hdr",hdr.offsetHeight+"px");
  $("#root").classList.toggle("quizmode", state.view==="quiz"||state.view==="reviewText");
  ({home:renderHome,pickText:renderPickText,quiz:renderQuiz,results:renderResults,reviewText:renderReviewText,stats:renderStats}[state.view]||renderHome)();
  renderOverlays();
  document.title = state.view==="quiz"&&state.session ? `${state.session.exam.mock?"Oefenen":"Lezen "+state.session.exam.year} · Lezen Trainer` : "Lezen Trainer";
}
applyTheme();
render();

if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load",()=>navigator.serviceWorker.register("service-worker.js").catch(()=>{}));
}
</script>
