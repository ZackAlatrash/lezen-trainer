els van het ROC bedoeld?", "options": {"A": "voor alle bezoekers", "B": "voor alle docenten", "C": "voor alle ICT-medewerkers", "D": "voor alle leerlingen"}, "answer": "D"}, {"n": 12, "textId": 3, "prompt": "Volgens de tekst staat de Nederlandse land- en tuinbouw bekend als modern en succesvol. Waarom?", "options": {"A": "De Nederlandse land- en tuinbouw gebruikt veel nieuwe technieken en apparatuur.", "B": "In de Nederlandse land- en tuinbouw werken veel mensen met de juiste opleiding.", "C": "Veel bedrijven verkopen en onderhouden land- en tuinbouwmachines."}, "answer": "A"}, {"n": 13, "textId": 3, "prompt": "Wat is volgens de tekst een interessante opleiding voor mensen die graag grote machines repareren?", "options": {"A": "landbouwtechniek", "B": "mechanisatie", "C": "medewerker gemechaniseerd loonwerk", "D": "monteur-chauffeur"}, "answer": "D"}, {"n": 14, "textId": 3, "prompt": "Wie kan een eigen bloemenzaak beginnen?", "options": {"A": "iemand met het diploma Algemene Ondernemersvaardigheden", "B": "iemand met het diploma bloemschikken", "C": "iemand met het diploma tuincentrum"}, "answer": "A"}, {"n": 15, "textId": 3, "prompt": "Hoelang duurt de opleiding arrangeur/decorateur bloemen- en tuincentrumbranche niveau IV voor cursisten met een havo-diploma?", "options": {"A": "drie jaar", "B": "korter dan drie jaar", "C": "langer dan drie jaar"}, "answer": "A"}, {"n": 16, "textId": 4, "prompt": "Laetitia werkt elk weekend via het uitzendbureau in een restaurant. Wat voor werkkleding moet Laetitia dragen in het restaurant?", "options": {"A": "In de tekst staat niet wat ze wel of niet moet dragen.", "B": "Ze mag alles dragen behalve een sjaal of ketting.", "C": "Ze moet beschermingsmiddelen dragen.", "D": "Ze moet een net mantelpak dragen."}, "answer": "A"}, {"n": 17, "textId": 4, "prompt": "Het is zondag. Laetitia is te ziek om te werken. Ze meldt zich vóór 9.00 uur ziek bij het restaurant. Ze moet zich ook ziek melden bij het uitzendbureau. Wanneer?", "options": {"A": "zondag vóór 9.00 uur", "B": "maandagochtend", "C": "binnen 2 à 3 dagen"}, "answer": "B"}, {"n": 18, "textId": 4, "prompt": "Het is donderdag. Laetitia was vier dagen ziek. Ze belt naar het restaurant en zegt dat ze komende zaterdag weer komt werken. Ze moet zich ook beter melden bij het uitzendbureau. Wanneer?", "options": {"A": "direct", "B": "komende zaterdag vóór 9.00 uur", "C": "volgende week maandagochtend"}, "answer": "A"}, {"n": 19, "textId": 4, "prompt": "Wie moet Laetitia ziek en beter melden bij het UWV?", "options": {"A": "Het uitzendbureau moet Laetitia zowel ziek als beter melden bij het UWV.", "B": "Laetitia moet zichzelf zowel ziek als beter melden bij het UWV.", "C": "Het uitzendbureau moet Laetitia ziek melden, Laetitia moet zichzelf beter melden.", "D": "Laetitia moet zichzelf ziek melden, het uitzendbureau moet Laetitia beter melden."}, "answer": "C"}, {"n": 20, "textId": 4, "prompt": "Laetitia wil stoppen met haar werk. Wat zijn de regels voor het afmelden?", "options": {"A": "Laetitia meldt zich af bij het restaurant, het restaurant geeft dit door aan het uitzendbureau.", "B": "Laetitia meldt zich af bij het uitzendbureau, het uitzendbureau meldt Laetitia af bij het restaurant.", "C": "Laetitia meldt zich af bij het uitzendbureau én bij het restaurant."}, "answer": "C"}, {"n": 21, "textId": 5, "prompt": "Angela wil alleen maar overdag werken. Kan dat bij de brandweer?", "options": {"A": "Ja, ze kan gewoon van acht tot vijf bij de brandweer werken.", "B": "Nee, ze kan alleen bij de brandweer werken als ze 24-uursdiensten wil draaien.", "C": "Dat kan wel bij de vrijwillige brandweer, maar niet bij de beroeps."}, "answer": "A"}, {"n": 22, "textId": 5, "prompt": "Angela is bang dat de brandweermannen haar niet zullen aanvaarden omdat ze een vrouw is. Wat zegt Caroline hierover?", "options": {"A": "Mannen accepteren Caroline door haar werk als sportlerares.", "B": "Mannen moesten eerst wennen maar nu gaat het goed.", "C": "Vrouwen moeten zichzelf nog dagelijks bewijzen en dat is lastig.", "D": "Vrouwen zijn nog steeds niet volledig geaccepteerd."}, "answer": "B"}, {"n": 23, "textId": 5, "prompt": "Angela wilde altijd al bij de brandweer. Geldt dat ook voor Anne-Pauline?", "options": {"A": "Ja, het was een kinderdroom van haar.", "B": "Nee, dat is door omstandigheden zo gegaan.", "C": "Nee, ze wilde liever hovenier worden, maar dat ging niet."}, "answer": "B"}, {"n": 24, "textId": 5, "prompt": "Angela vraagt zich af wat ze ongeveer kan verdienen bij de brandweer. Wat kan ze hierover lezen in de tekst?", "options": {"A": "Dat hangt af van haar functie.", "B": "evenveel als een mannelijke collega", "C": "Dat staat niet in de tekst."}, "answer": "C"}, {"n": 25, "textId": 5, "prompt": "De schrijver laat enkele vrouwen iets vertellen over hun werk bij de brandweer. Waarom doet hij dat?", "options": {"A": "om te laten zien dat brandweervrouwen even goed werken als brandweermannen", "B": "om te laten zien dat brandweervrouwen hun werk leuk vinden", "C": "om te laten zien welke voor- en nadelen vrouwen ervaren in hun werk bij de brandweer"}, "answer": "B"}, {"n": 26, "textId": 6, "prompt": "Hoe noemt de schrijver het proces van het zich eigen maken van gewoonten?", "options": {"A": "imitatie", "B": "internalisatie", "C": "socialisatie"}, "answer": "B"}, {"n": 27, "textId": 6, "prompt": "Waarvan worden in tekstdeel 2 voorbeelden gegeven?", "options": {"A": "van leren door herhaling", "B": "van leren door beloning", "C": "van model-leren"}, "answer": "A"}, {"n": 28, "textId": 6, "prompt": "Wat zijn volgens de tekst voorbeelden van leren door conditionering?", "options": {"A": "personen als voorbeeld nemen", "B": "positieve en negatieve reacties krijgen", "C": "verschillende soorten ervaring opdoen"}, "answer": "B"}, {"n": 29, "textId": 6, "prompt": "In tekstdeel 5 heeft de schrijver het over ‘een referentiegroep’. Wat bedoelt hij hiermee?", "options": {"A": "mensen die belangrijke ideeën, waarden, normen en opvattingen van iemand overnemen", "B": "mensen met ideeën, waarden, normen en opvattingen die voor iemand belangrijk zijn", "C": "mensen voor wie ideeën, waarden, normen en opvattingen van anderen belangrijk zijn"}, "answer": "B"}, {"n": 30, "textId": 6, "prompt": "Wat is het belangrijkste doel van deze tekst?", "options": {"A": "lezers informeren over hoe mensen gewoonten aanleren", "B": "lezers leren hoe ze gewoonten kunnen herkennen", "C": "lezers uitleggen welke gewoonten er zijn"}, "answer": "A"}, {"n": 31, "textId": 7, "prompt": "Souleyman wil weten of zijn elektrische tandenborstel geschikt is voor zijn zoontje van 2. Onder welk kopje kan hij dat vinden?", "options": {"A": "onder ‘Belangrijk’", "B": "onder ‘Waarschuwing’", "C": "onder ‘Beschrijving’", "D": "onder ‘Gebruik van de tandenborstel’"}, "answer": "A"}, {"n": 32, "textId": 7, "prompt": "Antonio heeft zijn tandenborstel op de oplader gezet, maar het indicatielampje gaat niet aan. Wat moet hij doen?", "options": {"A": "De tandenborstel eerst helemaal laten ontladen voordat hij hem oplaadt.", "B": "De tandenborstel op de oplader laten staan, want het lampje zal verschijnen.", "C": "De tandenborstel van de oplader halen, want opladen is dan nog niet nodig."}, "answer": "B"}, {"n": 33, "textId": 7, "prompt": "Rebecca heeft een QuadroX-opzetborstel. Wat voor poetstechniek moet ze gebruiken?", "options": {"A": "een heen-en-weer-poetsbeweging maken", "B": "een roterende poetsbeweging maken", "C": "langzaam van tand naar tand bewegen"}, "answer": "A"}, {"n": 34, "textId": 7, "prompt": "Lisan heeft last van pijnlijke gebieden in haar mond. Welke poetsstand kan zij het beste gebruiken?", "options": {"A": "«poetsstand 1»", "B": "«poetsstand 2»", "C": "«poetsstand 3»"}, "answer": "B"}, {"n": 35, "textId": 7, "prompt": "Jason draagt een beugel. Welke opzetborstel kan hij het beste gebruiken?", "options": {"A": "de 3DAllround-opzetborstel", "B": "de CleanQ-opzetborstel", "C": "de 4MEDwhite-opzetborstel"}, "answer": "C"}, {"n": 36, "textId": 7, "prompt": "Wat is het doel van deze tekst?", "options": {"A": "mensen informeren over voor- en nadelen van elektrisch poetsen", "B": "mensen overtuigen een elektrische tandenborstel te kiezen", "C": "mensen uitleggen hoe een elektrische tandenborstel werkt", "D": "mensen waarschuwen voor de risico’s van elektrisch poetsen"}, "answer": "C"}]}, {"id": "2021", "year": 2021, "title": "B1 Lezen 2021 — Openbaar examen", "timeLimitMin": 110, "passMark": 22, "totalQuestions": 37, "texts": [{"id": 1, "intro": "Deze tekst gaat over het lopen van een marathon. Is een hardloopwedstrijd van ruim 42 kilometer wel gezond?", "title": "Is een marathon lopen gezond?", "body": "<p>Een marathon is voor veel hardlopers een geweldige ervaring. Maar is een hardloopwedstrijd over een afstand van 42 kilometer en 195 meter wel gezond? Phidippides, die in het oude Griekenland de eerste marathon liep, viel dood neer na in Athene te zijn aangekomen. En hij was een goed getrainde soldaat.</p><h4>(On-)gezond?</h4><p>Hardlopen is gezond, blijkt telkens weer uit onderzoeken. Hardlopers leven langer en hebben tot op hoge leeftijd minder risico op gezondheidsproblemen. Niet voor niets doen er aan marathons vaak duizenden hardlopers mee.</p><p>Maar is een marathon lopen ook wel zo gezond? Met kans op maagdarmproblemen, blessures aan knieën en enkels en zelfs hartfalen lijkt een marathon niet bepaald een gezonde bezigheid. Van elke vijf getrainde lopers krijgt er één tijdens de marathon te maken met een nieuwe blessure.</p><p>&ldquo;De mens is niet gebouwd op het lopen van een marathon&rdquo;, zegt bioloog en sporthater Midas Dekkers. &ldquo;Het skelet kan niet urenlang gedreun verdragen. Alsof je in een oud Volkswagentje een Ferrari-motor bouwt en dan 250 kilometer per uur gaat rijden.&rdquo;</p><p>Het verhaal over Phidippides is volgens hem niet waar. Marathonlopers storten zich volgens Dekkers op een wedstrijd van veel te veel kilometers op basis van een eeuwenoud verzinsel.</p><p>Uit sportmedisch onderzoek blijkt dat een hardloper tijdens het rennen knieën en enkels belast met vier tot vijf keer zijn eigen lichaamsgewicht. Tijdens een marathon kan de belasting oplopen tot miljoenen kilo's. Hoe langer en hoe harder er gelopen wordt, des te groter de kans op blessures. Wat dat betreft heeft Midas Dekkers dus gelijk.</p><h4>Voorbereiding</h4><p>Toch is een marathon lopen volgens sportartsen &lsquo;niet ongezond&rsquo;, zolang de loper zich langdurig en zeer goed heeft voorbereid. Sportarts Don de Winter zegt dat de niet goed getrainde sporters de marathon een ongezond imago bezorgen.</p><p>Een marathon is voor het menselijk lichaam eigenlijk zeven kilometer te lang. Alleen de echt sterke lopers kunnen hun snelheid hoog houden in het laatste stuk. Hoeveel pasta, aardappelen en bananen de loper vooraf ook gegeten heeft, na 35 kilometer zijn de koolhydraten op en moet de energie komen uit sportdrank en de verbranding van vet. Dat is het punt waar veel sporters problemen krijgen.</p><p>Een uitgekiend voedingspatroon in de voorbereidingsfase moet uitputting voorkomen. Er moet ook getraind zijn op de inname van vocht tijdens het rennen, want maag en darmen kunnen tijdens de marathon voedsel en drank met moeite verwerken.</p><h4>Risico's</h4><p>Wie onvoldoende getraind meedoet aan een marathon, kan problemen krijgen met zijn hart. Een overbelast hart van een gezond persoon kan tot zelfs een maand na de marathon nog klachten geven.</p><p>Maar het kan ook erger. Zo werd de marathon van Rotterdam in 2006 opgeschrikt door een fatale hartstilstand bij een getrainde deelnemer. Naar schatting krijgen in Nederland per jaar 400 hardlopers, ook recreatieve lopers, te maken met hartfalen. Dat roept vragen op. Is hardlopen echt slecht voor het hart?</p><p>&ldquo;Zonder sport zouden er veel meer gevallen van hartfalen voorkomen&rdquo;, zegt sportarts M. van der Werve. Regelmatig sporten en bewegen is volgens de arts juist een goede bescherming tegen het krijgen van hart- en vaatziektes. De kans op plotselinge dood tijdens inspanning is bij getrainde sporters meer dan tien keer zo klein. Een totaal gebrek aan beweging is volgens Van der Werve net zo'n gevaarlijke risicofactor als bijvoorbeeld roken.</p><p>Italiaanse onderzoekers hebben vastgesteld dat ongeveer 80% van de sporters die tijdens het hardlopen werden getroffen door een infarct, al eerder signalen kregen die wezen op hartfalen. Een bezoek aan de huisarts had wellicht erger kunnen voorkomen. Deelnemers aan marathons behoren volgens sportartsen altijd een sportmedische keuring te ondergaan voordat ze aan een trainingsprogramma voor de marathon beginnen.</p>", "questionRange": [1, 5]}, {"id": 2, "intro": "Deze tekst komt uit een brochure van de politie. De politie geeft tips over hoe u bij u thuis de kans op een overval verkleint.", "title": "Veilig wonen", "body": "<p>Niet alleen winkels, benzinepompen en fastfoodrestaurants worden overvallen, ook woningovervallen komen voor. De kans dat u in uw woning overvallen wordt is klein, maar behoort wel tot de realiteit. Naast het opvolgen van de onderstaande tips, kunnen ook de maatregelen van het Politiekeurmerk Veilig Wonen de kans op een woningoverval aanzienlijk verkleinen. Het keurmerk is er onder andere op gericht dat u van binnenuit altijd kunt zien wie er voor de deur staat.</p><h4>DOE NOOIT ZOMAAR OPEN</h4><ul><li>Maak met uzelf de afspraak dat u niet open doet zonder eerst te kijken wie er voor de deur staat.</li><li>Doe bij woongebouwen met een centrale toegang alleen open voor uw eigen bezoek. Kijk door het raam, de deurspion of gebruik de intercom.</li><li>Doe een stevige kierstandhouder op de deur, zodat niemand de deur kan openen en u naar binnen kan duwen.</li><li>Vraag wie de persoon is en wat deze komt doen. Blijft u twijfelen? Laat hem dan met een legitimatie bewijzen wie hij is. Hij moet dit kunnen, ook als hij zegt namens de gemeente, een bedrijf of een instelling te komen. Indien u dan nog twijfelt aan zijn goede bedoelingen is het verstandig om &ndash; voordat u de persoon binnenlaat &ndash; ter controle te bellen naar het betreffende bedrijf of instantie.</li><li>Aan onverwacht bezoek (bijvoorbeeld een elektriciteitsbedrijf) kunt u ook vragen om op een ander tijdstip terug te komen, als er meerdere mensen thuis zijn.</li></ul><h4>BLIJF ALERT</h4><ul><li>Als u een collectant niet kent, laat deze buiten wachten en doe de deur even dicht terwijl u uw portemonnee gaat halen. Het is ook handig om een klein geldbedrag vlakbij de voordeur neer te leggen (in de meterkast bijvoorbeeld). Een collectant is verplicht een legitimatiebewijs en een afschrift van de vergunning van de gemeente/collecterende instantie bij zich te dragen.</li><li>Wees bedacht op zielige praatjes of smoezen die oplichters gebruiken om binnen te komen. Als onbekenden &lsquo;in nood&rsquo; aan de deur komen en vragen of ze het alarmnummer mogen bellen, laat ze dan niet binnen. Bel zelf het alarmnummer.</li><li>Geef nooit uw bankpas en/of pincode af.</li></ul><h4>WEES VOORZICHTIG</h4><ul><li>Koopt u nieuwe apparatuur, zet de verpakkingsdoos dan niet opvallend bij het oud papier. Daders kunnen daaraan zien dat er kostbare spullen in huis aanwezig zijn.</li><li>Wees niet loslippig over waardevolle spullen of geld dat u in huis heeft.</li><li>Met name ondernemers dienen te voorkomen dat geld van de zaak in huis bewaard wordt.</li><li>Wees voorzichtig met informatie over uzelf. Denk daarbij aan informatie over avonden waarop u alleen thuis bent of over tijdstippen waarop u weggaat of thuiskomt. Vergeet niet dat inbrekers en overvallers mee gaan met hun tijd. Ze bekijken niet alleen uw woning om te zien of u thuis bent, maar ze zijn ook te vinden op internet. Ook daar moet u zich beschermen. Maak dus geen melding op Twitter, Facebook of op uw weblog van waar u bent of naartoe gaat.</li><li>Let op met contacten die u legt via internet. U weet immers nog weinig over de persoon waarmee u contact heeft. Spreek bijvoorbeeld eerst een aantal keer buitenshuis af om iemand beter te leren kennen. Gaat het om de ver- of aankoop via bijvoorbeeld een veilingsite, kies dan voor de overdracht van de goederen voor een neutrale plek met meerdere mensen.</li><li>Afspraak met een onbekende aan huis? Zorg dat er bekenden bij u aanwezig zijn.</li></ul><h4>POLITIEKEURMERK VEILIG WONEN</h4><ul><li>Het PKVW is een veiligheidsinstrument dat bijdraagt aan de sociale veiligheid in en rond woningen, wooncomplexen en wijken. Één van de eisen van het keurmerk is dat bewoners altijd kunnen zien wie er voor de deur staat. Bijvoorbeeld door glas naast de deur of een deurspion. Ook goede (openbare) verlichting en groenbeheer &ndash; dat in het PKVW is vastgelegd &ndash; zorgen ervoor dat er zicht is vanaf de straat en vanuit andere woningen op uw voordeur.</li><li>Het keurmerk stelt ook andere eisen, zoals goedgekeurd hang- en sluitwerk op ramen, deuren en lichtkoepels. Eventueel ook op de schuur of garage als de woning via een tussendeur bereikbaar is. Maar denk ook aan rookmelders op iedere etage. Want naast inbraakveiligheid zegt het keurmerk ook iets over brandveiligheid.</li></ul>", "questionRange": [6, 10]}, {"id": 3, "intro": "In deze tekst uit een studieboek kunt u lezen hoe temperatuur, luchtsnelheid en vochtigheid van invloed kunnen zijn op werkomstandigheden en hoe mensen zich daaraan kunnen aanpassen.", "title": "Klimaat", "body": "<h4>1. Klimaatfactoren</h4><p>Het klimaat heeft een grote invloed op uw prestatie, uw motivatie en dus op uw welzijn tijdens uw werk. Een slecht klimaat kan ook direct invloed hebben op uw gezondheid en zelfs op uw veiligheid. Denk daarbij aan vocht en elektriciteit of aan koude handen en het bedienen van machines. De drie klimaatfactoren zijn temperatuur, luchtsnelheid en vochtigheid.</p><h4>1.1. Temperatuur</h4><p>Uw lichaam zet voedsel om in energie. De temperatuur die daarvoor nodig is, is ongeveer 37˚C. Bij deze omzetting komt warmte vrij die moet worden afgevoerd naar buiten. De temperatuur aan uw huidoppervlakte is ± 32˚C. Meestal is de temperatuur van de lucht om u heen lager. Hierdoor kan uw lichaam de af te voeren warmte afgeven aan uw omgeving.</p><p>De hoeveelheid warmte-energie die u kwijt moet, is afhankelijk van het werk dat u doet. U voelt u onbehaaglijk als u te veel of te weinig warmte afstaat aan uw omgeving. Het klimaat is goed als de hoeveelheid warmte die uw lichaam kwijt moet, beperkt blijft tot het noodzakelijke.</p><p>Als de omgevingstemperatuur te laag is wordt u bleek, krijgt u kippenvel en gaat u rillen. Bleek wordt u omdat uw bloed meer van het huidoppervlak af gaat stromen om afkoeling te voorkomen. Door kippenvel worden uw huidharen rechtop gezet. Tussen deze haren blijft een laagje lucht hangen dat isolerend werkt. Voor het rillen of het maken van andere bewegingen, is energie nodig. Daardoor verbruikt u meer voedsel en ontstaat meer afvalwarmte. Dat verklaart de behoefte aan meer voedsel bij koud weer of veel bewegen.</p><p>Als de omgevingstemperatuur te hoog is, wordt u rood, zweet u veel en beweegt u vaak zo weinig mogelijk. Zweten is het afstoten van water aan het oppervlak van het lichaam. Dat water moet weer worden aangevuld door veel te drinken. Zweet bevat ook veel mineralen, vooral zout. Bij erg veel zweten moet een zouttekort worden voorkomen om gezond te blijven.</p><p>Als een vloeistof verdampt, dan is hiervoor veel warmte-energie nodig. Deze energie wordt onttrokken aan uw omgeving. Als het zweet verdampt op uw huidoppervlak geeft dit verkoeling. Uw lichaam kan meer warmte kwijt.</p><p>Door het dragen van meer of minder kleding en het verwarmen of koelen van de lucht, past u uw lichaamswarmte aan aan het werk dat u moet doen.</p><h4>1.2. Luchtsnelheid</h4><p>Lucht is altijd in beweging. Op die manier komt er frisse lucht, verdwijnen hinderlijke geuren en kan uw lichaam zijn warmte kwijt. Twee factoren bepalen of luchtverplaatsing hinderlijk is: de temperatuur en de snelheid van de luchtstroom.</p><p>Buiten is een grote luchtsnelheid vooral een probleem wanneer het koud is. De wind zorgt ervoor dat uw lichaam sneller afkoelt. In de zomer is dezelfde windkracht prettig.</p><p>Een te hoge luchtsnelheid binnen noemen we tocht. De gevoeligheid voor tocht is veel groter dan voor wind. Dit komt doordat de luchtstroom binnen meestal een lagere temperatuur heeft dan de omgeving. De luchtstroom komt namelijk vaak door kieren en door openstaande ramen en deuren.</p><h4>1.3. Vochtigheid</h4><p>Wanneer u nat wordt door de regen, dan daalt uw lichaamstemperatuur. Op een zomerse dag kan dat prettig zijn. In de meeste gevallen zal uw lichaam extra warmte moeten leveren om op temperatuur te blijven. Ook wanneer er geen neerslag is, heeft u te maken met vocht. Wanneer water verdampt, wordt het door de omgevingslucht opgenomen. Hoeveel water kan worden opgenomen, is afhankelijk van de temperatuur van de lucht. Hoe hoger de temperatuur hoe meer vocht deze kan bevatten.</p><p>Erg droge lucht geeft een droge mond, soms prikkelende ogen en bevordert de stofverplaatsing. Dit stof wordt dan gemakkelijker door uw longen opgenomen. Dat is ongezond. In een bedrijf waar veel stof wordt veroorzaakt, wordt de lucht daarom kunstmatig bevochtigd.</p><h4>2. Aanpassingen aan klimaat</h4><p>Wanneer u buiten moet werken, kunt u het klimaat vaak niet beïnvloeden. Maar ook binnen is dat niet altijd mogelijk. Een bakker zal niet de ovens uitzetten, omdat het zo warm is! Toch kunt u wel aanpassingen doorvoeren, namelijk:</p><ul><li>technische aanpassingen;</li><li>aanpassen van de werktijden;</li><li>kiezen van de juiste kleding.</li></ul><h4>2.1. Technische aanpassingen</h4><p>Het binnenklimaat is te verbeteren met technische aanpassingen. Door het aanbrengen van isolaties, dubbelglas, luchtbehandelingsapparatuur en dergelijke kan de temperatuur, de vochtigheid en de luchtsnelheid aangepast worden aan de wensen.</p><p>Het buitenklimaat is moeilijker te verbeteren. Hooguit kunnen de gevolgen van de slechte omstandigheden worden aangepakt. Dat kan door goede werkkleding, het plaatsen van windschermen en/of overkappingen of het gebruiken van straalwarmtebronnen.</p><h4>2.2. Werktijden aanpassen</h4><p>In veel zuidelijke landen wordt op het heetst van de dag gerust. De werktijden worden aangepast aan het klimaat. Soms worden ook in Nederland werktijden aan het klimaat aangepast, bijvoorbeeld bij het werk in de kassen. Bij vorst en regen worden veel werkzaamheden in de bouw gestopt. Dat komt overigens vooral omdat metselspecie dan niet verwerkt kan worden.</p><p>Bij extreme klimaatomstandigheden is het verstandig om vaker te pauzeren. Uw lichaam krijgt daardoor de kans om zich te herstellen.</p><h4>2.3. Juiste kleding kiezen</h4><p>U kunt uw werkomstandigheden ook verbeteren door uw kleding aan te passen aan het klimaat.</p><p>Bij kou en regen moet u uw lichaam beschermen tegen afkoeling. Warme waterdichte kleding is dan de oplossing. Uw huid moet wel kunnen ademen. De kleding moet daarom ademend zijn.</p><p>Bij warmte is luchtige, dunne kleding meestal de beste oplossing, maar de kleding moet blijven voldoen aan de veiligheidseisen. Bij extreme hitte moet u bijvoorbeeld juist dikke beschermende kleding dragen. Voor het werk bij hoge temperaturen zijn speciale koelvesten ontwikkeld. Kleding van hittereflecterend materiaal kan ook een oplossing zijn.</p>", "questionRange": [11, 16]}, {"id": 4, "intro": "Deze tekst komt van internet en gaat over het werk van een waterleidingmonteur.", "title": "Het werk van een waterleidingmonteur", "body": "<p>In de Nederlandse bodem ligt een enorm netwerk van buizen waar ons drinkwater doorheen gaat. Ze lopen vanaf de waterleidingbedrijven voor een deel via de duinen of bossen naar de kranen in de huizen. Zo'n leidingnet moet onderhouden worden en gerepareerd als het stuk is. Dat is het werk van de waterleidingmonteurs. We gaan een dag op stap met Willem, waterleidingmonteur bij een waterleidingbedrijf. Hij vertelt ons hoe dat in zijn werk gaat. &ldquo;Het leuke van dit werk is dat je eigenlijk nooit weet wat je te wachten staat. Je komt overal en je bent veel buiten. Meestal hebben we gewoon reparatiewerk, maar soms is er ergens een grote waterleiding stuk en dan begint voor ons het &eacute;chte werk&rdquo;, zegt hij. &ldquo;Dan moeten we meteen zorgen dat het gemaakt wordt. Snel en zorgvuldig, want er mag natuurlijk geen vuil in de waterleiding komen. En de mensen willen graag vlug weer water uit de kraan!&rdquo;</p><h4>Aan de slag</h4><p>Onder de grond in Nederland liggen duizenden kilometers aan waterleidingbuizen. Dan kan er af en toe een buis gaan lekken, of een verbinding losgaan. Vaak gebeurt dat doordat er ergens een gebouw gesloopt wordt of door trillingen in de bodem van zwaar verkeer dat over een leiding rijdt, of door verzakkende grond. Omdat het water in de leidingen onder druk staat, spuit het water uit het lek. &ldquo;De laatste jaren is er veel veranderd in ons werk&rdquo;, gaat Willem verder. &ldquo;Elke monteur heeft tegenwoordig een eigen busje met alle spullen erin die hij nodig heeft. Op zijn laptop kan hij zien wat het werk voor die dag is en waar hij zijn moet. Mijn werkdag start dus gewoon thuis. Om half acht moeten we bij de eerste klus zijn. Vandaag is dat een brandkraan die niet goed meer is. Die moet ook een stukje hoger gezet worden. Daarna gaan we de leidingen er omheen schoon spoelen.&rdquo;</p><h4>De monteurs aan het werk</h4><p>Willem en zijn collega stoppen bij een aantal putten in de straat en gaan aan het werk. Ze graven de grond weg. In het waterleidingnet zitten overal afsluitpunten. Daardoor kunnen monteurs een stuk leiding tussen twee punten afsluiten als ze eraan moeten werken. Alle leidingen staan op kaarten in de computer. Zo weten monteurs precies waar ze moeten zijn. Als alle buizen weer goed zitten, draaien ze de afsluitpunten met de hand open. Om de leiding schoon te spoelen laten de monteurs de kraan een tijdje spuiten. &ldquo;Later vandaag komt er nog iemand wat water aftappen&rdquo;, vertelt Willem. &ldquo;Dat heet officieel een watermonster nemen. Dat monster wordt in het waterlaboratorium onderzocht. Pas als dat door het laboratorium is goedgekeurd gaat het water weer naar de kraan, de huizen in.&rdquo; Na afloop maken de monteurs het gat weer dicht. &ldquo;Ja, je moet ook nog stratenmaker zijn&rdquo;, lacht Willem.</p><h4>Even geen water</h4><p>Als de monteurs het water voor een langere tijd af moeten sluiten, willen de mensen dat natuurlijk wel weten. Daarom krijgen de mensen uit de straat een brief in de bus waarin staat dat ze maandagochtend vanaf half negen geen water hebben. Zo zijn ze van tevoren gewaarschuwd. Tegenwoordig kijken veel mensen ook op de website als er een storing is. Daar is alle informatie snel te vinden.</p><h4>Spoedklus!</h4><p>Dan gaat de telefoon: spoedklus! Er lekt een hoofdleiding in een dijk bij Monnickendam. In de bus en op pad maar weer. De leiding ligt een paar meter diep aan de voet van een dijk. Met een graafmachine wordt voorzichtig een gat gegraven. Er liggen namelijk ook elektriciteitskabels en telefoonkabels in de buurt. &ldquo;Je moet wel tegen een beetje viezigheid kunnen&rdquo;, lacht Willem. Hij staat tot aan zijn knieën in de bagger. &ldquo;Water en grond, dat wordt meestal een rotzooi.&rdquo;</p><h4>Wij willen water</h4><p>Bij een grotere storing kan er meestal voor gezorgd worden dat het water via een andere weg toch bij de huizen kan komen. Vergelijk het maar met de spoorwegen. Soms moet je een stuk omrijden als er ergens een kapotte trein staat, maar uiteindelijk kom je toch waar je moet zijn. &ldquo;Gelukkig maar&rdquo;, zegt Willem, &ldquo;want als er geen water uit de kraan komt, merk je pas hoe vaak je het nodig hebt. Dan kun je je goed voorstellen hoe het is als je in de woestijn woont, waar bijna geen water is.&rdquo;</p>", "questionRange": [17, 22]}, {"id": 5, "intro": "Deze tekst komt van de website van een mbo. De tekst gaat over de opleiding Sport- en bewegingscoördinator.", "title": "Sport- en bewegingscoördinator", "body": "<h4>Opleiding</h4><p>Is sport je hobby en wil je niets liever dan daar je werk van maken? Ben je bovendien een echte teamplayer met flink wat doorzettingsvermogen, eigen initiatief en organisatietalent? Voel jij je verantwoordelijk, werk je professioneel en communiceer je graag goed? Heb je een Passie voor sport? Neem je graag Initiatief? Ben je Trots op wat je kunt? Dan heb je PIT en dat zien wij graag! Op onze sportacademie kan je een opleiding volgen op niveau 2, 3 en 4. Om een breed pakket aan specialisaties aan te bieden werken wij samen met de andere sportopleidingen van MBO Utrecht.</p><h4>Wat kun je ermee?</h4><p>Als je mensen wilt helpen bij het sporten, bewegen of revalideren, maar ook de hele organisatie eromheen op je wilt nemen, dan is deze opleiding een goede keus. Je leert dan alles wat nodig is om sport- en bewegingsactiviteiten aan te bieden en de deelnemers te begeleiden. Je bent na je opleiding breed inzetbaar in de sportbranche. Je kunt aan het werk bij fitness- en gezondheidscentra, sportverenigingen en -clubs, overheidsinstanties, recreatiebedrijven, zwembaden, buitensportondernemingen, sportbuurtwerk, het onderwijs, sociaal cultureel werk en bij sportevenementen (afhankelijk van de gekozen richting).</p><h4>De voordelen van onze opleiding</h4><ul><li>Je kunt bij ons kiezen voor de volgende beroepsdomeinen: Sport en Leefstijl, Sport en Maatschappij en Sport en Ondernemen.</li><li>Alle studenten worden, naast hun eigen beroepskeuze, ook opgeleid tot Lifeguard en Leider sportieve recreatie. In de eerste twee jaar kan je de certificaten voor Lifeguard en Leider sportieve recreatie behalen.</li><li>Naast het reguliere lesprogramma kunnen studenten ook door sportbonden erkende deelcertificaten behalen, zoals Snowsport, Outdoor, Aangepast sporten, Fitnesstrainer A, Voetbaltrainer, enzovoort.</li></ul><h4>Kerntaken</h4><ul><li>het aanbieden van sport- en bewegingsactiviteiten</li><li>het organiseren van wedstrijden, toernooien en evenementen</li><li>het uitvoeren van organisatie- en beroepsgebonden taken</li><li>het coördineren en uitvoeren van sport- en bewegingsprojecten</li><li>het coördineren van de bedrijfsvoering</li></ul><h4>Stage</h4><p>In het eerste schooljaar loop je vier uur per week stage bij een sportvereniging en ga je vier keer per jaar een dagdeel op bezoek bij een andere sportorganisatie. In het tweede schooljaar loop je ongeveer 10 uur stage per week in het beroepsdomein dat je hebt gekozen als uitstroomrichting. In het derde en vierde jaar ben je ongeveer drie dagen in het sportwerkveld aan het stagelopen. Dit kan variëren van fitnesscentra, sportbonden, internaten, buitenschoolse opvang tot aan zeil- en surfscholen, speciaal onderwijs en sportondernemingen.</p><h4>Toelatingseisen</h4><ul><li>vmbo-diploma in de theoretische, gemengde of kaderberoepsgerichte leerweg</li><li>of een overgangsbewijs van 3 havo/vwo naar 4 havo/vwo</li><li>of een mbo-diploma Sport- en Bewegingsleider niveau 3</li><li>zwemdiploma</li></ul><p>Tijdens een toelatingstest kijken wij naar je gehele bewegingsvaardigheid en je persoonlijke ontwikkelingsmogelijkheden.</p>", "questionRange": [23, 27]}, {"id": 6, "intro": "Deze tekst komt uit een brochure over schadelijk geluid op de werkplek.", "title": "Geluidsschade op het werk", "body": "<p>Of het geluid op een werkplek schadelijk is, is afhankelijk van het geluidsniveau en de tijd dat een werknemer hieraan blootstaat. Voor een werkdag van acht uur ligt de schadegrens bij een dagelijkse blootstelling van 80 decibel (dB). Boven deze grens neemt het risico dat het gehoor wordt beschadigd snel toe.</p><p>Het gaat hierbij om de gemiddelde belasting die een werknemer op een dag van acht uur ondergaat. Stel: een werknemer werkt &rsquo;s ochtends vier uur in een omgeving met meer dan 90 dB en &rsquo;s middags vier uur in een omgeving met 75 dB. Deze werknemer staat dan bloot aan een gemiddelde geluidssterkte van meer dan 80 dB. Dit verplicht de werkgever maatregelen te nemen. Bij voorkeur pakt hij de bron aan maar hij kan ook gehoorbeschermers verstrekken.</p><p>Vanaf 85 dB zijn werknemers ook wettelijk verplicht om gehoorbeschermers te dragen. Ook moet de werkgever een schriftelijk plan van aanpak maken met maatregelen om de blootstelling te verminderen. De grenswaarde van 87 dB in het oor, dus rekening houdend met de gebruikte gehoorbescherming, mag niet worden overschreden. Mocht dit wel het geval zijn, dan moet de werkgever aanvullende maatregelen nemen.</p><p>Natuurlijk kan het ook hinderlijk zijn om kortere tijd aan hogere geluidsniveaus bloot te staan. Het kan dan verstandig zijn gehoorbeschermers te dragen.</p><h4>Wat zijn de gevolgen van geluidsschade?</h4><p>Als de oren veel hard geluid te verduren krijgen dan heeft dit vaak eerst een tijdelijk gehoorverlies, oorsuizingen of het horen van pieptonen tot gevolg. Van incidentele blootstellingen kan het oor zich in principe redelijk herstellen. Wanneer de blootstelling aan lawaai echter voortduurt en de oren niet de noodzakelijke herstelperiode krijgen, ontstaat blijvend gehoorverlies. Dat gebeurt over het algemeen heel geleidelijk en ongemerkt, maar eenmaal opgelopen schade is niet meer te herstellen.</p><p>Blijvend gehoorverlies herkent u zo:</p><ul><li>U kunt geen hoge tonen of zachte geluiden meer horen</li><li>U hebt moeite met telefoneren</li><li>U hebt moeite om een gesprek te voeren in een rumoerige omgeving</li><li>U hoort soms fluit-, piep- of bromtonen</li></ul><p>Een hoog geluidsniveau leidt niet alleen tot schade aan het gehoor, maar heeft ook effect op het functioneren van werknemers. Ze kunnen bijvoorbeeld last krijgen van concentratiestoornissen, belemmeringen in communicatie, vermoeidheid of gespannenheid. Bovendien neemt de kans op ongevallen toe doordat waarschuwingssignalen kunnen wegvallen.</p><h4>Wat kunt u als werknemer doen om gehoorverlies te voorkomen?</h4><p>Is het geluid op uw werkplek harder dan 80 dB, werk daar dan niet te lang in. Bij 80 dB kunt u onbeschermd nog de hele dag werken. Staat u dagelijks bloot aan meer dan 80 dB, dan kan dat niet meer. Dat wil zeggen: niet zonder gehoorbeschermers.</p><p>Laat uw gehoor regelmatig controleren door een arts. Uw werkgever is verplicht om voor u zo'n gehooronderzoek te betalen. Schadelijk geluid wordt nogal eens onderschat. Waarschijnlijk hebt u eerder gehoorbeschermers nodig dan u zelf denkt. Veel mensen hebben pas echt last van lawaai boven 90 dB.</p>", "questionRange": [28, 31]}, {"id": 7, "intro": "Deze gedragsregels staan op de website van een ROC. Lees eerst de vraag. Zoek het antwoord in de tekst.", "title": "Regels ROC", "body": "<h4>1. Gedragsregels</h4><p>Onze medewerkers zullen zich volledig inzetten om jou een leuke studietijd te bezorgen. Hiervoor vragen wij ook inzet van jou. Om plezierig met elkaar te kunnen werken en leren is het nodig dat er bepaalde regels en voorschriften op school gelden. De gouden regels zijn gedragsregels die mbo-studenten en docenten gezamenlijk hebben opgesteld. Iedere medewerker en iedere mbo-student houdt zich hieraan. Ook hebben we afgesproken dat wie de regels overtreedt, daar op wordt aangesproken door medestudenten of docenten.</p><h4>De gouden gedragsregels</h4><ol><li>We behandelen elkaar met respect</li><li>We houden het binnen en buiten ons gebouw netjes</li><li>Iedereen is herkenbaar, heeft een eigen schoolpas en laat deze zien als er om gevraagd wordt</li><li>Bij drugsbezit, drugsgebruik, geweld of diefstal schakelen we de politie in</li><li>Binnen ons gebouw spreken we Nederlands</li></ol><p>Daarnaast gelden er voor de onderwijsruimtes (praktijk en theorie), het Studie Centrum (SC), Het Loopbaan Expertisecentrum (LEC) en de kantine aanvullende regels. Deze zijn zichtbaar op de posters die in de betreffende ruimtes zijn opgehangen. Toelichting op de regels kan worden gegeven door de opleidingsmanager, docent, de kantinebeheerder, de conciërges, de medewerker van het LEC en de SC-medewerker. Zij zien ook toe op de naleving van de regels.</p><h4>2. Aanvullende regels</h4><h4>Verlies en diefstal</h4><p>Zodra je persoonlijke eigendommen mist, moet je dit direct melden bij je loopbaanbegeleider. Het ROC is niet aansprakelijk voor diefstal van persoonlijke eigendommen.</p><h4>Aansprakelijkheid en verzekering</h4><p>Bij vernieling en/of beschadiging van eigendommen van het ROC wordt de schade verhaald op de dader. Voor die schadegevallen waarin jouw eigen verzekering of een andere verzekering geen of onvoldoende dekking geeft, is er door het ROC een collectieve aanvullende verzekering voor je afgesloten. De verzekering is van toepassing op alle bezigheden die vanuit het ROC worden georganiseerd, zoals excursies, stages, enz. Ieder schadegeval dien je zo snel mogelijk te melden aan de opleidingsmanager van jouw opleiding. Met hem/haar kan je dan afspreken hoe er verder gehandeld moet worden. Het is overigens altijd aan te raden zelf een wettelijke aansprakelijkheidsverzekering (WA-verzekering) te hebben.</p><h4>Verwijdering uit de les</h4><p>Als een docent of medewerker je verzoekt een lokaal of praktijkruimte te verlaten vanwege ongewenst gedrag of ontoelaatbare uitingen, ben je verplicht om zonder verdere discussie de ruimte te verlaten. Na de les meld je je direct bij de betreffende docent of medewerker voor een gesprek. De op dat moment aanwezige opleidingsmanager/studieleider kan, als het nodig blijkt, een sanctie opleggen.</p><h4>Film en fotografie</h4><p>Het is in verband met de bescherming van de privacy niet toegestaan om zonder uitdrukkelijke toestemming foto's en/of filmopnames te maken van personeel en/of studenten binnen de locaties van het ROC. Overtreding hiervan heeft disciplinaire sancties tot gevolg.</p><h4>3. Aanwezigheid en verzuim</h4><h4>Aanwezigheid en studiegedrag</h4><ul><li>Een regel is dat je alle werkdagen van 8.15 &ndash; 17.00 uur beschikbaar bent voor het volgen van lessen, beroepspraktijkvorming (stage) en andere opleidingsactiviteiten (bij de BBL-opleiding zijn avondlessen mogelijk).</li><li>Ook is het regel dat je op tijd aanwezig bent en de lessen en opleidingsactiviteiten volgt volgens het rooster. Je bent ook op de vastgestelde tijden aanwezig in het leerbedrijf. We raden je aan tijdens de beroepspraktijkvorming geen bijbaantje te houden omdat dit je veel tijd en energie kost. Mocht dit problemen geven, dan adviseren we je het gesprek aan te gaan met je loopbaanbegeleider.</li><li>Vanuit school wordt geen toestemming gegeven om buiten de officiële vakantiedata met vakantie te gaan.</li><li>Als je te laat komt voor de les krijg je geen toegang meer tot de les. Wanneer de les als blokuur is ingeroosterd (twee aaneengesloten lesuren), mag je naar binnen bij de start van het tweede deel van het blokuur.</li><li>Als je geregeld te laat komt of verzuimt, krijg je een gesprek met je loopbaanbegeleider en zullen er consequenties aan vast zitten.</li><li>Als je (studie)gedrag &ndash; ondanks gemaakte afspraken &ndash; niet verbetert, kan naast de leerplichtambtenaar, de opleidingsmanager sancties opleggen. Die sancties variëren van een taakopdracht tot schorsing en/of definitieve verwijdering van school. Als je minderjarig bent stelt de school de afdeling leerplicht en je ouders op de hoogte van een eventuele schorsing of voornemen tot verwijdering.</li><li>(BBL) Verplichting tot werken bij lesvrij: als de lesdag door je werkgever wordt doorbetaald, ben je op deze dag verplicht tijdens schoolvakanties te gaan werken. Dit geldt ook als er onverwacht hele lesdagen uitvallen en als je vóór 14.00 uur van een lesdag vrijaf krijgt.</li></ul><h4>Ongeoorloofd verzuim</h4><p>Als je van school wegblijft zonder geldige reden, dan wordt dit aangemerkt als ongeoorloofd verzuim. Ook te laat komen of wanneer je wordt weggestuurd omdat je je leermiddelen niet bij je hebt, wordt gezien als ongeoorloofd verzuim en dit wordt als zodanig geregistreerd. Op ongeoorloofd verzuim volgen gesprekken met je loopbaanbegeleider. Ben je jonger dan 21 jaar dan worden je ouders op de hoogte gesteld en uitgenodigd voor een gesprek. De gesprekken worden vastgelegd in je dossier. In geval van langdurig of frequent verzuim gelden strengere maatregelen en wordt de leerplichtambtenaar ingeschakeld.</p><h4>De leerplichtambtenaar</h4><p>Het ROC heeft nauw contact met de afdeling leerplicht van het betrokken stadsdeel. Als je ongeoorloofd afwezig bent of te vaak te laat komt, zal de opleiding daar melding van doen bij DUO. De leerplichtambtenaar zal vervolgens jongeren jonger dan 18 jaar uitnodigen voor een gesprek met hun ouder(s). Voor kwalificatieplichtige studenten vanaf 18 jaar is er de leerplicht(plus)ambtenaar. De leerplicht(plus)ambtenaar is een aantal dagen op de locatie aanwezig. Verzuim kan leiden tot een proces-verbaal of een taakstraf.</p><h4>Ziek melden</h4><p>Wanneer je wegens ziekte of om een andere reden niet naar school kunt komen, bel dan tussen 8.00 en 8.30 uur naar het secretariaat van je opleiding en naar het leerbedrijf. Geef daarbij door: je naam, de klas en de naam van je mentor, de reden van je afwezigheid en het telefoonnummer waarop je zelf te bereiken bent. Wanneer je op school ziek wordt, meld dit dan bij de loopbaanbegeleider. Wanneer deze niet aanwezig is, meld je het bij je docent. Ben je weer beter, dan meld je dit ook bij het secretariaat van je opleiding en het leerbedrijf.</p><h4>Verzuim</h4><p>Voor minderjarigen: zodra je weer op school komt, neem je een briefje mee met daarop naam, klas, datum, uur en reden van verzuim en dit briefje moet ondertekend zijn door je ouder/verzorger. Dit briefje lever je vervolgens in bij je loopbaanbegeleider. Als vooraf bekend is dat je niet aanwezig kunt zijn, meld dit dan tijdig bij je loopbaanbegeleider en toon de afsprakenkaart. Afspraken voor dokter en tandarts moet je bij voorkeur buiten de lestijden maken. Bij verzuim van BBL-studenten neemt de loopbaanbegeleider telefonisch contact op met de werkgever en registreert de student als afwezig.</p><h4>4. Veiligheid</h4><p>De school is een veilige leer- en werkomgeving, waar iedereen die recht heeft op de voorzieningen, deze voorzieningen ongestoord kan gebruiken. De conciërges houden toezicht op de veiligheid. Onbevoegden hebben geen toegang tot de schoolgebouwen. Het heeft met de stadsdelen en de gemeentepolitie overeenkomsten gesloten over de veiligheid op school. Daarin is afgesproken dat de school, bij het vermoeden van een ernstige bedreiging van de veiligheid in en om school, dan wel van (ernstig) crimineel gedrag door leerlingen in en om de school, dit in alle gevallen meldt bij de politie. In de overeenkomst met de politie zijn ook afspraken gemaakt over het regelmatig controleren van de kluisjes. Voor hulp bij ongevallen zijn er bedrijfshulpverleners aanwezig.</p><h4>Bedrijfshulpverlening</h4><p>In elk gebouw van het ROC zijn getrainde bedrijfshulpverleners aanwezig. Hun taken zijn:</p><ul><li>verlenen van eerste hulp bij ongevallen (EHBO);</li><li>beperken en bestrijden van een beginnende brand;</li><li>voorkomen en beperken van ongevallen;</li><li>in noodsituaties alarmeren en evacueren van alle personen in het gebouw;</li><li>alarmeren van brandweer, ambulance en politie bij een brand of ongeval;</li><li>samenwerken met brandweer en andere hulpverleners.</li></ul><p>In de loop van het schooljaar zullen er ontruimingsoefeningen gehouden worden. De studenten zullen tijdig instructies krijgen. Tijdens een dergelijke oefening dien je de aanwijzingen van de bedrijfshulpverleners op te volgen.</p><h4>Camerabeveiliging</h4><p>Zowel binnen als buitenom zijn camera's geplaatst. Deze zijn er voor de veiligheid en bescherming van de studenten en medewerkers. De beelden worden opgeslagen en alleen gebruikt bij calamiteiten. Na een bepaalde tijd worden de beelden gewist.</p><h4>Cursus basisveiligheid VCA voor Techniekopleidingen</h4><p>Vanaf 1 januari zijn alle ISO-gecertificeerde bedrijven verplicht om hun &lsquo;buitendienstpersoneel&rsquo; te certificeren voor de cursus basisveiligheid VCA (Veiligheidscertificaat). Dat geldt dus voor het personeel dat ook werkzaamheden verricht buiten het bedrijf. Daarnaast is het voor het werken in de werkplaatsen in school verplicht om kennis te hebben van de basisregels op het gebied van veiligheid. Daarom verzorgt het ROC onder schooltijd de lessen voor het certificaat Basisveiligheid. Tijdens deze cursus doe je kennis op van de gevaren die zich tijdens het werk kunnen voordoen en leer je welke veiligheidsmaatregelen je moet treffen. Na de cursus kan je op geheel vrijwillige basis deelnemen aan het examen. Als je slaagt voor dit examen krijg je een certificaat met een geldigheidsduur van 10 jaar. De kosten van het examen bedragen &euro; 60,00.</p>", "questionRange": [32, 37]}], "questions": [{"n": 1, "textId": 1, "prompt": "Waarom heeft Midas Dekkers het over Volkswagen en Ferrari?", "options": {"A": "om duidelijk te maken dat het menselijk lichaam een marathon niet aankan", "B": "om duidelijk te maken hoeveel afstand mensen afleggen tijdens een marathon", "C": "om duidelijk te maken welke verschillen in snelheid er zijn tussen marathonlopers"}, "answer": "A"}, {"n": 2, "textId": 1, "prompt": "Door wie krijgen marathons een slechte naam, volgens Don de Winter?", "options": {"A": "door sportartsen als M. van der Werve", "B": "door sporters die niet goed trainen", "C": "door sporthaters als Midas Dekkers", "D": "door sportmedisch onderzoekers"}, "answer": "B"}, {"n": 3, "textId": 1, "prompt": "Wat moet een marathonloper 7 kilometer voor de finish doen, volgens de tekst?", "options": {"A": "langzamer gaan lopen", "B": "sneller gaan lopen", "C": "sportdrank drinken", "D": "voedsel met veel koolhydraten eten"}, "answer": "C"}, {"n": 4, "textId": 1, "prompt": "Wanneer moeten marathonlopers zich volgens sportartsen sportmedisch laten keuren?", "options": {"A": "als hun huisarts ze naar een sportarts stuurt", "B": "als ze signalen krijgen die op hartklachten lijken", "C": "voordat ze aan hun marathon beginnen", "D": "voordat ze aan hun trainingsprogramma beginnen"}, "answer": "D"}, {"n": 5, "textId": 1, "prompt": "Midas Dekkers geeft een duidelijke mening over het lopen van marathons. Wie is het in deze tekst met hem eens?", "options": {"A": "de schrijver van de tekst", "B": "Don de Winter", "C": "M. van der Werve", "D": "geen van drie genoemde personen"}, "answer": "D"}, {"n": 6, "textId": 2, "prompt": "Twee onbekenden bellen bij u aan. De eerste vraagt om geld voor een goed doel. De tweede wil de gasleiding in uw keuken controleren. Welke persoon moet kunnen bewijzen wie hij is?", "options": {"A": "alleen de eerste", "B": "alleen de tweede", "C": "geen van beide", "D": "zowel de eerste als de tweede"}, "answer": "D"}, {"n": 7, "textId": 2, "prompt": "Wat heeft het leggen van contacten via internet te maken met woningovervallen?", "options": {"A": "Het kan de kans op een overval bij u thuis groter maken.", "B": "Het kan de kans op een overval bij u thuis kleiner maken.", "C": "Het kan een overval bij u thuis helpen oplossen."}, "answer": "A"}, {"n": 8, "textId": 2, "prompt": "U heeft uw mobiele telefoon verkocht via internet. De koper wil de mobiele telefoon direct komen halen. U bent alleen thuis. Waar kunt u het beste afspreken?", "options": {"A": "bij de koper thuis", "B": "bij u thuis", "C": "in een openbare ruimte"}, "answer": "C"}, {"n": 9, "textId": 2, "prompt": "Is er een groot verschil tussen deze brochure en het Politiekeurmerk Veilig Wonen (PKVW)?", "options": {"A": "Ja: de brochure geeft adviezen, het PKVW stelt eisen.", "B": "Ja: de brochure stelt eisen, het PKVW geeft adviezen.", "C": "Nee: de brochure en het PKVW geven dezelfde adviezen.", "D": "Nee: de brochure en het PKVW stellen dezelfde eisen."}, "answer": "A"}, {"n": 10, "textId": 2, "prompt": "Wat wil de politie met deze brochure vooral duidelijk maken aan u?", "options": {"A": "dat u er zelf veel aan kan doen om een overval bij u thuis te voorkomen", "B": "dat u moet voldoen aan het Politiekeurmerk Veilig Wonen (PKVW)", "C": "dat u onbekenden die bij u aanbellen niet binnen moet laten"}, "answer": "A"}, {"n": 11, "textId": 3, "prompt": "De temperatuur bepaalt of u het warm of koud hebt. Geldt dat ook voor de luchtsnelheid en voor de vochtigheid?", "options": {"A": "Dat geldt niet voor luchtsnelheid en ook niet voor vochtigheid.", "B": "Dat geldt wel voor luchtsnelheid, maar niet voor vochtigheid.", "C": "Dat geldt wel voor vochtigheid, maar niet voor luchtsnelheid.", "D": "Dat geldt zowel voor luchtsnelheid als voor vochtigheid."}, "answer": "D"}, {"n": 12, "textId": 3, "prompt": "Wanneer is er doorgaans sprake van een goed klimaat?", "options": {"A": "als uw huidtemperatuur gelijk is aan uw omgevingstemperatuur", "B": "als uw huidtemperatuur hoger is dan uw omgevingstemperatuur", "C": "als uw huidtemperatuur lager is dan uw omgevingstemperatuur"}, "answer": "B"}, {"n": 13, "textId": 3, "prompt": "U zweet. Dat zweet verdampt. Wat is voor u dan het gevolg van die verdamping?", "options": {"A": "U krijgt dorst.", "B": "U krijgt honger.", "C": "U krijgt het minder warm.", "D": "U krijgt het warmer."}, "answer": "C"}, {"n": 14, "textId": 3, "prompt": "De tekst noemt drie soorten aanpassingen aan het klimaat in werksituaties. Welke aanpassing geeft het beste resultaat volgens de tekst?", "options": {"A": "aanpassing van werktijden", "B": "keuze van de juiste kleding", "C": "technische aanpassingen", "D": "Dat staat niet in de tekst."}, "answer": "D"}, {"n": 15, "textId": 3, "prompt": "Welke kleding adviseert de tekst als het koud is?", "options": {"A": "dikke, beschermende kleding", "B": "speciale kleding zoals koelvesten", "C": "warme, ademende kleding"}, "answer": "C"}, {"n": 16, "textId": 3, "prompt": "Met welk doel is deze tekst over het klimaat op het werk vooral geschreven?", "options": {"A": "met het doel om de lezer te inform te laat is."}, "answer": "A"}, {"n": 22, "textId": 4, "prompt": "Waarover wil de schrijver de lezer vooral informatie geven?", "options": {"A": "over het gebruik van waterleidingen en kranen", "B": "over het herstellen van kapotte waterleidingen", "C": "over het werk van een waterleidingmonteur", "D": "over hoe drinkwater in onze huizen komt"}, "answer": "C"}, {"n": 23, "textId": 5, "prompt": "Ilse geeft al vier jaar voetbaltraining. Ze houdt van sport, neemt graag het initiatief en geeft niet gauw op. Ze wil de opleiding Sport- en bewegingscoördinator gaan volgen. Waar heeft Ilse dan het meest aan?", "options": {"A": "dat ze passende karaktereigenschappen heeft", "B": "dat ze veel ervaring heeft met sportles geven", "C": "dat ze veel van voetbal als teamsport weet"}, "answer": "A"}, {"n": 24, "textId": 5, "prompt": "Lotte wil graag het certificaat Fitnesstrainer A halen. Kan dat bij de opleiding Sport- en bewegingscoördinator?", "options": {"A": "Ja, ze haalt dat certificaat vanzelf wanneer ze haar opleiding afmaakt.", "B": "Ja, ze kan dat certificaat halen als extra onderdeel van haar opleiding.", "C": "Ja, ze kan dat certificaat halen als ze stage loopt bij een fitnesscentrum."}, "answer": "B"}, {"n": 25, "textId": 5, "prompt": "Michiels droombaan is meehelpen in de organisatie van de Olympische Spelen. Is de opleiding Sport- en bewegingscoördinator dan nuttig?", "options": {"A": "Ja, want dat sluit aan bij één van de belangrijkste taken.", "B": "Ja, want organiseren past bij de beroepsdomeinen.", "C": "Nee, want de opleiding gaat vooral over het geven van sportles.", "D": "Nee, want hij doet hier geen ervaring in op."}, "answer": "A"}, {"n": 26, "textId": 5, "prompt": "Wat is een pluspunt van deze opleiding Sport- en bewegingscoördinator, volgens de tekst?", "options": {"A": "dat je allerlei certificaten kunt halen tijdens deze opleiding", "B": "dat je deze opleiding op verschillende niveaus kunt volgen", "C": "dat je van je hobby je werk kunt maken na deze opleiding", "D": "dat je veel tijd aan stage besteedt bij verschillende organisaties"}, "answer": "A"}, {"n": 27, "textId": 5, "prompt": "Wat is het belangrijkste doel van de tekst?", "options": {"A": "lezers informatie geven over hoe de opleiding Sport- en bewegingscoördinator in de praktijk eruitziet", "B": "lezers ervan overtuigen zich aan te melden voor de opleiding Sport- en bewegingscoördinator", "C": "lezers uitleggen hoe ze zich kunnen aanmelden voor de opleiding Sport- en bewegingscoördinator"}, "answer": "B"}, {"n": 28, "textId": 6, "prompt": "Vanaf welk geluidsniveau zijn werknemers verplicht om gehoorbeschermers te dragen?", "options": {"A": "vanaf een gemiddeld geluidsniveau van 80 dB per werkdag", "B": "vanaf een gemiddeld geluidsniveau van 85 dB per werkdag", "C": "vanaf een gemiddeld geluidsniveau van 87 dB per werkdag"}, "answer": "B"}, {"n": 29, "textId": 6, "prompt": "Jim wordt op zijn werk regelmatig blootgesteld aan hard geluid. Hij wil nagaan of hij gehoorverlies heeft. Onder welk kopje in de tekst kan hij dat vinden?", "options": {"A": "onder het kopje 'Wanneer is het geluid op de werkplek schadelijk?'", "B": "onder het kopje 'Wat zijn de gevolgen van geluidsschade?'", "C": "onder het kopje 'Wat kunt u als werknemer doen om gehoorverlies te voorkomen?'"}, "answer": "B"}, {"n": 30, "textId": 6, "prompt": "Sietse werkt dagelijks bij een gemiddeld geluidsniveau van 88 dB. Hij draagt tijdens het werk gehoorbeschermers. Toch wil Sietse zijn gehoor laten controleren bij een arts. Wie betaalt dit onderzoek?", "options": {"A": "de werkgever van Sietse", "B": "Sietse zelf", "C": "Dat verschilt per situatie."}, "answer": "A"}, {"n": 31, "textId": 6, "prompt": "Bij welk geluidsniveau merken veel mensen pas echt dat ze last hebben van lawaai?", "options": {"A": "bij een geluidsniveau van 80 dB", "B": "bij een geluidsniveau van meer dan 80 dB", "C": "bij een geluidsniveau van meer dan 90 dB"}, "answer": "C"}, {"n": 32, "textId": 7, "prompt": "Suze heeft tijdens een excursie de bril van een medestudent kapot gemaakt. Waar moet zij dit als eerste melden?", "options": {"A": "bij de opleidingsmanager", "B": "bij haar mentor", "C": "bij haar verzekering"}, "answer": "A"}, {"n": 33, "textId": 7, "prompt": "Wat zegt de tekst over het maken van foto's en filmpjes van docenten en studenten op school?", "options": {"A": "Het maken van foto's en filmpjes mag alleen met toestemming.", "B": "Het maken van foto's en filmpjes van studenten mag, maar van docenten niet.", "C": "Het maken van foto's mag wel, het maken van filmpjes mag niet.", "D": "Zowel het maken van foto's als het maken van filmpjes is niet toegestaan."}, "answer": "A"}, {"n": 34, "textId": 7, "prompt": "Christa wil op vakantie buiten de officiële schoolvakanties. Krijgt ze hiervoor toestemming van de school?", "options": {"A": "Ja, de loopbaanbegeleider kan hiervoor toestemming geven.", "B": "Ja, maar alleen als het leerbedrijf ook akkoord is.", "C": "Nee, de school geeft hiervoor geen toestemming."}, "answer": "C"}, {"n": 35, "textId": 7, "prompt": "Johan wordt ziek tijdens de les. Hij wil naar huis. Bij wie moet hij zich ziek melden?", "options": {"A": "bij de loopbaanbegeleider", "B": "bij het leerbedrijf", "C": "bij het secretariaat", "D": "bij zijn mentor"}, "answer": "A"}, {"n": 36, "textId": 7, "prompt": "Marco volgt een Techniekopleiding. Hij doet de cursus basisveiligheid VCA. Moet hij examen doen voor deze cursus?", "options": {"A": "Ja, het examen is verplicht voor alle leerlingen van Techniek.", "B": "Dat moet alleen als hij wil werken in de werkplaatsen in school.", "C": "Nee, het examen is niet verplicht."}, "answer": "C"}, {"n": 37, "textId": 7, "prompt": "Wat is het belangrijkste doel van deze tekst?", "options": {"A": "studenten ervan overtuigen dat ze de regels moeten volgen", "B": "studenten informeren over de regels die gelden op het ROC", "C": "studenten uitleggen waarom de regels belangrijk zijn", "D": "studenten waarschuwen voor het overtreden van regels"}, "answer": "B"}]}, {"id": "2022", "year": 2022, "title": "B1 Lezen 2022 — Openbaar examen", "timeLimitMin": 110, "passMark": 23, "totalQuestions": 35, "texts": [{"id": 1, "intro": "Deze tekst komt van een website en maakt reclame voor een cursus om zelfstandig ondernemer te worden.", "title": "Cursus ondernemer MKB", "body": "<h2>Cursus ondernemer MKB</h2><p><strong>Dé opstap naar zelfstandig ondernemerschap!</strong></p><p>Wilt u aan de slag als zelfstandig ondernemer? Dan is het studiepakket Praktijkdiploma ondernemer MKB dé cursus voor u! In acht maanden leert u alle aspecten van het zelfstandig ondernemerschap. Van de dagelijkse administratie tot en met het belang van reclame, het werven van personeel, het inrichten van de zaak en het schrijven van een ondernemingsplan. Allemaal zaken die van belang zijn voor het succes van uw bedrijf!</p><h4>Voor wie</h4><p>Wilt u graag zelfstandig ondernemer worden en droomt u van een eigen zaak? Dan is het studiepakket Praktijkdiploma ondernemer MKB écht iets voor u!</p><h4>Eindresultaat</h4><p>Na het volgen van de cursus Praktijkdiploma ondernemer MKB weet u alles van het zelfstandig ondernemerschap. U schrijft een ondernemingsplan met een commercieel en financieel doordacht plan voor uw eigen toekomstige bedrijf. Ook weet u een organisatie te leiden en de administratie te voeren. Allemaal zaken die van belang zijn voor het succes van uw bedrijf.</p><h4>Dit leert u</h4><p>De lessen zijn perfect aangepast aan het examenprogramma. Het studiepakket Praktijkdiploma ondernemer MKB is opgebouwd uit de volgende drie onderdelen:</p><p><strong>Praktijkdiploma ondernemingsplan</strong><br>In dit onderdeel komen drie vakken aan de orde. Het eerste vak, Marketing, leert u hoe u in uw bedrijfsvoering rekening kunt houden met de wensen van de klant. Hoe treedt u naar buiten? Hoe onderzoekt u waar vraag naar is? Bij dit vak leert u welke instrumenten u ter beschikking staan en op welke manier u ze optimaal kunt inzetten. Het vak Financiering leert u alles over budgetteren, calculeren, verzekeringen en de verschillende ondernemingsvormen. Kortom: alles wat te maken heeft met uw financiële beleid komt in dit onderdeel aan bod. Het ondernemingsplan vormt het laatste deel. In dit vak past u toe wat u eerder over marketing en financiering hebt geleerd. Het ondernemingsplan bepaalt in grote mate uw financieringsmogelijkheden.</p><p><strong>Praktijkdiploma personeel en organisatie MKB</strong><br>De organisatie van uw onderneming is een complexe zaak. In veel gevallen zal het werven van en leidinggeven aan personeel een deel zijn van uw dagelijkse werkzaamheden. Hoe gaat u hiermee om en welke wetgeving komt hierbij kijken? Dit onderdeel leert u alles over de organisatie van uw bedrijf.</p><p><strong>Praktijkdiploma bedrijfsadministratie MKB</strong><br>Dit onderdeel leert u hoe de administratie in elkaar zit en hoe u deze moet bijhouden. U leert een balans en resultatenrekeningen op te stellen en de uitkomsten van de administratie te interpreteren.</p><h4>Compleet studiepakket</h4><p>Uw complete studiepakket krijgt u in één keer thuisgestuurd. U hoeft geen extra boeken meer te kopen en u komt dus niet voor onverwachte kosten te staan. U krijgt ook een handige opbergmap om uw losbladige lesmateriaal in te bewaren en een schrijfblok plus pen. Daarnaast krijgt u bij uw cursus proefexamens, waarmee u uzelf perfect kunt voorbereiden op het examen. U kunt dus direct aan de slag!</p><h4>Officieel examen</h4><p>Dit studiepakket bereidt u voor op de drie officiële examens van Praktijkdiploma ondernemer MKB die worden afgenomen door de Stichting Nederlandse Associatie voor Praktijkexamens. U kunt zelf kiezen wanneer u examen wilt doen. De examens worden afgenomen in de studiecentra van de Open Universiteit.</p><p>Bent u voor alle drie de examens geslaagd, dan krijgt u het volledige Praktijkdiploma ondernemer MKB.</p><h4>Certificaat</h4><p>Wilt u kunnen aantonen dat u een studiepakket van ons hebt afgenomen? Vraag bij ons dan voor slechts € 12,95 (inclusief administratie- en verzendkosten) een certificaat aan! In uw studiepakket vindt u hierover alle informatie.</p><h4>Superlage lesgelden</h4><p>Alleen bij ons krijgt u superlage lesgelden! Vergelijk onze prijzen met die van andere instellingen voor afstandsonderwijs en overtuig uzelf! Bovendien bepaalt u bij ons zelf hoe u uw lesgeld wilt voldoen: in één keer of in 4, 8 of 12 termijnen.</p><h4>Studieduur</h4><p>De studie duurt 8 maanden. Als u ongeveer een uur per dag aan uw cursus besteedt, bent u binnen deze studieduur helemaal klaar voor het examen. Als u wilt, kunt u natuurlijk sneller of langzamer studeren. Bij ons bepaalt u helemaal zelf hoeveel tijd u aan uw cursus besteedt! Zo is uw cursus perfect te combineren met uw baan, uw hobby’s en andere bezigheden.</p><h4>Prijs</h4><p>Bij betaling in één keer: € 79,-<br>Bij betaling in termijnen:</p><table><tr><th>studieduur</th><th>per maand</th></tr><tr><td>4 maanden</td><td>€ 22,50</td></tr><tr><td>8 maanden</td><td>€ 12,50</td></tr><tr><td>12 maanden</td><td>€ 9,25</td></tr></table><p>Wij brengen daarnaast eenmalig € 15,- administratie- en verzendkosten in rekening.</p><h4>Meteen beginnen</h4><p>Schrijf u heel gemakkelijk en snel in via internet. Klik onderaan op de button “direct inschrijven”, vul het formulier in en u bent automatisch ingeschreven. Doet u dit vandaag nog vóór 13.00 uur, dan hebt u al binnen 48 uur uw complete studiepakket in huis!* U schrijft zich bovendien in zonder risico, want u ontvangt uw studiepakket elf dagen op proef. Voldoet het studiepakket van uw keuze niet aan uw verwachtingen, dan kunt u het binnen die elf dagen gewoon terugsturen.</p><p><em>* Schrijft u zich in op vrijdag, dan krijgt u het pakket op dinsdag.</em></p>", "questionRange": [1, 4]}, {"id": 2, "intro": "Deze tekst is een folder over buurtbemiddeling. Buurtbemiddeling betekent het proberen op te lossen van problemen tussen buren of wijkbewoners.", "title": "Een leefbare buurt voor iedereen", "body": "<h2>Een leefbare buurt voor iedereen</h2><p>Onze gemeente krijgt buurtbemiddeling. De komende weken worden vrijwilligers geworven die – na een goede training – als buurtbemiddelaar aan de slag gaan. In tientallen andere gemeenten is buurtbemiddeling al succesvol gebleken.</p><h4>Wat is buurtbemiddeling?</h4><p>Een burenruzie kan het woonplezier behoorlijk verpesten. Wat begint met een kleine irritatie over bijvoorbeeld geluidshinder of storend gedrag, kan in korte tijd uit de hand lopen. Buurtgenoten praten niet meer met elkaar en luisteren niet meer naar elkaar. De spanning loopt dan snel op.</p><p>Waar beide partijen mee geholpen zouden zijn, is iemand die ze weer met elkaar in gesprek brengt. Dat vraagt van zo’n buurtbemiddelaar vooral het vermogen om goed te luisteren, vertrouwen te winnen en de emoties van partijen gezamenlijk bespreekbaar te maken. Dat biedt partijen de kans om er samen uit te komen. Een buurtbemiddelaar geeft geen oordeel en is neutraal. Want het is de bedoeling dat de ruziënde partijen zelf hun conflict oplossen.</p><p>Het voordeel van buurtbemiddeling is dat de bewoners hun problemen niet bij politie of justitie neerleggen. De politie erbij halen lost misschien het conflict wel op, maar bewerkstelligt niet altijd een duurzame oplossing van het probleem.</p><h4>Voor wie is buurtbemiddeling?</h4><p>Buurtbemiddeling is er voor alle inwoners van de gemeente die in een conflictsituatie zitten of dreigen te komen met buren of buurtgenoten. Om gebruik te kunnen maken van buurtbemiddeling wordt van hen gevraagd dat ze – onder begeleiding van een bemiddelaar – met elkaar in gesprek gaan. Buren of wijkbewoners met een conflict of een probleem kunnen dat bij de buurtbemiddeling melden, al dan niet met verwijzing door instanties als gemeente, politie of woningcorporaties.</p><h4>Wie zijn de buurtbemiddelaars?</h4><p>Buurtbemiddelaars zijn vrijwilligers die zich inzetten voor een leefbare buurt. Ze worden jaarlijks getraind in conflictbemiddeling. Bij elk conflict zet de coördinator van buurtbemiddeling een panel van twee buurtbemiddelaars in. Dit panel wordt samengesteld naar gelang het soort conflict, de achtergrond van de partijen en de buurt waarin het conflict speelt.</p><h4>Hoe werkt buurtbemiddeling?</h4><p>Een buurtbewoner kan een conflict telefonisch melden bij de coördinator buurtbemiddeling. De coördinator zet twee buurtbemiddelaars in. Die maken een afspraak om bij de buurtbewoner op bezoek te gaan en zijn verhaal te horen. De buurtbemiddelaars gaan ook op bezoek bij de andere partij om de andere kant van het verhaal te horen. Bij bereidheid van beide partijen wordt op neutraal terrein een bemiddelingsgesprek gehouden onder leiding van de twee buurtbemiddelaars. In dat gesprek vertellen beide partijen aan elkaar wat hun dwars zit, spreken ze wensen voor verbetering uit en leggen de buurtbemiddelaars op papier concrete verbeterafspraken vast die door beide partijen worden ondertekend. Na enige tijd bellen de bemiddelaars beide partijen op om te horen of de gemaakte afspraken naar tevredenheid worden nagekomen.</p><h4>Wat zijn de uitgangspunten?</h4><ul><li>de buurtbemiddelaars ondersteunen beide partijen, trekken geen partij en geven geen oordeel;</li><li>buurtbemiddelaars zijn getrainde vrijwilligers;</li><li>er wordt gewerkt volgens afspraken die voor beide partijen aanvaardbaar zijn;</li><li>deelname aan buurtbemiddeling gebeurt op basis van vrijwilligheid, maar is niet vrijblijvend;</li><li>de buren of buurtgenoten blijven zelf verantwoordelijk voor het conflict en voor de oplossing;</li><li>bemiddelingsgesprekken en afspraken zijn strikt vertrouwelijk;</li><li>buurtbemiddeling is gratis.</li></ul><h4>Welke conflicten komen wel/niet in aanmerking?</h4><p><strong>Wel:</strong></p><ul><li>ruzies tussen buren of wijkbewoners;</li><li>individuele klachten;</li><li>conflicten die zijn doorverwezen door onder meer politie en woningbouwcorporaties;</li><li>conflicten tussen mensen die aanspreekbaar en toerekeningsvatbaar zijn.</li></ul><p><strong>Niet:</strong></p><ul><li>conflicten waarbij sprake is van ernstige agressie;</li><li>conflicten waarbij één van beide partijen door alcohol- en drugsverslaving of een psychiatrische stoornis niet goed aanspreekbaar is.</li></ul><h4>Meer informatie?</h4><p>Meer informatie, zowel over buurtbemiddeling als over het meewerken als vrijwillig buurtbemiddelaar, via info@buurtbemiddeling.nl.</p>", "questionRange": [5, 10]}, {"id": 3, "intro": "Deze tekst komt uit een studieboek voor de opleiding tot meubelmaker. De tekst gaat over het materiaal hout.", "title": "Hout", "body": "<h2>Hout</h2><p><strong>1</strong>  Hout is materiaal waarmee de mens al zeer lange tijd werkt. We overdrijven niet, als we zeggen dat hout de meest algemeen gebruikte grondstof ter wereld is en was. Hout heeft namelijk een aantal gunstige eigenschappen, waardoor het op verschillende manieren te gebruiken is.</p><p><strong>2</strong>  De ene houtsoort is beter geschikt voor een bepaald gebruiksdoel dan de andere, terwijl ook in eenzelfde soort grote verschillen kunnen voorkomen. Dit laatste is niet verwonderlijk, want hout is een natuurproduct, waardoor de structuur, kleur en tekening altijd weer verschillend zijn; zelfs bij planken die uit één boomstam zijn gezaagd. Deze verschillen geven soms moeilijkheden bij de verwerking en bij het gebruik. Bij een juiste keuze en behandeling is hout echter zeer geschikt voor allerlei toepassingen en vaak zelfs onvervangbaar.</p><h4>Herkomst van het hout</h4><p><strong>3  Houtvoorraad en verbruik</strong><br>De gehele aarde bestaat voor ongeveer 70% uit water en voor 30% uit land. Van het totale landoppervlak is ongeveer 30% bebost. De totale oppervlakte met bos bedraagt ongeveer vier miljard ha., waarvan een groot gedeelte alleen te gebruiken is voor brandhout. Tweederde deel is productief bos; dit levert het meubel- en timmerhout en de grondstof voor allerlei producten waar hout voor nodig is, zoals papier. Over de gehele wereld gebruikt men per jaar ruim 2.500 miljoen m³ hout. De jaarlijkse natuurlijke bijgroei en de nieuwe bomen die worden geplant zorgen ervoor dat, ook in de toekomst, waarschijnlijk voldoende hout beschikbaar kan zijn. Er zijn veel gebieden in de wereld waar herbebossing verplicht is. In ons land wordt per jaar, inclusief het hout voor de papierfabricage, 12 miljoen m³ hout gebruikt. Hiervan komt 11 miljoen m³ uit de tropische gebieden. Hiervoor zorgt de houthandel die over de gehele wereld inkopers heeft.</p><p><strong>4  Aantal soorten</strong><br>Het aantal houtsoorten dat op de wereld voorkomt wordt op vele duizenden geschat. De meeste ervan zijn wegens kwaliteit of afmeting echter niet interessant. Er blijven dan ook slechts enkele honderden bruikbare soorten over die op de wereldmarkt verhandeld worden. Deze zijn niet allemaal in Nederland verkrijgbaar. Doorgaans zijn er in ons land ongeveer 100 houtsoorten te koop.</p><p><strong>5  Bruikbaarheid en toepassing</strong><br>De keuze van een houtsoort voor bijvoorbeeld deuren, kozijnen, vloeren, meubelen of betimmeringen is afhankelijk van de eisen die voor een bepaald doel gesteld worden. Denk hierbij aan gewicht, sterkte, afmetingen, kleur en duurzaamheid van de verschillende houtsoorten. Alleen al het gewicht is een belangrijk punt. Het balsahout weegt slechts 150 kg per m³, het San Domingo pokhout daarentegen 1300 kg per m³. Balsahout is zéér zacht en drijft in water als kurk; San Domingo pokhout is zéér hard en zinkt als baksteen.</p><p><strong>6</strong>  Voor objecten die geschilderd worden zal men meestal een goedkope houtsoort kiezen. In de waterbouwkunde gebruikt men daarentegen de allerduurzaamste en sterkste soorten. Voor meubelen en betimmeringen kan het hout een warme, karakteristieke sfeer creëren. Voor elke toepassing moet men goed overwegen welk hout het meest in aanmerking komt, waarbij de prijs natuurlijk vaak een belangrijke rol speelt.</p><p><strong>7  Hoofdgroepen</strong><br>De bomen, die ons de verschillende houtsoorten leveren, zijn te onderscheiden in twee hoofdgroepen, namelijk naaldbomen en loofbomen. Naaldhout is afkomstig van bomen die bladeren in naaldvorm hebben. Bij sommige soorten groeien deze naalden in bosjes, bij andere soorten ontspringen zij direct uit de takken. Deze bomen heten coniferen (kegeldragers), naar de vorm van hun vruchten. Naaldhout is over het algemeen niet zo hard. Het heeft geen vaten, je ziet op het hout geen groeven. Enkele bekende naaldhoutsoorten zijn vuren-, dennen- en grenenhout.</p><p><strong>8</strong>  De naam loofhout geldt voor al het hout afkomstig van loof- of bladdragende bomen. Loofhout is meestal harder en vaster dan naaldhout. Kenmerkend voor loofhout is de aanwezigheid van vaten. Deze zijn op het lange houtoppervlak zichtbaar als kleine groefjes. Bij de herkenning van houtsoorten is het al of niet aanwezig zijn van vaten dus van belang. Enkele bekende loofhoutsoorten zijn eiken-, beuken-, berken-, essen-, mahonie-, noten- en teakhout. Door het decoratieve uiterlijk worden loofhoutsoorten het meest gebruikt voor het maken van meubels en betimmeringen.</p><p><strong>9  Groeigebieden</strong><br>Naaldbomen groeien in gematigde en koude streken zoals Canada en Midden- en Noord-Europa. Loofbomen komen zowel in gematigde als in tropische streken voor. Ter onderscheiding wordt dit hout aangeduid als loofhout en tropisch loofhout.</p><p><strong>10  Onderdelen van de boom</strong><br>De wortels van de boom zijn de fundering; ze geven de boom een vaste, stevige stand in de grond. De wortels halen ook het voedsel, dat de boom voor zijn groei nodig heeft, uit de grond. Het worteleinde is het deel waarin de wortels overgaan in de stam. Bij sommige bomen is dat deel buitengewoon fraai gevlamd, zoals bij notenhout en iepenhout. Het wordt dan ook vaak als ‘fineer’ verwerkt, een soort versierlaag. Zulk fineer komt ook van uitsteeksels en knobbels aan de stam, vooral bij notenhout.</p><p><strong>11</strong>  De stam draagt en ondersteunt de bladerkroon, het gedeelte met de bladeren. De stam vormt de verbinding tussen de wortels en de kroon. Ook zorgt de stam voor het transport van de voedingssappen van de wortels naar de bladeren. De bladeren zijn de ademhalende organen van de boom.</p><p><strong>12</strong>  De takken dragen de bladeren, zij zijn meestal te dun om te gebruiken als werkhout. De dikste takken kunnen nog dienen om board of spaanplaat van te maken. De plaats waar een tak uit de stam is gegroeid zie je in het werkhout terug, we noemen dat een kwast of noest.</p><p><strong>13  Werkhout</strong><br>Het werkhout komt voornamelijk van de stam. Deze stam kunnen we onderverdelen in top, middenstam en ondereinde. Het beste en meest gelijkmatig gegroeide hout komt van de middenstam, het hout van de onderstam is meestal grover van structuur, terwijl het hout van de top meestal veel kwasten vertoont. Om ermee te kunnen werken is het dus van belang dat de stam zo groot en zo gaaf mogelijk is.</p>", "questionRange": [11, 16]}, {"id": 4, "intro": "Deze tekst gaat over het indelen van het werkrooster door werknemers zelf.", "title": "Zelf je rooster maken: een goed idee of niet?", "body": "<h2>Zelf je rooster maken: een goed idee of niet?</h2><p>Een werkrooster maken voor een bedrijf kan moeilijk zijn: welke werknemer kan op welke dagen werken? Hoeveel uur heeft iemand wekelijks beschikbaar voor werk? Het gebeurt vaak dat werknemers niet tevreden zijn over de uren die ze zijn ingeroosterd, want ze missen de zwemles van hun zoontje of moeten studeren voor een belangrijk examen. Steeds meer organisaties denken daarom na over ‘individueel roosteren’. Elke werknemer kan dan zélf invullen op welke dagen en welke tijden hij komt werken. Maar heb je daar als werknemer nu echt voordeel van? Is het beter voor je gezondheid en de balans tussen werk en privé? Of wordt het werk er alleen maar onregelmatiger door? Twee ervaringsdeskundigen wisselen van gedachten.</p><h4>Rechten en plichten</h4><p>Ineke Calis werkt als verpleegkundige in een ziekenhuis waar al individueel wordt geroosterd. Ineke legt uit hoe het roosteren bij haar in de praktijk gaat: “Wij hebben drie vaste werkdiensten van achtenhalf uur: dag, avond en nacht. Voor elke maand dien je jouw voorkeuren in voor bepaalde diensten. Daarnaast kun je ook ‘rode aanvragen’ doen. Dit zijn aanvragen voor een bepaalde dienst of vrije dag die je écht wilt hebben. De hoeveelheid rode diensten die je mag aanvragen is afhankelijk van het aantal contracturen. Je hebt dus rechten en plichten. Bij ons werkt individueel roosteren erg goed. Als collega’s kennen we vaak elkaars voorkeuren, dus daar houd je ook wel rekening mee.”</p><h4>Lastig</h4><p>Marco de Vos verzorgt het spooronderhoud voor treinen bij SAT Infratechniek, een bedrijf dat binnenkort over wil gaan op individueel roosteren. “Ik denk dat het individueel roosteren bij ons lastig wordt, omdat wij zeer ingewikkelde roosters hebben”, zegt Marco. “Het meeste spooronderhoud gebeurt ’s nachts en in het weekend, en daarnaast hebben we een 24-uurs storingsdienst die is opgedeeld in twee ploegen. Als werknemers hebben we een rooster gevraagd waarin we meer rust en duidelijkheid krijgen. Daarom wordt nu aan individueel roosteren gedacht. Maar bij ons is het roosteren een complexe aangelegenheid. Wij draaien er storingsdiensten bij, we werken in wisselende teams, hebben allemaal eigen specialismen en werken steeds op verschillende locaties met wisselende reistijden. Er zijn veel variabele factoren. Daardoor heb ik wel twijfels. Ik kan me voorstellen dat individueel roosteren bij veel organisaties met vaste diensten werkt, zoals bij Ineke.”</p><h4>Afstemming op de thuissituatie</h4><p>Ineke herkent het probleem van Marco: “Het werkt bij ons inderdaad goed, omdat wij allemaal overal ingezet kunnen worden. We hebben een vast team van bijna allemaal deeltijdwerkers, we werken op één locatie en er is collegialiteit in de afstemming. Daarnaast is het heel belangrijk dat de roosters worden gemaakt door mensen die zelf ook op de afdeling meewerken. Zij weten uit ervaring wat de impact is van een bepaalde reeks diensten. Ook met individueel roosteren blijven onregelmatige diensten zwaar, maar je kunt je werk nu beter afstemmen op de thuissituatie. Het voelt meer als een eigen keuze en dat is prettig. Inmiddels weet ik welke diensten het beste zijn voor mijn lichaam. Toch kan ik daar niet altijd rekening mee houden. Als ik alleen die diensten kies, zie ik mijn kinderen en mijn vriend nooit meer. Zij gaan natuurlijk voor.”</p><h4>Slaap- en eetpatroon</h4><p>Marco ziet zijn vrouw heel weinig. “Soms stuurt ze via de telefoon een foto om even te laten zien hoe ze er ook alweer uitziet”, lacht hij. “Maar het scheelt dat wij nog geen kinderen hebben, daardoor ben ik flexibeler. Ik vind het wel belangrijk dat ik eet waar ik op dat moment van de dag trek in heb. Als ik een middag heb geslapen en begin van de avond wakker word, eet ik meestal een normaal ontbijtje: twee boterhammen of een bord muesli. Tijdens de nachtdienst eet ik een stevige lunch, anders houd ik het niet vol.” “Het is juist goed om het normale eetpatroon aan te houden”, vindt Ineke. “Dus als je uit bed komt, gewoon het avondeten als ontbijt nemen. En ’s nachts alleen lichte snacks en veel drinken.”</p><h4>Betrokkenheid</h4><p>“Als je erover nadenkt ben je eigenlijk gek dat je op onregelmatige tijden werkt”, zegt Ineke. “Ik zeg wel eens tegen mijn collega’s: wij moeten wel heel veel om ons werk geven om dit te willen doen.” Marco herkent dat: “Wij werken op de gekste tijden en de reparaties staan altijd onder tijdsdruk. De gemiddelde leeftijd is bij ons ruim vijftig jaar. Toch zijn er weinig zieken. Dat komt gewoon omdat we betrokken zijn. De trein moet blijven rijden. Het is prachtig werk. Ik moet er niet aan denken om elke morgen om 9 uur achter hetzelfde bureau te gaan zitten.”</p><h4>Individueel roosteren?</h4><p>Met individueel roosteren krijgen werknemers meer zeggenschap over hun werktijden. Het werk kan beter worden afgestemd op de thuissituatie en een dienst voelt meer als een eigen keuze. Tegelijkertijd blijft het werken op onregelmatige tijden ook met individueel roosteren zwaar. Daar kun je weinig aan veranderen.</p>", "questionRange": [17, 21]}, {"id": 5, "intro": "Deze tekst staat op de website van JOB, een organisatie voor jongeren in het beroepsonderwijs (mbo).", "title": "Waar kun je terecht met je klachten?", "body": "<h2>Waar kun je terecht met je klachten?</h2><p>Heb jij een klacht of een vraag over je school of opleiding? Hier vind je informatie over waar je terecht kan en wat je kan doen. Lees de informatie goed door. Als je er toch niet uit komt, neem dan contact op met JOB. Hieronder staat beschreven wanneer je bij wie terecht kan met je probleem.</p><h4>De studentenraad</h4><p>De studenten die in de studentenraad zitten, zijn de vertegenwoordigers van alle studenten in de school. Zij mogen meebeslissen over het beleid. Zij willen daarom graag op de hoogte zijn van de klachten binnen jullie school. Ze kunnen dan aan de slag om het onderwijs te verbeteren.</p><h4>De klachtenprocedure binnen de school</h4><p><strong>Mentor, opleidingsmanager en directie</strong><br>Ga altijd eerst met je klacht of probleem naar je mentor of opleidingscoördinator. Kom je er met hen niet uit, dan zoek je contact met de directie. Het is altijd verstandig om je klacht ook schriftelijk in te dienen. Dat kan per brief of per e-mail. Omschrijf wat het probleem is en waarom de school fout zit. Probeer vervolgens te beschrijven wat de school kan doen om het op te lossen. Naar aanleiding van de brief wordt een afspraak met je gemaakt om over het probleem te praten. Zorg dat de afspraken worden opgeschreven. Dan heb je een bewijs. Zorg dat de afspraak helder is, dus hoe, wat, met wie en wanneer.</p><p><strong>De interne klachtencommissie</strong><br>Als de mentor, opleidingscoördinator en de directie
